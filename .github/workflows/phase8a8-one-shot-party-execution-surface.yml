name: Phase 8A.8 Party Execution Surface
on:
  push:
    branches: [develop/phase8a8-customer-export-jobs]
permissions:
  contents: write
jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a8-customer-export-jobs
          fetch-depth: 0
      - name: Expose Party export execution read
        shell: python
        run: |
          from pathlib import Path
          p=Path('crates/crm-parties-query-adapter/src/lib.rs')
          s=p.read_text()
          if 'mod export_execution;' not in s:
              s=s.replace('mod export_selection;','mod export_execution;\nmod export_selection;',1)
          if 'pub use export_execution::*;' not in s:
              s=s.replace('pub use export_selection::*;','pub use export_execution::*;\npub use export_selection::*;',1)
          p.write_text(s)
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - run: rm .github/workflows/phase8a8-one-shot-party-execution-surface.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m 'Expose governed Party export execution read' && git push origin HEAD:develop/phase8a8-customer-export-jobs
