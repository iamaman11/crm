name: Phase 6A normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-domain-contracts-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Encapsulate invariant-bearing values and aggregates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(content: str, old: str, new: str, label: str) -> str:
              if content.count(old) != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {content.count(old)}')
              return content.replace(old, new, 1)

          contracts = Path('crates/crm-core-contracts/src/lib.rs')
          content = contracts.read_text()
          content = replace_once(
              content,
              '''pub struct Money {
              pub minor_units: i128,
              pub currency: CurrencyCode,
          }
          ''',
              '''pub struct Money {
              minor_units: i128,
              currency: CurrencyCode,
          }
          ''',
              'Money fields',
          )
          content = replace_once(
              content,
              '''    pub fn non_negative(self) -> Result<Self, ContractError> {
          ''',
              '''    pub const fn minor_units(&self) -> i128 {
                  self.minor_units
              }

              pub const fn currency(&self) -> &CurrencyCode {
                  &self.currency
              }

              pub fn non_negative(self) -> Result<Self, ContractError> {
          ''',
              'Money getters',
          )
          content = replace_once(
              content,
              '''pub struct CalendarDate {
              pub year: i32,
              pub month: u8,
              pub day: u8,
          }
          ''',
              '''pub struct CalendarDate {
              year: i32,
              month: u8,
              day: u8,
          }
          ''',
              'CalendarDate fields',
          )
          content = replace_once(
              content,
              '''impl CalendarDate {
              pub fn try_new(year: i32, month: u8, day: u8) -> Result<Self, ContractError> {
          ''',
              '''impl CalendarDate {
              pub const fn year(self) -> i32 {
                  self.year
              }

              pub const fn month(self) -> u8 {
                  self.month
              }

              pub const fn day(self) -> u8 {
                  self.day
              }

              pub fn try_new(year: i32, month: u8, day: u8) -> Result<Self, ContractError> {
          ''',
              'CalendarDate getters',
          )
          content = content.replace('money.minor_units, 12_345', 'money.minor_units(), 12_345')
          contracts.write_text(content)

          sales = Path('modules/crm-sales/src/domain.rs')
          content = sales.read_text()
          content = replace_once(
              content,
              '''pub struct DealStage {
              pub pipeline_id: PipelineId,
              pub stage_id: StageId,
              pub ordinal: u16,
          }
          ''',
              '''pub struct DealStage {
              pipeline_id: PipelineId,
              stage_id: StageId,
              ordinal: u16,
          }
          ''',
              'DealStage fields',
          )
          content = replace_once(
              content,
              '''impl DealStage {
              pub fn try_new(
          ''',
              '''impl DealStage {
              pub fn pipeline_id(&self) -> &PipelineId {
                  &self.pipeline_id
              }

              pub fn stage_id(&self) -> &StageId {
                  &self.stage_id
              }

              pub const fn ordinal(&self) -> u16 {
                  self.ordinal
              }

              pub fn try_new(
          ''',
              'DealStage getters',
          )
          content = replace_once(
              content,
              '''pub struct DealCloseOutcome {
              pub status: DealStatus,
              pub reason_code: ReasonCode,
              pub closed_at_unix_nanos: i64,
          }
          ''',
              '''pub struct DealCloseOutcome {
              status: DealStatus,
              reason_code: ReasonCode,
              closed_at_unix_nanos: i64,
          }

          impl DealCloseOutcome {
              pub const fn status(&self) -> DealStatus {
                  self.status
              }

              pub fn reason_code(&self) -> &ReasonCode {
                  &self.reason_code
              }

              pub const fn closed_at_unix_nanos(&self) -> i64 {
                  self.closed_at_unix_nanos
              }
          }
          ''',
              'DealCloseOutcome',
          )
          content = replace_once(
              content,
              '''pub struct Deal {
              pub deal_id: RecordId,
              pub name: String,
              pub owner: DealOwner,
              pub account: Option<ResourceRef>,
              pub primary_contact: Option<ResourceRef>,
              pub stage: DealStage,
              pub status: DealStatus,
              pub amount: Option<Money>,
              pub expected_close_date: Option<CalendarDate>,
              pub probability: BasisPoints,
              pub close_outcome: Option<DealCloseOutcome>,
              pub created_at_unix_nanos: i64,
              pub updated_at_unix_nanos: i64,
              pub version: i64,
          }
          ''',
              '''pub struct Deal {
              deal_id: RecordId,
              name: String,
              owner: DealOwner,
              account: Option<ResourceRef>,
              primary_contact: Option<ResourceRef>,
              stage: DealStage,
              status: DealStatus,
              amount: Option<Money>,
              expected_close_date: Option<CalendarDate>,
              probability: BasisPoints,
              close_outcome: Option<DealCloseOutcome>,
              created_at_unix_nanos: i64,
              updated_at_unix_nanos: i64,
              version: i64,
          }
          ''',
              'Deal fields',
          )
          content = replace_once(
              content,
              '''impl Deal {
              pub fn create(command: CreateDeal) -> Result<Self, SdkError> {
          ''',
              '''impl Deal {
              pub fn deal_id(&self) -> &RecordId { &self.deal_id }
              pub fn name(&self) -> &str { &self.name }
              pub fn owner(&self) -> &DealOwner { &self.owner }
              pub fn account(&self) -> Option<&ResourceRef> { self.account.as_ref() }
              pub fn primary_contact(&self) -> Option<&ResourceRef> { self.primary_contact.as_ref() }
              pub fn stage(&self) -> &DealStage { &self.stage }
              pub const fn status(&self) -> DealStatus { self.status }
              pub fn amount(&self) -> Option<&Money> { self.amount.as_ref() }
              pub const fn expected_close_date(&self) -> Option<CalendarDate> { self.expected_close_date }
              pub const fn probability(&self) -> BasisPoints { self.probability }
              pub fn close_outcome(&self) -> Option<&DealCloseOutcome> { self.close_outcome.as_ref() }
              pub const fn created_at_unix_nanos(&self) -> i64 { self.created_at_unix_nanos }
              pub const fn updated_at_unix_nanos(&self) -> i64 { self.updated_at_unix_nanos }
              pub const fn version(&self) -> i64 { self.version }

              pub fn create(command: CreateDeal) -> Result<Self, SdkError> {
          ''',
              'Deal getters',
          )
          content = content.replace('amount.minor_units < 0', 'amount.minor_units() < 0')
          content = content.replace('deal.amount.unwrap().minor_units,', 'deal.amount().unwrap().minor_units(),')
          sales.write_text(content)

          activities = Path('modules/crm-activities/src/domain.rs')
          content = activities.read_text()
          content = replace_once(
              content,
              '''pub struct Task {
              pub task_id: RecordId,
              pub subject: String,
              pub description: Option<String>,
              pub owner: TaskOwner,
              pub related_resources: Vec<ResourceRef>,
              pub priority: TaskPriority,
              pub status: TaskStatus,
              pub due_at_unix_nanos: Option<i64>,
              pub reminder_at_unix_nanos: Option<i64>,
              pub completed_at_unix_nanos: Option<i64>,
              pub created_at_unix_nanos: i64,
              pub updated_at_unix_nanos: i64,
              pub version: i64,
          }
          ''',
              '''pub struct Task {
              task_id: RecordId,
              subject: String,
              description: Option<String>,
              owner: TaskOwner,
              related_resources: Vec<ResourceRef>,
              priority: TaskPriority,
              status: TaskStatus,
              due_at_unix_nanos: Option<i64>,
              reminder_at_unix_nanos: Option<i64>,
              completed_at_unix_nanos: Option<i64>,
              created_at_unix_nanos: i64,
              updated_at_unix_nanos: i64,
              version: i64,
          }
          ''',
              'Task fields',
          )
          content = replace_once(
              content,
              '''impl Task {
              pub fn create(command: CreateTask) -> Result<Self, SdkError> {
          ''',
              '''impl Task {
              pub fn task_id(&self) -> &RecordId { &self.task_id }
              pub fn subject(&self) -> &str { &self.subject }
              pub fn description(&self) -> Option<&str> { self.description.as_deref() }
              pub fn owner(&self) -> &TaskOwner { &self.owner }
              pub fn related_resources(&self) -> &[ResourceRef] { &self.related_resources }
              pub const fn priority(&self) -> TaskPriority { self.priority }
              pub const fn status(&self) -> TaskStatus { self.status }
              pub const fn due_at_unix_nanos(&self) -> Option<i64> { self.due_at_unix_nanos }
              pub const fn reminder_at_unix_nanos(&self) -> Option<i64> { self.reminder_at_unix_nanos }
              pub const fn completed_at_unix_nanos(&self) -> Option<i64> { self.completed_at_unix_nanos }
              pub const fn created_at_unix_nanos(&self) -> i64 { self.created_at_unix_nanos }
              pub const fn updated_at_unix_nanos(&self) -> i64 { self.updated_at_unix_nanos }
              pub const fn version(&self) -> i64 { self.version }

              pub fn create(command: CreateTask) -> Result<Self, SdkError> {
          ''',
              'Task getters',
          )
          activities.write_text(content)
          PY
      - name: Validate invariant-safe Phase 6A
        shell: bash
        run: |
          set -o pipefail
          cargo generate-lockfile 2>&1 | tee phase6a-normalize.log
          cargo fmt --all 2>&1 | tee -a phase6a-normalize.log
          cargo test -p crm-core-contracts -p crm-sales -p crm-activities 2>&1 | tee -a phase6a-normalize.log
          cargo clippy -p crm-core-contracts -p crm-sales -p crm-activities --all-targets -- -D warnings 2>&1 | tee -a phase6a-normalize.log
          git diff --check 2>&1 | tee -a phase6a-normalize.log
      - name: Upload normalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6a-normalize-diagnostics
          path: phase6a-normalize.log
          if-no-files-found: error
          retention-days: 7
      - name: Commit invariant-safe files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No encapsulation changes required."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/crm-core-contracts/src/lib.rs modules/crm-sales/src modules/crm-activities/src
          git commit -m "Encapsulate Phase 6A domain invariants"
          git push origin HEAD:feature/sales-activities-domain-contracts-v1
