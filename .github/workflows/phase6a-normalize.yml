name: Phase 6A normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-domain-contracts-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply focused Clippy normalization
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/crm-core-contracts/src/lib.rs')
          content = path.read_text()

          old_patch = '''#[derive(Debug, Clone, PartialEq, Eq)]
          pub enum Patch<T> {
              Keep,
              Set(T),
              Clear,
          }

          impl<T> Default for Patch<T> {
              fn default() -> Self {
                  Self::Keep
              }
          }
          '''
          new_patch = '''#[derive(Debug, Clone, PartialEq, Eq, Default)]
          pub enum Patch<T> {
              #[default]
              Keep,
              Set(T),
              Clear,
          }
          '''
          old_page = '''#[derive(Debug, Clone, PartialEq, Eq)]
          pub struct PageRequest {
              pub cursor: Option<Cursor>,
              pub page_size: PageSize,
          }

          impl Default for PageRequest {
              fn default() -> Self {
                  Self {
                      cursor: None,
                      page_size: PageSize::default(),
                  }
              }
          }
          '''
          new_page = '''#[derive(Debug, Clone, PartialEq, Eq, Default)]
          pub struct PageRequest {
              pub cursor: Option<Cursor>,
              pub page_size: PageSize,
          }
          '''

          if old_patch not in content:
              raise SystemExit('manual Patch<T> Default implementation was not found')
          if old_page not in content:
              raise SystemExit('manual PageRequest Default implementation was not found')

          content = content.replace(old_patch, new_patch, 1)
          content = content.replace(old_page, new_page, 1)
          path.write_text(content)
          PY
      - name: Normalize and validate Phase 6A
        shell: bash
        run: |
          set -o pipefail
          cargo generate-lockfile 2>&1 | tee phase6a-normalize.log
          cargo fmt --all 2>&1 | tee -a phase6a-normalize.log
          cargo test -p crm-core-contracts -p crm-sales -p crm-activities 2>&1 | tee -a phase6a-normalize.log
          cargo clippy -p crm-core-contracts -p crm-sales -p crm-activities --all-targets -- -D warnings 2>&1 | tee -a phase6a-normalize.log
          git diff --check 2>&1 | tee -a phase6a-normalize.log
      - name: Upload normalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6a-normalize-diagnostics
          path: phase6a-normalize.log
          if-no-files-found: error
          retention-days: 7
      - name: Commit normalized files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No normalization changes required."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/crm-core-contracts/src/lib.rs modules/crm-sales/src modules/crm-activities/src
          git commit -m "Normalize Phase 6A domain contracts"
          git push origin HEAD:feature/sales-activities-domain-contracts-v1
