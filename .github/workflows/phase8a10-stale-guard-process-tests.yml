name: Phase 8A.10 Stale Guard Process Tests

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/phase8a10-stale-guard-process-tests.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_review_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_review_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5443
      PGDATABASE: crm_customer_enrichment_review_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5443/crm_customer_enrichment_review_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5443/crm_customer_enrichment_review_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply stale guard process-test patches
        run: |
          python scripts/patch_phase8a10_stale_guard_process_tests.py
          python scripts/patch_phase8a10_stale_guard_process_counts.py
          cargo fmt --all
      - name: Verify stale review and application guards
        run: |
          set -euo pipefail
          bash scripts/run_customer_enrichment_review_process.sh
          cargo clippy -p crm-customer-enrichment-review-composition \
            -p crm-customer-enrichment-application-composition \
            --all-targets -- -D warnings
      - name: Commit verified PostgreSQL guard evidence
        run: |
          set -euo pipefail
          rm .github/workflows/phase8a10-stale-guard-process-tests.yml
          rm scripts/patch_phase8a10_stale_guard_process_tests.py
          rm scripts/patch_phase8a10_stale_guard_process_counts.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Prove stale review and application guards'
          git push origin HEAD:agent/phase8a10-customer-enrichment
