name: Sync search branch generated files

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "**/*.rs"
      - ".github/workflows/sync-search-branch.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
      - uses: dtolnay/rust-toolchain@stable
      - name: Synchronize lockfile and formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
          rm .github/workflows/sync-search-branch.yml
      - name: Commit exact generated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock '*.toml' crates database .github/workflows/sync-search-branch.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "sync search branch generated files"
          git push origin HEAD:develop/phase7-permission-aware-search
