name: One-shot Phase 4C formatting

on:
  push:
    branches:
      - feature/postgres-data-adapter-v2
    paths:
      - .github/workflows/phase4c-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/postgres-data-adapter-v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatted sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates modules services
          git commit -m "style: format Phase 4C Rust sources"
          git push origin HEAD:feature/postgres-data-adapter-v2
