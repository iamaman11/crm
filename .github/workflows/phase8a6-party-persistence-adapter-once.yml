name: Phase 8A.6 Party Persistence Adapter Once

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/phase8a6-party-persistence-adapter-once.yml"

permissions:
  contents: write

jobs:
  adapt:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Add Party v1-read v2-write persistence compatibility
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-parties-capability-adapter/src/planner.rs")
          text = path.read_text()
          old_import = '''use crm_parties::{
    CreateParty, PARTY_STATE_MAXIMUM_BYTES, PARTY_STATE_RETENTION_POLICY_ID, PARTY_STATE_SCHEMA_ID,
    PARTY_STATE_SCHEMA_VERSION, Party, PartyId, PartyKind, UpdateParty, decode_party_state,
    encode_party_state, party_state_descriptor_hash,
};
'''
          new_import = '''use crm_parties::{
    CreateParty, PARTY_STATE_MAXIMUM_BYTES, PARTY_STATE_RETENTION_POLICY_ID, PARTY_STATE_SCHEMA_ID,
    PARTY_STATE_SCHEMA_VERSION, PARTY_STATE_V1_SCHEMA_VERSION, Party, PartyId, PartyKind,
    UpdateParty, decode_party_state, encode_party_state, party_state_descriptor_hash,
    party_state_v1_descriptor_hash,
};
'''
          if old_import not in text:
              raise SystemExit("Party persistence import anchor not found")
          text = text.replace(old_import, new_import, 1)

          old_contract = '''pub fn persisted_contract() -> PersistedPayloadContract<'static> {
    PersistedPayloadContract {
        owner: MODULE_ID,
        schema_id: PARTY_STATE_SCHEMA_ID,
        schema_version: PARTY_STATE_SCHEMA_VERSION,
        descriptor_hash: party_state_descriptor_hash(),
        maximum_size_bytes: PARTY_STATE_MAXIMUM_BYTES,
        retention_policy_id: PARTY_STATE_RETENTION_POLICY_ID,
    }
}
'''
          new_contract = old_contract + '''
fn legacy_v1_persisted_contract() -> PersistedPayloadContract<'static> {
    PersistedPayloadContract {
        owner: MODULE_ID,
        schema_id: PARTY_STATE_SCHEMA_ID,
        schema_version: PARTY_STATE_V1_SCHEMA_VERSION,
        descriptor_hash: party_state_v1_descriptor_hash(),
        maximum_size_bytes: PARTY_STATE_MAXIMUM_BYTES,
        retention_policy_id: PARTY_STATE_RETENTION_POLICY_ID,
    }
}
'''
          if old_contract not in text:
              raise SystemExit("Party persisted contract anchor not found")
          text = text.replace(old_contract, new_contract, 1)

          old_reader = '''pub fn party_from_snapshot(snapshot: &RecordSnapshot) -> Result<Party, SdkError> {
    let party = decode_party_state(support::persisted_json_bytes_with_data_class(
        snapshot,
        persisted_contract(),
        DataClass::Personal,
    )?)?;
    if party.party_id().as_str() != snapshot.reference.record_id.as_str()
        || party.version() != snapshot.version
    {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_IDENTITY_INVALID",
        ));
    }
    Ok(party)
}
'''
          new_reader = '''pub fn party_from_snapshot(snapshot: &RecordSnapshot) -> Result<Party, SdkError> {
    let contract = if snapshot.payload.schema_version.as_str() == PARTY_STATE_SCHEMA_VERSION
        && snapshot.payload.descriptor_hash == party_state_descriptor_hash()
    {
        persisted_contract()
    } else if snapshot.payload.schema_version.as_str() == PARTY_STATE_V1_SCHEMA_VERSION
        && snapshot.payload.descriptor_hash == party_state_v1_descriptor_hash()
    {
        legacy_v1_persisted_contract()
    } else {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_CONTRACT_INVALID",
        ));
    };
    let party = decode_party_state(support::persisted_json_bytes_with_data_class(
        snapshot,
        contract,
        DataClass::Personal,
    )?)?;
    if party.party_id().as_str() != snapshot.reference.record_id.as_str()
        || party.version() != snapshot.version
    {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_IDENTITY_INVALID",
        ));
    }
    Ok(party)
}
'''
          if old_reader not in text:
              raise SystemExit("Party snapshot reader anchor not found")
          path.write_text(text.replace(old_reader, new_reader, 1))
          PY
      - name: Verify Party persistence compatibility
        run: |
          cargo fmt --all
          cargo clippy -p crm-parties -p crm-parties-capability-adapter --all-targets --all-features -- -D warnings
          cargo test -p crm-parties -p crm-parties-capability-adapter
      - name: Remove one-shot workflow and commit
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm .github/workflows/phase8a6-party-persistence-adapter-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/crm-parties crates/crm-parties-capability-adapter .github/workflows/phase8a6-party-persistence-adapter-once.yml
          git commit -m "Add Party v1-read v2-write persistence compatibility"
          git push origin "HEAD:${HEAD_BRANCH}"
