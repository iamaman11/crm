name: One-shot branch repair

on:
  push:
    branches:
      - feature/roadmap-and-module-manifest-ir
    paths:
      - .github/workflows/branch-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/roadmap-and-module-manifest-ir
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply deterministic source repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/crm-module-manifest/src/lib.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "matches!(byte, b'_' | b'-')",
              "matches!(*byte, b'_' | b'-')",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          git diff --check
      - name: Commit formatted sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-module-manifest/src
          if git diff --cached --quiet; then
            echo "No repair changes required"
          else
            git commit -m "style: format module manifest implementation"
            git push origin HEAD:feature/roadmap-and-module-manifest-ir
          fi
