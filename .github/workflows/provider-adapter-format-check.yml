name: Provider Adapter Format Check

on:
  pull_request:
    branches: [main]
    paths:
      - crates/crm-customer-enrichment-provider-registry/src/lib.rs
      - .github/workflows/provider-adapter-format-check.yml

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - run: cargo test -p crm-customer-enrichment-provider-registry
      - name: Run strict Clippy
        id: clippy
        continue-on-error: true
        shell: bash
        run: cargo clippy -p crm-customer-enrichment-provider-registry --all-targets -- -D warnings > provider-adapter-clippy.txt 2>&1
      - name: Upload provider adapter diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: provider-adapter-focused-diagnostics
          path: |
            provider-adapter-clippy.txt
            crates/crm-customer-enrichment-provider-registry/src/lib.rs
      - name: Enforce strict Clippy result
        if: steps.clippy.outcome != 'success'
        run: exit 1
