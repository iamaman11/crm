name: Provider Adapter Format Check

on:
  pull_request:
    branches: [main]
    paths:
      - crates/crm-customer-enrichment-provider-registry/src/lib.rs
      - .github/workflows/provider-adapter-format-check.yml

permissions:
  contents: write

jobs:
  verify-and-commit:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply strict Clippy correction
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-customer-enrichment-provider-registry/src/lib.rs")
          text = path.read_text()
          old = '''    use std::task::{Context, Poll, Wake, Waker};

    #[derive(Debug)]
    struct NoopWake;

    impl Wake for NoopWake {
        fn wake(self: Arc<Self>) {}
    }

    fn block_on<F>(future: F) -> F::Output
    where
        F: Future,
    {
        let waker = Waker::from(Arc::new(NoopWake));
        let mut context = Context::from_waker(&waker);
'''
          new = '''    use std::task::{Context, Poll, Waker};

    fn block_on<F>(future: F) -> F::Output
    where
        F: Future,
    {
        let mut context = Context::from_waker(Waker::noop());
'''
          if text.count(old) != 1:
              raise SystemExit("expected exactly one manual no-op waker block")
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          cargo test -p crm-customer-enrichment-provider-registry
          cargo clippy -p crm-customer-enrichment-provider-registry --all-targets -- -D warnings
      - name: Commit verified provider adapter boundary
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/provider-adapter-format-check.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-customer-enrichment-provider-registry/src/lib.rs \
            .github/workflows/provider-adapter-format-check.yml
          git diff --cached --check
          git commit -m "Verify governed provider adapter boundary"
          git push origin HEAD:agent/phase8a10-customer-enrichment
