name: Phase 6C diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-persistence-planners-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply patch and collect diagnostics
        shell: bash
        run: |
          cat <<'PATCH64' | base64 --decode | gzip --decompress > /tmp/phase6c.patch
          
          PATCH64
          patch -p1 < /tmp/phase6c.patch
          mkdir -p /tmp/phase6c-diagnostics
          set +e
          cargo fmt --all > /tmp/phase6c-diagnostics/fmt.txt 2>&1
          fmt_status=$?
          cargo test -p crm-core-data --lib > /tmp/phase6c-diagnostics/test.txt 2>&1
          test_status=$?
          cargo clippy -p crm-core-data --all-targets --all-features -- -D warnings > /tmp/phase6c-diagnostics/clippy.txt 2>&1
          clippy_status=$?
          printf 'fmt=%s test=%s clippy=%s\n' "$fmt_status" "$test_status" "$clippy_status" > /tmp/phase6c-diagnostics/status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase6c-compiler-diagnostics
          path: /tmp/phase6c-diagnostics/
          if-no-files-found: error
          retention-days: 3
