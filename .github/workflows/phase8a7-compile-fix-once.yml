name: Phase 8A.7 Compile Fix Once

on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - .github/workflows/phase8a7-compile-fix-once.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact compile fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-customer-data-operations-capability-adapter/src/planner.rs')
          text = path.read_text()
          text = text.replace('&std::collections::HashMap<String, String>', '&std::collections::BTreeMap<String, String>')
          text = text.replace('&event.aggregate,', '&event.event.aggregate,')
          path.write_text(text)
          PY
          cargo fmt --all
          rm .github/workflows/phase8a7-compile-fix-once.yml
      - name: Commit fixes and self-remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(phase8a7): align planner with generated map and event evidence"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
