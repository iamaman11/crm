name: Phase 7G Maintenance

on:
  push:
    branches:
      - develop/phase7-governed-metadata-api
    paths:
      - ".github/workflows/phase7g-maintenance.yml"

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-governed-metadata-api
      - uses: dtolnay/rust-toolchain@stable
      # Regenerate from the complete workspace after all current Phase 7G members are present.
      - run: cargo generate-lockfile
      - run: cargo fmt --all
      - name: Commit generated maintenance changes
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates
          git commit -m "Phase 7G: format Rust and refresh lockfile"
          git push origin HEAD:develop/phase7-governed-metadata-api
