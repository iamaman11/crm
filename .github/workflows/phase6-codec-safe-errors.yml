name: Phase 6 codec safe errors

on:
  push:
    branches:
      - feature/sales-activities-domain-planners-v1
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-domain-planners-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Correct persisted-state error boundary
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              Path("modules/crm-sales/src/persistence.rs"): [
                  (
                      "    Deal::rehydrate(state.try_into()?)\n",
                      "    let snapshot = state.try_into()?;\n    Deal::rehydrate(snapshot).map_err(|error| {\n        persisted_error(format!(\"{}: {}\", error.code, error.safe_message))\n    })\n",
                  ),
                  (
                      '''fn persisted_error(message: impl Into<String>) -> SdkError {\n    SdkError::new(\n        "SALES_DEAL_PERSISTED_STATE_INVALID",\n        ErrorCategory::InvalidArgument,\n        false,\n        message,\n    )\n}\n''',
                      '''fn persisted_error(message: impl Into<String>) -> SdkError {\n    SdkError::new(\n        "SALES_DEAL_PERSISTED_STATE_INVALID",\n        ErrorCategory::Internal,\n        false,\n        "The persisted deal state is invalid.",\n    )\n    .with_internal_reference(message)\n}\n''',
                  ),
                  ('            "SALES_CLOSED_DEAL_OUTCOME_REQUIRED"\n', '            "SALES_DEAL_PERSISTED_STATE_INVALID"\n'),
              ],
              Path("modules/crm-activities/src/persistence.rs"): [
                  (
                      "    Task::rehydrate(state.try_into()?)\n",
                      "    let snapshot = state.try_into()?;\n    Task::rehydrate(snapshot).map_err(|error| {\n        persisted_error(format!(\"{}: {}\", error.code, error.safe_message))\n    })\n",
                  ),
                  (
                      '''fn persisted_error(message: impl Into<String>) -> SdkError {\n    SdkError::new(\n        "ACTIVITIES_TASK_PERSISTED_STATE_INVALID",\n        ErrorCategory::InvalidArgument,\n        false,\n        message,\n    )\n}\n''',
                      '''fn persisted_error(message: impl Into<String>) -> SdkError {\n    SdkError::new(\n        "ACTIVITIES_TASK_PERSISTED_STATE_INVALID",\n        ErrorCategory::Internal,\n        false,\n        "The persisted task state is invalid.",\n    )\n    .with_internal_reference(message)\n}\n''',
                  ),
                  ('            "ACTIVITIES_COMPLETED_TASK_TIME_REQUIRED"\n', '            "ACTIVITIES_TASK_PERSISTED_STATE_INVALID"\n'),
              ],
          }

          for path, edits in replacements.items():
              source = path.read_text(encoding="utf-8")
              for old, new in edits:
                  if source.count(old) != 1:
                      raise SystemExit(f"expected exactly one match in {path}: {old!r}")
                  source = source.replace(old, new, 1)
              path.write_text(source, encoding="utf-8")
      - name: Verify safe-error correction
        run: |
          cargo fmt --all
          python scripts/check_architecture.py
          cargo test -p crm-sales -p crm-activities
          cargo clippy -p crm-sales -p crm-activities --all-targets --all-features -- -D warnings
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/crm-sales/src/persistence.rs modules/crm-activities/src/persistence.rs
          git diff --cached --check
          git commit -m "fix: keep persisted-state diagnostics internal"
          git push origin HEAD:feature/sales-activities-domain-planners-v1
