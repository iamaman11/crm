name: Phase 6H format PostgreSQL query reader

on:
  push:
    branches:
      - feature/phase6h-postgres-query-reader-v1
    paths:
      - .github/workflows/phase6h-format-postgres-query.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-postgres-query-reader-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - name: Commit query reader formatting only
        run: |
          git add \
            crates/crm-core-data/src/postgres_query.rs \
            crates/crm-core-data/tests/postgres_query.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Format Phase 6H PostgreSQL query reader"
          git push origin HEAD:feature/phase6h-postgres-query-reader-v1
