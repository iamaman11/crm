name: Sync Phase 7 roadmap once

on:
  pull_request:
    paths:
      - ".github/workflows/sync-phase7-roadmap-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - name: Synchronize normative Phase 7 packet state
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("docs/IMPLEMENTATION_ROADMAP.md")
          text = path.read_text()
          replacements = [
              ("### Generalized projection runtime — #65 / PR #67 — Gate review", "### Generalized projection runtime — #65 / merged PR #67 — Complete"),
              ("The generic runtime has no Sales, Activities or PostgreSQL implementation dependency. Implementation and production acceptance are complete; merge of PR #67 closes #65 after all required checks are green on one exact review head.", "The generic runtime has no Sales, Activities or PostgreSQL implementation dependency. PR #67 was merged as `195448ab3cd70fe051967faf4f8ed87372fb3551`; #65 is complete."),
              ("### Next executable platform packet\n\n1. [#66](https://github.com/iamaman11/crm/issues/66) — build tenant- and permission-aware search with deterministic reindexing on the shared projection runtime.", "### Current executable platform packet\n\n[#66](https://github.com/iamaman11/crm/issues/66) / draft PR #68 is **In progress**: tenant- and permission-aware search with deterministic reindexing on the shared projection runtime.\n\nThe packet now includes candidate-only search, live resource/field visibility re-checks, immutable logical index generations, PostgreSQL FTS as a replaceable adapter, governed `search.global.query` ingress, application-runtime composition, immediate permission-revocation acceptance and canonical migration/runtime gates.\n\nThe packet remains **In progress** until compile/Clippy/test stabilization is complete and Contract, Governance, Rust, Database, Projection Runtime, Event Runtime, Search Runtime, Application Runtime and generated-source synchronization checks are simultaneously green on one exact review head."),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"roadmap anchor mismatch: {old[:60]!r}, count={count}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          rm .github/workflows/sync-phase7-roadmap-once.yml
      - name: Commit roadmap synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Synchronize Phase 7 roadmap state"
          git push origin HEAD:develop/phase7-permission-aware-search
