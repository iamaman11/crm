name: Phase 8A.2 Legacy Upgrade Gate Fix

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice

permissions:
  contents: write

concurrency:
  group: phase8a2-legacy-upgrade-gate-fix
  cancel-in-progress: true

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - name: Replace stale legacy-upgrade file references
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/database.yml')
          text = path.read_text()
          old = '''      - name: Apply legacy snapshot and upgrade migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/tests/fixtures/legacy_pre_versioning.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0009_search_index_generations.up.sql
      - name: Verify legacy rows were upgraded with defaults
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0002_platform_upgrade.sql
'''
          new = '''      - name: Verify legacy snapshot upgrade through current migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/tests/0002_legacy_upgrade.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0009_search_index_generations.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0010_metadata_publication_runtime.up.sql
'''
          if text.count(old) != 1:
              raise SystemExit('legacy-upgrade workflow block changed unexpectedly')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit gate repair and remove one-shot workflow
        run: |
          git rm .github/workflows/phase8a2-legacy-upgrade-fix.yml
          git add .github/workflows/database.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Repair legacy database upgrade gate"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
