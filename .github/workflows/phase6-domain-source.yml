name: Phase 6 domain source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Archive repository source
        run: git archive --format=tar.gz --output=/tmp/phase6-domain-source.tar.gz HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: phase6-domain-source
          path: /tmp/phase6-domain-source.tar.gz
          if-no-files-found: error
          retention-days: 3
