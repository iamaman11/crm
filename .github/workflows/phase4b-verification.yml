name: One-shot Phase 4B independent verification

on:
  push:
    branches:
      - feature/postgres-data-adapter-v1
    paths:
      - .github/workflows/phase4b-verification.yml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/postgres-data-adapter-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Verify architecture and Rust dependency lock
        run: |
          python scripts/check_architecture.py
          cargo generate-lockfile
          test -z "$(git status --porcelain -- Cargo.lock)"
      - name: Verify Rust quality
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
      - name: Verify PostgreSQL migrations and invariants
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
          cargo test -p crm-core-data --features postgres-integration --test postgres_foundation
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
          test "$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")" = "0"
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
      - name: Record independent verification evidence
        run: |
          gh pr comment 19 --repo "${GITHUB_REPOSITORY}" --body "Phase 4B independent verification **PASS** for commit \`${GITHUB_SHA}\`: architecture boundary, Cargo lockfile, rustfmt, Clippy with warnings denied, workspace tests, PostgreSQL 17 migrations, SQL invariant suite, SQLx tenant/atomicity fault-injection test, rollback and clean reapply all succeeded."
