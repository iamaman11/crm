name: Governance CI

on:
  push:
    paths:
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "tests/test_module_manifest_validation.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/workflows/governance.yml"
  pull_request:
    paths:
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "tests/test_module_manifest_validation.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/workflows/governance.yml"

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Validate module manifests
        run: python scripts/validate_module_manifests.py
      - name: Test strict format and dependency enforcement
        run: python -m unittest tests/test_module_manifest_validation.py
      - name: Enforce architecture boundaries
        run: python scripts/check_architecture.py
