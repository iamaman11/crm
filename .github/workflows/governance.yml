name: Governance CI

on:
  push:
    paths:
      - "AGENTS.md"
      - "Cargo.toml"
      - "contracts/**"
      - "crates/crm-application-composition/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-module-manifest/**"
      - "docs/ARCHITECTURE_READINESS.md"
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/APPLICATION_ARCHITECTURE.md"
      - "docs/DELIVERY_GOVERNANCE.md"
      - "docs/DEVELOPMENT_WORKFLOW.md"
      - "docs/IMPLEMENTATION_ROADMAP.md"
      - "docs/PROJECT_STATUS.md"
      - "docs/PHASE8_DELIVERY_PLAN.md"
      - "docs/MODULE_CATALOG.md"
      - "docs/CRM_CAPABILITY_COVERAGE.md"
      - "docs/MODULE_DEVELOPMENT.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/check_module_compatibility.py"
      - "scripts/check_production_route_classifications.py"
      - "scripts/check_native_module_composition.py"
      - "scripts/compile_module_manifest_ir.py"
      - "scripts/module_manifest_projection.py"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "scripts/scaffold_module.py"
      - "scripts/repo.py"
      - "tests/test_contract_bindings.py"
      - "tests/test_module_compatibility.py"
      - "tests/test_module_manifest_validation.py"
      - "tests/test_module_scaffolding.py"
      - "tests/test_production_route_classifications.py"
      - "tests/test_native_module_composition.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/pull_request_template.md"
      - ".github/workflows/governance.yml"
  pull_request:
    paths:
      - "AGENTS.md"
      - "Cargo.toml"
      - "contracts/**"
      - "crates/crm-application-composition/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-module-manifest/**"
      - "docs/ARCHITECTURE_READINESS.md"
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/APPLICATION_ARCHITECTURE.md"
      - "docs/DELIVERY_GOVERNANCE.md"
      - "docs/DEVELOPMENT_WORKFLOW.md"
      - "docs/IMPLEMENTATION_ROADMAP.md"
      - "docs/PROJECT_STATUS.md"
      - "docs/PHASE8_DELIVERY_PLAN.md"
      - "docs/MODULE_CATALOG.md"
      - "docs/CRM_CAPABILITY_COVERAGE.md"
      - "docs/MODULE_DEVELOPMENT.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/check_module_compatibility.py"
      - "scripts/check_production_route_classifications.py"
      - "scripts/check_native_module_composition.py"
      - "scripts/compile_module_manifest_ir.py"
      - "scripts/module_manifest_projection.py"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "scripts/scaffold_module.py"
      - "scripts/repo.py"
      - "tests/test_contract_bindings.py"
      - "tests/test_module_compatibility.py"
      - "tests/test_module_manifest_validation.py"
      - "tests/test_module_scaffolding.py"
      - "tests/test_production_route_classifications.py"
      - "tests/test_native_module_composition.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/pull_request_template.md"
      - ".github/workflows/governance.yml"

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Buf
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.50.1
          setup_only: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Enforce immutable module publication compatibility
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: python scripts/check_module_compatibility.py --base-ref "origin/${BASE_REF}"
      - name: Run permanent native architecture conformance preflight
        shell: bash
        run: |
          mkdir -p governance-diagnostics
          set +e
          python scripts/repo.py conformance >governance-diagnostics/conformance.txt 2>&1
          status=$?
          cat governance-diagnostics/conformance.txt
          exit "${status}"
      - name: Upload conformance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-conformance-diagnostics
          path: governance-diagnostics/conformance.txt
          if-no-files-found: error
          retention-days: 1
