name: Governance CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "crates/crm-application-composition/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-module-manifest/**"
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/IMPLEMENTATION_ROADMAP.md"
      - "docs/MODULE_DEVELOPMENT.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/check_module_compatibility.py"
      - "scripts/check_native_module_composition.py"
      - "scripts/compile_module_manifest_ir.py"
      - "scripts/module_manifest_projection.py"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "scripts/scaffold_module.py"
      - "scripts/repo.py"
      - "tests/test_contract_bindings.py"
      - "tests/test_module_compatibility.py"
      - "tests/test_module_manifest_validation.py"
      - "tests/test_module_scaffolding.py"
      - "tests/test_native_module_composition.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/workflows/governance.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "crates/crm-application-composition/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-module-manifest/**"
      - "docs/SYSTEM_INVARIANTS.md"
      - "docs/IMPLEMENTATION_ROADMAP.md"
      - "docs/MODULE_DEVELOPMENT.md"
      - "docs/adr/ADR-024-controlled-data-formats-and-canonicalization.md"
      - "schemas/**"
      - "modules/*/module.yaml"
      - "scripts/check_module_compatibility.py"
      - "scripts/check_native_module_composition.py"
      - "scripts/compile_module_manifest_ir.py"
      - "scripts/module_manifest_projection.py"
      - "scripts/validate_module_manifests.py"
      - "scripts/check_architecture.py"
      - "scripts/scaffold_module.py"
      - "scripts/repo.py"
      - "tests/test_contract_bindings.py"
      - "tests/test_module_compatibility.py"
      - "tests/test_module_manifest_validation.py"
      - "tests/test_module_scaffolding.py"
      - "tests/test_native_module_composition.py"
      - "architecture-policy.json"
      - "requirements-dev.txt"
      - ".github/workflows/governance.yml"

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: dtolnay/rust-toolchain@stable
      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Validate module manifests
        run: python scripts/validate_module_manifests.py
      - name: Enforce immutable module publication compatibility
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: python scripts/check_module_compatibility.py --base-ref "origin/${BASE_REF}"
      - name: Test native module composition readiness policy
        run: python -m unittest tests/test_native_module_composition.py
      - name: Enforce native module composition readiness
        run: python scripts/check_native_module_composition.py
      - name: Compile normalized runtime module IR
        run: python scripts/compile_module_manifest_ir.py --output-dir build/module-ir
      - name: Verify Rust runtime IR and digest parity
        run: cargo run --quiet -p crm-module-manifest --bin validate-module-manifest -- build/module-ir/*.json
      - name: Test strict format, compatibility, projection, dependency and scaffolding enforcement
        run: python -m unittest tests/test_contract_bindings.py tests/test_module_compatibility.py tests/test_module_manifest_validation.py tests/test_module_scaffolding.py
      - name: Enforce architecture boundaries
        run: python scripts/check_architecture.py
