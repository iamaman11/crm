name: Apply search application composition v3

on:
  pull_request:
    paths:
      - ".github/workflows/apply-search-application-composition-v3.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply verified application-runtime composition patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              print(f"{label}: matches={count}")
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          cargo_path = Path("crates/crm-application-runtime/Cargo.toml")
          cargo = cargo_path.read_text()
          cargo = replace_once(
              cargo,
              'crm-sales-activities-query-adapter = { path = "../crm-sales-activities-query-adapter" }\n',
              'crm-sales-activities-query-adapter = { path = "../crm-sales-activities-query-adapter" }\n'
              'crm-search-query-adapter = { path = "../crm-search-query-adapter" }\n'
              'crm-search-runtime = { path = "../crm-search-runtime" }\n',
              "application Cargo search dependencies",
          )
          cargo_path.write_text(cargo)

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()

          text = replace_once(
              text,
              '''use crm_sales_activities_capability_composition::{
              DEAL_TIMELINE_PROJECTION_ID, Phase6ProjectionWorker, SalesActivitiesCapabilityPlannerRouter,
              SalesActivitiesLinkDeliveryOutcome, SalesActivitiesLinkEventProcessor,
              SalesActivitiesLinkEventProcessorConfig, TASK_STATUS_PROJECTION_ID, capability_catalog,
              capability_definitions, query_capability_catalog, query_capability_definitions,
          };''',
              '''use crm_sales_activities_capability_composition::{
              DEAL_TIMELINE_PROJECTION_ID, GLOBAL_SEARCH_INDEX_ID, Phase6ProjectionWorker,
              Phase7SearchWorker, ProductionQueryRouter, SalesActivitiesCapabilityPlannerRouter,
              SalesActivitiesLinkDeliveryOutcome, SalesActivitiesLinkEventProcessor,
              SalesActivitiesLinkEventProcessorConfig, TASK_STATUS_PROJECTION_ID, capability_catalog,
              capability_definitions, query_capability_catalog, query_capability_definitions,
          };''',
              "composition imports",
          )
          text = replace_once(
              text,
              '''use crm_sales_activities_query_adapter::{
              ACTIVITIES_RECORD_TYPE, SALES_RECORD_TYPE, SalesActivitiesQueryAdapter,
          };''',
              '''use crm_sales_activities_query_adapter::{
              ACTIVITIES_RECORD_TYPE, SALES_RECORD_TYPE, SalesActivitiesQueryAdapter,
          };
          use crm_search_query_adapter::{SEARCH_MODULE_ID, SearchQueryAdapter};
          use crm_search_runtime::SearchIndexId;''',
              "search adapter imports",
          )
          text = replace_once(
              text,
              'const PROJECTION_PAGE_SIZE: u32 = 200;\n',
              'const PROJECTION_PAGE_SIZE: u32 = 200;\nconst SEARCH_PAGE_SIZE: u32 = 200;\n',
              "search page size",
          )
          text = replace_once(
              text,
              '    pub projection_worker: Arc<Phase6ProjectionWorker>,\n',
              '    pub projection_worker: Arc<Phase6ProjectionWorker>,\n    pub search_worker: Arc<Phase7SearchWorker>,\n',
              "search worker component field",
          )

          text = replace_once(
              text,
              '''        let query_adapter = Arc::new(
              SalesActivitiesQueryAdapter::new(
                  store.clone(),
                  CursorCodec::new(cursor_key)
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                  visibility_authorizer,
              )
              .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          );
          let query_gateway = Arc::new(QueryGateway::new(
              Arc::new(
                  query_capability_catalog()
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              ),
              query_adapter.clone(),
              authorizer,
              query_adapter,
          ));''',
              '''        let owner_query_adapter = SalesActivitiesQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          let search_query_adapter = SearchQueryAdapter::new(
              SearchIndexId::try_new(GLOBAL_SEARCH_INDEX_ID)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              Arc::new(store.clone()),
              visibility_authorizer,
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          let query_router = Arc::new(ProductionQueryRouter::new(
              owner_query_adapter,
              search_query_adapter,
          ));
          let query_gateway = Arc::new(QueryGateway::new(
              Arc::new(
                  query_capability_catalog()
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              ),
              query_router.clone(),
              authorizer,
              query_router,
          ));''',
              "governed production query router",
          )
          text = replace_once(
              text,
              '        let projection_worker = Arc::new(Phase6ProjectionWorker::new(store.clone()));\n',
              '''        let projection_worker = Arc::new(Phase6ProjectionWorker::new(store.clone()));
          let search_worker = Arc::new(
              Phase7SearchWorker::new(store.clone())
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          );
          ''',
              "search worker assembly",
          )
          text = replace_once(
              text,
              '            projection_worker,\n',
              '            projection_worker,\n            search_worker,\n',
              "search worker component assembly",
          )
          text = replace_once(
              text,
              '''        drain_projection(
              &components.projection_worker,
              tenant_id.clone(),
              TASK_STATUS_PROJECTION_ID,
          )
          .await?;
          ''',
              '''        drain_projection(
              &components.projection_worker,
              tenant_id.clone(),
              TASK_STATUS_PROJECTION_ID,
          )
          .await?;
          components
              .search_worker
              .ensure_ready(tenant_id.clone(), SEARCH_PAGE_SIZE)
              .await
              .map_err(|error| ApplicationRuntimeError::Server(error.to_string()))?;
          ''',
              "search background catch-up",
          )

          text = replace_once(
              text,
              '''        for definition in query_definitions {
              let (resource_type, field_paths) = if definition.owner_module_id.as_str() == "crm.sales"
              {
                  (SALES_RECORD_TYPE, sales_fields())
              } else {
                  (ACTIVITIES_RECORD_TYPE, task_fields())
              };
              visibility_store
                  .upsert(QueryVisibilityGrant {
                      tenant_id: tenant_id.clone(),
                      actor_id: config.actor_id.clone(),
                      capability_id: definition.capability_id.clone(),
                      capability_version: definition.capability_version.clone(),
                      owner_module_id: definition.owner_module_id.clone(),
                      record_type: RecordType::try_new(resource_type)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_id: None,
                      allowed_fields: field_paths,
                      policy_version: BOOTSTRAP_POLICY_VERSION.to_owned(),
                      expires_at_unix_nanos: Some(expires_at),
                  })
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          }''',
              '''        for definition in query_definitions {
              match definition.owner_module_id.as_str() {
                  "crm.sales" => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      "crm.sales",
                      SALES_RECORD_TYPE,
                      sales_fields(),
                      expires_at,
                  )?,
                  "crm.activities" => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      "crm.activities",
                      ACTIVITIES_RECORD_TYPE,
                      task_fields(),
                      expires_at,
                  )?,
                  SEARCH_MODULE_ID => {
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          "crm.sales",
                          SALES_RECORD_TYPE,
                          ["name"].into_iter().map(str::to_owned).collect(),
                          expires_at,
                      )?;
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          "crm.activities",
                          ACTIVITIES_RECORD_TYPE,
                          ["subject"].into_iter().map(str::to_owned).collect(),
                          expires_at,
                      )?;
                  }
                  _ => {
                      return Err(ApplicationRuntimeError::Assembly(
                          "unsupported bootstrap query owner".to_owned(),
                      ));
                  }
              }
          }''',
              "search-aware bootstrap visibility",
          )
          text = replace_once(
              text,
              '''fn expiry(now_unix_nanos: i64) -> Result<i64, ApplicationRuntimeError> {''',
              '''fn upsert_bootstrap_visibility(
              visibility_store: &LiveQueryVisibilityStore,
              config: &ApplicationConfig,
              tenant_id: &TenantId,
              definition: &CapabilityDefinition,
              owner_module_id: &str,
              resource_type: &str,
              allowed_fields: BTreeSet<String>,
              expires_at: i64,
          ) -> Result<(), ApplicationRuntimeError> {
              visibility_store
                  .upsert(QueryVisibilityGrant {
                      tenant_id: tenant_id.clone(),
                      actor_id: config.actor_id.clone(),
                      capability_id: definition.capability_id.clone(),
                      capability_version: definition.capability_version.clone(),
                      owner_module_id: ModuleId::try_new(owner_module_id)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_type: RecordType::try_new(resource_type)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_id: None,
                      allowed_fields,
                      policy_version: BOOTSTRAP_POLICY_VERSION.to_owned(),
                      expires_at_unix_nanos: Some(expires_at),
                  })
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))
          }

          fn expiry(now_unix_nanos: i64) -> Result<i64, ApplicationRuntimeError> {''',
              "bootstrap visibility helper",
          )
          text = text.replace("bootstrap_phase6_access(", "bootstrap_application_access(")
          path.write_text(text)
          PY
          rustfmt --edition 2024 crates/crm-application-runtime/src/runtime.rs
          rm .github/workflows/apply-search-application-composition-v3.yml
      - name: Commit application composition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime .github/workflows/apply-search-application-composition-v3.yml
          git commit -m "Compose governed search in application runtime"
          git pull --rebase origin develop/phase7-permission-aware-search
          git push origin HEAD:develop/phase7-permission-aware-search
