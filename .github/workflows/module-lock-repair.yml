name: One-shot exact module lockfile repair

on:
  push:
    branches:
      - feature/module-lifecycle-v1
    paths:
      - .github/workflows/module-lock-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/module-lifecycle-v1
      - name: Apply exact Cargo-generated checksum
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("Cargo.lock")
          text = path.read_text(encoding="utf-8")
          old = "0b928f33d9756ad9f86c8f283853ad26bdd5b10b7f1542aa2fa15e2289105a"
          new = "0b928f33d975fc6ad9f86c8f283853ad26bdd5b10b7f1542aa2fa15e2289105a"
          if old not in text:
              raise SystemExit("expected incorrect checksum was not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git diff --check
      - name: Commit exact lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "fix: use exact Cargo-generated registry lockfile"
          git push origin HEAD:feature/module-lifecycle-v1
