name: Phase 8A.6 Foundation Sync Once

on:
  push:
    branches:
      - develop/phase8a6-reversible-party-merge-unmerge
    paths:
      - ".github/workflows/phase8a6-foundation-sync-once.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a6-reversible-party-merge-unmerge
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.50.1
          setup_only: true
      - name: Apply exact Phase 8A.6 foundation synchronization
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          merge_planner = Path("crates/crm-parties-capability-adapter/src/merge_planner.rs")
          text = merge_planner.read_text()
          first = "    validate_pair(input.survivor, input.absorbed)?;"
          if text.count(first) != 2:
              raise SystemExit(f"expected exactly two public pair-validation anchors, found {text.count(first)}")
          text = text.replace(first, "    validate_merge_pair(input.survivor, input.absorbed)?;", 1)
          text = text.replace(first, "    validate_unmerge_pair(input.survivor, input.absorbed)?;", 1)
          text = text.replace("fn validate_pair(survivor: &Party, absorbed: &Party) -> Result<(), SdkError> {", "fn validate_merge_pair(survivor: &Party, absorbed: &Party) -> Result<(), SdkError> {", 1)
          anchor = """fn require_expected_version(party: &Party, expected_version: i64) -> Result<(), SdkError> {\n"""
          insertion = """fn validate_unmerge_pair(survivor: &Party, absorbed: &Party) -> Result<(), SdkError> {
    if survivor.party_id() == absorbed.party_id() {
        return Err(invalid_owner_plan(
            "PARTIES_MERGE_SELF_INVALID",
            "a Party cannot be unmerged from itself",
        ));
    }
    if survivor.kind() != absorbed.kind() {
        return Err(invalid_owner_plan(
            "PARTIES_MERGE_KIND_MISMATCH",
            "Party unmerge requires matching Party kinds",
        ));
    }
    require_active(survivor)
}

fn require_expected_version(party: &Party, expected_version: i64) -> Result<(), SdkError> {
"""
          if anchor not in text:
              raise SystemExit("unmerge validation insertion anchor not found")
          text = text.replace(anchor, insertion, 1)
          # Test helpers must exercise the same lifecycle preconditions as production helpers.
          marker = "fn plan_unmerge_state("
          before, sep, after = text.partition(marker)
          if not sep:
              raise SystemExit("plan_unmerge_state test helper not found")
          if "validate_pair(survivor, absorbed)?;" not in after:
              raise SystemExit("test unmerge validation anchor not found")
          after = after.replace("validate_pair(survivor, absorbed)?;", "validate_unmerge_pair(survivor, absorbed)?;", 1)
          # The merge test helper still uses the renamed merge validator.
          before = before.replace("validate_pair(survivor, absorbed)?;", "validate_merge_pair(survivor, absorbed)?;")
          merge_planner.write_text(before + sep + after)

          planner = Path("crates/crm-parties-capability-adapter/src/planner.rs")
          text = planner.read_text()
          old = """pub fn party_from_snapshot(snapshot: &RecordSnapshot) -> Result<Party, SdkError> {
    let party = decode_party_state(support::persisted_json_bytes_with_data_class(
        snapshot,
        persisted_contract(),
        DataClass::Personal,
    )?)?;
    if party.party_id().as_str() != snapshot.reference.record_id.as_str()
        || party.version() != snapshot.version
    {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_IDENTITY_INVALID",
        ));
    }
    Ok(party)
}
"""
          new = """pub fn party_from_snapshot(snapshot: &RecordSnapshot) -> Result<Party, SdkError> {
    let v1_contract = persisted_contract();
    let v2_contract = crate::merge_planner::party_v2_persisted_contract();
    let contract = if snapshot.payload.schema_version == v1_contract.schema_version
        && snapshot.payload.descriptor_hash == v1_contract.descriptor_hash
    {
        v1_contract
    } else if snapshot.payload.schema_version == v2_contract.schema_version
        && snapshot.payload.descriptor_hash == v2_contract.descriptor_hash
    {
        v2_contract
    } else {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_CONTRACT_INVALID",
        ));
    };
    let party = decode_party_state(support::persisted_json_bytes_with_data_class(
        snapshot,
        contract,
        DataClass::Personal,
    )?)?;
    if party.party_id().as_str() != snapshot.reference.record_id.as_str()
        || party.version() != snapshot.version
    {
        return Err(support::stored_data_error(
            "PARTIES_PERSISTED_PARTY_IDENTITY_INVALID",
        ));
    }
    Ok(party)
}
"""
          if old not in text:
              raise SystemExit("Party snapshot reader anchor not found")
          planner.write_text(text.replace(old, new, 1))

          bindings_path = Path("contracts/module-contract-bindings.json")
          bindings = json.loads(bindings_path.read_text())
          by_module = {module["module_id"]: module for module in bindings["modules"]}

          parties = by_module["crm.parties"]
          party_events = [
              ("parties.party.merge_redirect_applied", "crm.parties.v1.PartyMergeRedirectAppliedEvent"),
              ("parties.party.merge_redirect_removed", "crm.parties.v1.PartyMergeRedirectRemovedEvent"),
              ("parties.party.merge_survivorship_updated", "crm.parties.v1.PartyMergeSurvivorshipUpdatedEvent"),
              ("parties.party.merge_survivorship_restored", "crm.parties.v1.PartyMergeSurvivorshipRestoredEvent"),
          ]
          existing = {event["id"] for event in parties["events"]}
          for event_id, message in party_events:
              if event_id not in existing:
                  parties["events"].append({"id": event_id, "version": "1.0.0", "message": message})

          identity = by_module["crm.identity-resolution"]
          identity_caps = [
              ("identity_resolution.merge.apply", "MergeParties", "MergePartiesRequest", "MergePartiesResponse"),
              ("identity_resolution.merge.unmerge", "UnmergeParties", "UnmergePartiesRequest", "UnmergePartiesResponse"),
              ("identity_resolution.merge.get", "GetPartyMergeLineage", "GetPartyMergeLineageRequest", "GetPartyMergeLineageResponse"),
              ("identity_resolution.merge.list_by_party", "ListPartyMergeLineageByParty", "ListPartyMergeLineageByPartyRequest", "ListPartyMergeLineageByPartyResponse"),
              ("identity_resolution.party.resolve_canonical", "ResolveCanonicalParty", "ResolveCanonicalPartyRequest", "ResolveCanonicalPartyResponse"),
          ]
          existing = {cap["id"] for cap in identity["capabilities"]}
          for cap_id, method, request, response in identity_caps:
              if cap_id not in existing:
                  identity["capabilities"].append({
                      "id": cap_id,
                      "version": "1.0.0",
                      "rpc": f"crm.identity_resolution.v1.IdentityResolutionService.{method}",
                      "request": f"crm.identity_resolution.v1.{request}",
                      "response": f"crm.identity_resolution.v1.{response}",
                  })
          identity_events = [
              ("identity_resolution.merge.applied", "crm.identity_resolution.v1.PartyMergeAppliedEvent"),
              ("identity_resolution.merge.unmerged", "crm.identity_resolution.v1.PartyMergeUnmergedEvent"),
          ]
          existing = {event["id"] for event in identity["events"]}
          for event_id, message in identity_events:
              if event_id not in existing:
                  identity["events"].append({"id": event_id, "version": "1.0.0", "message": message})

          bindings_path.write_text(json.dumps(bindings, indent=2) + "\n")
          PY
          buf format -w proto
          cargo fmt --all
      - name: Verify synchronized foundation
        run: |
          cargo clippy -p crm-core-data -p crm-parties -p crm-parties-capability-adapter -p crm-identity-resolution --all-targets --all-features -- -D warnings
          cargo test -p crm-core-data -p crm-parties -p crm-parties-capability-adapter -p crm-identity-resolution
          buf build proto >/dev/null
      - name: Remove one-shot workflow and commit
        run: |
          rm .github/workflows/phase8a6-foundation-sync-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts proto crates modules .github/workflows/phase8a6-foundation-sync-once.yml
          git commit -m "Synchronize Phase 8A.6 owner foundation"
          git push origin HEAD:develop/phase8a6-reversible-party-merge-unmerge
