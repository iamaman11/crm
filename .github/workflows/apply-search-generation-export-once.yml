name: Apply search generation export once

on:
  pull_request:
    paths:
      - ".github/workflows/apply-search-generation-export-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Export generation runtime from crate root
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/crm-search-runtime/src/lib.rs")
          text = path.read_text()
          anchor = "#![forbid(unsafe_code)]\n\n"
          if text.count(anchor) != 1:
              raise RuntimeError("unexpected crm-search-runtime crate root header")
          path.write_text(text.replace(anchor, anchor + "mod generation;\n\npub use generation::*;\n\n", 1))
          PY
          rustfmt --edition 2024 crates/crm-search-runtime/src/lib.rs crates/crm-search-runtime/src/generation.rs
          rm .github/workflows/apply-search-generation-export-once.yml
      - name: Commit code-only generation export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Export search generation runtime"
          git push origin HEAD:develop/phase7-permission-aware-search
