name: Phase 8A.7 Format Once

on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - modules/crm-customer-data-operations/src/**
      - crates/crm-customer-data-operations-capability-adapter/src/**
      - .github/workflows/phase8a7-format-once.yml

permissions:
  contents: write

concurrency:
  group: phase8a7-format-once-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt
        run: cargo fmt --all
      - name: Commit formatting when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.rs'
          git commit -m "chore(phase8a7): apply rustfmt"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
