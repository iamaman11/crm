name: Fix search crate doc order once

on:
  pull_request:
    paths:
      - ".github/workflows/fix-search-crate-doc-order-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - name: Restore crate documentation before items
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/crm-search-runtime/src/lib.rs")
          text = path.read_text()
          prefix = "#![forbid(unsafe_code)]\n\nmod generation;\n\npub use generation::*;\n\n"
          if not text.startswith(prefix):
              raise RuntimeError("unexpected crm-search-runtime crate header")
          text = "#![forbid(unsafe_code)]\n\n" + text[len(prefix):]
          anchor = "//! before any resource identity, field value or match metadata is returned.\n"
          if text.count(anchor) != 1:
              raise RuntimeError("unexpected crm-search-runtime crate documentation")
          insertion = anchor + "\nmod generation;\n\npub use generation::*;\n"
          path.write_text(text.replace(anchor, insertion, 1))
          PY
          rm .github/workflows/fix-search-crate-doc-order-once.yml
      - name: Commit code-only crate header fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix search crate documentation order"
          git push origin HEAD:develop/phase7-permission-aware-search
