name: Phase 6C rustfmt

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/transactional-audit-materialization-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format and commit
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/crm-core-data/src/audit.rs
          git commit -m "Format reproducible audit hash profile"
          git push origin HEAD:feature/transactional-audit-materialization-v1
