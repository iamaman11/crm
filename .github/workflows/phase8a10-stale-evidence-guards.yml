        let executor = PostgresTransactionalAggregateExecutor::guarded(
            self.store.clone(),
            Arc::new(planner),
            Arc::new(guard),
        );
''',
          )

          # SQLx is now required by production guard modules rather than only integration tests.
          for cargo in [
              'crates/crm-customer-enrichment-review-composition/Cargo.toml',
              'crates/crm-customer-enrichment-application-composition/Cargo.toml',
              'crates/crm-customer-enrichment-materialization-composition/Cargo.toml',
          ]:
              text = Path(cargo).read_text()
              if '\nsqlx = ' not in text.split('[dev-dependencies]')[0]:
                  text = text.replace('\nserde_json = "1"\n', '\nserde_json = "1"\nsqlx = { version = "0.9", default-features = false, features = ["postgres", "runtime-tokio"] }\n', 1)
              dev = '[dev-dependencies]\n'
              text = text.replace(dev + 'sqlx = { version = "0.9", default-features = false, features = ["postgres", "runtime-tokio"] }\n', dev, 1)
              text = text.replace(dev + 'sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "postgres"] }\n', dev, 1)
              Path(cargo).write_text(text)
          PY
