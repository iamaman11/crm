name: Self-cleaning Phase 4C integration finalizer

on:
  push:
    branches:
      - feature/postgres-data-adapter-v2
    paths:
      - .github/workflows/phase4c-integration-finalize.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/postgres-data-adapter-v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Finalize batch executor and database CI
        run: |
          python - <<'PY'
          from pathlib import Path

          cargo = Path("crates/crm-core-data/Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          if 'sha2 = "0.10"' not in text:
              text = text.replace('serde_json = "1"\n', 'serde_json = "1"\nsha2 = "0.10"\n', 1)
          cargo.write_text(text, encoding="utf-8")

          lib = Path("crates/crm-core-data/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          if "pub mod postgres_batch;" not in text:
              text = text.replace("pub mod postgres;\n", "pub mod postgres;\npub mod postgres_batch;\n", 1)
          if "pub use postgres_batch::*;" not in text:
              text = text.replace("pub use postgres::*;\n", "pub use postgres::*;\npub use postgres_batch::*;\n", 1)
          lib.write_text(text, encoding="utf-8")

          batch = Path("crates/crm-core-data/src/postgres_batch.rs")
          text = batch.read_text(encoding="utf-8")
          text = text.replace(
              "stored_hash.as_slice() != plan.idempotency.request_hash",
              "stored_hash.as_slice() != plan.idempotency.request_hash.as_slice()",
          )
          old = """    if schema_id.as_deref() != Some(BATCH_RESULT_SCHEMA_ID)
        || schema_version.as_deref() != Some(BATCH_RESULT_SCHEMA_VERSION)
        || descriptor_hash.as_deref() != Some(batch_result_descriptor_hash().as_slice())
        || encoding.as_deref() != Some(\"json\")
    {"""
          new = """    let expected_descriptor_hash = batch_result_descriptor_hash();
    if schema_id.as_deref() != Some(BATCH_RESULT_SCHEMA_ID)
        || schema_version.as_deref() != Some(BATCH_RESULT_SCHEMA_VERSION)
        || descriptor_hash.as_deref() != Some(expected_descriptor_hash.as_slice())
        || encoding.as_deref() != Some(\"json\")
    {"""
          text = text.replace(old, new, 1)
          old = """        BatchError::Conflict(message) | BatchError::IdempotencyKeyReused => SdkError::new(
            \"DATA_CONFLICT\",
            ErrorCategory::Conflict,
            false,
            match error {
                BatchError::IdempotencyKeyReused => {
                    \"The idempotency key was used for a different request.\".to_owned()
                }
                _ => message,
            },
        ),"""
          new = """        BatchError::Conflict(message) => SdkError::new(
            \"DATA_CONFLICT\",
            ErrorCategory::Conflict,
            false,
            message,
        ),
        BatchError::IdempotencyKeyReused => SdkError::new(
            \"DATA_CONFLICT\",
            ErrorCategory::Conflict,
            false,
            \"The idempotency key was used for a different request.\",
        ),"""
          text = text.replace(old, new, 1)
          text = text.replace(
              "        RequestId, StateKey, TenantId, TraceId,\n",
              "        RequestId, TenantId, TraceId,\n",
          )
          text = text.replace(
              "        let _ = StateKey::try_new(\"type-import-guard\").unwrap();\n",
              "",
          )
          batch.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/database.yml")
          workflow.write_text('''name: Database CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - ".github/workflows/database.yml"

permissions:
  contents: read

jobs:
  postgres-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply clean migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
      - name: Verify SQL platform invariants
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
      - name: Enable the isolated runtime test role
        run: psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify atomic record adapter
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_foundation
      - name: Verify multi-record, replay, optimistic and relationship semantics
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_advanced
      - name: Roll back migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
      - name: Verify rollback removed authoritative schema
        run: |
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply migrations after rollback
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
      - name: Upload database and Rust diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-adapter-diagnostics
          path: |
            database/
            crates/crm-core-data/
          if-no-files-found: error
          retention-days: 7
''', encoding="utf-8")

          for temporary in (
              ".github/workflows/phase4c-bootstrap-repair.yml",
              ".github/workflows/phase4c-integration-finalize.yml",
          ):
              Path(temporary).unlink(missing_ok=True)
          PY
          cargo fmt --all
          cargo generate-lockfile
          git diff --check
      - name: Commit finalized Phase 4C integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: finalize idempotent multi-record PostgreSQL integration"
          git push origin HEAD:feature/postgres-data-adapter-v2
