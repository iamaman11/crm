name: Temporary Provider Conflict Reject Process

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: temporary-provider-conflict-reject-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_worker_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_worker_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5442
      PGDATABASE: crm_customer_enrichment_worker_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply terminal reject patch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tmp_apply_provider_conflict_reject_process.py
          python scripts/tmp_fix_provider_conflict_reject_imports.py
          cargo fmt --all
      - name: Reject unexpected patch scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess

          allowed = {
              ".github/workflows/customer-enrichment-worker-process-runtime.yml",
              "crates/crm-customer-enrichment-provider-process-composition/Cargo.toml",
              "crates/crm-customer-enrichment-provider-process-composition/src/lib.rs",
              "crates/crm-customer-enrichment-provider-process-composition/src/conflict_rejection.rs",
              "crates/crm-customer-enrichment-provider-process-composition/src/worker.rs",
              "crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_reject_process.rs",
          }
          modified = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
          untracked = set(subprocess.check_output(["git", "ls-files", "--others", "--exclude-standard"], text=True).splitlines())
          changed = modified | untracked
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f"unexpected={sorted(unexpected)}")
          missing = allowed - changed
          if missing:
              raise SystemExit(f"missing={sorted(missing)}")
          print("terminal reject diff:", sorted(changed))
          PY
      - name: Verify pure provider-process contracts
        id: pure
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-customer-enrichment-provider-process-composition --lib -- --nocapture 2>&1 | tee /tmp/provider-conflict-reject-pure.log
      - name: Upload pure diagnostics
        if: steps.pure.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-conflict-reject-pure-diagnostics
          path: /tmp/provider-conflict-reject-pure.log
          if-no-files-found: error
          retention-days: 3
      - name: Stop after pure failure
        if: steps.pure.outcome == 'failure'
        run: exit 1
      - name: Prepare fresh reject-process database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify terminal reject process and replay
        id: reject_process
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p crm-customer-enrichment-provider-process-composition \
            --features postgres-integration \
            --test postgres_conflict_reject_process \
            -- --nocapture 2>&1 | tee /tmp/provider-conflict-reject-postgres.log
      - name: Upload reject-process diagnostics
        if: steps.reject_process.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-conflict-reject-postgres-diagnostics
          path: /tmp/provider-conflict-reject-postgres.log
          if-no-files-found: error
          retention-days: 3
      - name: Stop after reject-process failure
        if: steps.reject_process.outcome == 'failure'
        run: exit 1
      - name: Prepare fresh retain-process regression database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify retain-first recovery regression
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p crm-customer-enrichment-provider-process-composition \
            --features postgres-integration \
            --test postgres_conflict_process_hold \
            -- --nocapture
      - name: Verify permanent worker workflow patch
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'crates/crm-customer-enrichment-provider-process-composition/**' .github/workflows/customer-enrichment-worker-process-runtime.yml
          grep -F 'postgres_conflict_reject_process' .github/workflows/customer-enrichment-worker-process-runtime.yml
      - name: Verify production wrappers compile
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p crm-application-runtime
          cargo test -p crm-application-runtime --test customer_enrichment_provider_source_contract --no-run
      - name: Strict focused Clippy
        id: focused_clippy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy \
            -p crm-customer-enrichment-provider-process-composition \
            -p crm-application-runtime \
            --all-targets --all-features -- -D warnings 2>&1 | tee /tmp/provider-conflict-reject-clippy.log
      - name: Upload focused Clippy diagnostics
        if: steps.focused_clippy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-conflict-reject-clippy-diagnostics
          path: /tmp/provider-conflict-reject-clippy.log
          if-no-files-found: error
          retention-days: 3
      - name: Stop after focused Clippy failure
        if: steps.focused_clippy.outcome == 'failure'
        run: exit 1
      - name: Commit verified terminal reject process
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/customer-enrichment-worker-process-runtime.yml \
            crates/crm-customer-enrichment-provider-process-composition/Cargo.toml \
            crates/crm-customer-enrichment-provider-process-composition/src/lib.rs \
            crates/crm-customer-enrichment-provider-process-composition/src/conflict_rejection.rs \
            crates/crm-customer-enrichment-provider-process-composition/src/worker.rs \
            crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_reject_process.rs
          git diff --cached --quiet && exit 0
          git commit -m "Terminalize requests after approved provider conflict rejection"
          git push origin "HEAD:${HEAD_BRANCH}"
