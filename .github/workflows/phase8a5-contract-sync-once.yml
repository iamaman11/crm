name: Phase 8A.5 Contract Sync Once

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: phase8a5-contract-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Publish module binding and generated browser hashes
        run: |
          python scripts/phase8a5_publish_contracts_once.py
          pnpm install --frozen-lockfile
          pnpm web:generate
          python -m json.tool contracts/module-contract-bindings.json >/dev/null
          git diff --check
      - name: Remove one-shot files and commit
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm .github/workflows/phase8a5-contract-sync-once.yml
          rm scripts/phase8a5_publish_contracts_once.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts/module-contract-bindings.json packages/client/src/contract_hashes.ts .github/workflows/phase8a5-contract-sync-once.yml scripts/phase8a5_publish_contracts_once.py
          git commit -m "Publish Phase 8A.5 identity resolution contracts"
          git push origin "HEAD:${HEAD_BRANCH}"
