name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install manifest validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Normalize Customer 360 public coordinates
        run: |
          python - <<'PY'
          from pathlib import Path

          allowed = [
              Path('contracts/module-contract-bindings.json'),
              Path('crates/crm-customer-360-composition/src/lib.rs'),
              Path('crates/crm-customer-360-query-adapter/src/lib.rs'),
              Path('docs/PHASE8A3D_CUSTOMER_360_ARCHITECTURE.md'),
              Path('modules/crm-customer-360/module.yaml'),
              Path('services/crm-api/tests/customer_360_process_e2e.rs'),
          ]
          for path in allowed:
              if not path.exists():
                  continue
              text = path.read_text()
              text = text.replace('crm.customer-360-projection', 'crm.customer360-projection')
              text = text.replace('crm.customer-360', 'crm.customer360')
              text = text.replace('customer-360.customer.get', 'customer360.customer.get')
              path.write_text(text)

          leftovers = []
          workflow = Path('.github/workflows/rust-generated-sync.yml')
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              try:
                  text = path.read_text()
              except (UnicodeDecodeError, OSError):
                  continue
              if 'crm.customer-360' in text or 'customer-360.customer.get' in text:
                  leftovers.append(str(path))
          if leftovers:
              raise SystemExit(f'legacy invalid Customer 360 public coordinates remain: {leftovers}')
          PY
      - name: Verify normalized Customer 360 coordinates
        run: |
          python scripts/validate_module_manifests.py
          python scripts/check_contract_bindings.py
          cargo fmt --all
          cargo generate-lockfile
          cargo check -p crm-customer-360-composition --all-targets
          cargo check -p crm-customer-360-query-adapter --all-targets
          cargo check -p crm-application-runtime --all-targets
          cargo check -p crm-api --test customer_360_process_e2e
      - name: Commit verified Customer 360 coordinate normalization
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock contracts/module-contract-bindings.json crates/crm-customer-360-composition crates/crm-customer-360-query-adapter docs/PHASE8A3D_CUSTOMER_360_ARCHITECTURE.md modules/crm-customer-360 services/crm-api/tests/customer_360_process_e2e.rs
          if git diff --cached --quiet; then
            echo "Customer 360 public coordinates are already canonical."
            exit 0
          fi
          git commit -m "Normalize Customer 360 public contract coordinates"
          git push origin "HEAD:${HEAD_BRANCH}"
