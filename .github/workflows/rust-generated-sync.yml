name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Repair Phase 8A.6 merge-lineage Clippy boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("modules/crm-identity-resolution/src/merge_lineage.rs")
          text = path.read_text()
          old = "fn normalize_survivorship(selections: &mut Vec<SurvivorshipSelection>) -> Result<(), SdkError> {"
          new = "fn normalize_survivorship(selections: &mut [SurvivorshipSelection]) -> Result<(), SdkError> {"
          if text.count(old) != 1:
              raise SystemExit(f"expected one ptr-arg anchor, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          cargo clippy -p crm-identity-resolution --all-targets --all-features -- -D warnings
          cargo test -p crm-identity-resolution
      - name: Restore permanent workflow and commit verified source fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git show 74ab48427b9dd5a30f0a0637cc52e74bd395b3c7:.github/workflows/rust-generated-sync.yml > .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/crm-identity-resolution/src/merge_lineage.rs .github/workflows/rust-generated-sync.yml
          git commit -m "fix(identity-resolution): use slice for survivorship normalization"
          git push origin "HEAD:${HEAD_BRANCH}"
