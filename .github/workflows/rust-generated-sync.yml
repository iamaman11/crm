name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "proto/crm/customer_data_operations/**"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Regenerate frozen browser contract hashes
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Restore permanent workflow and commit generated hashes
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          if git diff --quiet -- packages/client/src/contract_hashes.ts .github/workflows/rust-generated-sync.yml; then
            echo "Generated browser contract hashes are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/client/src/contract_hashes.ts .github/workflows/rust-generated-sync.yml
          git commit -m "Synchronize customer import browser contract hashes"
          git push origin "HEAD:${HEAD_BRANCH}"
