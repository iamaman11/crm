name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Repair Customer 360 projection registry test API
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-customer-360-composition/src/lib.rs')
          text = path.read_text()
          if '.definition(CUSTOMER_360_PROJECTION_ID)' in text:
              text = text.replace(
                  '.definition(CUSTOMER_360_PROJECTION_ID)',
                  '.get(CUSTOMER_360_PROJECTION_ID)',
                  1,
              )
          if 'definition.event_types.len()' in text:
              text = text.replace(
                  'definition.event_types.len()',
                  'definition.event_types().len()',
                  1,
              )
          if '.get(CUSTOMER_360_PROJECTION_ID)' not in text:
              raise SystemExit('Customer 360 projection registry get() repair failed')
          if 'definition.event_types().len()' not in text:
              raise SystemExit('Customer 360 projection event_types() repair failed')
          path.write_text(text)
          PY
      - name: Apply machine-fixable Rust maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit synchronized files when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust maintenance files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services
          git commit -m "Synchronize Customer 360 Rust foundation"
          git push origin "HEAD:${HEAD_BRANCH}"
