name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "crates/crm-application-runtime/**"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Add merge-operation bootstrap visibility
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()

          old = '''use crm_identity_resolution_capability_adapter::{\n    MODULE_ID as IDENTITY_RESOLUTION_MODULE_ID, RECORD_TYPE as IDENTITY_RESOLUTION_RECORD_TYPE,\n};'''
          new = '''use crm_identity_resolution_capability_adapter::{\n    MERGE_OPERATION_RECORD_TYPE as IDENTITY_RESOLUTION_MERGE_RECORD_TYPE,\n    MODULE_ID as IDENTITY_RESOLUTION_MODULE_ID, RECORD_TYPE as IDENTITY_RESOLUTION_RECORD_TYPE,\n};'''
          if text.count(old) != 1:
              raise SystemExit("identity resolution runtime import shape changed")
          text = text.replace(old, new, 1)

          old = '''                IDENTITY_RESOLUTION_MODULE_ID => upsert_bootstrap_visibility(\n                    visibility_store,\n                    config,\n                    tenant_id,\n                    definition,\n                    BootstrapVisibilityResource {\n                        owner_module_id: IDENTITY_RESOLUTION_MODULE_ID,\n                        resource_type: IDENTITY_RESOLUTION_RECORD_TYPE,\n                    },\n                    identity_resolution_fields(),\n                    expires_at,\n                )?,'''
          new = '''                IDENTITY_RESOLUTION_MODULE_ID => {\n                    upsert_bootstrap_visibility(\n                        visibility_store,\n                        config,\n                        tenant_id,\n                        definition,\n                        BootstrapVisibilityResource {\n                            owner_module_id: IDENTITY_RESOLUTION_MODULE_ID,\n                            resource_type: IDENTITY_RESOLUTION_RECORD_TYPE,\n                        },\n                        identity_resolution_fields(),\n                        expires_at,\n                    )?;\n                    upsert_bootstrap_visibility(\n                        visibility_store,\n                        config,\n                        tenant_id,\n                        definition,\n                        BootstrapVisibilityResource {\n                            owner_module_id: IDENTITY_RESOLUTION_MODULE_ID,\n                            resource_type: IDENTITY_RESOLUTION_MERGE_RECORD_TYPE,\n                        },\n                        identity_resolution_merge_fields(),\n                        expires_at,\n                    )?;\n                }'''
          if text.count(old) != 1:
              raise SystemExit("identity resolution bootstrap visibility arm changed")
          text = text.replace(old, new, 1)

          old = '''fn identity_resolution_fields() -> BTreeSet<String> {\n    [\n        "party_pair",\n        "evidence_history",\n        "status",\n        "decision_reason",\n    ]\n    .into_iter()\n    .map(str::to_owned)\n    .collect()\n}\n'''
          new = '''fn identity_resolution_fields() -> BTreeSet<String> {\n    [\n        "party_pair",\n        "evidence_history",\n        "status",\n        "decision_reason",\n    ]\n    .into_iter()\n    .map(str::to_owned)\n    .collect()\n}\n\nfn identity_resolution_merge_fields() -> BTreeSet<String> {\n    [\n        "party_pair",\n        "decision",\n        "survivorship",\n        "status",\n        "unmerge_decision",\n    ]\n    .into_iter()\n    .map(str::to_owned)\n    .collect()\n}\n'''
          if text.count(old) != 1:
              raise SystemExit("identity resolution field bootstrap function changed")
          text = text.replace(old, new, 1)

          old = '''        assert!(identity_resolution_fields().contains("evidence_history"));\n        assert!(identity_resolution_fields().contains("decision_reason"));'''
          new = '''        assert!(identity_resolution_fields().contains("evidence_history"));\n        assert!(identity_resolution_fields().contains("decision_reason"));\n        assert!(identity_resolution_merge_fields().contains("party_pair"));\n        assert!(identity_resolution_merge_fields().contains("survivorship"));\n        assert!(identity_resolution_merge_fields().contains("unmerge_decision"));'''
          if text.count(old) != 1:
              raise SystemExit("runtime bootstrap field-set test changed")
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY
          cargo fmt --all
          cargo clippy -p crm-application-runtime --all-targets --all-features -- -D warnings
          cargo test -p crm-application-runtime
      - name: Commit verified bootstrap visibility fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime/src/runtime.rs
          git commit -m "Grant merge-operation query visibility at runtime bootstrap"
          git push origin "HEAD:${HEAD_BRANCH}"
