name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit lockfile and formatting when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust lockfile and formatting are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize Rust lockfile and formatting"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
