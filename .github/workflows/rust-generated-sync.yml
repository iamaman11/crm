name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Repair confirmed Consent owner test fixture
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('modules/crm-consents/src/domain.rs')
          text = path.read_text()
          old = '            ..grant(None).snapshot().into_create_for_test(101)'
          new = '            ..grant(None).snapshot().into_create_for_test(100)'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Consent deny test fixture anchor not found')
          text = text.replace(
              'fn version_overflow_failure_is_atomic()',
              'fn strict_rehydrate_rejects_unreachable_active_overflow_version()',
              1,
          )
          path.write_text(text)
          PY
      - name: Verify Consent owner foundation
        run: |
          cargo fmt --all
          cargo clippy -p crm-consents --all-targets -- -D warnings
          cargo test -p crm-consents
      - name: Commit verified Consent repair and restore standard workflow
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git show origin/main:.github/workflows/rust-generated-sync.yml > .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/rust-generated-sync.yml modules/crm-consents/src/domain.rs
          if git diff --cached --quiet; then
            echo "Consent owner foundation repair already synchronized."
            exit 0
          fi
          git commit -m "Fix Consent owner lifecycle test fixture"
          git push origin "HEAD:${HEAD_BRANCH}"
