name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Apply Phase 8A.2b composition and generated-source synchronization
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()
          old = """        let party_query_adapter =
            PartyQueryAdapter::new(store.clone(), visibility_authorizer.clone());"""
          new = """        let party_query_adapter = PartyQueryAdapter::new(
            store.clone(),
            CursorCodec::new(cursor_key)
                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
            visibility_authorizer.clone(),
        )
        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;"""
          if old not in text:
              raise SystemExit("expected PartyQueryAdapter constructor block was not found")
          path.write_text(text.replace(old, new, 1))
          PY
          cargo generate-lockfile
          cargo fmt --all
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Restore canonical workflow and commit synchronized files
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          if git diff --quiet; then
            echo "Phase 8A.2b source is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts .github/workflows/rust-generated-sync.yml
          git commit -m "Synchronize Phase 8A.2b generated and runtime source"
          git push origin "HEAD:${HEAD_BRANCH}"
