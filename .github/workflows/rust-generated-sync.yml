name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Repair confirmed Customer 360 query adapter findings
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-customer-360-query-adapter/src/lib.rs')
          text = path.read_text()
          text = text.replace('    Customer360ContributionKind, Customer360ContributionSnapshot, CUSTOMER_360_CONSUMER_MODULE_ID,\n', '    Customer360ContributionKind, Customer360ContributionSnapshot,\n', 1)
          if 'CUSTOMER_360_CONSUMER_MODULE_ID' in text:
              raise SystemExit('unused Customer 360 consumer module import remains')
          path.write_text(text)
          PY
      - name: Synchronize generated Rust state for diagnostics
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Capture targeted Customer 360 query adapter diagnostics
        id: check
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo check -p crm-customer-360-query-adapter --all-targets 2>&1 | tee customer-360-query-check.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload targeted diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: customer-360-query-adapter-diagnostics
          path: customer-360-query-check.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail after diagnostics when targeted check failed
        if: steps.check.outputs.status != '0'
        run: exit 1
      - name: Commit canonical generated state when targeted check passes
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services
          if git diff --cached --quiet; then
            echo "Customer 360 query adapter is already synchronized."
            exit 0
          fi
          git commit -m "Synchronize Customer 360 query adapter foundation"
          git push origin "HEAD:${HEAD_BRANCH}"
