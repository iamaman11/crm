name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated client contract hashes
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
      - name: Apply verified export disclosure process acceptance patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/export_process_e2e.rs")
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              if old not in text:
                  raise SystemExit(f"expected export E2E anchor is missing: {old[:120]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              'const EXPORT_GET: &str = "customer_data.export.party.get";\n',
              'const EXPORT_GET: &str = "customer_data.export.party.get";\nconst EXPORT_ARTIFACT_DOWNLOAD_CAPABILITY: &str = "customer_data.export.party.artifact.download";\n',
          )

          completion_anchor = '    assert_eq!(completed_event_count(&admin).await, 1);\n\n    // Crash window 2:'
          completion_insert = '    assert_eq!(completed_event_count(&admin).await, 1);\n    verify_artifact_disclosure(\n        &http,\n        &http_addr,\n        &first_job_id,\n        &completed_first,\n        &admin,\n    )\n    .await;\n\n    // Crash window 2:'
          replace_once(completion_anchor, completion_insert)

          helper_lines = [
              'async fn verify_artifact_disclosure(',
              '    http: &reqwest::Client,',
              '    http_addr: &str,',
              '    job_id: &str,',
              '    job: &cdo::PartyExportJob,',
              '    admin: &PgPool,',
              ') {',
              '    let url = format!("http://{http_addr}/v1/customer-data/exports/{job_id}/artifact");',
              '    let audit_before = disclosure_audit_count(admin).await;',
              '',
              '    let unauthenticated = http',
              '        .get(&url)',
              '        .header("x-tenant-id", TENANT)',
              '        .send()',
              '        .await',
              '        .expect("request unauthenticated export artifact disclosure");',
              '    assert_eq!(unauthenticated.status(), reqwest::StatusCode::UNAUTHORIZED);',
              '    assert_eq!(disclosure_audit_count(admin).await, audit_before);',
              '',
              '    let forbidden_tenant = http',
              '        .get(&url)',
              '        .bearer_auth(TOKEN)',
              '        .header("x-tenant-id", "tenant-b")',
              '        .send()',
              '        .await',
              '        .expect("request cross-tenant export artifact disclosure");',
              '    assert_eq!(forbidden_tenant.status(), reqwest::StatusCode::FORBIDDEN);',
              '    assert_eq!(disclosure_audit_count(admin).await, audit_before);',
              '',
              '    let request_id = unique_id("export-artifact-disclosure");',
              '    let response = http',
              '        .get(&url)',
              '        .bearer_auth(TOKEN)',
              '        .header("x-tenant-id", TENANT)',
              '        .header("x-request-id", request_id)',
              '        .send()',
              '        .await',
              '        .expect("download governed Party export artifact");',
              '    assert_eq!(response.status(), reqwest::StatusCode::OK);',
              '    let headers = response.headers().clone();',
              '    let artifact = job.artifact.as_ref().expect("completed export artifact evidence");',
              '    let expected_sha256 = hex(&artifact.content_sha256);',
              '    assert_eq!(headers.get(reqwest::header::CONTENT_TYPE).unwrap(), "text/csv; charset=utf-8");',
              '    assert_eq!(headers.get(reqwest::header::CONTENT_LENGTH).unwrap(), artifact.size_bytes.to_string());',
              '    assert_eq!(headers.get(reqwest::header::CACHE_CONTROL).unwrap(), "private, no-store");',
              '    assert_eq!(headers.get(reqwest::header::ETAG).unwrap(), format!("\\\"sha256-{expected_sha256}\\\""));',
              '    assert_eq!(headers.get("x-content-sha256").unwrap(), expected_sha256);',
              '    assert_eq!(headers.get("x-content-type-options").unwrap(), "nosniff");',
              '    let bytes = response.bytes().await.expect("read governed Party export bytes");',
              '    assert_eq!(bytes.len() as u64, artifact.size_bytes);',
              '    assert_eq!(Sha256::digest(&bytes).as_slice(), artifact.content_sha256.as_slice());',
              '    assert!(bytes.starts_with(b"party_id,"));',
              '    assert_eq!(disclosure_audit_count(admin).await, audit_before + 1);',
              '}',
              '',
          ]
          helper = "\n".join(helper_lines) + "\n"
          replace_once('async fn install_outcome_delay_trigger(admin: &PgPool) {\n', helper + 'async fn install_outcome_delay_trigger(admin: &PgPool) {\n')

          audit_lines = [
              'async fn disclosure_audit_count(admin: &PgPool) -> i64 {',
              '    sqlx::query_scalar::<_, i64>(',
              '        "SELECT count(*) FROM crm.audit_records WHERE tenant_id = $1 AND capability_id = $2",',
              '    )',
              '    .bind(TENANT)',
              '    .bind(EXPORT_ARTIFACT_DOWNLOAD_CAPABILITY)',
              '    .fetch_one(admin)',
              '    .await',
              '    .expect("count export artifact disclosure audits")',
              '}',
              '',
          ]
          audit_helper = "\n".join(audit_lines) + "\n"
          replace_once('async fn completed_event_count(admin: &PgPool) -> i64 {\n', audit_helper + 'async fn completed_event_count(admin: &PgPool) -> i64 {\n')

          path.write_text(text)
          PY
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
