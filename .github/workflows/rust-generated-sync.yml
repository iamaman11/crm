name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact Phase 8A.9 Data Quality query wiring
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          temporary_workflow = Path(".github/workflows/phase8a9-wire-data-quality-query.yml")
          temporary_workflow.unlink(missing_ok=True)

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()
          marker = "use crm_data_quality_query_adapter::DataQualityQueryAdapter;"
          if marker in text:
              print("Data Quality query runtime is already wired.")
              raise SystemExit(0)

          replacements = [
              (
                  dedent("""\
                  use crm_customer_data_operations_query_adapter::{
                      CustomerDataOperationsQueryAdapter, LIST_IMPORT_ROWS_CAPABILITY,
                      PartyExportArtifactDownloadResolver, artifact_download_capability_definition,
                  };
                  """),
                  dedent("""\
                  use crm_customer_data_operations_query_adapter::{
                      CustomerDataOperationsQueryAdapter, LIST_IMPORT_ROWS_CAPABILITY,
                      PartyExportArtifactDownloadResolver, artifact_download_capability_definition,
                  };
                  use crm_data_quality_query_adapter::DataQualityQueryAdapter;
                  """),
              ),
              (
                  dedent("""\
                          let customer_data_operations_query_adapter = CustomerDataOperationsQueryAdapter::new(
                              store.clone(),
                              CursorCodec::new(cursor_key)
                                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                              visibility_authorizer.clone(),
                          )
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
                  """),
                  dedent("""\
                          let customer_data_operations_query_adapter = CustomerDataOperationsQueryAdapter::new(
                              store.clone(),
                              CursorCodec::new(cursor_key)
                                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                              visibility_authorizer.clone(),
                          )
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
                          let data_quality_query_adapter =
                              DataQualityQueryAdapter::new(store.clone(), visibility_authorizer.clone());
                  """),
              ),
              (
                  dedent("""\
                          let query_router = Arc::new(ApplicationQueryRouter::new(
                              production_query_router,
                              party_query_adapter,
                              account_query_adapter,
                              contact_point_query_adapter,
                              party_relationship_query_adapter,
                              customer_360_query_adapter,
                              consent_query_adapter,
                              identity_resolution_query_adapter,
                              identity_resolution_merge_query_adapter,
                              customer_data_operations_query_adapter,
                              metadata_query_adapter,
                          ));
                  """),
                  dedent("""\
                          let base_query_router = crate::governed_metadata::ApplicationQueryRouter::new(
                              production_query_router,
                              party_query_adapter,
                              account_query_adapter,
                              contact_point_query_adapter,
                              party_relationship_query_adapter,
                              customer_360_query_adapter,
                              consent_query_adapter,
                              identity_resolution_query_adapter,
                              identity_resolution_merge_query_adapter,
                              customer_data_operations_query_adapter,
                              metadata_query_adapter,
                          );
                          let query_router = Arc::new(ApplicationQueryRouter::new(
                              base_query_router,
                              data_quality_query_adapter,
                          ));
                  """),
              ),
              (
                  "                METADATA_MODULE_ID => {}\n",
                  dedent("""\
                                  "crm.data-quality" => upsert_bootstrap_visibility(
                                      visibility_store,
                                      config,
                                      tenant_id,
                                      definition,
                                      BootstrapVisibilityResource {
                                          owner_module_id: "crm.data-quality",
                                          resource_type: "data_quality.party_rule_set_version",
                                      },
                                      ["definition"].into_iter().map(str::to_owned).collect(),
                                      expires_at,
                                  )?,
                                  METADATA_MODULE_ID => {}
                  """),
              ),
          ]

          for index, (old, new) in enumerate(replacements, start=1):
              count = text.count(old)
              print(f"fragment {index}: {count}")
              if count != 1:
                  raise SystemExit(f"expected exactly one runtime fragment {index}, found {count}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated client contract hashes
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts .github/workflows/phase8a9-wire-data-quality-query.yml; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
            git add -A .github/workflows/phase8a9-wire-data-quality-query.yml
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
