name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Make process acceptance data-class aware
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/process_e2e.rs")
          text = path.read_text()
          old_payload = '''fn payload<M: Message>(definition: &CapabilityDefinition, message: M) -> TypedPayload {
              let payload = TypedPayload {
                  owner: definition.input_contract.owner.clone(),
                  schema_id: definition.input_contract.schema_id.clone(),
                  schema_version: definition.input_contract.schema_version.clone(),
                  descriptor_hash: definition.input_contract.descriptor_hash,
                  data_class: DataClass::Confidential,
                  encoding: PayloadEncoding::Protobuf,
                  maximum_size_bytes: definition.input_contract.maximum_size_bytes,
                  retention_policy_id: RetentionPolicyId::try_new("standard").unwrap(),
                  bytes: message.encode_to_vec(),
              };
              payload.validate().expect("valid governed input payload");
              payload
          }

          fn wire_payload(payload: TypedPayload) -> GatewayTypedPayload {
              GatewayTypedPayload {
                  owner_module_id: payload.owner.as_str().to_owned(),
                  schema_id: payload.schema_id.as_str().to_owned(),
                  schema_version: payload.schema_version.as_str().to_owned(),
                  descriptor_hash: payload.descriptor_hash.to_vec(),
                  data_class: "confidential".to_owned(),
                  encoding: "protobuf".to_owned(),
                  maximum_size_bytes: payload.maximum_size_bytes,
                  retention_policy_id: payload.retention_policy_id.as_str().to_owned(),
                  payload: payload.bytes,
              }
          }'''
          new_payload = '''fn payload<M: Message>(definition: &CapabilityDefinition, message: M) -> TypedPayload {
              let data_class = *definition
                  .input_contract
                  .allowed_data_classes
                  .first()
                  .expect("governed input contract must declare a data class");
              let payload = TypedPayload {
                  owner: definition.input_contract.owner.clone(),
                  schema_id: definition.input_contract.schema_id.clone(),
                  schema_version: definition.input_contract.schema_version.clone(),
                  descriptor_hash: definition.input_contract.descriptor_hash,
                  data_class,
                  encoding: PayloadEncoding::Protobuf,
                  maximum_size_bytes: definition.input_contract.maximum_size_bytes,
                  retention_policy_id: RetentionPolicyId::try_new("standard").unwrap(),
                  bytes: message.encode_to_vec(),
              };
              payload.validate().expect("valid governed input payload");
              payload
          }

          fn wire_payload(payload: TypedPayload) -> GatewayTypedPayload {
              GatewayTypedPayload {
                  owner_module_id: payload.owner.as_str().to_owned(),
                  schema_id: payload.schema_id.as_str().to_owned(),
                  schema_version: payload.schema_version.as_str().to_owned(),
                  descriptor_hash: payload.descriptor_hash.to_vec(),
                  data_class: data_class_name(payload.data_class).to_owned(),
                  encoding: "protobuf".to_owned(),
                  maximum_size_bytes: payload.maximum_size_bytes,
                  retention_policy_id: payload.retention_policy_id.as_str().to_owned(),
                  payload: payload.bytes,
              }
          }

          fn data_class_name(data_class: DataClass) -> &'static str {
              match data_class {
                  DataClass::Public => "public",
                  DataClass::Internal => "internal",
                  DataClass::Confidential => "confidential",
                  DataClass::Restricted => "restricted",
                  DataClass::Personal => "personal",
                  DataClass::SensitivePersonal => "sensitive_personal",
                  DataClass::Biometric => "biometric",
                  DataClass::Financial => "financial",
                  DataClass::Credential => "credential",
              }
          }'''
          if old_payload not in text:
              raise SystemExit("process_e2e data-class helper block not found")
          path.write_text(text.replace(old_payload, new_payload, 1))
          PY
      - name: Restore canonical workflow and commit compatibility fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/crm-api/tests/process_e2e.rs .github/workflows/rust-generated-sync.yml
          git commit -m "Make process acceptance contract-data-class aware"
          git push origin "HEAD:${HEAD_BRANCH}"
