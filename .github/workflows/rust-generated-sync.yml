name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Synchronize lockfile and Rust formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit formatted files and restore normal sync workflow
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git show origin/main:.github/workflows/rust-generated-sync.yml > .github/workflows/rust-generated-sync.yml
          if git diff --quiet -- Cargo.lock crates modules services .github/workflows/rust-generated-sync.yml; then
            echo "No Rust formatting changes are required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services .github/workflows/rust-generated-sync.yml
          git commit -m "Synchronize Phase 8A.6 Rust formatting"
          git push origin "HEAD:${HEAD_BRANCH}"
