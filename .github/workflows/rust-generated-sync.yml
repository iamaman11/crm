name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Repair Identity Resolution evidence accounting
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/identity_resolution_process_e2e.rs")
          text = path.read_text()
          replacements = {
              "assert_evidence_delta(after_ab, baseline, 1, 2, 1);": "assert_evidence_delta(after_ab, baseline, 1, 2, 1, 1);",
              "assert_evidence_delta(after_ac, baseline, 2, 4, 2);": "assert_evidence_delta(after_ac, baseline, 2, 4, 2, 2);",
              "assert_evidence_delta(final_counts, baseline, 2, 4, 6);": "assert_evidence_delta(final_counts, baseline, 2, 4, 6, 7);",
              "    successful_mutations: i64,\n) {": "    identity_successful_mutations: i64,\n    tenant_successful_mutations: i64,\n) {",
              "    assert_eq!(actual.events, baseline.events + successful_mutations);": "    assert_eq!(\n        actual.events,\n        baseline.events + identity_successful_mutations\n    );",
              "    assert_eq!(actual.audits, baseline.audits + successful_mutations);": "    assert_eq!(actual.audits, baseline.audits + tenant_successful_mutations);",
              "        baseline.idempotency + successful_mutations": "        baseline.idempotency + tenant_successful_mutations",
              "        baseline.transactions + successful_mutations": "        baseline.transactions + tenant_successful_mutations",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"missing exact evidence-accounting anchor: {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          cargo fmt --all
          cargo test -p crm-api --test identity_resolution_process_e2e --no-run
      - name: Commit repaired acceptance source
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/crm-api/tests/identity_resolution_process_e2e.rs
          git commit -m "fix(identity-resolution): account for Party mutation evidence"
          git push origin "HEAD:${HEAD_BRANCH}"
