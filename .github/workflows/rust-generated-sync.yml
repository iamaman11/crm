name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/**"
      - "packages/client/src/contract_hashes.ts"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Apply exact Phase 8A.3b Party-reference error-boundary fix
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          governed = Path("crates/crm-application-runtime/src/governed_metadata.rs")
          text = governed.read_text()
          replacement = '''async fn validate_account_party_references(
              store: &PostgresDataStore,
              definition: &CapabilityDefinition,
              request: &CapabilityRequest,
          ) -> Result<(), SdkError> {
              let references = match definition.capability_id.as_str() {
                  "accounts.account.create" => referenced_party_ids_from_create(request)?,
                  "accounts.account.update" => referenced_party_ids_from_update(request)?,
                  _ => return Err(account_reference_configuration_error()),
              };
              let unique_party_ids = references
                  .into_iter()
                  .map(|reference| reference.as_str().to_owned())
                  .collect::<BTreeSet<_>>();
              let owner_module_id = ModuleId::try_new(PARTIES_MODULE_ID).map_err(catalog_error)?;
              let record_type = RecordType::try_new(PARTY_RECORD_TYPE).map_err(catalog_error)?;

              for party_id in unique_party_ids {
                  if !party_reference_exists(store, request, &owner_module_id, &record_type, party_id)
                      .await?
                  {
                      return Err(account_party_reference_unavailable());
                  }
              }
              Ok(())
          }

          async fn validate_contact_point_party_reference(
              store: &PostgresDataStore,
              definition: &CapabilityDefinition,
              request: &CapabilityRequest,
          ) -> Result<(), SdkError> {
              if definition.capability_id.as_str() != "contact-points.contact-point.create" {
                  return Ok(());
              }
              let reference = referenced_party_id_from_create(request)?;
              let owner_module_id = ModuleId::try_new(PARTIES_MODULE_ID).map_err(catalog_error)?;
              let record_type = RecordType::try_new(PARTY_RECORD_TYPE).map_err(catalog_error)?;
              if party_reference_exists(
                  store,
                  request,
                  &owner_module_id,
                  &record_type,
                  reference.as_str().to_owned(),
              )
              .await?
              {
                  Ok(())
              } else {
                  Err(contact_point_party_reference_unavailable())
              }
          }

          async fn party_reference_exists(
              store: &PostgresDataStore,
              request: &CapabilityRequest,
              owner_module_id: &ModuleId,
              record_type: &RecordType,
              party_id: String,
          ) -> Result<bool, SdkError> {
              let record_id = RecordId::try_new(party_id).map_err(catalog_error)?;
              Ok(store
                  .get_record_for_query(&RecordGetQuery {
                      tenant_id: request.context.execution.tenant_id.clone(),
                      owner_module_id: owner_module_id.clone(),
                      record_type: record_type.clone(),
                      record_id,
                  })
                  .await?
                  .is_some())
          }

          fn account_party_reference_unavailable'''
          pattern = r"async fn validate_account_party_references\(.*?\nfn account_party_reference_unavailable"
          updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f"expected exactly one Party-reference validation block, found {count}")
          governed.write_text(updated)
          PY
      - name: Apply machine-fixable Rust maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code
          cargo generate-lockfile
          cargo fmt --all
      - name: Generate canonical browser contract hashes
        run: |
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Commit synchronized files when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts; then
            echo "Maintenance files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
          git commit -m "Preserve Party-reference non-disclosure without masking runtime failures"
          git push origin "HEAD:${HEAD_BRANCH}"
