name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated client contract hashes
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
      - name: Apply verified disclosure state rejection acceptance patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/export_process_e2e.rs")
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one export E2E anchor {old[:120]!r}; found {count}")
              text = text.replace(old, new, 1)

          replace_once(
              'const EXPORT_START: &str = "customer_data.export.party.execution.start";\n',
              'const EXPORT_START: &str = "customer_data.export.party.execution.start";\nconst EXPORT_CANCEL: &str = "customer_data.export.party.cancel";\n',
          )
          replace_once(
              '    let export_start = mutation_definition(EXPORT_START);\n    let export_get = query_definition(EXPORT_GET);\n',
              '    let export_start = mutation_definition(EXPORT_START);\n    let export_cancel = mutation_definition(EXPORT_CANCEL);\n    let export_get = query_definition(EXPORT_GET);\n',
          )
          replace_once(
              '    wait_for_artifact_chunk_count(&admin, &first_file_id, 2).await;\n    assert_eq!(outcome_record_count(&admin).await, 0);\n\n    force_kill(&mut child).await;\n',
              '    wait_for_artifact_chunk_count(&admin, &first_file_id, 2).await;\n    assert_eq!(outcome_record_count(&admin).await, 0);\n    assert_artifact_disclosure_rejected(\n        &http,\n        &http_addr,\n        &first_job_id,\n        reqwest::StatusCode::CONFLICT,\n        &admin,\n    )\n    .await;\n\n    force_kill(&mut child).await;\n',
          )

          end_anchor = '''    assert_eq!(artifact_count(&admin).await, artifacts_before_second + 1);
              assert_eq!(artifact_status(&admin, &second_file_id).await, "finalized");
              assert_eq!(completed_event_count(&admin).await, 2);

              send_sigint(&child).await;'''
          end_insert = '''    assert_eq!(artifact_count(&admin).await, artifacts_before_second + 1);
              assert_eq!(artifact_status(&admin, &second_file_id).await, "finalized");
              assert_eq!(completed_event_count(&admin).await, 2);

              let cancelled_job_id = unique_id("export-cancelled-disclosure-job");
              let created_cancelled = create_export_job(&mut grpc, &export_create, &cancelled_job_id).await;
              let cancelled = cancel_export(
                  &mut grpc,
                  &export_cancel,
                  &cancelled_job_id,
                  resource_version(&created_cancelled),
              )
              .await;
              assert_eq!(cancelled.status, cdo::PartyExportJobStatus::Cancelled as i32);
              assert_artifact_disclosure_rejected(
                  &http,
                  &http_addr,
                  &cancelled_job_id,
                  reqwest::StatusCode::CONFLICT,
                  &admin,
              )
              .await;

              let expired_job_id = unique_id("export-expired-disclosure-job");
              let created_expired = create_export_job_with_policy(
                  &mut grpc,
                  &export_create,
                  &expired_job_id,
                  "expired",
              )
              .await;
              let _selecting_expired = start_export(
                  &mut grpc,
                  &export_start,
                  &expired_job_id,
                  resource_version(&created_expired),
                  "export-expired-selection-start",
              )
              .await;
              let ready_expired = wait_for_export_status(
                  &mut grpc,
                  &export_get,
                  &expired_job_id,
                  cdo::PartyExportJobStatus::Ready,
              )
              .await;
              let _executing_expired = start_export(
                  &mut grpc,
                  &export_start,
                  &expired_job_id,
                  resource_version(&ready_expired),
                  "export-expired-execution-start",
              )
              .await;
              let completed_expired = wait_for_export_status(
                  &mut grpc,
                  &export_get,
                  &expired_job_id,
                  cdo::PartyExportJobStatus::Completed,
              )
              .await;
              assert_eq!(
                  completed_expired
                      .artifact
                      .as_ref()
                      .expect("expired export artifact evidence")
                      .retention_policy_id,
                  "expired"
              );
              sleep(Duration::from_millis(1_200)).await;
              assert_artifact_disclosure_rejected(
                  &http,
                  &http_addr,
                  &expired_job_id,
                  reqwest::StatusCode::NOT_FOUND,
                  &admin,
              )
              .await;

              send_sigint(&child).await;'''
          replace_once(end_anchor, end_insert)

          create_anchor = '''async fn create_export_job(
              client: &mut ApplicationGatewayServiceClient<tonic::transport::Channel>,
              definition: &CapabilityDefinition,
              job_id: &str,
          ) -> cdo::PartyExportJob {
              let response = mutate('''
          create_replacement = '''async fn create_export_job(
              client: &mut ApplicationGatewayServiceClient<tonic::transport::Channel>,
              definition: &CapabilityDefinition,
              job_id: &str,
          ) -> cdo::PartyExportJob {
              create_export_job_with_policy(client, definition, job_id, "standard").await
          }

          async fn create_export_job_with_policy(
              client: &mut ApplicationGatewayServiceClient<tonic::transport::Channel>,
              definition: &CapabilityDefinition,
              job_id: &str,
              retention_policy_id: &str,
          ) -> cdo::PartyExportJob {
              let response = mutate('''
          replace_once(create_anchor, create_replacement)
          replace_once(
              '                        retention_policy_id: "standard".to_owned(),\n',
              '                        retention_policy_id: retention_policy_id.to_owned(),\n',
          )

          cancel_helper = '''async fn cancel_export(
              client: &mut ApplicationGatewayServiceClient<tonic::transport::Channel>,
              definition: &CapabilityDefinition,
              job_id: &str,
              expected_version: i64,
          ) -> cdo::PartyExportJob {
              let response = mutate(
                  client,
                  definition,
                  payload(
                      definition,
                      cdo::CancelPartyExportJobRequest {
                          export_job_ref: Some(cdo::ExportJobRef {
                              export_job_id: job_id.to_owned(),
                          }),
                          expected_version,
                      },
                  ),
                  TENANT,
                  &unique_id("export-cancel-job"),
                  None,
              )
              .await
              .expect("cancel Party export through production gateway");
              cdo::CancelPartyExportJobResponse::decode(response.output.unwrap().payload.as_slice())
                  .expect("decode cancel Party export response")
                  .export_job
                  .expect("cancelled Party export job")
          }

          '''
          replace_once('async fn start_export(\n', cancel_helper + 'async fn start_export(\n')

          rejection_helper = '''async fn assert_artifact_disclosure_rejected(
              http: &reqwest::Client,
              http_addr: &str,
              job_id: &str,
              expected_status: reqwest::StatusCode,
              admin: &PgPool,
          ) {
              let audit_before = disclosure_audit_count(admin).await;
              let response = http
                  .get(format!(
                      "http://{http_addr}/v1/customer-data/exports/{job_id}/artifact"
                  ))
                  .bearer_auth(TOKEN)
                  .header("x-tenant-id", TENANT)
                  .header("x-request-id", unique_id("export-artifact-rejection"))
                  .send()
                  .await
                  .expect("request rejected Party export artifact disclosure");
              assert_eq!(response.status(), expected_status);
              assert_eq!(disclosure_audit_count(admin).await, audit_before);
          }

          '''
          replace_once('async fn verify_artifact_disclosure(\n', rejection_helper + 'async fn verify_artifact_disclosure(\n')

          path.write_text(text)
          PY
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
