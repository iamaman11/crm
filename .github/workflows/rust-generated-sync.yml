name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated client contract hashes
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
      - name: Apply verified disclosure header assertion patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/export_process_e2e.rs")
          text = path.read_text()
          replacements = [
              ('headers.get(reqwest::header::CONTENT_LENGTH).unwrap(),', 'headers.get(reqwest::header::CONTENT_LENGTH).unwrap().to_str().unwrap(),'),
              ('artifact.size_bytes.to_string()\n    );', 'artifact.size_bytes.to_string().as_str()\n    );'),
              ('headers.get(reqwest::header::ETAG).unwrap(),', 'headers.get(reqwest::header::ETAG).unwrap().to_str().unwrap(),'),
              ('format!("\\\"sha256-{expected_sha256}\\\"")\n    );', 'format!("\\\"sha256-{expected_sha256}\\\"").as_str()\n    );'),
              ('headers.get("x-content-sha256").unwrap(),', 'headers.get("x-content-sha256").unwrap().to_str().unwrap(),'),
              ('expected_sha256);', 'expected_sha256.as_str());'),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one disclosure assertion token {old!r}, found {count}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
