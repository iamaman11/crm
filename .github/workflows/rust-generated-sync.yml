name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Provision cross-tenant actor prerequisite in Account acceptance
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/account_process_e2e.rs")
          text = path.read_text()
          anchor = '''    admin
              .execute(sqlx::raw_sql(include_str!(
                  "../../../database/tests/0006_account_adapter.sql"
              )))
              .await
              .expect("publish Account module/capability registry fixture");'''
          replacement = anchor + '''
              admin
              .execute(sqlx::raw_sql(
                  "INSERT INTO crm.actors (tenant_id, actor_id, actor_type, status, display_name, last_business_transaction_id) VALUES ('tenant-b', 'actor-a', 'service', 'active', 'Account acceptance cross-tenant actor', 'account-process-actor-bootstrap') ON CONFLICT (tenant_id, actor_id) DO NOTHING;",
              ))
              .await
              .expect("provision Account acceptance actor in tenant B");'''
          if anchor not in text:
              raise SystemExit("Account acceptance fixture anchor not found")
          path.write_text(text.replace(anchor, replacement, 1))
          PY
      - name: Restore canonical workflow and commit prerequisite fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/crm-api/tests/account_process_e2e.rs .github/workflows/rust-generated-sync.yml
          git commit -m "Provision cross-tenant Account acceptance actor"
          git push origin "HEAD:${HEAD_BRANCH}"
