name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "services/crm-api/**"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Add and compile real merge-unmerge process acceptance
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/identity_resolution_process_e2e.rs")
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one replacement, found {count}: {old[:100]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              '''    gateway_v1::{\n        MutateRequest as GatewayMutateRequest, QueryRequest as GatewayQueryRequest,\n        TypedPayload as GatewayTypedPayload,\n        application_gateway_service_client::ApplicationGatewayServiceClient,\n    },''',
              '''    gateway_v1::{\n        ApprovalEvidence as GatewayApprovalEvidence, MutateRequest as GatewayMutateRequest,\n        QueryRequest as GatewayQueryRequest, TypedPayload as GatewayTypedPayload,\n        application_gateway_service_client::ApplicationGatewayServiceClient,\n    },''',
          )
          replace_once(
              '''use crm_capability_runtime::CapabilityDefinition;\nuse crm_module_sdk::{DataClass, PayloadEncoding, RetentionPolicyId, TypedPayload};''',
              '''use crm_capability_adapters::HmacSha256ApprovalVerifier;\nuse crm_capability_ingress::semantic_input_hash;\nuse crm_capability_runtime::{ApprovalEvidence, CapabilityDefinition};\nuse crm_module_sdk::{ActorId, DataClass, PayloadEncoding, RetentionPolicyId, TypedPayload};''',
          )
          replace_once(
              '''const TOKEN: &str = "identity-resolution-process-bearer-token-0123456789abcdef";\n\nconst PARTY_CREATE: &str = "parties.party.create";''',
              '''const TOKEN: &str = "identity-resolution-process-bearer-token-0123456789abcdef";\nconst APPROVAL_KEY: &str = "identity-resolution-approval-signing-key-0123456789abcdef";\n\nconst PARTY_CREATE: &str = "parties.party.create";''',
          )
          replace_once(
              '''const CANDIDATE_LIST: &str = "identity_resolution.candidate.list_by_party";''',
              '''const CANDIDATE_LIST: &str = "identity_resolution.candidate.list_by_party";\nconst MERGE_EXECUTE: &str = "identity_resolution.merge.execute";\nconst MERGE_UNMERGE: &str = "identity_resolution.merge.unmerge";\nconst MERGE_GET: &str = "identity_resolution.merge.get";\nconst MERGE_LIST: &str = "identity_resolution.merge.list_by_party";\nconst RESOLVE_CANONICAL: &str = "identity_resolution.party.resolve_canonical";''',
          )
          replace_once(
              '''    let admin = PgPool::connect(&admin_database_url)\n        .await\n        .expect("connect Identity Resolution process evidence reader");\n    for fixture in [''',
              '''    let admin = PgPool::connect(&admin_database_url)\n        .await\n        .expect("connect Identity Resolution process evidence reader");\n    ensure_canonical_redirect_migration(&admin).await;\n    for fixture in [''',
          )
          replace_once(
              '''    let final_counts = evidence_counts(&admin, TENANT_A).await;\n    assert_evidence_delta(final_counts, baseline, 2, 4, 6, 7);\n\n    send_sigint(&child).await;''',
              '''    let final_counts = evidence_counts(&admin, TENANT_A).await;\n    assert_evidence_delta(final_counts, baseline, 2, 4, 6, 7);\n\n    run_merge_unmerge_acceptance(\n        &mut grpc,\n        &admin,\n        &party_a,\n        &party_b,\n        &party_c,\n        &party_cross_tenant,\n    )\n    .await;\n\n    send_sigint(&child).await;''',
          )

          helper = r'''
#[derive(Debug, Clone, Copy, PartialEq, Eq)]
struct MergeEvidenceCounts {
    operations: i64,
    lineage_relationships: i64,
    redirects: i64,
    events: i64,
    audits: i64,
    idempotency: i64,
    transactions: i64,
}

async fn ensure_canonical_redirect_migration(admin: &PgPool) {
    let installed = sqlx::query_scalar::<_, bool>(
        "SELECT EXISTS (SELECT 1 FROM pg_indexes WHERE schemaname = 'crm' AND indexname = 'identity_resolution_canonical_redirect_source_uq')",
    )
    .fetch_one(admin)
    .await
    .expect("inspect canonical redirect migration state");
    if !installed {
        admin
            .execute(sqlx::raw_sql(include_str!(
                "../../../database/migrations/0011_identity_resolution_canonical_redirect.up.sql"
            )))
            .await
            .expect("apply canonical redirect hard-invariant migration for process acceptance");
    }
}

async fn run_merge_unmerge_acceptance(
    client: &mut ApplicationGatewayServiceClient<tonic::transport::Channel>,
    admin: &PgPool,
    party_a: &str,
    party_b: &str,
    party_c: &str,
    cross_tenant_party: &str,
) {
    let merge = mutation_definition(MERGE_EXECUTE);
    let unmerge = mutation_definition(MERGE_UNMERGE);
    let merge_get = query_definition(MERGE_GET);
    let merge_list = query_definition(MERGE_LIST);
    let resolve = query_definition(RESOLVE_CANONICAL);
    let party_get = query_definition(PARTY_GET);
    let baseline = merge_evidence_counts(admin, TENANT_A).await;

    let operation_id = unique_id("identity-merge-c-into-b");
    let exact_merge = merge_payload(&merge, &operation_id, party_c, 1, party_b, 1);

    let missing_approval = mutate(
        client,
        &merge,
        exact_merge.clone(),
        TENANT_A,
        "identity-merge-missing-approval",
        true,
    )
    .await
    .expect_err("merge must reject a missing approval");
    assert_eq!(missing_approval.code(), Code::PermissionDenied);

    let mut invalid_approval = signed_gateway_approval(&merge, &exact_merge);
    invalid_approval.opaque_proof[0] ^= 0xff;
    let invalid_signature = mutate_with_approval(
        client,
        &merge,
        exact_merge.clone(),
        TENANT_A,
        "identity-merge-invalid-approval",
        true,
        Some(invalid_approval),
    )
    .await
    .expect_err("merge must reject a tampered approval proof");
    assert_eq!(invalid_signature.code(), Code::PermissionDenied);

    let missing_party = unique_id("identity-merge-missing-party");
    let missing_payload = merge_payload(
        &merge,
        &unique_id("identity-merge-missing-operation"),
        &missing_party,
        1,
        party_b,
        1,
    );
    let missing_reference = mutate_with_approval(
        client,
        &merge,
        missing_payload.clone(),
        TENANT_A,
        "identity-merge-missing-reference",
        true,
        Some(signed_gateway_approval(&merge, &missing_payload)),
    )
    .await
    .expect_err("merge must reject a missing Party reference");
    assert_eq!(missing_reference.code(), Code::InvalidArgument);

    let cross_payload = merge_payload(
        &merge,
        &unique_id("identity-merge-cross-operation"),
        cross_tenant_party,
        1,
        party_b,
        1,
    );
    let cross_reference = mutate_with_approval(
        client,
        &merge,
        cross_payload.clone(),
        TENANT_A,
        "identity-merge-cross-reference",
        true,
        Some(signed_gateway_approval(&merge, &cross_payload)),
    )
    .await
    .expect_err("merge must reject a cross-tenant Party without disclosure");
    assert_eq!(cross_reference.code(), Code::InvalidArgument);
    assert_eq!(cross_reference.message(), missing_reference.message());

    let stale_payload = merge_payload(
        &merge,
        &unique_id("identity-merge-stale-operation"),
        party_c,
        2,
        party_b,
        1,
    );
    let stale_reference = mutate_with_approval(
        client,
        &merge,
        stale_payload.clone(),
        TENANT_A,
        "identity-merge-stale-reference",
        true,
        Some(signed_gateway_approval(&merge, &stale_payload)),
    )
    .await
    .expect_err("merge must reject a stale source Party version");
    assert_eq!(stale_reference.code(), Code::Aborted);
    assert_eq!(merge_evidence_counts(admin, TENANT_A).await, baseline);

    let merged = mutate_with_approval(
        client,
        &merge,
        exact_merge.clone(),
        TENANT_A,
        "identity-merge-c-into-b",
        true,
        Some(signed_gateway_approval(&merge, &exact_merge)),
    )
    .await
    .expect("approved exact-version merge must succeed");
    assert!(!merged.replayed);
    let merged_operation = decode_merge(&merged);
    assert_eq!(merge_operation_id(&merged_operation), operation_id);
    assert_eq!(merge_version(&merged_operation), 1);
    assert_eq!(
        merged_operation.status,
        identity::MergeOperationStatus::Active as i32
    );
    assert_eq!(merged_operation.decided_by_actor_id, ACTOR);
    assert_eq!(merged_operation.source_party_version, 1);
    assert_eq!(merged_operation.survivor_party_version, 1);
    assert_eq!(merged_operation.survivorship.len(), 1);
    assert_merge_evidence_delta(
        merge_evidence_counts(admin, TENANT_A).await,
        baseline,
        1,
        2,
        1,
        1,
    );

    let queried_merge = decode_get_merge(
        query(
            client,
            &merge_get,
            get_merge_payload(&merge_get, &operation_id),
            TENANT_A,
            true,
        )
        .await
        .expect("query active merge operation"),
    );
    assert_eq!(merge_operation_id(&queried_merge), operation_id);
    assert_eq!(queried_merge.status, identity::MergeOperationStatus::Active as i32);

    for party_id in [party_c, party_b] {
        let listed = decode_list_merges(
            query(
                client,
                &merge_list,
                list_merges_payload(
                    &merge_list,
                    party_id,
                    Some(identity::MergeOperationStatus::Active),
                ),
                TENANT_A,
                true,
            )
            .await
            .expect("list active merge operation by Party"),
        );
        assert_eq!(listed.merge_operations.len(), 1);
        assert_eq!(merge_operation_id(&listed.merge_operations[0]), operation_id);
    }

    let resolved = decode_resolution(
        query(
            client,
            &resolve,
            resolve_payload(&resolve, party_c),
            TENANT_A,
            true,
        )
        .await
        .expect("resolve source Party to current canonical survivor"),
    );
    assert_eq!(
        resolved
            .requested_party_ref
            .as_ref()
            .expect("requested Party ref")
            .party_id,
        party_c
    );
    assert_eq!(
        resolved
            .canonical_party_ref
            .as_ref()
            .expect("canonical Party ref")
            .party_id,
        party_b
    );
    assert_eq!(
        resolved
            .party_path
            .iter()
            .map(|party| party.party_id.as_str())
            .collect::<Vec<_>>(),
        vec![party_c, party_b]
    );
    assert_eq!(resolved.merge_operation_path.len(), 1);
    assert_eq!(resolved.merge_operation_path[0].merge_operation_id, operation_id);

    let duplicate_source_payload = merge_payload(
        &merge,
        &unique_id("identity-merge-duplicate-source"),
        party_c,
        1,
        party_a,
        2,
    );
    let duplicate_source = mutate_with_approval(
        client,
        &merge,
        duplicate_source_payload.clone(),
        TENANT_A,
        "identity-merge-duplicate-source",
        true,
        Some(signed_gateway_approval(&merge, &duplicate_source_payload)),
    )
    .await
    .expect_err("a Party with an active redirect cannot be merged again as a source");
    assert!(matches!(duplicate_source.code(), Code::Aborted | Code::FailedPrecondition));

    let cycle_payload = merge_payload(
        &merge,
        &unique_id("identity-merge-cycle"),
        party_b,
        1,
        party_c,
        1,
    );
    let cycle = mutate_with_approval(
        client,
        &merge,
        cycle_payload.clone(),
        TENANT_A,
        "identity-merge-cycle",
        true,
        Some(signed_gateway_approval(&merge, &cycle_payload)),
    )
    .await
    .expect_err("merge topology must reject a reverse cycle");
    assert!(matches!(cycle.code(), Code::Aborted | Code::FailedPrecondition));
    assert_merge_evidence_delta(
        merge_evidence_counts(admin, TENANT_A).await,
        baseline,
        1,
        2,
        1,
        1,
    );

    let stale_unmerge = unmerge_payload(&unmerge, &operation_id, 1, 2, 1);
    let stale_unmerge_error = mutate_with_approval(
        client,
        &unmerge,
        stale_unmerge.clone(),
        TENANT_A,
        "identity-unmerge-stale-party-version",
        true,
        Some(signed_gateway_approval(&unmerge, &stale_unmerge)),
    )
    .await
    .expect_err("unmerge must reject stale Party version evidence");
    assert_eq!(stale_unmerge_error.code(), Code::Aborted);

    let exact_unmerge = unmerge_payload(&unmerge, &operation_id, 1, 1, 1);
    let unmerged = mutate_with_approval(
        client,
        &unmerge,
        exact_unmerge.clone(),
        TENANT_A,
        "identity-unmerge-c-from-b",
        true,
        Some(signed_gateway_approval(&unmerge, &exact_unmerge)),
    )
    .await
    .expect("approved exact-version unmerge must succeed");
    let unmerged_operation = decode_unmerge(&unmerged);
    assert_eq!(merge_operation_id(&unmerged_operation), operation_id);
    assert_eq!(merge_version(&unmerged_operation), 2);
    assert_eq!(
        unmerged_operation.status,
        identity::MergeOperationStatus::Unmerged as i32
    );
    assert!(unmerged_operation.unmerge_decision.is_some());
    assert_merge_evidence_delta(
        merge_evidence_counts(admin, TENANT_A).await,
        baseline,
        1,
        2,
        0,
        2,
    );

    let resolved_after_unmerge = decode_resolution(
        query(
            client,
            &resolve,
            resolve_payload(&resolve, party_c),
            TENANT_A,
            true,
        )
        .await
        .expect("resolve source Party after unmerge"),
    );
    assert_eq!(
        resolved_after_unmerge
            .canonical_party_ref
            .as_ref()
            .expect("canonical Party after unmerge")
            .party_id,
        party_c
    );
    assert_eq!(resolved_after_unmerge.party_path.len(), 1);
    assert!(resolved_after_unmerge.merge_operation_path.is_empty());

    let queried_unmerged = decode_get_merge(
        query(
            client,
            &merge_get,
            get_merge_payload(&merge_get, &operation_id),
            TENANT_A,
            true,
        )
        .await
        .expect("query immutable unmerged lineage"),
    );
    assert_eq!(queried_unmerged.status, identity::MergeOperationStatus::Unmerged as i32);

    let listed_unmerged = decode_list_merges(
        query(
            client,
            &merge_list,
            list_merges_payload(
                &merge_list,
                party_c,
                Some(identity::MergeOperationStatus::Unmerged),
            ),
            TENANT_A,
            true,
        )
        .await
        .expect("list retained unmerged lineage by source Party"),
    );
    assert_eq!(listed_unmerged.merge_operations.len(), 1);
    assert_eq!(merge_operation_id(&listed_unmerged.merge_operations[0]), operation_id);

    let party_b_after = decode_party(
        query(
            client,
            &party_get,
            party_get_payload(&party_get, party_b),
            TENANT_A,
            true,
        )
        .await
        .expect("survivor Party remains independently queryable"),
    );
    let party_c_after = decode_party(
        query(
            client,
            &party_get,
            party_get_payload(&party_get, party_c),
            TENANT_A,
            true,
        )
        .await
        .expect("source Party remains independently queryable after unmerge"),
    );
    assert_eq!(party_version(&party_b_after), 1);
    assert_eq!(party_version(&party_c_after), 1);
    assert_eq!(party_record_count(admin, TENANT_A).await, 3);
}

fn merge_payload(
    definition: &CapabilityDefinition,
    operation_id: &str,
    source_party: &str,
    source_version: i64,
    survivor_party: &str,
    survivor_version: i64,
) -> TypedPayload {
    payload(
        definition,
        identity::MergePartyRequest {
            merge_operation_ref: Some(identity::MergeOperationRef {
                merge_operation_id: operation_id.to_owned(),
            }),
            source_party_ref: Some(customer::PartyRef {
                party_id: source_party.to_owned(),
            }),
            source_party_version: source_version,
            survivor_party_ref: Some(customer::PartyRef {
                party_id: survivor_party.to_owned(),
            }),
            survivor_party_version: survivor_version,
            decision_ref: format!("review://identity-resolution/{operation_id}/merge"),
            reason: "review.confirmed_duplicate".to_owned(),
            survivorship: vec![identity::SurvivorshipSelection {
                field_path: "display_name".to_owned(),
                provenance_party_ref: Some(customer::PartyRef {
                    party_id: survivor_party.to_owned(),
                }),
                provenance_party_version: survivor_version,
                source_value_sha256: vec![0x42; 32],
                evidence_ref: format!(
                    "evidence://identity-resolution/{operation_id}/display-name"
                ),
            }],
        },
    )
}

fn unmerge_payload(
    definition: &CapabilityDefinition,
    operation_id: &str,
    expected_version: i64,
    expected_source_party_version: i64,
    expected_survivor_party_version: i64,
) -> TypedPayload {
    payload(
        definition,
        identity::UnmergePartyRequest {
            merge_operation_ref: Some(identity::MergeOperationRef {
                merge_operation_id: operation_id.to_owned(),
            }),
            expected_version,
            decision_ref: format!("review://identity-resolution/{operation_id}/unmerge"),
            reason: "review.manual_correction".to_owned(),
            expected_source_party_version,
            expected_survivor_party_version,
        },
    )
}

fn get_merge_payload(definition: &CapabilityDefinition, operation_id: &str) -> TypedPayload {
    payload(
        definition,
        identity::GetMergeOperationRequest {
            merge_operation_ref: Some(identity::MergeOperationRef {
                merge_operation_id: operation_id.to_owned(),
            }),
        },
    )
}

fn list_merges_payload(
    definition: &CapabilityDefinition,
    party_id: &str,
    status: Option<identity::MergeOperationStatus>,
) -> TypedPayload {
    payload(
        definition,
        identity::ListMergeOperationsByPartyRequest {
            party_ref: Some(customer::PartyRef {
                party_id: party_id.to_owned(),
            }),
            status: status
                .map(|value| value as i32)
                .unwrap_or(identity::MergeOperationStatus::Unspecified as i32),
            page_size: 10,
            cursor: String::new(),
        },
    )
}

fn resolve_payload(definition: &CapabilityDefinition, party_id: &str) -> TypedPayload {
    payload(
        definition,
        identity::ResolveCanonicalPartyRequest {
            party_ref: Some(customer::PartyRef {
                party_id: party_id.to_owned(),
            }),
        },
    )
}

fn signed_gateway_approval(
    definition: &CapabilityDefinition,
    input: &TypedPayload,
) -> GatewayApprovalEvidence {
    let verifier = HmacSha256ApprovalVerifier::try_new(APPROVAL_KEY.as_bytes().to_vec())
        .expect("valid acceptance approval signing key");
    let mut approval = ApprovalEvidence {
        approval_id: unique_id("identity-approval"),
        actor_id: ActorId::try_new(ACTOR).expect("valid acceptance actor"),
        capability_id: definition.capability_id.clone(),
        capability_version: definition.capability_version.clone(),
        input_hash: semantic_input_hash(input),
        policy_version: "identity-resolution-merge-approval/v1".to_owned(),
        expires_at_unix_nanos: now_nanos() + 300_000_000_000,
        opaque_proof: Vec::new(),
    };
    approval.opaque_proof = verifier.sign(&approval);
    GatewayApprovalEvidence {
        approval_id: approval.approval_id,
        actor_id: approval.actor_id.as_str().to_owned(),
        capability_id: approval.capability_id.as_str().to_owned(),
        capability_version: approval.capability_version.as_str().to_owned(),
        input_hash: approval.input_hash.to_vec(),
        policy_version: approval.policy_version,
        expires_at_unix_nanos: approval.expires_at_unix_nanos,
        opaque_proof: approval.opaque_proof,
    }
}

fn decode_merge(
    response: &crm_application_runtime::gateway_v1::MutateResponse,
) -> identity::MergeOperation {
    identity::MergePartyResponse::decode(
        response
            .output
            .as_ref()
            .expect("merge output")
            .payload
            .as_slice(),
    )
    .expect("decode merge response")
    .merge_operation
    .expect("created merge operation")
}

fn decode_unmerge(
    response: &crm_application_runtime::gateway_v1::MutateResponse,
) -> identity::MergeOperation {
    identity::UnmergePartyResponse::decode(
        response
            .output
            .as_ref()
            .expect("unmerge output")
            .payload
            .as_slice(),
    )
    .expect("decode unmerge response")
    .merge_operation
    .expect("unmerged merge operation")
}

fn decode_get_merge(
    response: crm_application_runtime::gateway_v1::QueryResponse,
) -> identity::MergeOperation {
    identity::GetMergeOperationResponse::decode(
        response
            .output
            .expect("merge get output")
            .payload
            .as_slice(),
    )
    .expect("decode merge get response")
    .merge_operation
    .expect("queried merge operation")
}

fn decode_list_merges(
    response: crm_application_runtime::gateway_v1::QueryResponse,
) -> identity::ListMergeOperationsByPartyResponse {
    identity::ListMergeOperationsByPartyResponse::decode(
        response
            .output
            .expect("merge list output")
            .payload
            .as_slice(),
    )
    .expect("decode merge list response")
}

fn decode_resolution(
    response: crm_application_runtime::gateway_v1::QueryResponse,
) -> identity::CanonicalPartyResolution {
    identity::ResolveCanonicalPartyResponse::decode(
        response
            .output
            .expect("canonical resolution output")
            .payload
            .as_slice(),
    )
    .expect("decode canonical Party resolution")
    .resolution
    .expect("canonical Party resolution")
}

fn merge_operation_id(operation: &identity::MergeOperation) -> &str {
    operation
        .merge_operation_ref
        .as_ref()
        .expect("merge operation ref")
        .merge_operation_id
        .as_str()
}

fn merge_version(operation: &identity::MergeOperation) -> i64 {
    operation
        .resource_version
        .as_ref()
        .expect("merge operation resource version")
        .version
}

async fn merge_evidence_counts(admin: &PgPool, tenant_id: &str) -> MergeEvidenceCounts {
    let operations = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.records WHERE tenant_id = $1 AND owner_module_id = 'crm.identity-resolution' AND record_type = 'identity_resolution.merge_operation' AND deleted_at IS NULL",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count merge-operation records");
    let lineage_relationships = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.relationships WHERE tenant_id = $1 AND owner_module_id = 'crm.identity-resolution' AND relationship_type = 'identity_resolution.merge.party'",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count immutable merge lineage relationships");
    let redirects = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.relationships WHERE tenant_id = $1 AND owner_module_id = 'crm.identity-resolution' AND relationship_type = 'identity_resolution.canonical_redirect'",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count active canonical redirects");
    let events = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.outbox_events WHERE tenant_id = $1 AND event_type IN ('identity_resolution.party.merged', 'identity_resolution.party.unmerged')",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count merge lineage events");
    let audits = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.audit_records WHERE tenant_id = $1",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count merge acceptance audits");
    let idempotency = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.idempotency_records WHERE tenant_id = $1",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count merge acceptance idempotency rows");
    let transactions = sqlx::query_scalar::<_, i64>(
        "SELECT count(*) FROM crm.business_transactions WHERE tenant_id = $1",
    )
    .bind(tenant_id)
    .fetch_one(admin)
    .await
    .expect("count merge acceptance transactions");
    MergeEvidenceCounts {
        operations,
        lineage_relationships,
        redirects,
        events,
        audits,
        idempotency,
        transactions,
    }
}

fn assert_merge_evidence_delta(
    actual: MergeEvidenceCounts,
    baseline: MergeEvidenceCounts,
    operations: i64,
    lineage_relationships: i64,
    redirects: i64,
    successful_mutations: i64,
) {
    assert_eq!(actual.operations, baseline.operations + operations);
    assert_eq!(
        actual.lineage_relationships,
        baseline.lineage_relationships + lineage_relationships
    );
    assert_eq!(actual.redirects, baseline.redirects + redirects);
    assert_eq!(actual.events, baseline.events + successful_mutations);
    assert_eq!(actual.audits, baseline.audits + successful_mutations);
    assert_eq!(actual.idempotency, baseline.idempotency + successful_mutations);
    assert_eq!(actual.transactions, baseline.transactions + successful_mutations);
}

