name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply Phase 8A.7 validation and application patch
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            git show 38834f97565ec8fb554ec8657c5226130c316e28:.github/workflows/phase8a7-validation-application-once.yml > /tmp/phase8a7-patch.yml
            python - <<'PY'
          from pathlib import Path

          lines = Path('/tmp/phase8a7-patch.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          indent = len(lines[start]) - len(lines[start].lstrip())
          prefix = ' ' * indent
          code = '\n'.join(line[indent:] if line.startswith(prefix) else line for line in lines[start:end])
          exec(compile(code, 'phase8a7-validation-application-patch', 'exec'), {'__name__': '__main__'})
          PY
            cargo generate-lockfile
            cargo fmt --all
          ) > /tmp/phase8a7-patch.log 2>&1
          status=$?

          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            tail -n 250 /tmp/phase8a7-patch.log > phase8a7-patch-error.txt
            git add -A
            git commit -m "diagnose(phase8a7): capture validation application patch failure"
            git push origin "HEAD:${HEAD_BRANCH}"
            exit "$status"
          fi

          rm -f phase8a7-patch-error.txt
          git add -A
          git commit -m "feat(phase8a7): finalize validation and application routing"
          git push origin "HEAD:${HEAD_BRANCH}"
