name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add explicit empty approval to existing gateway mutations
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def blocks(text: str):
              cursor = 0
              while True:
                  start = text.find("GatewayMutateRequest {", cursor)
                  if start < 0:
                      return
                  brace = text.find("{", start)
                  depth = 0
                  end = None
                  for index in range(brace, len(text)):
                      if text[index] == "{":
                          depth += 1
                      elif text[index] == "}":
                          depth -= 1
                          if depth == 0:
                              end = index
                              break
                  if end is None:
                      raise SystemExit("unclosed GatewayMutateRequest initializer")
                  yield start, end
                  cursor = end + 1

          changed = 0
          for path in sorted(Path("services/crm-api/tests").glob("*.rs")):
              text = path.read_text()
              spans = list(blocks(text))
              if not spans:
                  continue
              output = []
              cursor = 0
              for start, end in spans:
                  output.append(text[cursor:start])
                  block = text[start:end + 1]
                  if "approval:" not in block:
                      closing_line_start = text.rfind("\n", start, end) + 1
                      closing_indent = text[closing_line_start:end]
                      block = block[:-1] + "    approval: None,\n" + closing_indent + "}"
                      changed += 1
                  output.append(block)
                  cursor = end + 1
              output.append(text[cursor:])
              updated = "".join(output)
              for start, end in blocks(updated):
                  if "approval:" not in updated[start:end + 1]:
                      raise SystemExit(f"approval field still missing in {path}")
              path.write_text(updated)

          if changed == 0:
              raise SystemExit("no legacy GatewayMutateRequest initializer required migration")
          print(f"updated {changed} GatewayMutateRequest initializers")
          PY
          cargo fmt --all
      - name: Commit compatibility updates
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/crm-api/tests
          git commit -m "Adapt process tests to optional approval transport"
          git push origin "HEAD:${HEAD_BRANCH}"
