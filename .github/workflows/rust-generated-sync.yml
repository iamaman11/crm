name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add explicit empty approval to legacy process mutations
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          changed = 0
          for path in sorted(Path("services/crm-api/tests").glob("*_process_e2e.rs")):
              text = path.read_text()
              cursor = 0
              pieces = []
              while True:
                  start = text.find("GatewayMutateRequest {", cursor)
                  if start < 0:
                      pieces.append(text[cursor:])
                      break
                  pieces.append(text[cursor:start])
                  brace = text.find("{", start)
                  depth = 0
                  end = None
                  for index in range(brace, len(text)):
                      char = text[index]
                      if char == "{":
                          depth += 1
                      elif char == "}":
                          depth -= 1
                          if depth == 0:
                              end = index
                              break
                  if end is None:
                      raise SystemExit(f"unclosed GatewayMutateRequest initializer in {path}")
                  block = text[start:end + 1]
                  if "approval:" not in block:
                      line_start = text.rfind("\n", start, end) + 1
                      closing_line_start = text.rfind("\n", start, end) + 1
                      closing_indent = text[closing_line_start:end]
                      block = block[:-1] + f"    approval: None,\n{closing_indent}" + "}"
                      changed += 1
                  pieces.append(block)
                  cursor = end + 1
              path.write_text("".join(pieces))

          if changed != 3:
              raise SystemExit(f"expected exactly 3 legacy mutation constructors, changed {changed}")
          PY
          cargo fmt --all
      - name: Commit compatibility updates
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/crm-api/tests
          git commit -m "Adapt process tests to optional approval transport"
          git push origin "HEAD:${HEAD_BRANCH}"
