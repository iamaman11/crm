name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact Phase 8A.3b persisted-invariant precedence fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("modules/crm-contact-points/src/domain.rs")
          lines = path.read_text().splitlines(keepends=True)
          preference_indexes = [
              index
              for index, line in enumerate(lines)
              if line.strip() == "validate_preference(snapshot.status, snapshot.preferred)?;"
          ]
          if len(preference_indexes) != 1:
              raise SystemExit(
                  f"expected one persisted preference check, found {len(preference_indexes)}"
              )
          preference_index = preference_indexes[0]
          initial_indexes = [
              index
              for index, line in enumerate(lines)
              if index > preference_index and line.strip() == "validate_initial_transition_shape("
          ]
          if len(initial_indexes) != 1:
              raise SystemExit(
                  f"expected one later initial-transition check, found {len(initial_indexes)}"
              )
          initial_start = initial_indexes[0]
          initial_end = next(
              index
              for index in range(initial_start + 1, len(lines))
              if lines[index].strip() == ")?;"
          )
          block = lines[initial_start : initial_end + 1]
          del lines[initial_start : initial_end + 1]
          preference_index = next(
              index
              for index, line in enumerate(lines)
              if line.strip() == "validate_preference(snapshot.status, snapshot.preferred)?;"
          )
          lines[preference_index:preference_index] = block
          path.write_text("".join(lines))
          PY
      - name: Apply machine-fixable Rust maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit synchronized files when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust maintenance files are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services
          git commit -m "Prioritize impossible persisted Contact Point create state"
          git push origin "HEAD:${HEAD_BRANCH}"
