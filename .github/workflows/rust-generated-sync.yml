name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "requirements-dev.txt"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "modules/*/module.yaml"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "schemas/module.schema.json"
      - "scripts/contract_bindings.py"
      - "scripts/generate_contract_bindings.py"
      - "scripts/validate_module_manifests.py"
      - "contracts/module-contract-bindings.json"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Repair promoted subject process cfg and restore canonical workflow
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("services/crm-api/tests/customer_privacy_case_subject_verify_process_e2e.rs")
          source = path.read_text(encoding="utf-8")
          stale = '#![cfg(all(unix, feature = "customer-privacy-subject-verify-candidate"))]'
          promoted = '#![cfg(unix)]'
          if not source.startswith(stale + "\n"):
              raise SystemExit("subject process test no longer has the expected stale candidate cfg")
          path.write_text(promoted + source[len(stale):], encoding="utf-8")
          PY
          git fetch origin main --depth=1
          git checkout FETCH_HEAD -- .github/workflows/rust-generated-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/crm-api/tests/customer_privacy_case_subject_verify_process_e2e.rs .github/workflows/rust-generated-sync.yml
          git commit -m "Fix promoted Customer Privacy subject process test"
          git push origin "HEAD:${HEAD_BRANCH}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install generation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Install Buf
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.50.1
          setup_only: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated contract artifacts
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
          python scripts/generate_contract_bindings.py --write
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts contracts/module-contract-bindings.json; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts contracts/module-contract-bindings.json
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee generated-sync-clippy.txt
      - name: Upload canonical Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-sync-clippy-diagnostics
          path: generated-sync-clippy.txt
          if-no-files-found: error
          retention-days: 7
