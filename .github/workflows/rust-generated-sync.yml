name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - "proto/**/*.proto"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Synchronize lockfile and canonical formatting
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Synchronize generated client contract hashes
        run: |
          cargo run -p crm-proto-contracts --bin generate_hashes -- packages/client/src/contract_hashes.ts
      - name: Apply verified export disclosure composition patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"expected patch anchor missing in {path}: {old[:120]!r}")
              path.write_text(text.replace(old, new, 1))

          query_lib = Path("crates/crm-customer-data-operations-query-adapter/src/lib.rs")
          replace_exact(
              query_lib,
              "mod export_query;\n",
              "mod artifact_download;\npub use artifact_download::*;\n\nmod export_query;\n",
          )

          runtime = Path("crates/crm-application-runtime/src/runtime.rs")
          replace_exact(
              runtime,
              "    ApplicationGatewayService, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,\n    GovernedPartyExportSelectionSource, ProcessIdentitySource, SystemClock,\n",
              "    ApplicationGatewayService, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,\n    GovernedPartyExportSelectionSource, PartyExportArtifactDownloadService, ProcessIdentitySource,\n    SystemClock,\n",
          )
          replace_exact(
              runtime,
              "use axum::extract::{Path, State};\nuse axum::http::{HeaderMap, StatusCode};\n",
              "use axum::body::Body;\nuse axum::extract::{Path, State};\nuse axum::http::{header, HeaderMap, HeaderValue, StatusCode};\n",
          )
          replace_exact(
              runtime,
              "    PostgresDataStore, PostgresMetadataCapabilityExecutor, PostgresMetadataQueryStore,\n    PostgresTransactionalAggregateExecutor,\n",
              "    PostgresDataStore, PostgresImmutableFileArtifactStore, PostgresMetadataCapabilityExecutor,\n    PostgresMetadataQueryStore, PostgresTransactionalAggregateExecutor,\n",
          )
          replace_exact(
              runtime,
              "use crm_customer_data_operations_query_adapter::{\n    CustomerDataOperationsQueryAdapter, LIST_IMPORT_ROWS_CAPABILITY,\n};\n",
              "use crm_customer_data_operations_query_adapter::{\n    CustomerDataOperationsQueryAdapter, LIST_IMPORT_ROWS_CAPABILITY,\n    PartyExportArtifactDownloadResolver, artifact_download_capability_definition,\n};\n",
          )
          replace_exact(
              runtime,
              "use crm_module_sdk::{\n    ActorId, CapabilityId, CapabilityVersion, Clock, EventType, ModuleId, RandomSource, RecordType,\n    SchemaVersion, TenantId, TypedPayload,\n};\n",
              "use crm_module_sdk::{\n    ActorId, CapabilityId, CapabilityVersion, Clock, ErrorCategory, EventType, ModuleId,\n    RandomSource, RecordType, SchemaVersion, SdkError, TenantId, TypedPayload,\n};\n",
          )
          replace_exact(
              runtime,
              "    pub import_execution_worker: Arc<PartyImportExecutionWorker>,\n    pub export_selection_worker: Arc<PartyExportSelectionWorker>,\n",
              "    pub import_execution_worker: Arc<PartyImportExecutionWorker>,\n    pub export_selection_worker: Arc<PartyExportSelectionWorker>,\n    pub export_artifact_download: Arc<PartyExportArtifactDownloadService>,\n",
          )
          replace_exact(
              runtime,
              "        let internal_export_selection_definitions =\n            internal_export_selection_capability_definitions()\n                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let import_execution_worker_actor_id =\n",
              "        let internal_export_selection_definitions =\n            internal_export_selection_capability_definitions()\n                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let artifact_download_definition = artifact_download_capability_definition()\n            .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let import_execution_worker_actor_id =\n",
          )
          replace_exact(
              runtime,
              "                &query_definitions,\n                &internal_export_selection_definitions,\n                &export_selection_worker_actor_id,\n",
              "                &query_definitions,\n                &artifact_download_definition,\n                &internal_export_selection_definitions,\n                &export_selection_worker_actor_id,\n",
          )
          replace_exact(
              runtime,
              "        let cursor_key: [u8; 32] = config.cursor_signing_key[..32]\n",
              "        let artifact_download_resolver = Arc::new(PartyExportArtifactDownloadResolver::new(\n            store.clone(),\n            visibility_authorizer.clone(),\n        ));\n        let cursor_key: [u8; 32] = config.cursor_signing_key[..32]\n",
          )
          replace_exact(
              runtime,
              "        let query_ingress = QueryIngress::new(\n            authenticator,\n            QueryContextResolver::new(Arc::clone(&clock), random, timeout_policy)\n                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,\n            query_gateway,\n        );\n",
              "        let query_context_resolver = QueryContextResolver::new(\n            Arc::clone(&clock),\n            Arc::clone(&random),\n            timeout_policy,\n        )\n        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let export_artifact_download = Arc::new(\n            PartyExportArtifactDownloadService::new(\n                authenticator.clone(),\n                query_context_resolver.clone(),\n                authorizer.clone(),\n                artifact_download_resolver,\n                Arc::new(PostgresImmutableFileArtifactStore::new(store.clone())),\n                store.clone(),\n            )\n            .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,\n        );\n        let query_ingress = QueryIngress::new(\n            authenticator,\n            query_context_resolver,\n            query_gateway,\n        );\n",
          )
          replace_exact(
              runtime,
              "            import_execution_worker,\n            export_selection_worker,\n            readiness: Arc::new(AtomicBool::new(false)),\n",
              "            import_execution_worker,\n            export_selection_worker,\n            export_artifact_download,\n            readiness: Arc::new(AtomicBool::new(false)),\n",
          )
          replace_exact(
              runtime,
              "        .route(\"/readyz\", get(ready))\n        .route(\n",
              "        .route(\"/readyz\", get(ready))\n        .route(\n            \"/v1/customer-data/exports/{export_job_id}/artifact\",\n            get(download_export_artifact),\n        )\n        .route(\n",
          )
          ready_anchor = '''async fn ready(State(state): State<HttpState>) -> impl IntoResponse {
    if state.components.is_ready() {
        (StatusCode::OK, Json(json!({"status": "ready"})))
    } else {
        (
            StatusCode::SERVICE_UNAVAILABLE,
            Json(json!({
                "status": "not_ready",
                "worker_error": state.components.last_worker_error(),
            })),
        )
    }
}

'''
          handler = r'''async fn download_export_artifact(
    State(state): State<HttpState>,
    Path(export_job_id): Path<String>,
    headers: HeaderMap,
) -> Response {
    let authorization = match optional_header(&headers, "authorization") {
        Ok(value) => value.unwrap_or_default(),
        Err(response) => return response,
    };
    let tenant_id = match optional_header(&headers, "x-tenant-id") {
        Ok(value) => value,
        Err(response) => return response,
    };
    let request_id = match optional_header(&headers, "x-request-id") {
        Ok(value) => value,
        Err(response) => return response,
    };
    let correlation_id = match optional_header(&headers, "x-correlation-id") {
        Ok(value) => value,
        Err(response) => return response,
    };
    let trace_id = match optional_header(&headers, "x-trace-id") {
        Ok(value) => value,
        Err(response) => return response,
    };
    let timeout_millis = match optional_header(&headers, "x-timeout-ms") {
        Ok(Some(value)) => match value.parse::<u64>() {
            Ok(value) => Some(value),
            Err(_) => return bad_route(),
        },
        Ok(None) => None,
        Err(response) => return response,
    };

    match state
        .components
        .export_artifact_download
        .download(crate::PartyExportArtifactDownloadRequest {
            authorization,
            tenant_id,
            request_id,
            correlation_id,
            trace_id,
            timeout_millis,
            export_job_id,
        })
        .await
    {
        Ok(result) => artifact_download_response(result),
        Err(error) => artifact_download_error_response(error),
    }
}

fn artifact_download_response(result: crate::PartyExportArtifactDownloadResult) -> Response {
    let content_length = result.bytes.len().to_string();
    let content_sha256 = hex_bytes(&result.content_sha256);
    let mut response = Response::new(Body::from(result.bytes));
    *response.status_mut() = StatusCode::OK;
    let headers = response.headers_mut();
    headers.insert(
        header::CONTENT_TYPE,
        HeaderValue::from_str(&result.media_type)
            .expect("validated export media type must be a valid HTTP header"),
    );
    headers.insert(
        header::CONTENT_LENGTH,
        HeaderValue::from_str(&content_length)
            .expect("content length must be a valid HTTP header"),
    );
    headers.insert(
        header::CONTENT_DISPOSITION,
        HeaderValue::from_static("attachment; filename=\"party-export.csv\""),
    );
    headers.insert(
        header::CACHE_CONTROL,
        HeaderValue::from_static("private, no-store"),
    );
    headers.insert(
        header::ETAG,
        HeaderValue::from_str(&format!("\"sha256-{content_sha256}\""))
            .expect("SHA-256 ETag must be a valid HTTP header"),
    );
    headers.insert(
        "x-content-sha256",
        HeaderValue::from_str(&content_sha256)
            .expect("SHA-256 digest must be a valid HTTP header"),
    );
    headers.insert(
        "x-content-type-options",
        HeaderValue::from_static("nosniff"),
    );
    response
}

fn artifact_download_error_response(error: SdkError) -> Response {
    let status = match error.category {
        ErrorCategory::InvalidArgument => StatusCode::BAD_REQUEST,
        ErrorCategory::Authentication => StatusCode::UNAUTHORIZED,
        ErrorCategory::Authorization => StatusCode::FORBIDDEN,
        ErrorCategory::Conflict => StatusCode::CONFLICT,
        ErrorCategory::NotFound => StatusCode::NOT_FOUND,
        ErrorCategory::RateLimit => StatusCode::TOO_MANY_REQUESTS,
        ErrorCategory::Dependency | ErrorCategory::Unavailable => StatusCode::SERVICE_UNAVAILABLE,
        ErrorCategory::Internal => StatusCode::INTERNAL_SERVER_ERROR,
    };
    (status, Json(json!({"error": "request_failed"}))).into_response()
}

fn optional_header(headers: &HeaderMap, name: &'static str) -> Result<Option<String>, Response> {
    headers
        .get(name)
        .map(|value| value.to_str().map(str::to_owned).map_err(|_| bad_route()))
        .transpose()
}

fn hex_bytes(bytes: &[u8]) -> String {
    let mut output = String::with_capacity(bytes.len() * 2);
    for byte in bytes {
        use std::fmt::Write as _;
        write!(&mut output, "{byte:02x}").expect("writing to String cannot fail");
    }
    output
}

'''
          replace_exact(runtime, ready_anchor, ready_anchor + handler)
          PY
      - name: Commit generated Rust and contract artifacts when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services packages/client/src/contract_hashes.ts; then
            echo "Rust and generated contract artifacts are already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
            git commit -m "Synchronize Rust and generated contract artifacts"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Apply machine-fixable Clippy maintenance
        run: |
          cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged -- \
            -W unused-imports -W dead-code || true
      - name: Commit Clippy fixes when needed
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- Cargo.lock crates modules services; then
            echo "Rust Clippy maintenance is already synchronized."
          else
            git config user.name "github-actions[bot]"
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add Cargo.lock crates modules services
            git commit -m "Synchronize machine-fixable Rust maintenance"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - name: Verify canonical Clippy state
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
