name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "services/**/Cargo.toml"
      - "services/**/*.rs"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Complete Phase 8A.7 application routing
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          meta = Path('crates/crm-application-runtime/src/governed_metadata.rs')
          text = meta.read_text()

          old = '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.target(definition, request)
          } else {
              SalesActivitiesCapabilityPlannerRouter.target(definition, request)
          }
'''
          new = '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.target(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              CustomerDataOperationsCapabilityPlanner.target(definition, request)
          } else {
              SalesActivitiesCapabilityPlannerRouter.target(definition, request)
          }
'''
          if old not in text:
              raise SystemExit('mutation target router anchor not found')
          text = text.replace(old, new, 1)

          old = '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.plan(definition, request, current)
          } else {
              SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
          }
'''
          new = '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.plan(definition, request, current)
          } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              CustomerDataOperationsCapabilityPlanner.plan(definition, request, current)
          } else {
              SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
          }
'''
          if old not in text:
              raise SystemExit('mutation plan router anchor not found')
          text = text.replace(old, new, 1)

          old = '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.validate(definition, request)
          } else {
              self.production.validate(definition, request)
          }
'''
          new = '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.validate(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.customer_data_operations.validate(definition, request)
          } else {
              self.production.validate(definition, request)
          }
'''
          if old not in text:
              raise SystemExit('query validate router anchor not found')
          text = text.replace(old, new, 1)

          old = '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.execute(definition, request)
          } else {
              self.production.execute(definition, request)
          }
'''
          new = '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.execute(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.customer_data_operations.execute(definition, request)
          } else {
              self.production.execute(definition, request)
          }
'''
          if old not in text:
              raise SystemExit('query execute router anchor not found')
          text = text.replace(old, new, 1)
          meta.write_text(text)

          runtime = Path('crates/crm-application-runtime/src/runtime.rs')
          text = runtime.read_text()
          anchor = '''        let identity_resolution_merge_query_adapter = IdentityResolutionMergeQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
'''
          addition = anchor + '''        let customer_data_operations_query_adapter = CustomerDataOperationsQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
'''
          if 'let customer_data_operations_query_adapter =' not in text:
              if anchor not in text:
                  raise SystemExit('query adapter construction anchor not found')
              text = text.replace(anchor, addition, 1)

          anchor = '''                PARTY_RELATIONSHIPS_MODULE_ID => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      BootstrapVisibilityResource {
                          owner_module_id: PARTY_RELATIONSHIPS_MODULE_ID,
                          resource_type: PARTY_RELATIONSHIP_RECORD_TYPE,
                      },
                      party_relationship_fields(),
                      expires_at,
                  )?,
'''
          addition = anchor + '''                CUSTOMER_DATA_OPERATIONS_MODULE_ID => {
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          BootstrapVisibilityResource {
                              owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                              resource_type: CUSTOMER_DATA_IMPORT_JOB_RECORD_TYPE,
                          },
                          customer_data_import_job_fields(),
                          expires_at,
                      )?;
                      if definition.capability_id.as_str() == LIST_IMPORT_ROWS_CAPABILITY {
                          upsert_bootstrap_visibility(
                              visibility_store,
                              config,
                              tenant_id,
                              definition,
                              BootstrapVisibilityResource {
                                  owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                                  resource_type: CUSTOMER_DATA_IMPORT_ROW_RECORD_TYPE,
                              },
                              customer_data_import_row_fields(),
                              expires_at,
                          )?;
                      }
                  }
'''
          if 'CUSTOMER_DATA_OPERATIONS_MODULE_ID =>' not in text:
              if anchor not in text:
                  raise SystemExit('bootstrap owner anchor not found')
              text = text.replace(anchor, addition, 1)

          anchor = 'fn customer_360_party_fields() -> BTreeSet<String> {\n'
          helpers = '''fn customer_data_import_job_fields() -> BTreeSet<String> {
              ["source", "mapping", "status", "counters", "checkpoint"]
                  .into_iter()
                  .map(str::to_owned)
                  .collect()
          }

          fn customer_data_import_row_fields() -> BTreeSet<String> {
              [
                  "row_position",
                  "source_identity",
                  "status",
                  "prepared_party",
                  "diagnostics",
                  "execution",
                  "target_party_ref",
              ]
              .into_iter()
              .map(str::to_owned)
              .collect()
          }

          '''
          if 'fn customer_data_import_job_fields()' not in text:
              if anchor not in text:
                  raise SystemExit('field helper anchor not found')
              text = text.replace(anchor, helpers + anchor, 1)
          runtime.write_text(text)
          PY
          cargo generate-lockfile
          cargo fmt --all
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
      - name: Commit completed application routing
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(phase8a7): complete import application routing"
          git push origin "HEAD:${HEAD_BRANCH}"
