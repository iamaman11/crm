name: Rust Generated Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - "crates/**/*.rs"
      - "modules/**/Cargo.toml"
      - "modules/**/*.rs"
      - "proto/crm/customer_data_operations/**"
      - ".github/workflows/rust-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: rust-generated-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply Phase 8A.7 contract-freeze identity and parser-profile refactor
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new)

          def sub_once(text: str, pattern: str, replacement: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one regex match, found {count}")
              return updated

          domain_path = Path("modules/crm-customer-data-operations/src/domain.rs")
          domain = domain_path.read_text()

          domain = replace_once(
              domain,
              "use crm_module_sdk::{ErrorCategory, FieldName, FieldViolation, RecordId, SdkError};",
              "use crate::profile::{ExternalPartyIdentifierDigest, ImportParserProfile, SourceSystemId};\nuse crm_module_sdk::{ErrorCategory, FieldName, FieldViolation, RecordId, SdkError};",
              "domain profile import",
          )
          domain = replace_once(
              domain,
              'const TARGET_IDEMPOTENCY_DOMAIN: &[u8] =\n    b"crm.customer-data-operations.party-create-idempotency/v1";',
              'const TARGET_IDEMPOTENCY_DOMAIN: &[u8] =\n    b"crm.customer-data-operations.party-create-idempotency/v1";\nconst TARGET_PARTY_ID_DOMAIN: &[u8] = b"crm.customer-data-operations.target-party-id/v1";',
              "target Party namespace",
          )

          domain = sub_once(
              domain,
              r"    fn for_party_mapping\(mapping: &PartyImportMapping\) -> Result<Self, SdkError> \{.*?        Self::try_new\(format!\(\"cdo-map-\{\}\", hex_digest\(hasher.finalize\(\)\)\)\)\n    \}",
              '''    fn for_party_mapping(mapping: &PartyImportMapping) -> Result<Self, SdkError> {
              let mut hasher = Sha256::new();
              hasher.update(MAPPING_ID_DOMAIN);
              hash_optional_part(&mut hasher, mapping.target_party_id_column.as_deref());
              hash_part(&mut hasher, mapping.party_kind_column.as_bytes());
              hash_part(&mut hasher, mapping.display_name_column.as_bytes());
              hash_optional_part(&mut hasher, mapping.source_external_id_column.as_deref());
              hash_optional_part(&mut hasher, mapping.external_row_key_column.as_deref());
              Self::try_new(format!("cdo-map-{}", hex_digest(hasher.finalize())))
          }''',
              "mapping identity",
          )

          domain = replace_once(
              domain,
              '''    pub fn as_str(&self) -> &str {
              self.0.as_str()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct SourceDescriptor {''',
              '''    pub fn for_import_row(job_id: &ImportJobId, row_id: &ImportRowId) -> Result<Self, SdkError> {
              let mut hasher = Sha256::new();
              hasher.update(TARGET_PARTY_ID_DOMAIN);
              hash_part(&mut hasher, job_id.as_str().as_bytes());
              hash_part(&mut hasher, row_id.as_str().as_bytes());
              Self::try_new(format!("party-import-{}", hex_digest(hasher.finalize())))
          }

          pub fn as_str(&self) -> &str {
              self.0.as_str()
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct SourceDescriptor {''',
              "target Party derivation",
          )

          domain = sub_once(
              domain,
              r"#\[derive\(Debug, Clone, PartialEq, Eq\)\]\npub struct SourceDescriptor \{.*?\n\}\n\n#\[derive\(Debug, Clone, PartialEq, Eq\)\]\npub struct PartyImportMapping",
              '''#[derive(Debug, Clone, PartialEq, Eq)]
          pub struct SourceDescriptor {
              source_system_id: SourceSystemId,
              source_name: String,
              content_sha256: String,
              row_count: u32,
              parser_profile: ImportParserProfile,
          }

          impl SourceDescriptor {
              pub fn try_new(
                  source_system_id: SourceSystemId,
                  source_name: impl Into<String>,
                  content_sha256: impl Into<String>,
                  row_count: u32,
                  parser_profile: ImportParserProfile,
              ) -> Result<Self, SdkError> {
                  let source_name = normalize_bounded_text(
                      source_name.into(),
                      MAX_SOURCE_NAME_BYTES,
                      "CUSTOMER_DATA_SOURCE_NAME_INVALID",
                      "customer_data.source.name",
                      "source name",
                  )?;
                  let content_sha256 = normalize_sha256(
                      content_sha256.into(),
                      "CUSTOMER_DATA_SOURCE_SHA256_INVALID",
                      "customer_data.source.content_sha256",
                  )?;
                  validate_row_count(row_count)?;
                  Ok(Self {
                      source_system_id,
                      source_name,
                      content_sha256,
                      row_count,
                      parser_profile,
                  })
              }

              pub fn source_system_id(&self) -> &SourceSystemId {
                  &self.source_system_id
              }

              pub fn source_name(&self) -> &str {
                  &self.source_name
              }

              pub fn content_sha256(&self) -> &str {
                  &self.content_sha256
              }

              pub const fn row_count(&self) -> u32 {
                  self.row_count
              }

              pub fn parser_profile(&self) -> &ImportParserProfile {
                  &self.parser_profile
              }
          }

          #[derive(Debug, Clone, PartialEq, Eq)]
          pub struct PartyImportMapping''',
              "source descriptor",
          )

          domain = sub_once(
              domain,
              r"pub struct PartyImportMapping \{.*?\n\}\n\nimpl PartyImportMapping \{.*?\n\}\n\n#\[derive\(Debug, Clone, Copy, PartialEq, Eq\)\]\npub enum PartialExecutionPolicy",
              '''pub struct PartyImportMapping {
              target_party_id_column: Option<String>,
              party_kind_column: String,
              display_name_column: String,
              source_external_id_column: Option<String>,
              external_row_key_column: Option<String>,
          }

          impl PartyImportMapping {
              pub fn try_new(
                  target_party_id_column: Option<String>,
                  party_kind_column: impl Into<String>,
                  display_name_column: impl Into<String>,
                  source_external_id_column: Option<String>,
                  external_row_key_column: Option<String>,
              ) -> Result<Self, SdkError> {
                  let target_party_id_column = target_party_id_column
                      .map(normalize_column_name)
                      .transpose()?;
                  let party_kind_column = normalize_column_name(party_kind_column.into())?;
                  let display_name_column = normalize_column_name(display_name_column.into())?;
                  let source_external_id_column = source_external_id_column
                      .map(normalize_column_name)
                      .transpose()?;
                  let external_row_key_column = external_row_key_column
                      .map(normalize_column_name)
                      .transpose()?;

                  Ok(Self {
                      target_party_id_column,
                      party_kind_column,
                      display_name_column,
                      source_external_id_column,
                      external_row_key_column,
                  })
              }

              pub fn version_id(&self) -> Result<MappingVersionId, SdkError> {
                  MappingVersionId::for_party_mapping(self)
              }

              pub fn target_party_id_column(&self) -> Option<&str> {
                  self.target_party_id_column.as_deref()
              }

              pub fn party_kind_column(&self) -> &str {
                  &self.party_kind_column
              }

              pub fn display_name_column(&self) -> &str {
                  &self.display_name_column
              }

              pub fn source_external_id_column(&self) -> Option<&str> {
                  self.source_external_id_column.as_deref()
              }

              pub fn external_row_key_column(&self) -> Option<&str> {
                  self.external_row_key_column.as_deref()
              }
          }

          #[derive(Debug, Clone, Copy, PartialEq, Eq)]
          pub enum PartialExecutionPolicy''',
              "Party import mapping",
          )

          domain = replace_once(
              domain,
              '''    identity_source: RowIdentitySource,
              status: ImportRowStatus,''',
              '''    identity_source: RowIdentitySource,
              source_external_id_sha256: Option<ExternalPartyIdentifierDigest>,
              status: ImportRowStatus,''',
              "row external evidence field",
          )
          domain = replace_once(
              domain,
              '''    pub identity_source: RowIdentitySource,
              pub status: ImportRowStatus,''',
              '''    pub identity_source: RowIdentitySource,
              pub source_external_id_sha256: Option<ExternalPartyIdentifierDigest>,
              pub status: ImportRowStatus,''',
              "row snapshot external evidence field",
          )
          domain = replace_once(
              domain,
              '''pub struct ValidateImportRowSuccess {
              pub expected_version: i64,
              pub prepared_party: PreparedPartyRow,
              pub occurred_at_unix_nanos: i64,
          }''',
              '''pub struct ValidateImportRowSuccess {
              pub expected_version: i64,
              pub prepared_party: PreparedPartyRow,
              pub source_external_id: Option<String>,
              pub occurred_at_unix_nanos: i64,
          }''',
              "validation success external evidence",
          )
          domain = replace_once(
              domain,
              '''pub struct ValidateImportRowFailure {
              pub expected_version: i64,
              pub diagnostics: Vec<RowDiagnostic>,
              pub occurred_at_unix_nanos: i64,
          }''',
              '''pub struct ValidateImportRowFailure {
              pub expected_version: i64,
              pub diagnostics: Vec<RowDiagnostic>,
              pub source_external_id: Option<String>,
              pub occurred_at_unix_nanos: i64,
          }''',
              "validation failure external evidence",
          )
          domain = replace_once(
              domain,
              '''            identity_source,
              status: ImportRowStatus::Pending,''',
              '''            identity_source,
              source_external_id_sha256: None,
              status: ImportRowStatus::Pending,''',
              "row create external evidence",
          )
          domain = replace_once(
              domain,
              '''        validate_row_state_shape(
              snapshot.status,
              &snapshot.prepared_party,''',
              '''        validate_row_state_shape(
              snapshot.status,
              snapshot.source_external_id_sha256.as_ref(),
              &snapshot.prepared_party,''',
              "row rehydrate shape external evidence",
          )
          domain = replace_once(
              domain,
              '''            identity_source: snapshot.identity_source,
              status: snapshot.status,''',
              '''            identity_source: snapshot.identity_source,
              source_external_id_sha256: snapshot.source_external_id_sha256,
              status: snapshot.status,''',
              "row rehydrate external evidence",
          )
          domain = replace_once(
              domain,
              '''    pub fn mark_valid(&mut self, command: ValidateImportRowSuccess) -> Result<(), SdkError> {
              self.require_pending(command.expected_version, command.occurred_at_unix_nanos)?;
              self.prepared_party = Some(command.prepared_party);
              self.status = ImportRowStatus::Valid;
              self.advance(command.occurred_at_unix_nanos)
          }''',
              '''    pub fn mark_valid(&mut self, command: ValidateImportRowSuccess) -> Result<(), SdkError> {
              self.require_pending(command.expected_version, command.occurred_at_unix_nanos)?;
              self.source_external_id_sha256 = hash_optional_external_id(command.source_external_id)?;
              self.prepared_party = Some(command.prepared_party);
              self.status = ImportRowStatus::Valid;
              self.advance(command.occurred_at_unix_nanos)
          }''',
              "mark valid external evidence",
          )
          domain = replace_once(
              domain,
              '''    pub fn mark_invalid(&mut self, command: ValidateImportRowFailure) -> Result<(), SdkError> {
              self.require_pending(command.expected_version, command.occurred_at_unix_nanos)?;
              validate_diagnostics(&command.diagnostics)?;
              self.diagnostics = command.diagnostics;
              self.status = ImportRowStatus::Invalid;
              self.advance(command.occurred_at_unix_nanos)
          }''',
              '''    pub fn mark_invalid(&mut self, command: ValidateImportRowFailure) -> Result<(), SdkError> {
              self.require_pending(command.expected_version, command.occurred_at_unix_nanos)?;
              validate_diagnostics(&command.diagnostics)?;
              self.source_external_id_sha256 = hash_optional_external_id(command.source_external_id)?;
              self.diagnostics = command.diagnostics;
              self.status = ImportRowStatus::Invalid;
              self.advance(command.occurred_at_unix_nanos)
          }''',
              "mark invalid external evidence",
          )
          domain = replace_once(
              domain,
              '''            identity_source: self.identity_source.clone(),
              status: self.status,''',
              '''            identity_source: self.identity_source.clone(),
              source_external_id_sha256: self.source_external_id_sha256.clone(),
              status: self.status,''',
              "row snapshot external evidence",
          )
          domain = replace_once(
              domain,
              '''    pub fn prepared_party(&self) -> Option<&PreparedPartyRow> {
              self.prepared_party.as_ref()
          }

          pub const fn version(&self) -> i64 {''',
              '''    pub fn source_external_id_sha256(&self) -> Option<&ExternalPartyIdentifierDigest> {
              self.source_external_id_sha256.as_ref()
          }

          pub fn prepared_party(&self) -> Option<&PreparedPartyRow> {
              self.prepared_party.as_ref()
          }

          pub const fn version(&self) -> i64 {''',
              "row external evidence getter",
          )

          old_counter_call = '''        validate_job_counters(
              snapshot.status,
              snapshot.partial_execution_policy,
              snapshot.total_rows,
              snapshot.valid_rows,
              snapshot.invalid_rows,
              snapshot.succeeded_rows,
              snapshot.checkpoint_row_position,
              snapshot.version,
          )?;'''
          new_counter_call = '''        validate_job_counters(ImportJobCounterState {
              status: snapshot.status,
              policy: snapshot.partial_execution_policy,
              total_rows: snapshot.total_rows,
              valid_rows: snapshot.valid_rows,
              invalid_rows: snapshot.invalid_rows,
              succeeded_rows: snapshot.succeeded_rows,
              checkpoint_row_position: snapshot.checkpoint_row_position,
              version: snapshot.version,
          })?;'''
          domain = replace_once(domain, old_counter_call, new_counter_call, "typed counter call")
          domain = sub_once(
              domain,
              r"fn validate_job_counters\(\n    status: ImportJobStatus,\n    policy: PartialExecutionPolicy,\n    total_rows: u32,\n    valid_rows: u32,\n    invalid_rows: u32,\n    succeeded_rows: u32,\n    checkpoint_row_position: u32,\n    version: i64,\n\) -> Result<\(\), SdkError> \{\n    let validated_total = valid_rows",
              '''#[derive(Debug, Clone, Copy)]
          struct ImportJobCounterState {
              status: ImportJobStatus,
              policy: PartialExecutionPolicy,
              total_rows: u32,
              valid_rows: u32,
              invalid_rows: u32,
              succeeded_rows: u32,
              checkpoint_row_position: u32,
              version: i64,
          }

          fn validate_job_counters(state: ImportJobCounterState) -> Result<(), SdkError> {
              let ImportJobCounterState {
                  status,
                  policy,
                  total_rows,
                  valid_rows,
                  invalid_rows,
                  succeeded_rows,
                  checkpoint_row_position,
                  version,
              } = state;
              let validated_total = valid_rows''',
              "typed counter state",
          )
          domain = replace_once(
              domain,
              '''fn validate_row_state_shape(
              status: ImportRowStatus,
              prepared_party: &Option<PreparedPartyRow>,''',
              '''fn validate_row_state_shape(
              status: ImportRowStatus,
              source_external_id_sha256: Option<&ExternalPartyIdentifierDigest>,
              prepared_party: &Option<PreparedPartyRow>,''',
              "row shape signature",
          )
          domain = replace_once(
              domain,
              '''            if version != 1
                  || prepared_party.is_some()''',
              '''            if version != 1
                  || source_external_id_sha256.is_some()
                  || prepared_party.is_some()''',
              "pending row external evidence invariant",
          )
          domain = replace_once(
              domain,
              '''fn hash_part(hasher: &mut Sha256, value: &[u8]) {
              hasher.update((value.len() as u64).to_be_bytes());
              hasher.update(value);
          }

          fn hex_digest''',
              '''fn hash_part(hasher: &mut Sha256, value: &[u8]) {
              hasher.update((value.len() as u64).to_be_bytes());
              hasher.update(value);
          }

          fn hash_optional_part(hasher: &mut Sha256, value: Option<&str>) {
              match value {
                  Some(value) => {
                      hash_part(hasher, b"some");
                      hash_part(hasher, value.as_bytes());
                  }
                  None => hash_part(hasher, b"none"),
              }
          }

          fn hash_optional_external_id(
              value: Option<String>,
          ) -> Result<Option<ExternalPartyIdentifierDigest>, SdkError> {
              value
                  .map(ExternalPartyIdentifierDigest::for_identifier)
                  .transpose()
          }

          fn hex_digest''',
              "hash helpers",
          )

          domain = replace_once(
              domain,
              '''    fn source(rows: u32) -> SourceDescriptor {
              SourceDescriptor::try_new(
                  "customers.csv",
                  "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef",
                  rows,
              )
              .unwrap()
          }''',
              '''    fn source(rows: u32) -> SourceDescriptor {
              SourceDescriptor::try_new(
                  SourceSystemId::try_new("crm-source-a").unwrap(),
                  "customers.csv",
                  "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef",
                  rows,
                  ImportParserProfile::delimited_text_v1(',', '"').unwrap(),
              )
              .unwrap()
          }''',
              "domain test source helper",
          )
          domain = replace_once(
              domain,
              '''    fn mapping() -> PartyImportMapping {
              PartyImportMapping::try_new(
                  "party_id",
                  "kind",
                  "display_name",
                  Some("external_id".into()),
              )
              .unwrap()
          }''',
              '''    fn mapping() -> PartyImportMapping {
              PartyImportMapping::try_new(
                  None,
                  "kind",
                  "display_name",
                  Some("source_external_id".into()),
                  Some("external_row_key".into()),
              )
              .unwrap()
          }''',
              "domain test mapping helper",
          )
          domain = replace_once(
              domain,
              '''        let first = PartyImportMapping::try_new(
              " party_id ",
              "kind",
              "display_name",
              Some("external_id".into()),
          )
          .unwrap();''',
              '''        let first = PartyImportMapping::try_new(
              None,
              " kind ",
              "display_name",
              Some(" source_external_id ".into()),
              Some("external_row_key".into()),
          )
          .unwrap();''',
              "domain mapping determinism test",
          )
          domain = domain.replace(
              '''            prepared_party: prepared_party(),
              occurred_at_unix_nanos:''',
              '''            prepared_party: prepared_party(),
              source_external_id: Some("external-party-42".into()),
              occurred_at_unix_nanos:''',
          )
          if domain.count('source_external_id: Some("external-party-42".into())') != 2:
              raise SystemExit("expected two domain validation-success test updates")

          domain_path.write_text(domain)

          lib_path = Path("modules/crm-customer-data-operations/src/lib.rs")
          lib = lib_path.read_text()
          lib = sub_once(
              lib,
              r"#!\[expect\(.*?\)\]\n\n",
              "",
              "remove temporary clippy expectation",
          )
          lib = replace_once(
              lib,
              "pub mod persistence;",
              "pub mod persistence;\npub mod profile;",
              "profile module declaration",
          )
          lib = replace_once(
              lib,
              "pub use persistence::*;",
              "pub use persistence::*;\npub use profile::*;",
              "profile module export",
          )
          lib_path.write_text(lib)

          persistence_path = Path("modules/crm-customer-data-operations/src/persistence.rs")
          persistence = persistence_path.read_text()
          persistence = replace_once(
              persistence,
              '''    PartyImportMapping, PreparedPartyRow, RowDiagnostic, RowIdentitySource, SourceDescriptor,
              TargetPartyId,
          };''',
              '''    PartyImportMapping, PreparedPartyRow, RowDiagnostic, RowIdentitySource, SourceDescriptor,
              TargetPartyId,
          };
          use crate::profile::{
              CanonicalizationProfileId, ExternalPartyIdentifierDigest, ImportHeaderMode,
              ImportParserProfile, ImportSourceFormat, ImportTextEncoding, ParserProfileId,
              ParserProfileVersion, SourceSystemId,
          };''',
              "persistence profile imports",
          )
          persistence = replace_once(
              persistence,
              'const IMPORT_JOB_STATE_DESCRIPTOR: &[u8] = b"crm.customer-data-operations.import_job.state/v1:job_id,source[source_name,content_sha256,row_count],mapping[party_id_column,party_kind_column,display_name_column,external_row_key_column],mapping_version_id,partial_execution_policy,status,total_rows,valid_rows,invalid_rows,succeeded_rows,checkpoint_row_position,created_at_unix_nanos,updated_at_unix_nanos,version";',
              'const IMPORT_JOB_STATE_DESCRIPTOR: &[u8] = b"crm.customer-data-operations.import_job.state/v1:job_id,source[source_system_id,source_name,content_sha256,row_count,parser_profile],mapping[target_party_id_column,party_kind_column,display_name_column,source_external_id_column,external_row_key_column],mapping_version_id,partial_execution_policy,status,total_rows,valid_rows,invalid_rows,succeeded_rows,checkpoint_row_position,created_at_unix_nanos,updated_at_unix_nanos,version";',
              "job persistence descriptor",
          )
          persistence = replace_once(
              persistence,
              'const IMPORT_ROW_STATE_DESCRIPTOR: &[u8] = b"crm.customer-data-operations.import_row.state/v1:row_id,job_id,row_position,identity_source, status,prepared_party[party_id,kind,display_name],diagnostics[code,field],execution_attempts,last_execution_error_code,target_party_id,created_at_unix_nanos,updated_at_unix_nanos,version";',
              'const IMPORT_ROW_STATE_DESCRIPTOR: &[u8] = b"crm.customer-data-operations.import_row.state/v1:row_id,job_id,row_position,identity_source,source_external_id_sha256,status,prepared_party[party_id,kind,display_name],diagnostics[code,field],execution_attempts,last_execution_error_code,target_party_id,created_at_unix_nanos,updated_at_unix_nanos,version";',
              "row persistence descriptor",
          )
          persistence = replace_once(
              persistence,
              '''struct SourceDescriptorStateV1 {
              source_name: String,
              content_sha256: String,
              row_count: u32,
          }''',
              '''struct SourceDescriptorStateV1 {
              source_system_id: String,
              source_name: String,
              content_sha256: String,
              row_count: u32,
              parser_profile: ImportParserProfileStateV1,
          }

          #[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
          #[serde(deny_unknown_fields)]
          struct ImportParserProfileStateV1 {
              parser_profile_id: String,
              parser_profile_version: String,
              format: ImportSourceFormatState,
              encoding: ImportTextEncodingState,
              delimiter: String,
              quote_character: String,
              header_mode: ImportHeaderModeState,
              canonicalization_profile_id: String,
          }

          #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
          #[serde(rename_all = "snake_case")]
          enum ImportSourceFormatState {
              DelimitedText,
          }

          #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
          #[serde(rename_all = "snake_case")]
          enum ImportTextEncodingState {
              Utf8,
          }

          #[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]
          #[serde(rename_all = "snake_case")]
          enum ImportHeaderModeState {
              FirstRow,
          }''',
              "source/parser persistence state",
          )
          persistence = replace_once(
              persistence,
              '''struct PartyImportMappingStateV1 {
              party_id_column: String,
              party_kind_column: String,
              display_name_column: String,
              external_row_key_column: Option<String>,
          }''',
              '''struct PartyImportMappingStateV1 {
