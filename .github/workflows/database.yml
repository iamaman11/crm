name: Database CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "services/crm-api/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - "docs/adr/ADR-030-public-gateway-acceptance.md"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "services/crm-api/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - "docs/adr/ADR-030-public-gateway-acceptance.md"
      - ".github/workflows/database.yml"

permissions:
  contents: write

jobs:
  postgres-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply clean migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
      - name: Verify SQL platform invariants
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
      - name: Enable the isolated runtime test role
        run: psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify atomic record adapter
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_foundation
      - name: Verify multi-record replay optimistic and relationship semantics
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_advanced -- --nocapture 2>&1 | tee database/postgres-advanced.log
      - name: Verify public capability gateway acceptance
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e -- --nocapture 2>&1 | tee database/postgres-gateway-e2e.log
      - name: Roll back migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
      - name: Verify rollback removed authoritative schema
        run: |
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply migrations after rollback
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
      - name: Upload database and Rust diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-adapter-diagnostics
          path: |
            database/
            crates/crm-core-data/
            crates/crm-capability-ingress/
          if-no-files-found: error
          retention-days: 7

  legacy-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_upgrade_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_upgrade_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5433
      PGDATABASE: crm_upgrade_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Verify legacy data upgrade through migrations 0002 and 0003
        shell: bash
        run: |
          set -o pipefail
          psql --set ON_ERROR_STOP=1 --file database/tests/0002_legacy_upgrade.sql 2>&1 | tee database/legacy-upgrade.log
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
      - name: Verify upgraded schema can roll back cleanly
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Upload upgrade diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-upgrade-diagnostics
          path: database/
          if-no-files-found: error
          retention-days: 7

  apply-replay-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-gateway-e2e-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply and validate focused test fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          test_path = Path('crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs')
          content = test_path.read_text()
          old = '''    assert!(success_result(&replay.body).replayed);
    assert_eq!(success_result(&replay.body), success_result(&first.body));
'''
          new = '''    let first_result = success_result(&first.body);
    let replay_result = success_result(&replay.body);
    assert!(replay_result.replayed);
    assert_eq!(replay_result.output, first_result.output);
    assert_eq!(
        replay_result.affected_resources,
        first_result.affected_resources
    );
'''
          if old not in content:
              raise SystemExit('expected replay assertion was not found')
          test_path.write_text(content.replace(old, new))

          temporary = Path('.github/workflows/fix-gateway-replay-assertion.yml')
          if temporary.exists():
              temporary.unlink()

          rust_workflow = Path('.github/workflows/rust.yml')
          subprocess_marker = '\n  apply-replay-fix:\n'
          rust_content = rust_workflow.read_text()
          rust_content = rust_content.replace('  contents: write', '  contents: read', 1)
          if subprocess_marker in rust_content:
              rust_content = rust_content.split(subprocess_marker, 1)[0].rstrip() + '\n'
          rust_workflow.write_text(rust_content)

          database_workflow = Path('.github/workflows/database.yml')
          database_content = database_workflow.read_text()
          database_content = database_content.replace('  contents: write', '  contents: read', 1)
          database_content = database_content.split('\n  apply-replay-fix:\n', 1)[0].rstrip() + '\n'
          database_workflow.write_text(database_content)
          PY
          cargo fmt --all
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e --no-run
          git diff --check
      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs .github/workflows/database.yml .github/workflows/rust.yml .github/workflows/fix-gateway-replay-assertion.yml
          git commit -m "Compare replay payload independently of replay marker"
          git push origin HEAD:feature/capability-gateway-e2e-v1
