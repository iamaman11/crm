name: Database CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - ".github/workflows/database.yml"

permissions:
  contents: write

jobs:
  branch-repair:
    if: github.event_name == 'push' && github.ref_name == 'feature/postgres-data-adapter-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/postgres-data-adapter-v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply remaining Phase 4C compiler repairs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          batch = Path("crates/crm-core-data/src/postgres_batch.rs")
          text = batch.read_text(encoding="utf-8")
          for token in ("ModuleId, ", "RetentionPolicyId, ", "SchemaId, ", "SchemaVersion, "):
              text = text.replace(token, "", 1)
          pattern = re.compile(
              r"        BatchError::Conflict\(message\) \| BatchError::IdempotencyKeyReused => SdkError::new\(.*?\n        \),\n        BatchError::IdempotencyInProgress",
              re.S,
          )
          replacement = '''        BatchError::Conflict(message) => SdkError::new(
            "DATA_CONFLICT",
            ErrorCategory::Conflict,
            false,
            message,
        ),
        BatchError::IdempotencyKeyReused => SdkError::new(
            "DATA_CONFLICT",
            ErrorCategory::Conflict,
            false,
            "The idempotency key was used for a different request.",
        ),
        BatchError::IdempotencyInProgress'''
          text, count = pattern.subn(replacement, text, count=1)
          if count not in (0, 1):
              raise SystemExit(f"unexpected replacement count {count}")
          batch.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          git diff --check
      - name: Commit repaired source when needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-core-data/src/postgres_batch.rs
          if git diff --cached --quiet; then
            echo "Compiler repair already applied"
          else
            git commit -m "fix: resolve remaining Phase 4C compiler findings"
            git push origin HEAD:feature/postgres-data-adapter-v2
          fi

  postgres-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply clean migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
      - name: Verify SQL platform invariants
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
      - name: Enable the isolated runtime test role
        run: psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify atomic record adapter
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_foundation
      - name: Verify multi-record replay optimistic and relationship semantics
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_advanced
      - name: Roll back migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
      - name: Verify rollback removed authoritative schema
        run: |
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply migrations after rollback
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
      - name: Upload database and Rust diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-adapter-diagnostics
          path: |
            database/
            crates/crm-core-data/
          if-no-files-found: error
          retention-days: 7

  legacy-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_upgrade_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_upgrade_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5433
      PGDATABASE: crm_upgrade_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Verify legacy data upgrade through migrations 0002 and 0003
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0002_legacy_upgrade.sql
      - name: Verify upgraded schema can roll back cleanly
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Upload upgrade diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-upgrade-diagnostics
          path: database/
          if-no-files-found: error
          retention-days: 7
