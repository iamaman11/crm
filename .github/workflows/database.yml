name: Database CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-application-runtime/**"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-plan-support/**"
      - "crates/crm-sales-capability-adapter/**"
      - "crates/crm-activities-capability-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "crates/crm-capability-ingress/**"
      - "services/crm-api/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - "docs/adr/ADR-030-public-gateway-acceptance.md"
      - ".github/workflows/database.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-application-runtime/**"
      - "crates/crm-core-data/**"
      - "crates/crm-module-sdk/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-plan-support/**"
      - "crates/crm-sales-capability-adapter/**"
      - "crates/crm-activities-capability-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "crates/crm-capability-ingress/**"
      - "services/crm-api/**"
      - "modules/crm-sales/**"
      - "database/**"
      - "docs/adr/ADR-025-postgresql-tenant-transaction-foundation.md"
      - "docs/adr/ADR-030-public-gateway-acceptance.md"
      - ".github/workflows/database.yml"

permissions:
  contents: read

jobs:
  postgres-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply clean migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
      - name: Verify SQL platform invariants
        run: psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
      - name: Enable the isolated runtime test role
        run: psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify atomic record adapter
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        run: cargo test -p crm-core-data --features postgres-integration --test postgres_foundation
      - name: Verify multi-record replay optimistic and relationship semantics
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_advanced -- --nocapture 2>&1 | tee database/postgres-advanced.log
      - name: Verify tenant-scoped PostgreSQL keyset query reader
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_query -- --nocapture 2>&1 | tee database/postgres-query.log
      - name: Verify restart-safe PostgreSQL event delivery lineage
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_event_delivery -- --nocapture 2>&1 | tee database/postgres-event-delivery.log
      - name: Verify public capability gateway acceptance
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e -- --nocapture 2>&1 | tee database/postgres-gateway-e2e.log
      - name: Roll back migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
      - name: Verify rollback removed authoritative schema
        run: |
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply migrations after rollback
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
      - name: Rebuild runtime fixtures after rollback
        run: |
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0003_sales_activities_adapters.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify authenticated production Sales and Activities gateway
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_production_mutations -- --nocapture 2>&1 | tee database/postgres-production-mutations.log
      - name: Verify permission-bound production Sales and Activities queries
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-sales-activities-capability-composition --features postgres-integration --test postgres_queries -- --nocapture 2>&1 | tee database/postgres-production-queries.log
      - name: Verify authenticated HTTP and gRPC production queries
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_production_queries -- --nocapture 2>&1 | tee database/postgres-production-query-ingress.log
      - name: Verify production evidence omission rollback
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_production_evidence_rollback -- --nocapture 2>&1 | tee database/postgres-production-evidence-rollback.log
      - name: Verify Sales PostgreSQL mutation planner
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        run: cargo test -p crm-sales-capability-adapter --features postgres-integration --test postgres_mutations -- --nocapture
      - name: Verify Activities audited no-op transaction
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        run: cargo test -p crm-activities-capability-adapter --features postgres-integration --test postgres_noop -- --nocapture
      - name: Upload database and Rust diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-adapter-diagnostics
          path: |
            database/
            crates/crm-application-runtime/
            crates/crm-core-data/
            crates/crm-capability-ingress/
            crates/crm-sales-activities-capability-composition/
            crates/crm-sales-activities-query-adapter/
          if-no-files-found: error
          retention-days: 7

  legacy-upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_upgrade_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_upgrade_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5433
      PGDATABASE: crm_upgrade_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Verify legacy data upgrade through current runtime schema
        shell: bash
        run: |
          set -o pipefail
          psql --set ON_ERROR_STOP=1 --file database/tests/0002_legacy_upgrade.sql 2>&1 | tee database/legacy-upgrade.log
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
      - name: Verify upgraded schema can roll back cleanly
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.down.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.down.sql
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Upload upgrade diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-upgrade-diagnostics
          path: database/
          if-no-files-found: error
          retention-days: 7
