name: Phase 8A.8 Execution Planner Fix
on:
  push:
    branches: [develop/phase8a8-customer-export-jobs]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a8-customer-export-jobs
          fetch-depth: 0
      - name: Fix private execution planner helpers
        shell: python
        run: |
          from pathlib import Path
          p=Path('crates/crm-customer-data-operations-capability-adapter/src/export_execution_planner.rs')
          s=p.read_text()
          s=s.replace('''    PartyExportArtifactEvidence, PartyExportExclusionReason, PartyExportExecutionOutcome,
    PartyExportExecutionStage, PartyExportJobStatus, PartyExportReconciliation,
''','''    ExportJobId, PartyExportArtifactEvidence, PartyExportExclusionReason,
    PartyExportExecutionOutcome, PartyExportExecutionStage, PartyExportJobStatus,
    PartyExportReconciliation,
''',1)
          s=s.replace('''    EXPORT_JOB_RECORD_TYPE, MODULE_ID, PARTY_EXPORT_COMPLETED_EVENT_SCHEMA,
    PARTY_EXPORT_COMPLETED_EVENT_TYPE, export_execution_outcome_persisted_payload,
    export_execution_outcome_record_ref, export_execution_stage_persisted_payload,
    export_execution_stage_record_ref, export_job_from_snapshot, export_job_id_from_ref,
    export_job_persisted_payload, export_job_record_ref, export_job_to_wire,
''','''    EXPORT_JOB_RECORD_TYPE, MODULE_ID, export_execution_outcome_persisted_payload,
    export_execution_outcome_record_ref, export_execution_stage_persisted_payload,
    export_execution_stage_record_ref, export_job_from_snapshot, export_job_persisted_payload,
    export_job_to_wire,
''',1)
          s=s.replace('''pub const PARTY_EXPORT_EXECUTION_PROGRESSED_EVENT_TYPE: &str =
    "customer_data.export.party.execution_progressed";
''','''pub const PARTY_EXPORT_COMPLETED_EVENT_TYPE: &str = "customer_data.export.party.completed";
pub const PARTY_EXPORT_COMPLETED_EVENT_SCHEMA: &str =
    "crm.customer_data_operations.v1.PartyExportCompletedEvent";
pub const PARTY_EXPORT_EXECUTION_PROGRESSED_EVENT_TYPE: &str =
    "customer_data.export.party.execution_progressed";
''',1)
          s=s.replace('FileId::try_new(artifact.file_id).map_err(configured)?,','configured(FileId::try_new(artifact.file_id))?,',1)
          marker='''fn ensure_job_identity(
'''
          helper='''fn export_job_id_from_ref(reference: Option<wire::ExportJobRef>) -> Result<ExportJobId, SdkError> {
    let reference = reference.ok_or_else(|| {
        SdkError::invalid_argument("customer_data.export_job_ref", "Export job reference is required")
    })?;
    ExportJobId::try_new(reference.export_job_id).map_err(|error| {
        SdkError::invalid_argument("customer_data.export_job_ref.export_job_id", error.safe_message)
    })
}

fn export_job_record_ref(job_id: &ExportJobId) -> Result<crm_module_sdk::RecordRef, SdkError> {
    support::record_ref(
        EXPORT_JOB_RECORD_TYPE,
        job_id.as_str(),
        "customer_data.export_job_ref.export_job_id",
    )
}

'''
          if s.count(marker)!=1: raise SystemExit(f'helper marker={s.count(marker)}')
          s=s.replace(marker,helper+marker,1)
          p.write_text(s)
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - run: rm .github/workflows/phase8a8-one-shot-execution-planner-fix.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m 'Fix Phase 8A.8 private execution planner helpers' && git push origin HEAD:develop/phase8a8-customer-export-jobs
