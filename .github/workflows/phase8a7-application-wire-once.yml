name: Phase 8A.7 Application Wire Once

on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - .github/workflows/phase8a7-application-wire-once.yml

permissions:
  contents: write

jobs:
  wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire customer data operations through application runtime
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          meta = Path('crates/crm-application-runtime/src/governed_metadata.rs')
          text = meta.read_text()
          anchor = '''use crm_customer_accounts_query_adapter::{
    AccountQueryAdapter, QUERY_CAPABILITY_IDS as ACCOUNT_QUERY_CAPABILITY_IDS,
    query_capability_definitions as account_query_capability_definitions,
};
'''
          addition = anchor + '''use crm_customer_data_operations_capability_adapter::{
    CustomerDataOperationsCapabilityPlanner,
    MUTATION_CAPABILITY_IDS as CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS,
    capability_definitions as customer_data_operations_capability_definitions,
};
use crm_customer_data_operations_query_adapter::{
    CustomerDataOperationsQueryAdapter,
    QUERY_CAPABILITY_IDS as CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS,
    query_capability_definitions as customer_data_operations_query_capability_definitions,
};
'''
          if 'CustomerDataOperationsCapabilityPlanner' not in text:
              text = text.replace(anchor, addition)

          text = text.replace(
              '    definitions.extend(identity_resolution_capability_definitions()?);\n    definitions.extend(metadata_mutation_capability_definitions()?);',
              '    definitions.extend(identity_resolution_capability_definitions()?);\n    definitions.extend(customer_data_operations_capability_definitions()?);\n    definitions.extend(metadata_mutation_capability_definitions()?);'
          )
          text = text.replace(
              '    definitions.extend(identity_resolution_merge_query_capability_definitions()?);\n    definitions.extend(metadata_query_capability_definitions()?);',
              '    definitions.extend(identity_resolution_merge_query_capability_definitions()?);\n    definitions.extend(customer_data_operations_query_capability_definitions()?);\n    definitions.extend(metadata_query_capability_definitions()?);'
          )
          text = text.replace(
              '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            IdentityResolutionCapabilityPlanner.target(definition, request)
        } else {
            SalesActivitiesCapabilityPlannerRouter.target(definition, request)
        }
''',
              '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            IdentityResolutionCapabilityPlanner.target(definition, request)
        } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            CustomerDataOperationsCapabilityPlanner.target(definition, request)
        } else {
            SalesActivitiesCapabilityPlannerRouter.target(definition, request)
        }
'''
          )
          text = text.replace(
              '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            IdentityResolutionCapabilityPlanner.plan(definition, request, current)
        } else {
            SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
        }
''',
              '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            IdentityResolutionCapabilityPlanner.plan(definition, request, current)
        } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            CustomerDataOperationsCapabilityPlanner.plan(definition, request, current)
        } else {
            SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
        }
'''
          )
          text = text.replace(
              '    identity_resolution_merge: IdentityResolutionMergeQueryAdapter,\n    metadata: MetadataQueryAdapter,',
              '    identity_resolution_merge: IdentityResolutionMergeQueryAdapter,\n    customer_data_operations: CustomerDataOperationsQueryAdapter,\n    metadata: MetadataQueryAdapter,'
          )
          text = text.replace(
              '        identity_resolution_merge: IdentityResolutionMergeQueryAdapter,\n        metadata: MetadataQueryAdapter,',
              '        identity_resolution_merge: IdentityResolutionMergeQueryAdapter,\n        customer_data_operations: CustomerDataOperationsQueryAdapter,\n        metadata: MetadataQueryAdapter,'
          )
          text = text.replace(
              '            identity_resolution_merge,\n            metadata,',
              '            identity_resolution_merge,\n            customer_data_operations,\n            metadata,'
          )
          text = text.replace(
              '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.identity_resolution_merge.validate(definition, request)
        } else {
            self.production.validate(definition, request)
        }
''',
              '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.identity_resolution_merge.validate(definition, request)
        } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.customer_data_operations.validate(definition, request)
        } else {
            self.production.validate(definition, request)
        }
'''
          )
          text = text.replace(
              '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.identity_resolution_merge.execute(definition, request)
        } else {
            self.production.execute(definition, request)
        }
''',
              '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.identity_resolution_merge.execute(definition, request)
        } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
            .contains(&definition.capability_id.as_str())
        {
            self.customer_data_operations.execute(definition, request)
        } else {
            self.production.execute(definition, request)
        }
'''
          )
          text = text.replace(
              '                + IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS.len()\n                + METADATA_MUTATION_CAPABILITY_IDS.len()',
              '                + IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS.len()\n                + CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS.len()\n                + METADATA_MUTATION_CAPABILITY_IDS.len()'
          )
          text = text.replace(
              '                + IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS.len()\n                + METADATA_QUERY_CAPABILITY_IDS.len()',
              '                + IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS.len()\n                + CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS.len()\n                + METADATA_QUERY_CAPABILITY_IDS.len()'
          )
          meta.write_text(text)

          runtime = Path('crates/crm-application-runtime/src/runtime.rs')
          text = runtime.read_text()
          anchor = 'use crm_customer_accounts_query_adapter::AccountQueryAdapter;\n'
          addition = anchor + '''use crm_customer_data_operations_capability_adapter::{
    IMPORT_JOB_RECORD_TYPE as CUSTOMER_DATA_IMPORT_JOB_RECORD_TYPE,
    IMPORT_ROW_RECORD_TYPE as CUSTOMER_DATA_IMPORT_ROW_RECORD_TYPE,
    MODULE_ID as CUSTOMER_DATA_OPERATIONS_MODULE_ID,
};
use crm_customer_data_operations_query_adapter::{
    CustomerDataOperationsQueryAdapter, LIST_IMPORT_ROWS_CAPABILITY,
};
'''
          if 'CustomerDataOperationsQueryAdapter' not in text:
              text = text.replace(anchor, addition)

          adapter_anchor = '''        let identity_resolution_merge_query_adapter = IdentityResolutionMergeQueryAdapter::new(
            store.clone(),
            CursorCodec::new(cursor_key)
                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
            visibility_authorizer.clone(),
        )
        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
'''
          if 'let customer_data_operations_query_adapter' not in text:
              text = text.replace(adapter_anchor, adapter_anchor + '''        let customer_data_operations_query_adapter = CustomerDataOperationsQueryAdapter::new(
            store.clone(),
            CursorCodec::new(cursor_key)
                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
            visibility_authorizer.clone(),
        )
        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
''')
          text = text.replace(
              '            identity_resolution_merge_query_adapter,\n            metadata_query_adapter,',
              '            identity_resolution_merge_query_adapter,\n            customer_data_operations_query_adapter,\n            metadata_query_adapter,'
          )

          case_anchor = '''                PARTY_RELATIONSHIPS_MODULE_ID => upsert_bootstrap_visibility(
                    visibility_store,
                    config,
                    tenant_id,
                    definition,
                    BootstrapVisibilityResource {
                        owner_module_id: PARTY_RELATIONSHIPS_MODULE_ID,
                        resource_type: PARTY_RELATIONSHIP_RECORD_TYPE,
                    },
                    party_relationship_fields(),
                    expires_at,
                )?,
'''
          if 'CUSTOMER_DATA_OPERATIONS_MODULE_ID =>' not in text:
              text = text.replace(case_anchor, case_anchor + '''                CUSTOMER_DATA_OPERATIONS_MODULE_ID => {
                    upsert_bootstrap_visibility(
                        visibility_store,
                        config,
                        tenant_id,
                        definition,
                        BootstrapVisibilityResource {
                            owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                            resource_type: CUSTOMER_DATA_IMPORT_JOB_RECORD_TYPE,
                        },
                        customer_data_import_job_fields(),
                        expires_at,
                    )?;
                    if definition.capability_id.as_str() == LIST_IMPORT_ROWS_CAPABILITY {
                        upsert_bootstrap_visibility(
                            visibility_store,
                            config,
                            tenant_id,
                            definition,
                            BootstrapVisibilityResource {
                                owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                                resource_type: CUSTOMER_DATA_IMPORT_ROW_RECORD_TYPE,
                            },
                            customer_data_import_row_fields(),
                            expires_at,
                        )?;
                    }
                }
''')

          fn_anchor = 'fn customer_360_party_fields() -> BTreeSet<String> {\n'
          if 'fn customer_data_import_job_fields()' not in text:
              text = text.replace(fn_anchor, '''fn customer_data_import_job_fields() -> BTreeSet<String> {
    ["source", "mapping", "status", "counters", "checkpoint"]
        .into_iter()
        .map(str::to_owned)
        .collect()
}

fn customer_data_import_row_fields() -> BTreeSet<String> {
    [
        "row_position",
        "source_identity",
        "status",
        "prepared_party",
        "diagnostics",
        "execution",
        "target_party_ref",
    ]
    .into_iter()
    .map(str::to_owned)
    .collect()
}

''' + fn_anchor)
          runtime.write_text(text)
          PY
          cargo fmt --all
          rm .github/workflows/phase8a7-application-wire-once.yml
      - name: Commit complete application wiring and self-remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(phase8a7): wire import capabilities and queries into application"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
