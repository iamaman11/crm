name: Phase 8A.2 Runtime Composition Sync

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice

permissions:
  contents: write

concurrency:
  group: phase8a2-runtime-sync
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Apply exact Party composition patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()

          replacements = [
              (
                  "use crate::{\n    ApplicationCapabilityExecutorRouter, ApplicationConfig, ApplicationGatewayService,",
                  "use crate::{\n    ApplicationAggregatePlannerRouter, ApplicationCapabilityExecutorRouter, ApplicationConfig,\n    ApplicationGatewayService,",
              ),
              (
                  "use crm_metadata_query_adapter::MetadataQueryAdapter;\nuse crm_module_registry::ModuleRegistry;",
                  "use crm_metadata_query_adapter::MetadataQueryAdapter;\nuse crm_module_registry::ModuleRegistry;\nuse crm_parties_capability_adapter::{\n    MODULE_ID as PARTIES_MODULE_ID, RECORD_TYPE as PARTY_RECORD_TYPE,\n};\nuse crm_parties_query_adapter::PartyQueryAdapter;",
              ),
              (
                  "    Phase7SearchWorker, ProductionQueryRouter, SalesActivitiesCapabilityPlannerRouter,\n    SalesActivitiesLinkDeliveryOutcome, SalesActivitiesLinkEventProcessor,",
                  "    Phase7SearchWorker, ProductionQueryRouter, SalesActivitiesLinkDeliveryOutcome,\n    SalesActivitiesLinkEventProcessor,",
              ),
              (
                  "                Arc::new(SalesActivitiesCapabilityPlannerRouter),",
                  "                Arc::new(ApplicationAggregatePlannerRouter),",
              ),
              (
                  "        )\n        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let search_query_adapter = SearchQueryAdapter::new(",
                  "        )\n        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n        let party_query_adapter =\n            PartyQueryAdapter::new(store.clone(), visibility_authorizer.clone());\n        let search_query_adapter = SearchQueryAdapter::new(",
              ),
              (
                  "        let query_router = Arc::new(ApplicationQueryRouter::new(\n            production_query_router,\n            metadata_query_adapter,\n        ));",
                  "        let query_router = Arc::new(ApplicationQueryRouter::new(\n            production_query_router,\n            party_query_adapter,\n            metadata_query_adapter,\n        ));",
              ),
              (
                  "                METADATA_MODULE_ID => {}",
                  "                PARTIES_MODULE_ID => upsert_bootstrap_visibility(\n                    visibility_store,\n                    config,\n                    tenant_id,\n                    definition,\n                    BootstrapVisibilityResource {\n                        owner_module_id: PARTIES_MODULE_ID,\n                        resource_type: PARTY_RECORD_TYPE,\n                    },\n                    party_fields(),\n                    expires_at,\n                )?,\n                METADATA_MODULE_ID => {}",
              ),
              (
                  "fn task_fields() -> BTreeSet<String> {",
                  "fn party_fields() -> BTreeSet<String> {\n    [\"kind\", \"display_name\"]\n        .into_iter()\n        .map(str::to_owned)\n        .collect()\n}\n\nfn task_fields() -> BTreeSet<String> {",
              ),
              (
                  "        assert!(task_fields().contains(\"subject\"));\n        assert!(task_fields().contains(\"status\"));",
                  "        assert!(party_fields().contains(\"kind\"));\n        assert!(party_fields().contains(\"display_name\"));\n        assert!(task_fields().contains(\"subject\"));\n        assert!(task_fields().contains(\"status\"));",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one runtime patch match, got {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Synchronize Rust formatting and lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile

      - name: Commit exact composition artifacts
        run: |
          git add \
            Cargo.lock \
            crates/crm-application-runtime/src/runtime.rs \
            crates/crm-application-runtime/src/governed_metadata.rs \
            crates/crm-parties-capability-adapter/src \
            crates/crm-parties-query-adapter/src \
            modules/crm-parties/src
          if git diff --cached --quiet; then
            echo "Runtime composition is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Compose Party vertical slice into application runtime"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
