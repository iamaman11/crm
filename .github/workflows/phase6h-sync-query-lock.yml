name: Phase 6H sync query lockfile

on:
  push:
    branches:
      - feature/phase6h-production-queries-v1
    paths:
      - .github/workflows/phase6h-sync-query-lock.yml

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-queries-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Commit only Cargo.lock when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git diff --cached --quiet && exit 0
          git commit -m "chore(query): refresh Cargo lockfile"
          git push origin HEAD:feature/phase6h-production-queries-v1
