name: Temporary Atomic Provider Response Reconciliation

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/tmp_apply_provider_response_reconciliation_atomic.py
      - .github/workflows/tmp-provider-response-reconciliation-atomic.yml

permissions:
  contents: write

concurrency:
  group: tmp-provider-response-reconciliation-atomic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_worker_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_worker_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5442
      PGDATABASE: crm_customer_enrichment_worker_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply atomic reconciliation patch
        id: apply_patch
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tmp_apply_provider_response_reconciliation_atomic.py 2>&1 | tee provider-response-reconciliation-atomic-patch.log
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-customer-enrichment-worker-composition/src/lib.rs")
          text = path.read_text()
          old = '''    if error.code == "DATA_CONFLICT" {
          '''
          new = '''    if matches!(
                  error.code.as_str(),
                  "DATA_CONFLICT" | "CAPABILITY_IDEMPOTENCY_KEY_REUSED"
              ) {
          '''
          if text.count(old) != 1:
              raise SystemExit("expected exactly one response reconciliation error mapping")
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Upload atomic patch diagnostics
        if: steps.apply_patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-atomic-patch-diagnostics
          path: provider-response-reconciliation-atomic-patch.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after atomic patch failure
        if: steps.apply_patch.outcome == 'failure'
        run: exit 1
      - name: Verify exact patch scope
        shell: bash
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            crates/crm-customer-enrichment-worker-composition/src/lib.rs \
            crates/crm-customer-enrichment-worker-composition/src/tests.rs \
            crates/crm-customer-enrichment-worker-composition/tests/postgres_worker_process.rs \
            modules/crm-customer-enrichment/src/lifecycle.rs | sort)"
          actual="$(git diff --name-only | sort)"
          printf 'Expected changed files:\n%s\n' "${expected}"
          printf 'Actual changed files:\n%s\n' "${actual}"
          test "${actual}" = "${expected}"
      - name: Format workspace
        run: cargo fmt --all
      - name: Verify canonical patch scope after formatting
        shell: bash
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            crates/crm-customer-enrichment-worker-composition/src/lib.rs \
            crates/crm-customer-enrichment-worker-composition/src/tests.rs \
            crates/crm-customer-enrichment-worker-composition/tests/postgres_worker_process.rs \
            modules/crm-customer-enrichment/src/lifecycle.rs | sort)"
          actual="$(git diff --name-only | sort)"
          test "${actual}" = "${expected}"
          git diff --check
      - name: Verify pure reconciliation semantics
        id: pure_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-customer-enrichment response_replay -- --nocapture 2>&1 | tee provider-response-reconciliation-pure.log
      - name: Upload pure diagnostics
        if: steps.pure_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-pure-diagnostics
          path: provider-response-reconciliation-pure.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after pure failure
        if: steps.pure_tests.outcome == 'failure'
        run: exit 1
      - name: Verify worker unit semantics
        id: worker_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-customer-enrichment-worker-composition -- --nocapture 2>&1 | tee provider-response-reconciliation-worker.log
      - name: Upload worker diagnostics
        if: steps.worker_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-worker-diagnostics
          path: provider-response-reconciliation-worker.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after worker failure
        if: steps.worker_tests.outcome == 'failure'
        run: exit 1
      - name: Prepare fresh worker database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify PostgreSQL reconciliation process
        id: postgres_process
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-customer-enrichment-worker-composition --features postgres-integration --test postgres_worker_process -- --nocapture 2>&1 | tee provider-response-reconciliation-postgres.log
      - name: Upload PostgreSQL diagnostics
        if: steps.postgres_process.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-postgres-diagnostics
          path: provider-response-reconciliation-postgres.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after PostgreSQL failure
        if: steps.postgres_process.outcome == 'failure'
        run: exit 1
      - name: Verify application authorization wrapper compiles
        id: wrapper_compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-application-runtime --test postgres_customer_enrichment_provider_worker --no-run 2>&1 | tee provider-response-reconciliation-wrapper.log
      - name: Upload wrapper diagnostics
        if: steps.wrapper_compile.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-wrapper-diagnostics
          path: provider-response-reconciliation-wrapper.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after wrapper failure
        if: steps.wrapper_compile.outcome == 'failure'
        run: exit 1
      - name: Strict focused Clippy
        id: focused_clippy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p crm-customer-enrichment -p crm-customer-enrichment-worker-composition -p crm-application-runtime --all-targets -- -D warnings 2>&1 | tee provider-response-reconciliation-clippy.log
      - name: Upload Clippy diagnostics
        if: steps.focused_clippy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: provider-response-reconciliation-clippy-diagnostics
          path: provider-response-reconciliation-clippy.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop after Clippy failure
        if: steps.focused_clippy.outcome == 'failure'
        run: exit 1
      - name: Commit verified reconciliation slice
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            modules/crm-customer-enrichment/src/lifecycle.rs \
            crates/crm-customer-enrichment-worker-composition/src/lib.rs \
            crates/crm-customer-enrichment-worker-composition/src/tests.rs \
            crates/crm-customer-enrichment-worker-composition/tests/postgres_worker_process.rs
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" -eq 4
          git commit -m "Reconcile provider response replays semantically"
          git push origin HEAD:agent/phase8a10-customer-enrichment
