name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7

  apply-replay-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-gateway-e2e-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply and validate focused test fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          test_path = Path('crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs')
          content = test_path.read_text()
          old = '''    assert!(success_result(&replay.body).replayed);
    assert_eq!(success_result(&replay.body), success_result(&first.body));
'''
          new = '''    let first_result = success_result(&first.body);
    let replay_result = success_result(&replay.body);
    assert!(replay_result.replayed);
    assert_eq!(replay_result.output, first_result.output);
    assert_eq!(
        replay_result.affected_resources,
        first_result.affected_resources
    );
'''
          if old not in content:
              raise SystemExit('expected replay assertion was not found')
          test_path.write_text(content.replace(old, new))

          temporary = Path('.github/workflows/fix-gateway-replay-assertion.yml')
          if temporary.exists():
              temporary.unlink()

          rust_workflow = Path('.github/workflows/rust.yml')
          workflow = rust_workflow.read_text()
          workflow = workflow.replace('  contents: write', '  contents: read', 1)
          workflow = workflow.split('\n  apply-replay-fix:\n', 1)[0].rstrip() + '\n'
          rust_workflow.write_text(workflow)
          PY
          cargo fmt --all
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e --no-run
          git diff --check
      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs .github/workflows/rust.yml .github/workflows/fix-gateway-replay-assertion.yml
          git commit -m "Compare replay payload independently of replay marker"
          git push origin HEAD:feature/capability-gateway-e2e-v1
