name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7

  phase6h-query-ingress-import-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/phase6h-query-ingress-v1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-query-ingress-v1
          fetch-depth: 0
      - name: Fix query ingress acceptance imports
        shell: python
        run: |
          from pathlib import Path
          path = Path('crates/crm-capability-ingress/tests/postgres_production_queries.rs')
          text = path.read_text()
          text = text.replace(
              '    AccessTokenGrant, AccessTokenStore, ApprovalStore, AuthorizationGrant, BearerTokenAuthenticator,\n',
              '    ApprovalStore, AuthorizationGrant,\n',
          )
          text = text.replace(
              '    ERROR_CODE_METADATA, GrpcQueryMessage, GrpcQueryMiddleware, HttpQueryBody, HttpQueryMiddleware,\n',
              '    AccessTokenGrant, AccessTokenStore, BearerTokenAuthenticator, ERROR_CODE_METADATA,\n    GrpcQueryMessage, GrpcQueryMiddleware, HttpQueryBody, HttpQueryMiddleware,\n',
          )
          text = text.replace(' PortFuture, RecordId, RecordType,\n', ' PortFuture, RecordType,\n')
          path.write_text(text)
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - name: Commit test import fix only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-capability-ingress/tests/postgres_production_queries.rs
          git diff --cached --quiet && exit 0
          git commit -m "fix(query): correct transport acceptance auth imports"
          git push origin HEAD:feature/phase6h-query-ingress-v1
