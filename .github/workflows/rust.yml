name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7

  phase6h-visibility-revoke-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/phase6h-production-query-adapter-v1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-query-adapter-v1
          fetch-depth: 0
      - name: Refactor visibility revoke identity
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('crates/crm-capability-adapters/src/query_visibility.rs')
          text = path.read_text()
          pattern = re.compile(
              r'''    pub fn revoke\(\n.*?^        Ok\(removed\)\n    \}\n''',
              re.MULTILINE | re.DOTALL,
          )
          replacement = '''    pub fn revoke(
              &self,
              grant: &QueryVisibilityGrant,
          ) -> Result<bool, QueryVisibilityStoreError> {
              let mut state = self
                  .state
                  .write()
                  .map_err(|_| QueryVisibilityStoreError::Poisoned)?;
              let removed = state.grants.remove(&grant.key()).is_some();
              if removed {
                  state.revision = state.revision.saturating_add(1);
              }
              Ok(removed)
          }
'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'revoke implementation replacements: {count}')
          call_pattern = re.compile(
              r'''        store\n            \.revoke\(\n.*?            \.unwrap\(\);\n''',
              re.MULTILINE | re.DOTALL,
          )
          call_replacement = '''        let exact_grant = grant(
              Some("deal-1"),
              BTreeSet::from(["name".to_owned(), "amount".to_owned()]),
          );
          store.revoke(&exact_grant).unwrap();
'''
          text, count = call_pattern.subn(call_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'revoke test replacements: {count}')
          path.write_text(text)
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - name: Commit source fix only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-capability-adapters/src/query_visibility.rs
          git diff --cached --quiet && exit 0
          git commit -m "fix(query): bind visibility revoke to grant identity"
          git push origin HEAD:feature/phase6h-production-query-adapter-v1
