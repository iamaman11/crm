name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7

  phase6h-postgres-query-test-sync:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/phase6h-production-query-adapter-v1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-query-adapter-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve lockfile and format workspace
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit generated lockfile and formatted query acceptance files only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock \
            crates/crm-sales-activities-capability-composition/Cargo.toml \
            crates/crm-sales-activities-capability-composition/src/lib.rs \
            crates/crm-sales-activities-capability-composition/src/query_catalog.rs \
            crates/crm-sales-activities-capability-composition/tests/postgres_queries.rs
          git diff --cached --quiet && exit 0
          git commit -m "chore(query): sync PostgreSQL acceptance lockfile and formatting"
          git push origin HEAD:feature/phase6h-production-query-adapter-v1
