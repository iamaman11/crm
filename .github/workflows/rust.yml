name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: crates/crm-module-manifest/src/
          if-no-files-found: error
          retention-days: 7
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
