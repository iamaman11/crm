name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply and publish Phase 6F source lint fixes
        if: github.event_name == 'push' && github.ref_name == 'feature/phase6f-recovery-v1' && github.actor != 'github-actions[bot]'
        run: |
          python - <<'PY'
          from pathlib import Path

          activities = Path("crates/crm-activities-capability-adapter/src/lib.rs")
          source = activities.read_text()
          old = "RecordRef, RecordSnapshot, ResourceRef, SdkError, TenantId, TypedPayload,"
          new = "RecordRef, RecordSnapshot, SdkError, TenantId, TypedPayload,"
          if old not in source:
              raise SystemExit("expected Activities import not found")
          activities.write_text(source.replace(old, new, 1))

          sales = Path("crates/crm-sales-capability-adapter/src/lib.rs")
          source = sales.read_text()
          old = "fn deal_to_wire(deal: &Deal, tenant: &TenantId) -> wire::Deal {"
          new = "#[allow(deprecated)]\nfn deal_to_wire(deal: &Deal, tenant: &TenantId) -> wire::Deal {"
          if old not in source:
              raise SystemExit("expected Sales compatibility function not found")
          sales.write_text(source.replace(old, new, 1))
          PY
          cargo fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/crm-activities-capability-adapter/src/lib.rs \
            crates/crm-sales-capability-adapter/src/lib.rs
          git diff --cached --check
          git commit -m "fix: satisfy adapter lint gates"
          git push origin HEAD:feature/phase6f-recovery-v1
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7
