name: Rust CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: python scripts/check_architecture.py
      - name: Generate resolved Cargo lockfile
        run: cargo generate-lockfile
      - name: Upload resolved Cargo lockfile
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 7
      - name: Verify committed Cargo lockfile is current
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            echo "Cargo.lock is missing or out of date. Download the cargo-lockfile artifact and commit it."
            git status --short -- Cargo.lock
            exit 1
          fi
      - name: Check Rust formatting
        id: rustfmt
        run: cargo fmt --all -- --check
      - name: Generate formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        run: cargo fmt --all
      - name: Upload formatted source diagnostics
        if: failure() && steps.rustfmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            crates/*/src/
            modules/*/src/
            services/*/src/
          if-no-files-found: error
          retention-days: 7
      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee clippy.txt
      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.txt
          if-no-files-found: error
          retention-days: 7
      - name: Run workspace tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee tests.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: tests.txt
          if-no-files-found: error
          retention-days: 7

  phase6h-owner-filter-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/phase6h-production-query-adapter-v1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-query-adapter-v1
          fetch-depth: 0
      - name: Replace invalid guarded matches with explicit matches
        shell: python
        run: |
          from pathlib import Path

          path = Path('crates/crm-sales-activities-query-adapter/src/wire.rs')
          text = path.read_text()
          old = '''fn deal_owner_matches(actual: &DealOwner, expected: &core::ActorOrTeamOwner) -> bool {
              use core::actor_or_team_owner::Owner;
              matches!(
                  (actual, expected.owner.as_ref()),
                  (DealOwner::Actor(actual), Some(Owner::ActorId(expected))) if actual.as_str() == expected
                      | (DealOwner::Team(actual), Some(Owner::TeamId(expected))) if actual.as_str() == expected
              )
          }

          fn task_owner_matches(actual: &TaskOwner, expected: &core::ActorOrTeamOwner) -> bool {
              use core::actor_or_team_owner::Owner;
              matches!(
                  (actual, expected.owner.as_ref()),
                  (TaskOwner::Actor(actual), Some(Owner::ActorId(expected))) if actual.as_str() == expected
                      | (TaskOwner::Team(actual), Some(Owner::TeamId(expected))) if actual.as_str() == expected
              )
          }
          '''
          new = '''fn deal_owner_matches(actual: &DealOwner, expected: &core::ActorOrTeamOwner) -> bool {
              use core::actor_or_team_owner::Owner;
              match (actual, expected.owner.as_ref()) {
                  (DealOwner::Actor(actual), Some(Owner::ActorId(expected))) => {
                      actual.as_str() == expected
                  }
                  (DealOwner::Team(actual), Some(Owner::TeamId(expected))) => {
                      actual.as_str() == expected
                  }
                  _ => false,
              }
          }

          fn task_owner_matches(actual: &TaskOwner, expected: &core::ActorOrTeamOwner) -> bool {
              use core::actor_or_team_owner::Owner;
              match (actual, expected.owner.as_ref()) {
                  (TaskOwner::Actor(actual), Some(Owner::ActorId(expected))) => {
                      actual.as_str() == expected
                  }
                  (TaskOwner::Team(actual), Some(Owner::TeamId(expected))) => {
                      actual.as_str() == expected
                  }
                  _ => false,
              }
          }
          '''
          if old not in text:
              raise SystemExit('owner-match block not found')
          path.write_text(text.replace(old, new, 1))
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - name: Commit source fix only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-sales-activities-query-adapter/src/wire.rs
          git diff --cached --quiet && exit 0
          git commit -m "fix(query): match owner filters explicitly"
          git push origin HEAD:feature/phase6h-production-query-adapter-v1
