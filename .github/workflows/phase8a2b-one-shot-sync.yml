name: Phase 8A.2b One-Shot Source Sync

on:
  push:
    branches:
      - develop/phase8a2b-party-update-list

permissions:
  contents: write

concurrency:
  group: phase8a2b-one-shot-source-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2b-party-update-list
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire Party query cursor and format Rust
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()
          old = '''        let party_query_adapter =
              PartyQueryAdapter::new(store.clone(), visibility_authorizer.clone());'''
          new = '''        let party_query_adapter = PartyQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;'''
          if old not in text:
              raise SystemExit("expected PartyQueryAdapter constructor block was not found")
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
      - name: Remove one-shot workflow and commit synchronized source
        run: |
          git rm .github/workflows/phase8a2b-one-shot-sync.yml
          if git diff --quiet; then
            echo "No synchronization changes were produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates modules services .github/workflows/phase8a2b-one-shot-sync.yml
          git commit -m "Synchronize Phase 8A.2b runtime composition and formatting"
          git push origin HEAD:develop/phase8a2b-party-update-list
