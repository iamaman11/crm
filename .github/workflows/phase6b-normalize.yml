name: Phase 6B normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-protobuf-contracts-v1
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install contract validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Install Buf
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.50.1
          setup_only: true
      - name: Apply focused validator correction
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/validate_contract_bindings.py')
          content = path.read_text()
          old_import = 'from google.protobuf import descriptor_pb2\n'
          new_import = 'from google.protobuf import descriptor_pb2\nfrom google.protobuf.message import DecodeError\n'
          old_except = 'except (OSError, descriptor_pb2.DecodeError) as error:'
          new_except = 'except (OSError, DecodeError) as error:'
          if old_import not in content or old_except not in content:
              raise SystemExit('expected descriptor validator correction target was not found')
          content = content.replace(old_import, new_import, 1)
          content = content.replace(old_except, new_except, 1)
          path.write_text(content)
          PY
      - name: Format and validate published contracts
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        shell: bash
        run: |
          set -o pipefail
          buf format -w proto
          mkdir -p build/contracts
          buf build proto --output build/contracts/crm-schema.binpb
          buf lint proto
          git branch --force "${BASE_REF}" "origin/${BASE_REF}"
          buf breaking proto --against ".git#branch=${BASE_REF}"
          python -m py_compile scripts/validate_contract_bindings.py
          python scripts/validate_contract_bindings.py \
            --descriptor-set build/contracts/crm-schema.binpb
          git diff --check
      - name: Commit normalized contract sources
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No contract normalization changes required."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add proto scripts/validate_contract_bindings.py contracts buf.yaml
          git commit -m "Normalize Phase 6B published contracts"
          git push origin HEAD:feature/sales-activities-protobuf-contracts-v1
