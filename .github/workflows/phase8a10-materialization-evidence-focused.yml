name: Phase 8A.10 Materialization Evidence Focused

on:
  pull_request:
    branches: [main]
    paths:
      - crates/crm-customer-enrichment-materialization-composition/**
      - .github/workflows/phase8a10-materialization-evidence-focused.yml

permissions:
  contents: write

jobs:
  verify-and-commit:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify governed materialization evidence source
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo test -p crm-customer-enrichment-materialization-composition
          cargo clippy -p crm-customer-enrichment-materialization-composition --all-targets -- -D warnings
      - name: Commit verified evidence source
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/phase8a10-materialization-evidence-focused.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates/crm-customer-enrichment-materialization-composition \
            .github/workflows/phase8a10-materialization-evidence-focused.yml
          git diff --cached --check
          git commit -m "Verify governed materialization evidence source"
          git push origin HEAD:agent/phase8a10-customer-enrichment
