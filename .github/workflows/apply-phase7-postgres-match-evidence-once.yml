name: Apply Phase 7 PostgreSQL match evidence once

on:
  pull_request:
    paths:
      - "scripts/align_phase7_postgres_match_evidence.py"
      - ".github/workflows/apply-phase7-postgres-match-evidence-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Align PostgreSQL candidate and field match semantics
        run: |
          python scripts/align_phase7_postgres_match_evidence.py
          rustfmt --edition 2024 \
            crates/crm-core-data/src/search_store.rs \
            crates/crm-core-data/tests/postgres_search.rs
          rm scripts/align_phase7_postgres_match_evidence.py
          rm .github/workflows/apply-phase7-postgres-match-evidence-once.yml
      - name: Commit PostgreSQL match evidence and helper cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align PostgreSQL search match evidence semantics"
          git push origin HEAD:develop/phase7-permission-aware-search
