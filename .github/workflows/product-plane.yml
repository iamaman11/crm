name: Product Plane CI

on:
  push:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "buf.gen.web.yaml"
      - "apps/web/**"
      - "packages/client/**"
      - ".github/workflows/product-plane.yml"
      - "scripts/run_e2e.sh"
      - "proto/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-proto-contracts/**"
      - "services/crm-api/**"
      - "database/**"
      - "contracts/module-contract-bindings.json"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "buf.gen.web.yaml"
      - "apps/web/**"
      - "packages/client/**"
      - ".github/workflows/product-plane.yml"
      - "scripts/run_e2e.sh"
      - "proto/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-proto-contracts/**"
      - "services/crm-api/**"
      - "database/**"
      - "contracts/module-contract-bindings.json"

concurrency:
  group: product-plane-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Publish crm.consents bindings
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("contracts/module-contract-bindings.json")
          data = json.loads(path.read_text())
          modules = data["modules"]
          if any(module["module_id"] == "crm.consents" for module in modules):
              raise SystemExit("crm.consents binding already exists; one-shot sync must not duplicate it")
          consent = {
              "module_id": "crm.consents",
              "capabilities": [
                  {
                      "id": "consents.authorization.create",
                      "version": "1.0.0",
                      "rpc": "crm.consents.v1.ConsentAuthorizationService.CreateConsentAuthorization",
                      "request": "crm.consents.v1.CreateConsentAuthorizationRequest",
                      "response": "crm.consents.v1.CreateConsentAuthorizationResponse"
                  },
                  {
                      "id": "consents.authorization.withdraw",
                      "version": "1.0.0",
                      "rpc": "crm.consents.v1.ConsentAuthorizationService.WithdrawConsentAuthorization",
                      "request": "crm.consents.v1.WithdrawConsentAuthorizationRequest",
                      "response": "crm.consents.v1.WithdrawConsentAuthorizationResponse"
                  },
                  {
                      "id": "consents.authorization.get",
                      "version": "1.0.0",
                      "rpc": "crm.consents.v1.ConsentAuthorizationService.GetConsentAuthorization",
                      "request": "crm.consents.v1.GetConsentAuthorizationRequest",
                      "response": "crm.consents.v1.GetConsentAuthorizationResponse"
                  },
                  {
                      "id": "consents.authorization.list",
                      "version": "1.0.0",
                      "rpc": "crm.consents.v1.ConsentAuthorizationService.ListConsentAuthorizations",
                      "request": "crm.consents.v1.ListConsentAuthorizationsRequest",
                      "response": "crm.consents.v1.ListConsentAuthorizationsResponse"
                  },
                  {
                      "id": "consents.communication.authorize",
                      "version": "1.0.0",
                      "rpc": "crm.consents.v1.ConsentAuthorizationService.AuthorizeCommunication",
                      "request": "crm.consents.v1.AuthorizeCommunicationRequest",
                      "response": "crm.consents.v1.AuthorizeCommunicationResponse"
                  }
              ],
              "events": [
                  {
                      "id": "consents.authorization.created",
                      "version": "1.0.0",
                      "message": "crm.consents.v1.ConsentAuthorizationCreatedEvent"
                  },
                  {
                      "id": "consents.authorization.withdrawn",
                      "version": "1.0.0",
                      "message": "crm.consents.v1.ConsentAuthorizationWithdrawnEvent"
                  }
              ]
          }
          insertion = next(
              (index for index, module in enumerate(modules) if module["module_id"] == "crm.customer360"),
              len(modules),
          )
          modules.insert(insertion, consent)
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate canonical browser contract hashes
        run: pnpm web:generate

      - name: Restore standard Product Plane workflow
        run: git show origin/main:.github/workflows/product-plane.yml > .github/workflows/product-plane.yml

      - name: Commit synchronized publication artifacts
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "4189824+github-actions[bot]@users.noreply.github.com"
          git add contracts/module-contract-bindings.json packages/client/src/contract_hashes.ts .github/workflows/product-plane.yml
          git commit -m "Publish Consent contract bindings and browser hashes"
          git push origin "HEAD:${HEAD_BRANCH}"
