name: Product Plane CI

on:
  push:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "buf.gen.web.yaml"
      - "apps/web/**"
      - "packages/client/**"
      - "packages/ui/**"
      - ".github/workflows/product-plane.yml"
      - "scripts/run_e2e.sh"
      - "proto/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-proto-contracts/**"
      - "services/crm-api/**"
      - "database/**"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "buf.gen.web.yaml"
      - "apps/web/**"
      - "packages/client/**"
      - "packages/ui/**"
      - ".github/workflows/product-plane.yml"
      - "scripts/run_e2e.sh"
      - "proto/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-proto-contracts/**"
      - "services/crm-api/**"
      - "database/**"

# Only the newest Product Plane validation for a PR/ref is useful. Cancelling stale runs
# prevents old exact-SHA candidates from consuming hosted runners while the current head waits.
concurrency:
  group: product-plane-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated contract hashes are up-to-date
        run: |
          pnpm web:generate
          git diff --exit-code packages/client/src/contract_hashes.ts

      - name: Run Web typecheck
        run: pnpm web:typecheck

      - name: Run Web lint
        run: pnpm web:lint

      - name: Run Web unit tests
        run: pnpm web:test

      - name: Run Web build
        run: pnpm web:build

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run E2E Integration Suite
        run: ./scripts/run_e2e.sh 2>&1 | tee product-plane-e2e.log

      - name: Upload E2E diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-plane-e2e-diagnostics
          path: |
            product-plane-e2e.log
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7
