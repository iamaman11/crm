name: Normalize capability ingress branch

on:
  push:
    branches:
      - feature/capability-ingress-v1

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-ingress-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize source and lockfile
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-capability-ingress/src/http.rs')
          path.write_text(path.read_text().replace('use http::{', 'use ::http::{'))
          PY
          cargo fmt --all
          cargo generate-lockfile
          rm .github/workflows/normalize-capability-ingress.yml
          git diff --check

      - name: Commit normalized branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/crm-capability-ingress services/crm-api .github/workflows/normalize-capability-ingress.yml
          git commit -m "Normalize authenticated capability ingress"
          git push origin HEAD:feature/capability-ingress-v1
