name: Phase 8A.3c Semantic Hardening

on:
  push:
    branches:
      - develop/phase8a3c-party-relationship
    paths:
      - ".phase8a3c-semantic-hardening-trigger"

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3c-party-relationship
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Patch reserved semantics and code-only filter validation
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          domain = Path('modules/crm-party-relationships/src/domain.rs')
          text = domain.read_text()
          needle = '''            _ => {}
        }

        Ok(Self {
'''
          replacement = '''            _ => {}
        }

        validate_reserved_builtin_semantics(&code, directionality, &from_role, &to_role)?;

        Ok(Self {
'''
          if text.count(needle) != 1:
              raise SystemExit(f'expected one domain insertion point, found {text.count(needle)}')
          text = text.replace(needle, replacement, 1)

          marker = '''#[derive(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash)]
pub enum PartyRelationshipStatus {
'''
          helper = '''fn validate_reserved_builtin_semantics(
    code: &str,
    directionality: RelationshipDirectionality,
    from_role: &str,
    to_role: &str,
) -> Result<(), SdkError> {
    let expected = match code {
        "employment" => Some((RelationshipDirectionality::Directional, "employer", "employee")),
        "household" => Some((RelationshipDirectionality::Reciprocal, "household_member", "household_member")),
        "parent_subsidiary" => Some((RelationshipDirectionality::Directional, "parent", "subsidiary")),
        "partner" => Some((RelationshipDirectionality::Reciprocal, "partner", "partner")),
        "advisor" => Some((RelationshipDirectionality::Directional, "advisor", "advisee")),
        "guarantor" => Some((RelationshipDirectionality::Directional, "guarantor", "guaranteed_party")),
        _ => None,
    };
    if let Some((expected_directionality, expected_from_role, expected_to_role)) = expected
        && (directionality != expected_directionality
            || from_role != expected_from_role
            || to_role != expected_to_role)
    {
        return Err(invalid(
            "PARTY_RELATIONSHIPS_RESERVED_TYPE_SEMANTICS_INVALID",
            "party_relationship.relationship_type",
            format!("reserved relationship type '{code}' must use its canonical directionality and endpoint roles"),
        ));
    }
    Ok(())
}

'''
          if text.count(marker) != 1:
              raise SystemExit('expected one status marker')
          text = text.replace(marker, helper + marker, 1)

          test_marker = '''    #[test]
    fn normalizes_bounded_custom_semantics_deterministically() {
'''
          test = '''    #[test]
    fn rejects_redefinition_of_reserved_builtin_semantics() {
        let wrong_directionality = RelationshipType::try_new(
            "employment",
            RelationshipDirectionality::Reciprocal,
            "employee",
            "employee",
        )
        .unwrap_err();
        assert_eq!(wrong_directionality.code, "PARTY_RELATIONSHIPS_RESERVED_TYPE_SEMANTICS_INVALID");

        let wrong_roles = RelationshipType::try_new(
            "parent_subsidiary",
            RelationshipDirectionality::Directional,
            "owner",
            "owned",
        )
        .unwrap_err();
        assert_eq!(wrong_roles.code, "PARTY_RELATIONSHIPS_RESERVED_TYPE_SEMANTICS_INVALID");
    }

'''
          if text.count(test_marker) != 1:
              raise SystemExit('expected one domain test marker')
          text = text.replace(test_marker, test + test_marker, 1)
          domain.write_text(text)

          query = Path('crates/crm-party-relationships-query-adapter/src/lib.rs')
          text = query.read_text()
          start = text.index('fn validate_type_code_filter(value: &str) -> Result<String, SdkError> {')
          end = text.index('\n}\n\nfn directionality_from_wire', start) + 2
          replacement = '''fn validate_type_code_filter(value: &str) -> Result<String, SdkError> {
    if value.is_empty()
        || value.len() > 96
        || value.chars().any(char::is_control)
        || !value.as_bytes().first().is_some_and(u8::is_ascii_alphanumeric)
        || !value.as_bytes().last().is_some_and(u8::is_ascii_alphanumeric)
        || !value.as_bytes().iter().all(|byte| {
            byte.is_ascii_lowercase()
                || byte.is_ascii_digit()
                || matches!(*byte, b'.' | b'-' | b'_')
        })
    {
        return Err(SdkError::invalid_argument(
            "party_relationship.relationship_type_code",
            "Party Relationship type-code filter must use canonical lowercase ASCII syntax",
        ));
    }
    Ok(value.to_owned())
}'''
          text = text[:start] + replacement + text[end:]

          test_marker = '''    #[test]
    fn field_visibility_redacts_relationship_data_without_hiding_resource_identity() {
'''
          test = '''    #[test]
    fn type_code_filter_accepts_reserved_reciprocal_codes_without_fabricating_semantics() {
        assert_eq!(validate_type_code_filter("household").unwrap(), "household");
        assert!(validate_type_code_filter(" Household ").is_err());
        assert!(validate_type_code_filter("bad type!").is_err());
    }

'''
          if text.count(test_marker) != 1:
              raise SystemExit('expected one query test marker')
          text = text.replace(test_marker, test + test_marker, 1)
          query.write_text(text)
          PY
          cargo fmt --all
          cargo test -p crm-party-relationships -p crm-party-relationships-query-adapter
          cargo clippy -p crm-party-relationships -p crm-party-relationships-query-adapter --all-targets -- -D warnings
      - name: Commit validated patch and remove one-shot files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase8a3c-semantic-hardening.yml .phase8a3c-semantic-hardening-trigger
          git add modules/crm-party-relationships/src/domain.rs crates/crm-party-relationships-query-adapter/src/lib.rs
          git commit -m "Harden Party Relationship semantic codes"
          git push origin HEAD:develop/phase8a3c-party-relationship
