name: Phase 8A.3c Semantic Hardening

on:
  push:
    branches:
      - develop/phase8a3c-party-relationship
    paths:
      - ".phase8a3c-semantic-hardening-trigger"

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3c-party-relationship
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Fix type-code-only filter semantics
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-party-relationships-query-adapter/src/lib.rs')
          text = path.read_text()
          start = text.index('fn validate_type_code_filter(value: &str) -> Result<String, SdkError> {')
          end = text.index('\n}\n\nfn directionality_from_wire', start) + 2
          replacement = '''fn validate_type_code_filter(value: &str) -> Result<String, SdkError> {
    if value.is_empty()
        || value.len() > 96
        || value.chars().any(char::is_control)
        || !value.as_bytes().first().is_some_and(u8::is_ascii_alphanumeric)
        || !value.as_bytes().last().is_some_and(u8::is_ascii_alphanumeric)
        || !value.as_bytes().iter().all(|byte| {
            byte.is_ascii_lowercase()
                || byte.is_ascii_digit()
                || matches!(*byte, b'.' | b'-' | b'_')
        })
    {
        return Err(SdkError::invalid_argument(
            "party_relationship.relationship_type_code",
            "Party Relationship type-code filter must use canonical lowercase ASCII syntax",
        ));
    }
    Ok(value.to_owned())
}'''
          text = text[:start] + replacement + text[end:]
          marker = '''    #[test]
    fn field_visibility_redacts_relationship_data_without_hiding_resource_identity() {
'''
          test = '''    #[test]
    fn type_code_filter_accepts_reserved_reciprocal_codes_without_fabricating_semantics() {
        assert_eq!(validate_type_code_filter("household").unwrap(), "household");
        assert!(validate_type_code_filter(" Household ").is_err());
        assert!(validate_type_code_filter("bad type!").is_err());
    }

'''
          if 'type_code_filter_accepts_reserved_reciprocal_codes_without_fabricating_semantics' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('expected one query test marker')
              text = text.replace(marker, test + marker, 1)
          path.write_text(text)
          PY
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit query fix and remove one-shot gate
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase8a3c-semantic-hardening.yml .phase8a3c-semantic-hardening-trigger
          git add Cargo.lock crates/crm-party-relationships-query-adapter/src/lib.rs
          git commit -m "Harden Party Relationship query type filters"
          git push origin HEAD:develop/phase8a3c-party-relationship
