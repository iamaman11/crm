name: Phase 8A.5 Query Wire Once

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: phase8a5-query-wire-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wire:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact query composition patch
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact anchor, found {count}: {old!r}")
              p.write_text(text.replace(old, new, 1))

          replace_exact(
              "crates/crm-application-runtime/Cargo.toml",
              'crm-identity-resolution-capability-composition = { path = "../crm-identity-resolution-capability-composition" }\n',
              'crm-identity-resolution-capability-composition = { path = "../crm-identity-resolution-capability-composition" }\n'
              'crm-identity-resolution-query-adapter = { path = "../crm-identity-resolution-query-adapter" }\n',
          )

          path = "crates/crm-application-runtime/src/governed_metadata.rs"
          replace_exact(
              path,
              'use crm_identity_resolution_capability_composition::{\n    IdentityResolutionCapabilityExecutor, PostgresIdentityResolutionReferenceReader,\n};\n',
              'use crm_identity_resolution_capability_composition::{\n'
              '    IdentityResolutionCapabilityExecutor, PostgresIdentityResolutionReferenceReader,\n'
              '};\n'
              'use crm_identity_resolution_query_adapter::{\n'
              '    IdentityResolutionQueryAdapter,\n'
              '    QUERY_CAPABILITY_IDS as IDENTITY_RESOLUTION_QUERY_CAPABILITY_IDS,\n'
              '    query_capability_definitions as identity_resolution_query_capability_definitions,\n'
              '};\n',
          )
          replace_exact(
              path,
              '    definitions.extend(consent_query_capability_definitions()?);\n    definitions.extend(metadata_query_capability_definitions()?);\n',
              '    definitions.extend(consent_query_capability_definitions()?);\n'
              '    definitions.extend(identity_resolution_query_capability_definitions()?);\n'
              '    definitions.extend(metadata_query_capability_definitions()?);\n',
          )
          replace_exact(
              path,
              '    customer_360: Customer360QueryAdapter,\n    consents: ConsentQueryAdapter,\n    metadata: MetadataQueryAdapter,\n',
              '    customer_360: Customer360QueryAdapter,\n'
              '    consents: ConsentQueryAdapter,\n'
              '    identity_resolution: IdentityResolutionQueryAdapter,\n'
              '    metadata: MetadataQueryAdapter,\n',
          )
          replace_exact(
              path,
              '        customer_360: Customer360QueryAdapter,\n        consents: ConsentQueryAdapter,\n        metadata: MetadataQueryAdapter,\n',
              '        customer_360: Customer360QueryAdapter,\n'
              '        consents: ConsentQueryAdapter,\n'
              '        identity_resolution: IdentityResolutionQueryAdapter,\n'
              '        metadata: MetadataQueryAdapter,\n',
          )
          replace_exact(
              path,
              '            customer_360,\n            consents,\n            metadata,\n',
              '            customer_360,\n'
              '            consents,\n'
              '            identity_resolution,\n'
              '            metadata,\n',
          )
          replace_exact(
              path,
              '        } else if CONSENT_QUERY_CAPABILITY_IDS.contains(&definition.capability_id.as_str()) {\n            self.consents.validate(definition, request)\n        } else {\n',
              '        } else if CONSENT_QUERY_CAPABILITY_IDS.contains(&definition.capability_id.as_str()) {\n'
              '            self.consents.validate(definition, request)\n'
              '        } else if IDENTITY_RESOLUTION_QUERY_CAPABILITY_IDS\n'
              '            .contains(&definition.capability_id.as_str())\n'
              '        {\n'
              '            self.identity_resolution.validate(definition, request)\n'
              '        } else {\n',
          )
          replace_exact(
              path,
              '        } else if CONSENT_QUERY_CAPABILITY_IDS.contains(&definition.capability_id.as_str()) {\n            self.consents.execute(definition, request)\n        } else {\n',
              '        } else if CONSENT_QUERY_CAPABILITY_IDS.contains(&definition.capability_id.as_str()) {\n'
              '            self.consents.execute(definition, request)\n'
              '        } else if IDENTITY_RESOLUTION_QUERY_CAPABILITY_IDS\n'
              '            .contains(&definition.capability_id.as_str())\n'
              '        {\n'
              '            self.identity_resolution.execute(definition, request)\n'
              '        } else {\n',
          )
          replace_exact(
              path,
              '                + CONSENT_MUTATION_CAPABILITY_IDS.len()\n                + METADATA_MUTATION_CAPABILITY_IDS.len()\n',
              '                + CONSENT_MUTATION_CAPABILITY_IDS.len()\n'
              '                + IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS.len()\n'
              '                + METADATA_MUTATION_CAPABILITY_IDS.len()\n',
          )
          replace_exact(
              path,
              '        for coordinate in CONSENT_MUTATION_CAPABILITY_IDS {\n            assert!(\n                mutations\n                    .iter()\n                    .any(|definition| definition.capability_id.as_str() == coordinate)\n            );\n        }\n        for coordinate in METADATA_MUTATION_CAPABILITY_IDS {\n',
              '        for coordinate in CONSENT_MUTATION_CAPABILITY_IDS {\n'
              '            assert!(\n'
              '                mutations\n'
              '                    .iter()\n'
              '                    .any(|definition| definition.capability_id.as_str() == coordinate)\n'
              '            );\n'
              '        }\n'
              '        for coordinate in IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS {\n'
              '            assert!(\n'
              '                mutations\n'
              '                    .iter()\n'
              '                    .any(|definition| definition.capability_id.as_str() == coordinate)\n'
              '            );\n'
              '        }\n'
              '        for coordinate in METADATA_MUTATION_CAPABILITY_IDS {\n',
          )
          replace_exact(
              path,
              '                + CONSENT_QUERY_CAPABILITY_IDS.len()\n                + METADATA_QUERY_CAPABILITY_IDS.len()\n',
              '                + CONSENT_QUERY_CAPABILITY_IDS.len()\n'
              '                + IDENTITY_RESOLUTION_QUERY_CAPABILITY_IDS.len()\n'
              '                + METADATA_QUERY_CAPABILITY_IDS.len()\n',
          )
          replace_exact(
              path,
              '        for coordinate in CONSENT_QUERY_CAPABILITY_IDS {\n            assert!(\n                queries\n                    .iter()\n                    .any(|definition| definition.capability_id.as_str() == coordinate)\n            );\n        }\n        for coordinate in METADATA_QUERY_CAPABILITY_IDS {\n',
              '        for coordinate in CONSENT_QUERY_CAPABILITY_IDS {\n'
              '            assert!(\n'
              '                queries\n'
              '                    .iter()\n'
              '                    .any(|definition| definition.capability_id.as_str() == coordinate)\n'
              '            );\n'
              '        }\n'
              '        for coordinate in IDENTITY_RESOLUTION_QUERY_CAPABILITY_IDS {\n'
              '            assert!(\n'
              '                queries\n'
              '                    .iter()\n'
              '                    .any(|definition| definition.capability_id.as_str() == coordinate)\n'
              '            );\n'
              '        }\n'
              '        for coordinate in METADATA_QUERY_CAPABILITY_IDS {\n',
          )

          path = "crates/crm-application-runtime/src/runtime.rs"
          replace_exact(
              path,
              'use crm_consents_query_adapter::ConsentQueryAdapter;\n',
              'use crm_consents_query_adapter::ConsentQueryAdapter;\n'
              'use crm_identity_resolution_capability_adapter::{\n'
              '    MODULE_ID as IDENTITY_RESOLUTION_MODULE_ID,\n'
              '    RECORD_TYPE as IDENTITY_RESOLUTION_RECORD_TYPE,\n'
              '};\n'
              'use crm_identity_resolution_query_adapter::IdentityResolutionQueryAdapter;\n',
          )
          replace_exact(
              path,
              '        let search_query_adapter = SearchQueryAdapter::new(\n',
              '        let identity_resolution_query_adapter = IdentityResolutionQueryAdapter::new(\n'
              '            store.clone(),\n'
              '            CursorCodec::new(cursor_key)\n'
              '                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,\n'
              '            visibility_authorizer.clone(),\n'
              '        )\n'
              '        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n'
              '        let search_query_adapter = SearchQueryAdapter::new(\n',
          )
          replace_exact(
              path,
              '            customer_360_query_adapter,\n            consent_query_adapter,\n            metadata_query_adapter,\n',
              '            customer_360_query_adapter,\n'
              '            consent_query_adapter,\n'
              '            identity_resolution_query_adapter,\n'
              '            metadata_query_adapter,\n',
          )
          replace_exact(
              path,
              '                CONSENTS_MODULE_ID => upsert_bootstrap_visibility(\n                    visibility_store,\n                    config,\n                    tenant_id,\n                    definition,\n                    BootstrapVisibilityResource {\n                        owner_module_id: CONSENTS_MODULE_ID,\n                        resource_type: CONSENT_RECORD_TYPE,\n                    },\n                    consent_fields(),\n                    expires_at,\n                )?,\n',
              '                CONSENTS_MODULE_ID => upsert_bootstrap_visibility(\n'
              '                    visibility_store,\n'
              '                    config,\n'
              '                    tenant_id,\n'
              '                    definition,\n'
              '                    BootstrapVisibilityResource {\n'
              '                        owner_module_id: CONSENTS_MODULE_ID,\n'
              '                        resource_type: CONSENT_RECORD_TYPE,\n'
              '                    },\n'
              '                    consent_fields(),\n'
              '                    expires_at,\n'
              '                )?,\n'
              '                IDENTITY_RESOLUTION_MODULE_ID => upsert_bootstrap_visibility(\n'
              '                    visibility_store,\n'
              '                    config,\n'
              '                    tenant_id,\n'
              '                    definition,\n'
              '                    BootstrapVisibilityResource {\n'
              '                        owner_module_id: IDENTITY_RESOLUTION_MODULE_ID,\n'
              '                        resource_type: IDENTITY_RESOLUTION_RECORD_TYPE,\n'
              '                    },\n'
              '                    identity_resolution_fields(),\n'
              '                    expires_at,\n'
              '                )?,\n',
          )
          replace_exact(
              path,
              'fn party_relationship_fields() -> BTreeSet<String> {\n',
              'fn identity_resolution_fields() -> BTreeSet<String> {\n'
              '    ["party_pair", "evidence_history", "status", "decision_reason"]\n'
              '        .into_iter()\n'
              '        .map(str::to_owned)\n'
              '        .collect()\n'
              '}\n\n'
              'fn party_relationship_fields() -> BTreeSet<String> {\n',
          )
          PY
      - name: Verify query runtime wiring
        run: |
          cargo fmt --all
          cargo check -p crm-application-runtime --all-targets
          cargo test -p crm-application-runtime --lib
          git diff --check
      - name: Remove one-shot workflow and commit
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm .github/workflows/phase8a5-query-wire-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates modules services .github/workflows/phase8a5-query-wire-once.yml
          if git diff --cached --quiet; then
            echo "No query wiring changes to commit."
            exit 0
          fi
          git commit -m "Wire Phase 8A.5 identity resolution queries into application runtime"
          git push origin "HEAD:${HEAD_BRANCH}"
