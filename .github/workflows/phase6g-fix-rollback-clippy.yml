name: Phase 6G fix rollback Clippy

on:
  push:
    branches:
      - feature/phase6g-authenticated-postgres-mutations-v1
    paths:
      - .github/workflows/phase6g-fix-rollback-clippy.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6g-authenticated-postgres-mutations-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Rename evidence fault variants and format
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-capability-ingress/tests/postgres_production_evidence_rollback.rs')
          text = path.read_text()
          replacements = {
              'OmitOutbox': 'OutboxMissing',
              'OmitAudit': 'AuditMissing',
              'OmitIdempotency': 'IdempotencyMissing',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit rollback Clippy fix only
        run: |
          git add crates/crm-capability-ingress/tests/postgres_production_evidence_rollback.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix rollback evidence fault variant names"
          git push origin HEAD:feature/phase6g-authenticated-postgres-mutations-v1
