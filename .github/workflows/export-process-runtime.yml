name: Export Process Runtime CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/customer_data_operations/**"
      - "proto/crm/parties/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-files/**"
      - "crates/crm-customer-data-operations-capability-adapter/**"
      - "crates/crm-customer-data-operations-execution-composition/**"
      - "crates/crm-customer-data-operations-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "modules/crm-customer-data-operations/**"
      - "modules/crm-parties/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/0013_customer_data_export_adapter.sql"
      - ".github/workflows/export-process-runtime.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/customer_data_operations/**"
      - "proto/crm/parties/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-files/**"
      - "crates/crm-customer-data-operations-capability-adapter/**"
      - "crates/crm-customer-data-operations-execution-composition/**"
      - "crates/crm-customer-data-operations-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "modules/crm-customer-data-operations/**"
      - "modules/crm-parties/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/0013_customer_data_export_adapter.sql"
      - ".github/workflows/export-process-runtime.yml"

permissions:
  contents: read

jobs:
  export-process-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_export_process_runtime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_export_process_runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5438
      PGDATABASE: crm_export_process_runtime_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5438/crm_export_process_runtime_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5438/crm_export_process_runtime_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Prepare fresh export process database
        shell: bash
        run: |
          set -euo pipefail
          psql --set ON_ERROR_STOP=1 --command "DROP SCHEMA IF EXISTS crm CASCADE"
          while IFS= read -r migration; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0003_sales_activities_adapters.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify governed Party export crash-recovery process lifecycle
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-api --test export_process_e2e -- --nocapture \
            2>&1 | tee database/export-process-runtime.log
      - name: Capture PostgreSQL diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          {
            echo "=== file_artifacts ==="
            psql --no-psqlrc --pset pager=off --command "
              SELECT tenant_id, file_id, owner_module_id, status,
                     next_chunk_index, received_size_bytes, expected_size_bytes,
                     encode(expected_sha256, 'hex') AS expected_sha256
                FROM crm.file_artifacts
               ORDER BY tenant_id, file_id;
            "
            echo "=== file_artifact_chunks ==="
            psql --no-psqlrc --pset pager=off --command "
              SELECT tenant_id, file_id, chunk_index, chunk_size_bytes,
                     encode(chunk_sha256, 'hex') AS chunk_sha256
                FROM crm.file_artifact_chunks
               ORDER BY tenant_id, file_id, chunk_index;
            "
            echo "=== customer-data records ==="
            psql --no-psqlrc --pset pager=off --command "
              SELECT tenant_id, owner_module_id, record_type, record_id, version,
                     created_at, updated_at, deleted_at
                FROM crm.records
               WHERE owner_module_id = 'crm.customer-data-operations'
               ORDER BY tenant_id, record_type, record_id;
            "
            echo "=== export outbox events ==="
            psql --no-psqlrc --pset pager=off --command "
              SELECT tenant_id, event_type, aggregate_type, aggregate_id,
                     aggregate_version, occurred_at
                FROM crm.outbox_events
               WHERE event_type LIKE 'customer_data.export.%'
               ORDER BY tenant_id, occurred_at, aggregate_id;
            "
          } > database/export-process-runtime-state.log 2>&1

          postgres_container="$(docker ps -aq --filter ancestor=postgres:17-alpine | head -n 1)"
          if [ -n "${postgres_container}" ]; then
            docker logs "${postgres_container}" > database/export-process-runtime-postgres.log 2>&1
          else
            echo "PostgreSQL service container was not found." > database/export-process-runtime-postgres.log
            docker ps -a >> database/export-process-runtime-postgres.log 2>&1
          fi
      - name: Upload export process diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-process-runtime-diagnostics
          path: |
            database/export-process-runtime.log
            database/export-process-runtime-state.log
            database/export-process-runtime-postgres.log
            services/crm-api/tests/export_process_e2e.rs
            database/tests/0013_customer_data_export_adapter.sql
            crates/crm-customer-data-operations-execution-composition/
            crates/crm-application-runtime/src/export_selection_bootstrap.rs
          if-no-files-found: error
          retention-days: 7
