name: Phase 8A.3b Maintenance

on:
  push:
    branches:
      - develop/phase8a3b-contact-point-lifecycle
    paths:
      - ".github/workflows/phase8a3b-maintenance.yml"

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3b-contact-point-lifecycle
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Apply exact Phase 8A.3b maintenance fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path("crates/crm-application-runtime/src/runtime.rs")
          text = runtime.read_text()
          old = '''async fn drain_projection(
              worker: &Phase6ProjectionWorker,
              tenant_id: TenantId,
              projection_id: &str,
              page_size: u32,
          ) -> Result<(), ApplicationRuntimeError> {
              loop {
                  let result = worker
                      .run_batch(tenant_id.clone(), projection_id, page_size)'''
          new = '''async fn drain_projection(
              worker: &Phase6ProjectionWorker,
              tenant_id: TenantId,
              projection_id: &str,
          ) -> Result<(), ApplicationRuntimeError> {
              loop {
                  let result = worker
                      .run_batch(tenant_id.clone(), projection_id, PROJECTION_PAGE_SIZE)'''
          if old not in text:
              raise SystemExit("expected drain_projection source block not found")
          runtime.write_text(text.replace(old, new))

          governed = Path("crates/crm-application-runtime/src/governed_metadata.rs")
          text = governed.read_text()
          old = '''    for party_id in unique_party_ids {
              ensure_party_reference_available(store, request, &owner_module_id, &record_type, party_id)
                  .await
                  .map_err(|_| account_party_reference_unavailable())?;
          }
          Ok(())
          }'''
          new = '''    for party_id in unique_party_ids {
              if !party_reference_exists(store, request, &owner_module_id, &record_type, party_id)
                  .await?
              {
                  return Err(account_party_reference_unavailable());
              }
          }
          Ok(())
          }'''
          if old not in text:
              raise SystemExit("expected Account Party-reference block not found")
          text = text.replace(old, new)
          old = '''    ensure_party_reference_available(
              store,
              request,
              &owner_module_id,
              &record_type,
              reference.as_str().to_owned(),
          )
          .await
          .map_err(|_| contact_point_party_reference_unavailable())
          }

          async fn ensure_party_reference_available(
              store: &PostgresDataStore,
              request: &CapabilityRequest,
              owner_module_id: &ModuleId,
              record_type: &RecordType,
              party_id: String,
          ) -> Result<(), SdkError> {
              let record_id = RecordId::try_new(party_id).map_err(catalog_error)?;
              let exists = store
                  .get_record_for_query(&RecordGetQuery {
                      tenant_id: request.context.execution.tenant_id.clone(),
                      owner_module_id: owner_module_id.clone(),
                      record_type: record_type.clone(),
                      record_id,
                  })
                  .await?
                  .is_some();
              if exists {
                  Ok(())
              } else {
                  Err(SdkError::new(
                      "APPLICATION_PARTY_REFERENCE_UNAVAILABLE",
                      ErrorCategory::InvalidArgument,
                      false,
                      "The referenced Party is unavailable.",
                  ))
              }
          }'''
          new = '''    if party_reference_exists(
              store,
              request,
              &owner_module_id,
              &record_type,
              reference.as_str().to_owned(),
          )
          .await?
          {
              Ok(())
          } else {
              Err(contact_point_party_reference_unavailable())
          }
          }

          async fn party_reference_exists(
              store: &PostgresDataStore,
              request: &CapabilityRequest,
              owner_module_id: &ModuleId,
              record_type: &RecordType,
              party_id: String,
          ) -> Result<bool, SdkError> {
              let record_id = RecordId::try_new(party_id).map_err(catalog_error)?;
              Ok(store
                  .get_record_for_query(&RecordGetQuery {
                      tenant_id: request.context.execution.tenant_id.clone(),
                      owner_module_id: owner_module_id.clone(),
                      record_type: record_type.clone(),
                      record_id,
                  })
                  .await?
                  .is_some())
          }'''
          if old not in text:
              raise SystemExit("expected Contact Point Party-reference helper block not found")
          governed.write_text(text.replace(old, new))
          PY
      - name: Generate canonical Rust synchronized outputs
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Generate canonical browser contract hashes
        run: |
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Commit synchronized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates modules services packages/client/src/contract_hashes.ts
          if git diff --cached --quiet; then
            echo "No maintenance changes required."
            exit 0
          fi
          git commit -m "Synchronize Phase 8A.3b maintenance outputs"
          git pull --rebase origin develop/phase8a3b-contact-point-lifecycle
          git push origin HEAD:develop/phase8a3b-contact-point-lifecycle
