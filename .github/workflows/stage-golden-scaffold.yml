name: Stage Golden Module Scaffold

on:
  push:
    branches:
      - agent/native-module-composition-stage-scaffold
    paths:
      - ".agent/golden-scaffold.patch.ready"

permissions:
  contents: write

concurrency:
  group: golden-scaffold-stage
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/native-module-composition-stage-scaffold
          fetch-depth: 0
      - name: Verify and apply golden scaffold packet
        shell: bash
        run: |
          cat .agent/golden-scaffold.patch.part.* > /tmp/golden-scaffold.patch
          sha256sum --check .agent/golden-scaffold.patch.ready
          git apply --check /tmp/golden-scaffold.patch
          git apply --index /tmp/golden-scaffold.patch
          git rm .agent/golden-scaffold.patch.part.* .agent/golden-scaffold.patch.ready
          git rm .github/workflows/stage-golden-scaffold.yml
      - name: Publish staged scaffold
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Generate fail-closed module composition scaffolds"
          git push origin HEAD:agent/native-module-composition-stage-scaffold
