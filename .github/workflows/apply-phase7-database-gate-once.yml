name: Materialize Phase 7 gate patch

on:
  pull_request:
    paths:
      - "scripts/apply_phase7_database_gate.py"
      - ".github/workflows/apply-phase7-database-gate-once.yml"

permissions:
  contents: read

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Validate patch script
        run: python -m py_compile scripts/apply_phase7_database_gate.py
      - name: Materialize canonical Database CI and compile fix
        run: |
          python scripts/apply_phase7_database_gate.py
          rustfmt --edition 2024 crates/crm-search-runtime/src/lib.rs
      - name: Upload exact patched files
        uses: actions/upload-artifact@v4
        with:
          name: phase7-gate-patch
          path: |
            .github/workflows/database.yml
            crates/crm-search-runtime/src/lib.rs
          if-no-files-found: error
          retention-days: 1
