name: Apply Phase 7 Rust compile fix once

on:
  pull_request:
    paths:
      - "scripts/apply_phase7_database_gate.py"
      - ".github/workflows/apply-phase7-database-gate-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact compile fix and remove helpers
        run: |
          python scripts/apply_phase7_database_gate.py
          rustfmt --edition 2024 crates/crm-search-runtime/src/lib.rs
          rm scripts/apply_phase7_database_gate.py
          rm .github/workflows/apply-phase7-database-gate-once.yml
      - name: Commit code-only fix and helper cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix search pagination test store compilation"
          git push origin HEAD:develop/phase7-permission-aware-search
