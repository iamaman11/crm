name: Rustfmt Patch Diagnostic

on:
  pull_request:
    paths:
      - "**/*.rs"
      - ".github/workflows/rustfmt-patch.yml"

permissions:
  contents: read

jobs:
  rustfmt-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate exact rustfmt patch
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch
      - name: Upload exact rustfmt patch
        uses: actions/upload-artifact@v4
        with:
          name: exact-rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1
