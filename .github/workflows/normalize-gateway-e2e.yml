name: Normalize gateway acceptance branch

on:
  push:
    branches:
      - feature/capability-gateway-e2e-v1

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-gateway-e2e-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize source and lockfile
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs')
          content = path.read_text()
          content = content.replace(
              'use crm_capability_adapters::{\n    AccessTokenGrant, AccessTokenStore, ApprovalStore, AuthorizationGrant,\n    BearerTokenAuthenticator, CapabilityCatalog, FixedWindowPolicy, FixedWindowRateLimiter,\n',
              'use crm_capability_adapters::{\n    ApprovalStore, AuthorizationGrant, CapabilityCatalog, FixedWindowPolicy, FixedWindowRateLimiter,\n',
          )
          content = content.replace(
              '    BUSINESS_TRANSACTION_HEADER, CAUSATION_ID_HEADER, CORRELATION_ID_HEADER, CapabilityCallEnvelope,\n    CapabilityIngress, CapabilityRoute, ExecutionContextResolver, HttpCapabilityBody,\n',
              '    AccessTokenGrant, AccessTokenStore, BUSINESS_TRANSACTION_HEADER, BearerTokenAuthenticator,\n    CAUSATION_ID_HEADER, CORRELATION_ID_HEADER, CapabilityIngress, CapabilityRoute,\n    ExecutionContextResolver, HttpCapabilityBody,\n',
          )
          content = content.replace(', EventType, ModuleExecutionContext, ModuleId,', ', EventType, ModuleId,')
          content = content.replace('use http::{HeaderMap, HeaderValue, StatusCode};', 'use ::http::{HeaderMap, HeaderValue, StatusCode};')
          content = content.replace(
              '    let definition = capability_definition();\n',
              '    let definition = capability_definition();\n    let clock_port: Arc<dyn Clock> = clock.clone();\n',
              1,
          )
          content = content.replace('Arc::clone(&clock) as Arc<dyn Clock>', 'Arc::clone(&clock_port)')
          path.write_text(content)
          PY
          cargo fmt --all
          cargo generate-lockfile
          python scripts/check_architecture.py
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e --no-run
          rm .github/workflows/normalize-gateway-e2e.yml
          git diff --check

      - name: Commit normalized branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs .github/workflows/normalize-gateway-e2e.yml
          git commit -m "Normalize public gateway acceptance evidence"
          git push origin HEAD:feature/capability-gateway-e2e-v1
