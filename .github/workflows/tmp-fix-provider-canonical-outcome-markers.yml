name: Temporary Canonical Outcome Marker Repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: temporary-canonical-outcome-marker-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Repair exact patch markers
        run: python scripts/tmp_fix_provider_canonical_outcome_apply_markers.py
      - name: Commit repaired applicator
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/tmp_apply_provider_canonical_outcome.py
          git diff --cached --quiet && exit 0
          git commit -m "Repair canonical outcome patch markers"
          git push origin "HEAD:${HEAD_BRANCH}"
