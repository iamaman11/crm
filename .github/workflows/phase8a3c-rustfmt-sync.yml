name: Phase 8A.3c Rustfmt Sync

on:
  push:
    branches:
      - develop/phase8a3c-party-relationship
    paths:
      - ".phase8a3c-rustfmt-trigger"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3c-party-relationship
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply canonical workspace rustfmt
        run: |
          set -euo pipefail
          cargo fmt --all
          python - <<'PY'
          from pathlib import Path
          import subprocess

          allowed = {
              'crates/crm-application-runtime/src/governed_metadata.rs',
              'crates/crm-application-runtime/src/runtime.rs',
              'crates/crm-party-relationships-capability-adapter/src/lib.rs',
              'crates/crm-party-relationships-capability-adapter/src/planner.rs',
              'crates/crm-party-relationships-projection/src/lib.rs',
              'crates/crm-party-relationships-query-adapter/src/lib.rs',
              'crates/crm-proto-contracts/tests/party_relationship_contract.rs',
              'modules/crm-party-relationships/src/domain.rs',
              'modules/crm-party-relationships/src/lib.rs',
              'modules/crm-party-relationships/src/persistence.rs',
          }
          changed = set(filter(None, subprocess.check_output(
              ['git', 'diff', '--name-only', '--', '*.rs'], text=True
          ).splitlines()))
          unexpected = sorted(changed - allowed)
          if unexpected:
              raise SystemExit('rustfmt attempted to change out-of-scope Rust files: ' + ', '.join(unexpected))
          if not changed:
              raise SystemExit('expected Party Relationship rustfmt changes but found none')
          Path('/tmp/phase8a3c-rustfmt-files').write_text('\n'.join(sorted(changed)) + '\n')
          PY
      - name: Commit only validated Party Relationship formatting
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase8a3c-rustfmt-sync.yml .phase8a3c-rustfmt-trigger
          while IFS= read -r path; do
            git add -- "$path"
          done < /tmp/phase8a3c-rustfmt-files
          git commit -m "Apply canonical Party Relationship rustfmt"
          git push origin HEAD:develop/phase8a3c-party-relationship
