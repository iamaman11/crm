name: Customer Privacy Persistence CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/customer_privacy/**"
      - "crates/crm-customer-privacy-persistence-adapter/**"
      - "crates/crm-customer-privacy-capability-adapter/**"
      - "crates/crm-customer-privacy-submit-capability-adapter/**"
      - "crates/crm-customer-privacy-subject-capability-adapter/**"
      - "crates/crm-customer-privacy-cancel-capability-adapter/**"
      - "crates/crm-customer-privacy-query-adapter/**"
      - "crates/crm-customer-privacy-capability-composition/**"
      - "crates/crm-identity-resolution-topology-composition/**"
      - "crates/crm-party-reference-composition/**"
      - "crates/crm-application-runtime/**"
      - "contracts/production-route-classifications.json"
      - "modules/crm-customer-privacy/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/0001_platform_foundation.sql"
      - "database/tests/0004_search_runtime_role_grants.sql"
      - "database/tests/0020_customer_privacy_persistence_fixture.sql"
      - "database/tests/0021_customer_privacy_force_rls.sql"
      - "database/tests/0022_customer_privacy_submit_fixture.sql"
      - "database/tests/0023_customer_privacy_subject_verify_fixture.sql"
      - ".github/workflows/customer-privacy-persistence.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/customer_privacy/**"
      - "crates/crm-customer-privacy-persistence-adapter/**"
      - "crates/crm-customer-privacy-capability-adapter/**"
      - "crates/crm-customer-privacy-submit-capability-adapter/**"
      - "crates/crm-customer-privacy-subject-capability-adapter/**"
      - "crates/crm-customer-privacy-cancel-capability-adapter/**"
      - "crates/crm-customer-privacy-query-adapter/**"
      - "crates/crm-customer-privacy-capability-composition/**"
      - "crates/crm-identity-resolution-topology-composition/**"
      - "crates/crm-party-reference-composition/**"
      - "crates/crm-application-runtime/**"
      - "contracts/production-route-classifications.json"
      - "modules/crm-customer-privacy/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/0001_platform_foundation.sql"
      - "database/tests/0004_search_runtime_role_grants.sql"
      - "database/tests/0020_customer_privacy_persistence_fixture.sql"
      - "database/tests/0021_customer_privacy_force_rls.sql"
      - "database/tests/0022_customer_privacy_submit_fixture.sql"
      - "database/tests/0023_customer_privacy_subject_verify_fixture.sql"
      - ".github/workflows/customer-privacy-persistence.yml"

permissions:
  contents: read

jobs:
  persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_privacy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_privacy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_privacy_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_privacy_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_privacy_test
      SUBMIT_DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_privacy_submit_test
      SUBMIT_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_privacy_submit_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply clean migrations to create-process database
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
      - name: Build create-process runtime role fixture
        shell: bash
        run: |
          set -euo pipefail
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0020_customer_privacy_persistence_fixture.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Build isolated submit-subject-query-cancel database
        shell: bash
        run: |
          set -euo pipefail
          createdb crm_privacy_submit_test
          while IFS= read -r migration; do
            PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0020_customer_privacy_persistence_fixture.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0022_customer_privacy_submit_fixture.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0023_customer_privacy_subject_verify_fixture.sql
      - name: Verify strict privacy adapters and planners
        run: |
          cargo test -p crm-customer-privacy-persistence-adapter --all-features
          cargo test -p crm-customer-privacy-capability-adapter --all-features
          cargo test -p crm-customer-privacy-submit-capability-adapter --all-features
          cargo test -p crm-customer-privacy-subject-capability-adapter --all-features
          cargo test -p crm-customer-privacy-cancel-capability-adapter --all-features
          cargo test -p crm-customer-privacy-query-adapter --all-features
          cargo test -p crm-identity-resolution-topology-composition --all-features
      - name: Verify clean create-process FORCE RLS
        shell: bash
        run: |
          set -o pipefail
          psql --set ON_ERROR_STOP=1 --echo-errors --file database/tests/0021_customer_privacy_force_rls.sql 2>&1 | tee database/customer-privacy-force-rls-create-clean.log
      - name: Verify clean case-create process
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_create --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-create-clean.log
      - name: Verify clean submit-subject-query-cancel FORCE RLS
        shell: bash
        run: |
          set -o pipefail
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --echo-errors --file database/tests/0021_customer_privacy_force_rls.sql \
            2>&1 | tee database/customer-privacy-force-rls-submit-clean.log
      - name: Verify clean case-submit process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_submit --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-submit-clean.log
      - name: Verify clean case-subject-verification process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_subject_verify --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-subject-verify-clean.log
      - name: Roll back create-process database
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.down.sql' | sort -r)
      - name: Verify create-process rollback removed authoritative schema
        run: |
          count="$(psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply create-process database and fixture
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0020_customer_privacy_persistence_fixture.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify reapplied create-process FORCE RLS and process
        shell: bash
        run: |
          set -o pipefail
          psql --set ON_ERROR_STOP=1 --echo-errors --file database/tests/0021_customer_privacy_force_rls.sql \
            2>&1 | tee database/customer-privacy-force-rls-create-reapplied.log
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_create --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-create-reapplied.log
      - name: Roll back submit-subject-query-cancel database
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.down.sql' | sort -r)
      - name: Verify submit-subject-query-cancel rollback removed authoritative schema
        run: |
          count="$(PGDATABASE=crm_privacy_submit_test psql --tuples-only --no-align --command "SELECT count(*) FROM pg_namespace WHERE nspname = 'crm'")"
          test "${count}" = "0"
      - name: Reapply submit-subject-query-cancel database and fixture
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0020_customer_privacy_persistence_fixture.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0022_customer_privacy_submit_fixture.sql
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --file database/tests/0023_customer_privacy_subject_verify_fixture.sql
      - name: Verify reapplied submit-subject-query-cancel FORCE RLS and processes
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          PGDATABASE=crm_privacy_submit_test psql --set ON_ERROR_STOP=1 --echo-errors --file database/tests/0021_customer_privacy_force_rls.sql \
            2>&1 | tee database/customer-privacy-force-rls-submit-reapplied.log
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_submit --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-submit-reapplied.log
          cargo test -p crm-customer-privacy-capability-composition --test postgres_case_subject_verify --all-features -- --nocapture \
            2>&1 | tee database/customer-privacy-case-subject-verify-reapplied.log
      - name: Verify real crm-api case-create process
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-api --test customer_privacy_case_create_process_e2e -- --nocapture \
            2>&1 | tee database/customer-privacy-case-create-crm-api.log
      - name: Verify real crm-api case-submit process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-api --test customer_privacy_case_submit_process_e2e -- --nocapture \
            2>&1 | tee database/customer-privacy-case-submit-crm-api.log
      - name: Verify real crm-api case-subject-verification process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-api --test customer_privacy_case_subject_verify_process_e2e -- --nocapture \
            2>&1 | tee database/customer-privacy-case-subject-verify-crm-api.log
      - name: Verify real crm-api case-get process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-api --test customer_privacy_case_get_process_e2e -- --nocapture \
            2>&1 | tee database/customer-privacy-case-get-crm-api.log
      - name: Verify real crm-api case-cancel process
        shell: bash
        env:
          DATABASE_URL: ${{ env.SUBMIT_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUBMIT_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          cargo test -p crm-api --test customer_privacy_case_cancel_process_e2e -- --nocapture \
            2>&1 | tee database/customer-privacy-case-cancel-crm-api.log
      - name: Upload Customer Privacy persistence diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: customer-privacy-persistence-diagnostics
          path: |
            crates/crm-customer-privacy-persistence-adapter/
            crates/crm-customer-privacy-capability-adapter/
            crates/crm-customer-privacy-submit-capability-adapter/
            crates/crm-customer-privacy-subject-capability-adapter/
            crates/crm-customer-privacy-cancel-capability-adapter/
            crates/crm-customer-privacy-query-adapter/
            crates/crm-customer-privacy-capability-composition/
            crates/crm-identity-resolution-topology-composition/
            crates/crm-party-reference-composition/
            services/crm-api/tests/customer_privacy_case_create_process_e2e.rs
            services/crm-api/tests/customer_privacy_case_submit_process_e2e.rs
            services/crm-api/tests/customer_privacy_case_subject_verify_process_e2e.rs
            services/crm-api/tests/customer_privacy_case_get_process_e2e.rs
            services/crm-api/tests/customer_privacy_case_cancel_process_e2e.rs
            database/tests/0020_customer_privacy_persistence_fixture.sql
            database/tests/0021_customer_privacy_force_rls.sql
            database/tests/0022_customer_privacy_submit_fixture.sql
            database/tests/0023_customer_privacy_subject_verify_fixture.sql
            database/customer-privacy-case-create-*.log
            database/customer-privacy-case-submit-*.log
            database/customer-privacy-case-subject-verify-*.log
            database/customer-privacy-case-get-*.log
            database/customer-privacy-case-cancel-*.log
            database/customer-privacy-force-rls-*.log
          if-no-files-found: error
          retention-days: 7
