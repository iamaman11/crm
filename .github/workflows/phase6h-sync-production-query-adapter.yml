name: Phase 6H sync production query adapter

on:
  push:
    branches:
      - feature/phase6h-production-query-adapter-v1
    paths:
      - .github/workflows/phase6h-sync-production-query-adapter.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-query-adapter-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve lockfile and format workspace
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit only generated lockfile and query sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock \
            crates/crm-query-runtime/src/query_lib.rs \
            crates/crm-query-runtime/src/visibility.rs \
            crates/crm-capability-adapters/src/lib.rs \
            crates/crm-capability-adapters/src/query_visibility.rs \
            crates/crm-sales-activities-query-adapter/src/lib.rs \
            crates/crm-sales-activities-query-adapter/src/definitions.rs \
            crates/crm-sales-activities-query-adapter/src/executor.rs \
            crates/crm-sales-activities-query-adapter/src/wire.rs
          git diff --cached --quiet && exit 0
          git commit -m "chore(query): sync production adapter lockfile and formatting"
          git push origin HEAD:feature/phase6h-production-query-adapter-v1
