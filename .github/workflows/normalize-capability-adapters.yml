name: Normalize capability adapters branch

on:
  push:
    branches:
      - feature/capability-policy-adapters-v1

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-policy-adapters-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Normalize source and lockfile
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          approval = Path('crates/crm-capability-adapters/src/approval.rs')
          content = approval.read_text().replace(
              'difference | (left ^ right)',
              'difference | (*left ^ *right)',
          )
          approval.write_text(content)

          authorization = Path('crates/crm-capability-adapters/src/authorization.rs')
          content = authorization.read_text().replace(
              'if self.expires_at_unix_nanos == Some(0) {',
              'if self.expires_at_unix_nanos.is_some_and(|value| value <= 0) {',
          )
          authorization.write_text(content)
          PY
          cargo fmt --all
          cargo generate-lockfile
          rm .github/workflows/normalize-capability-adapters.yml
          git diff --check

      - name: Commit normalized branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock crates/crm-capability-adapters .github/workflows/normalize-capability-adapters.yml
          git commit -m "Normalize capability policy adapters"
          git push origin HEAD:feature/capability-policy-adapters-v1
