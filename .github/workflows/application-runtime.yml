name: Application Runtime CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/gateway/**"
      - "proto/crm/search/**"
      - "proto/crm/metadata/**"
      - "proto/crm/customer/**"
      - "proto/crm/parties/**"
      - "proto/crm/accounts/**"
      - "proto/crm/contact_points/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-contact-points-capability-adapter/**"
      - "crates/crm-contact-points-query-adapter/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-customer-accounts-capability-adapter/**"
      - "crates/crm-customer-accounts-query-adapter/**"
      - "crates/crm-metadata-api-adapter/**"
      - "crates/crm-metadata-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "crates/crm-query-runtime/**"
      - "crates/crm-search-runtime/**"
      - "crates/crm-search-query-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "modules/crm-contact-points/**"
      - "modules/crm-customer-accounts/**"
      - "modules/crm-parties/**"
      - "modules/crm-sales-activities-link/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/application-runtime.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/gateway/**"
      - "proto/crm/search/**"
      - "proto/crm/metadata/**"
      - "proto/crm/customer/**"
      - "proto/crm/parties/**"
      - "proto/crm/accounts/**"
      - "proto/crm/contact_points/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-contact-points-capability-adapter/**"
      - "crates/crm-contact-points-query-adapter/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-customer-accounts-capability-adapter/**"
      - "crates/crm-customer-accounts-query-adapter/**"
      - "crates/crm-metadata-api-adapter/**"
      - "crates/crm-metadata-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "crates/crm-query-runtime/**"
      - "crates/crm-search-runtime/**"
      - "crates/crm-search-query-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "modules/crm-contact-points/**"
      - "modules/crm-customer-accounts/**"
      - "modules/crm-parties/**"
      - "modules/crm-sales-activities-link/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/application-runtime.yml"

permissions:
  contents: write

jobs:
  sync-phase8a3b-docs:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Synchronize Phase 8A.3b delivery documentation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          phase8 = Path("docs/PHASE8_DELIVERY_PLAN.md")
          text = phase8.read_text()
          replacement = '''#### 8A.3b — Contact Point lifecycle, verification and preference — Active / final verification

          Tracked by #103 and draft PR #104 on `develop/phase8a3b-contact-point-lifecycle`.

          The packet now implements:

          - authoritative typed Contact Point identity with a stable Party reference and no copied Party identity attributes;
          - Email, Phone, Postal, Web and Messaging endpoint kinds with deterministic canonical normalization and bounded validation;
          - Active/Inactive lifecycle, preferred state, validity intervals and explicit verification evidence/time;
          - verification preservation for lifecycle/validity/display-only changes and automatic reset only when the canonical endpoint value changes;
          - exact optimistic version progression, monotonic mutation time, semantic no-op rejection and atomic version-exhaustion failure;
          - strict deterministic versioned persisted Contact Point state with canonical rehydration checks;
          - additive `crm.contact_points.v1` create/update/verify/get/list contracts and created/updated/verified events;
          - immutable module manifest evolution, exact contract bindings and synchronized Rust/browser descriptor identities;
          - governed transactional create/update/verify through the production aggregate executor with idempotency, outbox and audit evidence;
          - permission-aware get/list with tenant/actor/filter/sort/page-bound signed cursors, typed filters, bounded visibility scans and live field redaction;
          - application-level Party-reference integrity without SQL or cross-owner storage access in the Contact Point owner module;
          - identical safe rejection for missing and cross-tenant Party references while real database/runtime failures remain distinguishable internally;
          - `crm-application-runtime` composition and field-bounded visibility bootstrap;
          - fresh-PostgreSQL real `crm-api` process acceptance covering Party prerequisites, lifecycle, verification, display-only preservation, verification reset on value change, replay, conflicting replay, stale version, filters, signed cursor pagination/tamper rejection, unauthenticated rejection, tenant non-disclosure and durable evidence counts.

          The packet remains **Active** and PR #104 remains draft until all applicable workflows are green together on one exact final SHA. It is not marked complete or merged prematurely.

          Consent and communication authorization, provider delivery state, Party Relationship and Customer 360 remain separate authoritative ownership and are not hidden inside Contact Point flags.

          '''
          replacement = re.sub(r"^          ", "", replacement, flags=re.M)
          text, count = re.subn(
              r"#### 8A\.3b — Contact Point lifecycle, verification and preference — Active\n.*?(?=#### 8A\.3c —)",
              replacement,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f"expected one PHASE8 8A.3b block, found {count}")
          phase8.write_text(text)

          status = Path("docs/PROJECT_STATUS.md")
          text = status.read_text()
          replacement = '''### 8A.3b — Contact Point lifecycle, verification and preference — Active / final verification

          Issue #103 and draft PR #104 now contain the implemented authoritative Contact Point vertical slice:

          - typed Contact Point identity and stable Party reference;
          - deterministic Email, Phone, Postal, Web and Messaging normalization/validation;
          - Active/Inactive lifecycle, preferred state, validity intervals and explicit verification evidence/time;
          - verification preservation for non-value changes and reset only when the canonical endpoint value changes;
          - exact optimistic concurrency, monotonic mutation time and deterministic persisted-state validation;
          - additive v1 create/update/verify/get/list contracts plus created/updated/verified events;
          - governed transactional mutations with idempotency, outbox and audit evidence;
          - permission-aware get/list with typed filters, signed cursor binding and live field/resource visibility;
          - application-level Party-reference integrity with the same safe result for missing and cross-tenant Parties and no direct cross-owner storage access from the owner module;
          - immutable manifest/contract bindings and synchronized generated descriptors;
          - application-runtime composition and field-bounded visibility bootstrap;
          - fresh-PostgreSQL real `crm-api` process acceptance for lifecycle, verification/reset, replay/conflict, filters, signed cursor pagination/tamper rejection, unauthenticated rejection, tenant non-disclosure and durable evidence counts.

          PR #104 remains draft pending one exact-head all-green applicable CI set. The packet is therefore not yet marked **Complete** or merged.

          Consent and communication authorization, provider delivery state, Party Relationship and Customer 360 remain separate owner concerns.

          '''
          replacement = re.sub(r"^          ", "", replacement, flags=re.M)
          text, count = re.subn(
              r"### 8A\.3b — Contact Point lifecycle, verification and preference — Active\n.*?(?=### Remaining 8A sequence)",
              replacement,
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f"expected one PROJECT_STATUS 8A.3b block, found {count}")
          text = text.replace(
              "- `crm.contact-points` — owner foundation with active 8A.3b domain implementation, not yet production-complete;",
              "- `crm.contact-points` — implemented authoritative 8A.3b vertical slice in draft PR #104, pending exact-head final verification and merge;",
              1,
          )
          text = text.replace(
              "1. Continue Phase 8A.3b / #103 from `develop/phase8a3b-contact-point-lifecycle` and complete contracts, persistence, governed mutation/query adapters, application composition and process-level production proof.",
              "1. Finish exact-head CI verification for Phase 8A.3b / #103, merge draft PR #104 only after the full applicable green set, then begin Party Relationship.",
              1,
          )
          status.write_text(text)

          roadmap = Path("docs/IMPLEMENTATION_ROADMAP.md")
          text = roadmap.read_text()
          old = "Current delivery position: Party create/update/get/list/search is production-proven. The first authoritative Account create/update/get/list slice with typed Party associations and platform-level reference integrity is merged and production-proven (#101 / merged PR #102; final verified head `0d6d79dce31aaea4d2a0998fadb1ac842fdcfde4`; merge commit `7ee48530d880ef8aeb6abf2140b524ac724d4fc9`). Contact Point lifecycle is now active in #103 on `develop/phase8a3b-contact-point-lifecycle`; the branch currently contains the first typed lifecycle/verification domain foundation but not yet the public contracts, adapters, runtime composition or production process proof required for merge. Party Relationship and Customer 360 follow. Consent, identity resolution, merge/unmerge, provenance and privacy lifecycle remain later explicit 8A packets."
          new = "Current delivery position: Party create/update/get/list/search is production-proven. The first authoritative Account create/update/get/list slice with typed Party associations and platform-level reference integrity is merged and production-proven (#101 / merged PR #102; final verified head `0d6d79dce31aaea4d2a0998fadb1ac842fdcfde4`; merge commit `7ee48530d880ef8aeb6abf2140b524ac724d4fc9`). Contact Point lifecycle is implemented in #103 / draft PR #104 on `develop/phase8a3b-contact-point-lifecycle`, including strict persistence, additive v1 contracts/events, governed mutations, permission-aware queries, application-level Party-reference integrity, runtime composition, synchronized descriptors and fresh-PostgreSQL real `crm-api` process proof. It remains Active until one exact final SHA passes the full applicable CI set and the PR is merged. Party Relationship and Customer 360 follow. Consent, identity resolution, merge/unmerge, provenance and privacy lifecycle remain later explicit 8A packets."
          if text.count(old) != 1:
              raise SystemExit("expected one IMPLEMENTATION_ROADMAP delivery-position paragraph")
          roadmap.write_text(text.replace(old, new, 1))

          catalog = Path("docs/MODULE_CATALOG.md")
          text = catalog.read_text()
          if text.count("`crm.contact-points` is being implemented to own:") != 1:
              raise SystemExit("expected one MODULE_CATALOG Contact Point ownership heading")
          text = text.replace("`crm.contact-points` is being implemented to own:", "`crm.contact-points` owns:", 1)
          old = "The current 8A.3b branch already establishes the first pure domain model and resets verification when the endpoint value changes, but the module remains a foundation until governed public contracts, persistence, application composition and production acceptance are complete."
          new = "Draft PR #104 now implements the authoritative 8A.3b Contact Point vertical slice: strict deterministic persistence, additive v1 contracts/events, governed mutation and permission-aware query adapters, application-level Party-reference integrity, runtime composition, synchronized descriptors and fresh-PostgreSQL real `crm-api` process acceptance. The owner module remains pure: it has no SQL, transport types or direct cross-owner storage access. The packet remains Active until one exact final SHA is fully green and merged."
          if text.count(old) != 1:
              raise SystemExit("expected one MODULE_CATALOG stale Contact Point status paragraph")
          catalog.write_text(text.replace(old, new, 1))
          PY
      - name: Commit synchronized documentation
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- docs; then
            echo "Phase 8A.3b delivery documentation is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Synchronize Phase 8A.3b delivery status"
          git push origin "HEAD:${HEAD_BRANCH}"

  application-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_application_runtime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_application_runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5435
      PGDATABASE: crm_application_runtime_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5435/crm_application_runtime_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5435/crm_application_runtime_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Prepare isolated application database reset helper
        shell: bash
        run: |
          cat > /tmp/reset-application-database.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          psql --set ON_ERROR_STOP=1 --command "DROP SCHEMA IF EXISTS crm CASCADE"
          for migration in database/migrations/000{1,2,3,4,5,6,7,8,9}_*.up.sql database/migrations/0010_*.up.sql; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0003_sales_activities_adapters.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
          SH
          chmod +x /tmp/reset-application-database.sh
      - name: Verify full crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-process.log
      - name: Verify Party crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test party_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-party-process.log
      - name: Verify Account crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test account_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-account-process.log
      - name: Verify Contact Point crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test contact_point_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-contact-point-process.log
      - name: Capture PostgreSQL diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          postgres_container="$(docker ps -aq --filter ancestor=postgres:17-alpine | head -n 1)"
          if [ -n "${postgres_container}" ]; then
            docker logs "${postgres_container}" > database/application-runtime-postgres.log 2>&1
          else
            echo "PostgreSQL service container was not found." > database/application-runtime-postgres.log
            docker ps -a >> database/application-runtime-postgres.log 2>&1
          fi
      - name: Upload application runtime diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-runtime-diagnostics
          path: |
            database/application-runtime-process.log
            database/application-runtime-party-process.log
            database/application-runtime-account-process.log
            database/application-runtime-contact-point-process.log
            database/application-runtime-postgres.log
            crates/crm-application-runtime/
            crates/crm-contact-points-capability-adapter/
            crates/crm-contact-points-query-adapter/
            crates/crm-customer-accounts-capability-adapter/
            crates/crm-customer-accounts-query-adapter/
            crates/crm-metadata-api-adapter/
            crates/crm-metadata-query-adapter/
            crates/crm-parties-capability-adapter/
            crates/crm-parties-query-adapter/
            crates/crm-search-query-adapter/
            modules/crm-contact-points/
            modules/crm-customer-accounts/
            services/crm-api/
          if-no-files-found: error
          retention-days: 7
