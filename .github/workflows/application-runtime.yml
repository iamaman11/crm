  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/gateway/**"
      - "proto/crm/search/**"
      - "proto/crm/metadata/**"
      - "proto/crm/customer/**"
      - "proto/crm/parties/**"
      - "proto/crm/accounts/**"
      - "proto/crm/contact_points/**"
      - "proto/crm/party_relationships/**"
      - "proto/crm/consents/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-consents-capability-adapter/**"
      - "crates/crm-consents-capability-composition/**"
      - "crates/crm-consents-query-adapter/**"
      - "crates/crm-contact-points-capability-adapter/**"
      - "crates/crm-contact-points-query-adapter/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-customer-accounts-capability-adapter/**"
      - "crates/crm-customer-accounts-query-adapter/**"
      - "crates/crm-metadata-api-adapter/**"
      - "crates/crm-metadata-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "crates/crm-party-relationships-capability-adapter/**"
      - "crates/crm-party-relationships-query-adapter/**"
      - "crates/crm-party-relationships-projection/**"
      - "crates/crm-query-runtime/**"
      - "crates/crm-search-runtime/**"
      - "crates/crm-search-query-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "modules/crm-consents/**"
      - "modules/crm-contact-points/**"
      - "modules/crm-customer-accounts/**"
      - "modules/crm-parties/**"
      - "modules/crm-party-relationships/**"
      - "modules/crm-sales-activities-link/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/application-runtime.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "proto/crm/gateway/**"
      - "proto/crm/search/**"
      - "proto/crm/metadata/**"
      - "proto/crm/customer/**"
      - "proto/crm/parties/**"
      - "proto/crm/accounts/**"
      - "proto/crm/contact_points/**"
      - "proto/crm/party_relationships/**"
      - "proto/crm/consents/**"
      - "crates/crm-application-runtime/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-ingress/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-consents-capability-adapter/**"
      - "crates/crm-consents-capability-composition/**"
      - "crates/crm-consents-query-adapter/**"
      - "crates/crm-contact-points-capability-adapter/**"
      - "crates/crm-contact-points-query-adapter/**"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-customer-accounts-capability-adapter/**"
      - "crates/crm-customer-accounts-query-adapter/**"
      - "crates/crm-metadata-api-adapter/**"
      - "crates/crm-metadata-query-adapter/**"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "crates/crm-party-relationships-capability-adapter/**"
      - "crates/crm-party-relationships-query-adapter/**"
      - "crates/crm-party-relationships-projection/**"
      - "crates/crm-query-runtime/**"
      - "crates/crm-search-runtime/**"
      - "crates/crm-search-query-adapter/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-query-adapter/**"
      - "modules/crm-consents/**"
      - "modules/crm-contact-points/**"
      - "modules/crm-customer-accounts/**"
      - "modules/crm-parties/**"
      - "modules/crm-party-relationships/**"
      - "modules/crm-sales-activities-link/**"
      - "services/crm-api/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/application-runtime.yml"

permissions:
  contents: write

jobs:
  application-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_application_runtime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_application_runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5435
      PGDATABASE: crm_application_runtime_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5435/crm_application_runtime_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5435/crm_application_runtime_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Prepare isolated application database reset helper
        shell: bash
        run: |
          cat > /tmp/reset-application-database.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          psql --set ON_ERROR_STOP=1 --command "DROP SCHEMA IF EXISTS crm CASCADE"
          for migration in database/migrations/000{1,2,3,4,5,6,7,8,9}_*.up.sql database/migrations/0010_*.up.sql; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0003_sales_activities_adapters.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
          SH
          chmod +x /tmp/reset-application-database.sh
      - name: Verify full crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-process.log
      - name: Verify Party crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test party_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-party-process.log
      - name: Verify Account crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test account_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-account-process.log
      - name: Verify Contact Point crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test contact_point_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-contact-point-process.log
      - name: Verify Party Relationship crm-api process lifecycle and hierarchy rebuild
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test party_relationship_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-party-relationship-process.log
      - name: Verify Consent and communication authorization crm-api process lifecycle
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test consent_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-consent-process.log
      - name: Verify Identity Resolution crm-api process lifecycle without Party merge
        shell: bash
        run: |
          set -o pipefail
          /tmp/reset-application-database.sh
          cargo test -p crm-api --test identity_resolution_process_e2e -- --nocapture \
            2>&1 | tee database/application-runtime-identity-resolution-process.log
      - name: Capture PostgreSQL diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          postgres_container="$(docker ps -aq --filter ancestor=postgres:17-alpine | head -n 1)"
          if [ -n "${postgres_container}" ]; then
            docker logs "${postgres_container}" > database/application-runtime-postgres.log 2>&1
          else
            echo "PostgreSQL service container was not found." > database/application-runtime-postgres.log
            docker ps -a >> database/application-runtime-postgres.log 2>&1
          fi
      - name: Upload application runtime diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-runtime-diagnostics
          path: |
            database/application-runtime-process.log
            database/application-runtime-party-process.log
            database/application-runtime-account-process.log
            database/application-runtime-contact-point-process.log
            database/application-runtime-party-relationship-process.log
            database/application-runtime-consent-process.log
            database/application-runtime-identity-resolution-process.log
            database/application-runtime-postgres.log
            crates/crm-application-runtime/
            crates/crm-consents-capability-adapter/
            crates/crm-consents-capability-composition/
            crates/crm-consents-query-adapter/
            crates/crm-contact-points-capability-adapter/
            crates/crm-contact-points-query-adapter/
            crates/crm-customer-accounts-capability-adapter/
            crates/crm-customer-accounts-query-adapter/
            crates/crm-metadata-api-adapter/
            crates/crm-metadata-query-adapter/
            crates/crm-parties-capability-adapter/
            crates/crm-parties-query-adapter/
            crates/crm-party-relationships-capability-adapter/
            crates/crm-party-relationships-query-adapter/
            crates/crm-party-relationships-projection/
            crates/crm-search-query-adapter/
            modules/crm-consents/
            modules/crm-contact-points/
            modules/crm-customer-accounts/
            modules/crm-party-relationships/
            services/crm-api/
          if-no-files-found: error
          retention-days: 7

  refactor-query-router-once:
    if: github.event_name == 'push' && github.ref_name == 'develop/phase8a5-identity-resolution-duplicate-candidates'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a5-identity-resolution-duplicate-candidates
          fetch-depth: 2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Bundle query adapters and verify exact source refactor
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          governed = Path("crates/crm-application-runtime/src/governed_metadata.rs")
          text = governed.read_text()
          pattern = re.compile(r"#\[derive\(Debug, Clone\)\]\npub struct ApplicationQueryRouter \{.*?\n\}\n\nimpl ApplicationQueryRouter \{.*?\n\}\n", re.S)
          replacement = """#[derive(Debug, Clone)]
pub struct ApplicationQueryAdapters {
    pub parties: PartyQueryAdapter,
    pub accounts: AccountQueryAdapter,
    pub contact_points: ContactPointQueryAdapter,
    pub party_relationships: PartyRelationshipQueryAdapter,
    pub customer_360: Customer360QueryAdapter,
    pub consents: ConsentQueryAdapter,
    pub identity_resolution: IdentityResolutionQueryAdapter,
    pub metadata: MetadataQueryAdapter,
}

#[derive(Debug, Clone)]
pub struct ApplicationQueryRouter {
    production: ProductionQueryRouter,
    adapters: ApplicationQueryAdapters,
}

impl ApplicationQueryRouter {
    pub fn new(production: ProductionQueryRouter, adapters: ApplicationQueryAdapters) -> Self {
        Self { production, adapters }
    }
}
"""
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one query-router block, replaced {count}")
          for field in ("metadata", "parties", "accounts", "contact_points", "party_relationships", "customer_360", "consents", "identity_resolution"):
              text = text.replace(f"self.{field}.validate(", f"self.adapters.{field}.validate(")
              text = text.replace(f"self.{field}.execute(", f"self.adapters.{field}.execute(")
          governed.write_text(text)

          runtime = Path("crates/crm-application-runtime/src/runtime.rs")
          text = runtime.read_text()
          old_import = "ApplicationGatewayService, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,"
          new_import = "ApplicationGatewayService, ApplicationQueryAdapters, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,"
          if old_import not in text:
              raise SystemExit("runtime query-router import anchor not found")
          text = text.replace(old_import, new_import, 1)
          call_pattern = re.compile(r"let query_router = Arc::new\(ApplicationQueryRouter::new\(\n\s*production_query_router,\n\s*party_query_adapter,\n\s*account_query_adapter,\n\s*contact_point_query_adapter,\n\s*party_relationship_query_adapter,\n\s*customer_360_query_adapter,\n\s*consent_query_adapter,\n\s*identity_resolution_query_adapter,\n\s*metadata_query_adapter,\n\s*\)\);")
          call = """let query_router = Arc::new(ApplicationQueryRouter::new(
            production_query_router,
            ApplicationQueryAdapters {
                parties: party_query_adapter,
                accounts: account_query_adapter,
                contact_points: contact_point_query_adapter,
                party_relationships: party_relationship_query_adapter,
                customer_360: customer_360_query_adapter,
                consents: consent_query_adapter,
                identity_resolution: identity_resolution_query_adapter,
                metadata: metadata_query_adapter,
            },
        ));"""
          text, count = call_pattern.subn(call, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one runtime query-router call, replaced {count}")
          runtime.write_text(text)
          PY
          cargo fmt --all
          cargo clippy -p crm-application-runtime --all-targets --all-features -- -D warnings
          cargo test -p crm-application-runtime --lib
      - name: Restore permanent CI and commit clean source refactor
        run: |
          git show 41fe1f429d20880b37613cefc4c3738dbc3c273f:.github/workflows/application-runtime.yml > .github/workflows/application-runtime.yml
          rm -f .github/workflows/phase8a5-query-router-refactor-once.yml
          rm -f .github/workflows/phase8a5-query-router-refactor-v2-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime .github/workflows
          git commit -m "refactor(runtime): bundle query router adapters"
          git push origin HEAD:develop/phase8a5-identity-resolution-duplicate-candidates
