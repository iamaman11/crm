name: Phase 8A.7 Apply Validation And Application

on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - .github/workflows/phase8a7-apply-validation-application.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply retained validation and application patch
        shell: bash
        run: |
          set -euo pipefail
          git show 38834f97565ec8fb554ec8657c5226130c316e28:.github/workflows/phase8a7-validation-application-once.yml > /tmp/phase8a7-patch.yml
          python - <<'PY'
          from pathlib import Path
          import textwrap

          lines = Path('/tmp/phase8a7-patch.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          code = textwrap.dedent('\n'.join(lines[start:end]))
          exec(compile(code, 'phase8a7-validation-application-patch', 'exec'), {'__name__': '__main__'})
          PY
          cargo generate-lockfile
          cargo fmt --all
          rm .github/workflows/phase8a7-apply-validation-application.yml
      - name: Commit applied production boundary
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(phase8a7): finalize validation and application routing"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
