name: Phase 8A.10 Pending Application Materialization Recovery

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/phase8a10-pending-application-materialization-recovery.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_worker_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_worker_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5442
      PGDATABASE: crm_customer_enrichment_worker_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply recovery process patch
        run: |
          python scripts/patch_phase8a10_pending_application_materialization_recovery.py
          cargo fmt --all
      - name: Prepare fresh PostgreSQL
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify pending application materialization recovery
        run: |
          set -euo pipefail
          cargo test \
            -p crm-customer-enrichment-materialization-composition \
            --features postgres-integration \
            --test postgres_materialization_event_process \
            -- --nocapture
          cargo clippy \
            -p crm-customer-enrichment-materialization-composition \
            --all-targets -- -D warnings
      - name: Commit verified recovery proof and remove temporary tooling
        run: |
          set -euo pipefail
          rm .github/workflows/phase8a10-pending-application-materialization-recovery.yml
          rm scripts/patch_phase8a10_pending_application_materialization_recovery.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Prove pending application materialization recovery'
          git push origin HEAD:agent/phase8a10-customer-enrichment
