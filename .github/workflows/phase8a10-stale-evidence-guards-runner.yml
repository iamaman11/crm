name: Phase 8A.10 Stale Guard Runner

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/phase8a10-stale-evidence-guards-runner.yml

permissions:
  contents: write

jobs:
  implement-and-verify:
    if: github.head_ref == 'agent/phase8a10-customer-enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/phase8a10-customer-enrichment
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply prepared stale-evidence guard patch
        run: python scripts/run_phase8a10_stale_guard_patch.py
      - name: Verify focused stale-evidence implementation
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          {
            cargo fmt --all
            cargo test -p crm-core-data -p crm-customer-enrichment \
              -p crm-customer-enrichment-review-composition \
              -p crm-customer-enrichment-application-composition \
              -p crm-customer-enrichment-materialization-composition
            cargo test -p crm-customer-enrichment-review-composition \
              --features postgres-integration --test postgres_review_process
            cargo test -p crm-customer-enrichment-application-composition \
              --features postgres-integration --test postgres_application_process
            cargo test -p crm-customer-enrichment-materialization-composition \
              --features postgres-integration --test postgres_materialization_process
            cargo clippy -p crm-core-data -p crm-customer-enrichment \
              -p crm-customer-enrichment-review-composition \
              -p crm-customer-enrichment-application-composition \
              -p crm-customer-enrichment-materialization-composition \
              --all-targets -- -D warnings
          } 2>&1 | tee /tmp/phase8a10-stale-guard-verify.log
      - name: Persist focused diagnostics
        if: steps.verify.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          tail -n 240 /tmp/phase8a10-stale-guard-verify.log > /tmp/phase8a10-stale-guard-diagnostic.txt
          git reset --hard HEAD
          git clean -fd
          cp /tmp/phase8a10-stale-guard-diagnostic.txt phase8a10-stale-guard-diagnostic.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add phase8a10-stale-guard-diagnostic.txt
          git commit -m 'Capture stale guard verification diagnostic'
          git push origin HEAD:agent/phase8a10-customer-enrichment
          exit 1
      - name: Commit verified guards and remove temporary tooling
        if: steps.verify.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/phase8a10-stale-evidence-guards.yml
          rm .github/workflows/phase8a10-stale-evidence-guards-runner.yml
          rm scripts/run_phase8a10_stale_guard_patch.py
          rm -f phase8a10-stale-guard-diagnostic.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Add atomic stale suggestion mutation guards'
          git push origin HEAD:agent/phase8a10-customer-enrichment
