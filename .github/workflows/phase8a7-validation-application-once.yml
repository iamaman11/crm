        self.require_version(command.expected_version)?;
        self.require_monotonic_time(command.occurred_at_unix_nanos)?;
        if self.status != ImportJobStatus::Created {
            return Err(conflict(
                "CUSTOMER_DATA_IMPORT_JOB_NOT_CREATED",
                "only a created import job can accept validation results",
            ));
        }
        let total = command
            .valid_rows
            .checked_add(command.invalid_rows)
            .ok_or_else(|| invalid_counter("validation row counts overflow"))?;
        if total != self.total_rows {
            return Err(invalid_counter(
                "valid plus invalid rows must equal the immutable source row count",
            ));
        }
        self.valid_rows = command.valid_rows;
        self.invalid_rows = command.invalid_rows;
        self.status = ImportJobStatus::Validated;
        self.advance(command.occurred_at_unix_nanos)
    }
'''
          replacement = method_anchor + '''
    pub fn record_validation_batch(
        &mut self,
        command: RecordImportValidationBatch,
    ) -> Result<(), SdkError> {
        self.require_version(command.expected_version)?;
        self.require_monotonic_time(command.occurred_at_unix_nanos)?;
        if self.status != ImportJobStatus::Created {
            return Err(conflict(
                "CUSTOMER_DATA_IMPORT_JOB_NOT_CREATED",
                "only a created import job can record validation progress",
            ));
        }
        let batch_total = command
            .valid_rows
            .checked_add(command.invalid_rows)
            .ok_or_else(|| invalid_counter("validation batch row counts overflow"))?;
        if batch_total == 0 {
            return Err(invalid_counter(
                "validation progress batch must contain at least one row",
            ));
        }
        let next_valid = self
            .valid_rows
            .checked_add(command.valid_rows)
            .ok_or_else(|| invalid_counter("valid row counter overflow"))?;
        let next_invalid = self
            .invalid_rows
            .checked_add(command.invalid_rows)
            .ok_or_else(|| invalid_counter("invalid row counter overflow"))?;
        let next_total = next_valid
            .checked_add(next_invalid)
            .ok_or_else(|| invalid_counter("validation counters overflow"))?;
        if next_total > self.total_rows {
            return Err(invalid_counter(
                "validation progress cannot exceed the immutable source row count",
            ));
        }
        self.valid_rows = next_valid;
        self.invalid_rows = next_invalid;
        self.advance(command.occurred_at_unix_nanos)
    }

    pub fn finalize_validation(
        &mut self,
        command: FinalizeImportValidation,
    ) -> Result<(), SdkError> {
        self.require_version(command.expected_version)?;
        self.require_monotonic_time(command.occurred_at_unix_nanos)?;
        if self.status != ImportJobStatus::Created {
            return Err(conflict(
                "CUSTOMER_DATA_IMPORT_JOB_NOT_CREATED",
                "only a created import job can finalize validation",
            ));
        }
        let validated_total = self
            .valid_rows
            .checked_add(self.invalid_rows)
            .ok_or_else(|| invalid_counter("validation counters overflow"))?;
        if validated_total != self.total_rows {
            return Err(conflict(
                "CUSTOMER_DATA_IMPORT_VALIDATION_INCOMPLETE",
                "validation cannot finalize until every immutable source row has an authoritative outcome",
            ));
        }
        self.status = ImportJobStatus::Validated;
        self.advance(command.occurred_at_unix_nanos)
    }
