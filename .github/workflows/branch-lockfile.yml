name: One-shot Cargo lockfile

on:
  push:
    branches:
      - feature/roadmap-and-module-manifest-ir
    paths:
      - .github/workflows/branch-lockfile.yml

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/roadmap-and-module-manifest-ir
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          if git diff --cached --quiet; then
            echo "Cargo.lock is already current"
          else
            git commit -m "build: add reproducible Cargo lockfile"
            git push origin HEAD:feature/roadmap-and-module-manifest-ir
          fi
