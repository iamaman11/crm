name: Fix capability executor mapper name

on:
  push:
    branches:
      - feature/capability-postgres-executor-v1

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-postgres-executor-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply focused rename
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-core-data/src/capability_executor.rs')
          content = path.read_text().replace(
              'batch_error_to_sdk',
              'capability_batch_error_to_sdk',
          )
          path.write_text(content)
          PY
          cargo fmt --all
          rm .github/workflows/fix-capability-executor-name.yml
          git diff --check

      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/crm-core-data/src/capability_executor.rs .github/workflows/fix-capability-executor-name.yml
          git commit -m "Disambiguate capability batch error mapping"
          git push origin HEAD:feature/capability-postgres-executor-v1
