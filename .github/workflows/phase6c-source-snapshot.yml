name: Phase 6C normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/transactional-audit-materialization-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply transactional audit materialization
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .phase6c-code.patch.gz.b64 | gzip --decompress > /tmp/phase6c-code.patch
          git apply --check /tmp/phase6c-code.patch
          git apply /tmp/phase6c-code.patch
          rm .phase6c-code.patch.gz.b64
      - name: Normalize and validate focused runtime
        shell: bash
        run: |
          set -o pipefail
          {
            cargo fmt --all
            cargo test -p crm-core-data -p crm-capability-ingress
            cargo clippy -p crm-core-data -p crm-capability-ingress --all-targets -- -D warnings
            git diff --check
          } 2>&1 | tee phase6c-normalize.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6c-normalize-diagnostics
          path: phase6c-normalize.log
          if-no-files-found: warn
          retention-days: 7
      - name: Commit normalized runtime
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Materialize audit chain inside PostgreSQL transactions"
          git push origin HEAD:feature/transactional-audit-materialization-v1
