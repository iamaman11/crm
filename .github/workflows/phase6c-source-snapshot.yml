name: Phase 6C source snapshot

on:
  push:
    branches:
      - feature/transactional-audit-materialization-v1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Collect complete source snapshot
        shell: bash
        run: |
          mkdir -p phase6c-snapshot
          grep -RInE "AuditEvidence|audit_sequence|previous_hash|record_hash|canonical_envelope" \
            crates tests database .github docs > phase6c-snapshot/audit-references.txt || true
          tar --exclude=.git --exclude=target --exclude=phase6c-snapshot \
            -czf phase6c-snapshot/source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: phase6c-source-snapshot
          path: phase6c-snapshot/
          if-no-files-found: error
          retention-days: 3
