name: Temporary Provider Recovery Assertion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: temporary-provider-recovery-assertion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply exact assertion and acceptance patch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tmp_fix_provider_recovery_acceptance.py
      - name: Verify exact patch scope
        shell: bash
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            crates/crm-customer-enrichment-provider-process-composition/src/lib.rs \
            modules/crm-customer-enrichment/ACCEPTANCE.md)"
          actual="$(git diff --name-only | sort)"
          test "${actual}" = "${expected}"
      - name: Format workspace
        run: cargo fmt --all
      - name: Verify canonical patch scope
        shell: bash
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            crates/crm-customer-enrichment-provider-process-composition/src/lib.rs \
            modules/crm-customer-enrichment/ACCEPTANCE.md)"
          actual="$(git diff --name-only | sort)"
          test "${actual}" = "${expected}"
      - name: Verify provider recovery semantics
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p crm-customer-enrichment-provider-process-composition \
            --lib exact_profile_party_and_deadline_are_revalidated_before_recovery \
            -- --nocapture
          cargo test -p crm-customer-enrichment-provider-process-composition --lib -- --nocapture
      - name: Strict focused Clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy \
            -p crm-customer-enrichment-provider-process-composition \
            --all-targets --all-features -- -D warnings
      - name: Commit verified assertion and acceptance fix
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/crm-customer-enrichment-provider-process-composition/src/lib.rs \
            modules/crm-customer-enrichment/ACCEPTANCE.md
          git diff --cached --quiet && exit 0
          git commit -m "Align provider recovery acceptance"
          git push origin "HEAD:${HEAD_BRANCH}"
