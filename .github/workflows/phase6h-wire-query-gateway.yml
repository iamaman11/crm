name: Phase 6H wire query gateway

on:
  push:
    branches:
      - feature/phase6h-production-queries-v1
    paths:
      - .github/workflows/phase6h-wire-query-gateway.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-production-queries-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Export query gateway and complete trace context
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lib = Path('crates/crm-query-runtime/src/lib.rs')
          text = lib.read_text()
          marker = '#![forbid(unsafe_code)]\n'
          export = '\nmod gateway;\npub use gateway::*;\n'
          if 'mod gateway;' not in text:
              text = text.replace(marker, marker + export, 1)
          lib.write_text(text)

          gateway = Path('crates/crm-query-runtime/src/gateway.rs')
          text = gateway.read_text()
          text = text.replace(
              'ActorId, CapabilityId, CapabilityVersion, CorrelationId, ErrorCategory, ModuleId, PortFuture,',
              'ActorId, CapabilityId, CapabilityVersion, CausationId, CorrelationId, ErrorCategory, ModuleId, PortFuture,',
          )
          text = text.replace(
              '    pub correlation_id: CorrelationId,\n    pub trace_id: TraceId,',
              '    pub correlation_id: CorrelationId,\n    pub causation_id: CausationId,\n    pub trace_id: TraceId,',
          )
          text = text.replace(
              '                correlation_id: CorrelationId::try_new("correlation-a").unwrap(),\n                trace_id:',
              '                correlation_id: CorrelationId::try_new("correlation-a").unwrap(),\n                causation_id: CausationId::try_new("causation-a").unwrap(),\n                trace_id:',
          )
          gateway.write_text(text)
          PY
          cargo fmt --all
      - name: Commit query gateway wiring only
        run: |
          git add \
            crates/crm-query-runtime/src/lib.rs \
            crates/crm-query-runtime/src/gateway.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Wire exact-version query gateway runtime"
          git push origin HEAD:feature/phase6h-production-queries-v1
