name: Fix gateway replay assertion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/capability-gateway-e2e-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Fix replay comparison
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs')
          content = path.read_text()
          old = '''    assert!(success_result(&replay.body).replayed);
    assert_eq!(success_result(&replay.body), success_result(&first.body));
'''
          new = '''    let first_result = success_result(&first.body);
    let replay_result = success_result(&replay.body);
    assert!(replay_result.replayed);
    assert_eq!(replay_result.output, first_result.output);
    assert_eq!(
        replay_result.affected_resources,
        first_result.affected_resources
    );
'''
          if old not in content:
              raise SystemExit('expected replay assertion was not found')
          path.write_text(content.replace(old, new))
          PY
          cargo fmt --all
          cargo test -p crm-capability-ingress --features postgres-integration --test postgres_gateway_e2e --no-run
          rm .github/workflows/fix-gateway-replay-assertion.yml
          git diff --check

      - name: Commit focused fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/crm-capability-ingress/tests/postgres_gateway_e2e.rs .github/workflows/fix-gateway-replay-assertion.yml
          git commit -m "Compare replay payload independently of replay marker"
          git push origin HEAD:feature/capability-gateway-e2e-v1
