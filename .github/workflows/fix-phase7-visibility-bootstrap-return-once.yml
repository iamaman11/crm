name: Fix Phase 7 visibility bootstrap return once

on:
  pull_request:
    paths:
      - "scripts/fix_phase7_visibility_bootstrap_return.py"
      - ".github/workflows/fix-phase7-visibility-bootstrap-return-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact bootstrap return fix
        run: |
          python scripts/fix_phase7_visibility_bootstrap_return.py
          rustfmt --edition 2024 crates/crm-application-runtime/src/runtime.rs
          rm scripts/fix_phase7_visibility_bootstrap_return.py
          rm .github/workflows/fix-phase7-visibility-bootstrap-return-once.yml
      - name: Commit code-only fix and helper cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix search visibility bootstrap return type"
          git push origin HEAD:develop/phase7-permission-aware-search
