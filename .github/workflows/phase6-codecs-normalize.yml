name: Phase 6 codecs normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-domain-planners-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply persisted codec sources
        shell: bash
        run: |
          cat <<'ARCHIVE64' | base64 --decode > /tmp/phase6-codecs.tar.gz
          
          ARCHIVE64
          tar -xzf /tmp/phase6-codecs.tar.gz
      - name: Format and verify owner modules
        run: |
          cargo fmt --all
          python scripts/check_architecture.py
          cargo test -p crm-sales -p crm-activities
          cargo clippy -p crm-sales -p crm-activities --all-targets --all-features -- -D warnings
      - name: Commit normalized codecs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock modules/crm-sales modules/crm-activities
          git diff --cached --check
          git commit -m "feat: add validated Deal and Task persisted codecs"
          git push origin HEAD:feature/sales-activities-domain-planners-v1
