name: One-shot module registry Clippy repair

on:
  push:
    branches:
      - feature/module-lifecycle-v1
    paths:
      - .github/workflows/module-registry-clippy-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/module-lifecycle-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact Clippy repair
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/crm-module-registry/src/registry.rs")
          text = path.read_text(encoding="utf-8")
          old = "        let mut report = ImpactReport::default();\n        report.blockers = self.installed_dependents(tenant_id, module_id)?;"
          new = "        let mut report = ImpactReport {\n            blockers: self.installed_dependents(tenant_id, module_id)?,\n            ..ImpactReport::default()\n        };"
          if old not in text:
              raise SystemExit("expected ImpactReport initializer was not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          cargo fmt --all
          git diff --check
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-module-registry/src/registry.rs
          git commit -m "fix: initialize lifecycle impact report atomically"
          git push origin HEAD:feature/module-lifecycle-v1
