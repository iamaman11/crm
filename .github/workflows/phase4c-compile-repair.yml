name: One-shot Phase 4C compile repair

on:
  push:
    branches:
      - feature/postgres-data-adapter-v2
    paths:
      - .github/workflows/phase4c-compile-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/postgres-data-adapter-v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply resilient compiler repairs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          postgres = Path("crates/crm-core-data/src/postgres.rs")
          text = postgres.read_text(encoding="utf-8")
          text = text.replace("RecordId, ", "", 1)
          text = text.replace("RecordType, ", "", 1)
          postgres.write_text(text, encoding="utf-8")

          batch = Path("crates/crm-core-data/src/postgres_batch.rs")
          text = batch.read_text(encoding="utf-8")
          for token in ("ModuleId, ", "RetentionPolicyId, ", "SchemaId, ", "SchemaVersion, "):
              text = text.replace(token, "", 1)

          pattern = re.compile(
              r"        BatchError::Conflict\(message\) \| BatchError::IdempotencyKeyReused => SdkError::new\(.*?\n        \),\n        BatchError::IdempotencyInProgress",
              re.S,
          )
          replacement = '''        BatchError::Conflict(message) => SdkError::new(
            "DATA_CONFLICT",
            ErrorCategory::Conflict,
            false,
            message,
        ),
        BatchError::IdempotencyKeyReused => SdkError::new(
            "DATA_CONFLICT",
            ErrorCategory::Conflict,
            false,
            "The idempotency key was used for a different request.",
        ),
        BatchError::IdempotencyInProgress'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"error mapping replacement count was {count}")
          batch.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          set +e
          cargo check --workspace --all-targets --all-features > phase4c-compile.txt 2>&1
          status=$?
          set -e
          echo "compile_status=${status}" >> phase4c-compile.txt
          git diff --check
      - name: Commit repaired sources and evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-core-data/src/postgres.rs crates/crm-core-data/src/postgres_batch.rs phase4c-compile.txt
          git commit -m "fix: resolve Phase 4C compiler findings"
          git push origin HEAD:feature/postgres-data-adapter-v2
