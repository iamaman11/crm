name: Contract CI

on:
  push:
    paths:
      - "proto/**"
      - "contracts/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "scripts/validate_contract_bindings.py"
      - "requirements-dev.txt"
      - "modules/*/module.yaml"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "proto/**"
      - "contracts/**"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "scripts/validate_contract_bindings.py"
      - "requirements-dev.txt"
      - "modules/*/module.yaml"
      - ".github/workflows/contracts.yml"

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install contract validation dependencies
        run: python -m pip install --requirement requirements-dev.txt
      - name: Install Buf
        uses: bufbuild/buf-action@v1.4.0
        with:
          version: 1.50.1
          setup_only: true
      - name: Build, format, lint, bind and breaking checks
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        shell: bash
        run: |
          mkdir -p contract-diagnostics
          set +e

          buf build proto --output contract-diagnostics/crm-schema.binpb \
            >contract-diagnostics/build.txt 2>&1
          build_status=$?

          buf format -d --exit-code proto \
            >contract-diagnostics/format.diff 2>&1
          format_status=$?

          buf lint proto >contract-diagnostics/lint.txt 2>&1
          lint_status=$?

          bindings_status=0
          if [ "${build_status}" -eq 0 ]; then
            python scripts/validate_contract_bindings.py \
              --descriptor-set contract-diagnostics/crm-schema.binpb \
              >contract-diagnostics/bindings.txt 2>&1
            bindings_status=$?
          else
            echo "Binding validation skipped because descriptor build failed" \
              >contract-diagnostics/bindings.txt
            bindings_status=1
          fi

          breaking_status=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git branch --force "${BASE_REF}" "origin/${BASE_REF}"
            buf breaking proto --against ".git#branch=${BASE_REF}" \
              >contract-diagnostics/breaking.txt 2>&1
            breaking_status=$?
          else
            echo "Breaking check skipped outside pull requests" \
              >contract-diagnostics/breaking.txt
          fi

          for report in \
            contract-diagnostics/build.txt \
            contract-diagnostics/format.diff \
            contract-diagnostics/lint.txt \
            contract-diagnostics/bindings.txt \
            contract-diagnostics/breaking.txt; do
            echo "::group::${report}"
            cat "${report}"
            echo "::endgroup::"
          done

          printf 'build=%s format=%s lint=%s bindings=%s breaking=%s\n' \
            "${build_status}" "${format_status}" "${lint_status}" \
            "${bindings_status}" "${breaking_status}"

          if [ "${build_status}" -ne 0 ] || [ "${format_status}" -ne 0 ] || \
             [ "${lint_status}" -ne 0 ] || [ "${bindings_status}" -ne 0 ] || \
             [ "${breaking_status}" -ne 0 ]; then
            exit 1
          fi
      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-diagnostics
          path: contract-diagnostics/
          if-no-files-found: error
          retention-days: 14
      - name: Upload immutable descriptor artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crm-protobuf-descriptor
          path: contract-diagnostics/crm-schema.binpb
          if-no-files-found: error
          retention-days: 30
