name: Phase 6G sync roadmap

on:
  push:
    branches:
      - feature/phase6g-authenticated-postgres-mutations-v1
    paths:
      - .github/workflows/phase6g-sync-roadmap.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6g-authenticated-postgres-mutations-v1
          fetch-depth: 0
      - name: Replace stale Phase 6F gate review with verified 6F and 6G progress
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/IMPLEMENTATION_ROADMAP.md')
          text = path.read_text()
          start = text.index('### Current gate-review slice 6F')
          end = text.index('### Next implementation sequence', start)
          replacement = '''### Completed slice 6F — audited no-op foundation and Sales/Activities capability adapters

Merged in PR #37 as `0969eb657cd03479c27fe6ee0825c57af8565419`.

- Recovered the incomplete PR #35 merge into ordinary reviewable source code and removed all temporary payload/bootstrap artifacts.
- Added shared deterministic `crm-capability-plan-support` conversions, descriptor identity, event evidence, canonical audit intent and idempotency helpers.
- Added audited aggregate semantic no-op transactions with immutable typed response plus audit/idempotency evidence and no false state mutation or outbox event.
- Added migration `0005_audited_noop_transactions`, including rollback refusal while immutable zero-outbox history exists.
- Added production Sales deal create/update/stage-advance planners and Activities task create/update/complete/reminder planners.
- Added exact-money base-10 conversion, tenant/resource validation, generated Protobuf input/output/event mapping and independent persisted schemas.
- Verified PostgreSQL mutation, replay, stale conflict, semantic no-op, rollback, migration and evidence behavior.

Exact PR head `94e0735ff5698989d8b1f28dd5d506ebdf413fcc` passed Rust, Governance and both Database CI jobs before merge. The temporary hosted-runner allocation blocker was resolved without bypassing required checks.

### Completed slice 6G — authenticated production PostgreSQL mutation acceptance

Authoritative PR: #40. Issue: #39.

Materialized scope:

- added `crm-sales-activities-capability-composition` as the non-transport composition boundary for the seven published Sales and Activities mutation capabilities;
- built one deterministic exact-version capability catalog and a synchronous planner router that rejects unsupported, version-mismatched, owner-mismatched and request-mismatched coordinates before PostgreSQL;
- preserved transport boundaries: `crm-capability-ingress` and `services/crm-api` did not gain production dependencies on business owner modules or persistence implementations;
- exercised real Sales create/update/stage-advance and Activities create/update/reminder/complete commands through authenticated HTTP and gRPC ingress, live authorization and `PostgresTransactionalAggregateExecutor`;
- proved exact replay, idempotency-key conflict, stale-version conflict, invalid bearer denial, tenant denial, cross-tenant resource rejection, live permission revocation and semantic no-op behavior;
- measured committed evidence: successful state-changing mutations produce record/outbox/audit/idempotency/business-transaction evidence exactly once; replay and denied/conflicting requests add no duplicate or partial evidence; audited no-op adds audit/idempotency/transaction evidence without record or outbox changes;
- added production evidence-omission rollback acceptance for missing outbox, audit and idempotency evidence, proving typed safe failure with zero committed transactional side effects;
- fixed the PostgreSQL runtime fixture to register all seven production mutation capability coordinates, including `activities.task.update` and `activities.task.schedule_reminder`.

The implementation is merge-ready only after the final post-roadmap head receives green Rust, Governance and both Database CI jobs on one exact commit.

'''
          path.write_text(text[:start] + replacement + text[end:])
          PY
      - name: Commit roadmap only when changed
        run: |
          git add docs/IMPLEMENTATION_ROADMAP.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update roadmap through Phase 6G acceptance"
          git push origin HEAD:feature/phase6g-authenticated-postgres-mutations-v1
