name: Phase 8A.8 Runtime C3
on:
  push:
    branches: [develop/phase8a8-customer-export-jobs]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a8-customer-export-jobs
          fetch-depth: 0
      - name: Import export selection bootstrap
        shell: python
        run: |
          from pathlib import Path
          p=Path('crates/crm-application-runtime/src/runtime.rs'); s=p.read_text()
          old='GovernedPartyExportSelectionSource, ProcessIdentitySource, SystemClock,'
          new='bootstrap_export_selection_worker_access, GovernedPartyExportSelectionSource,\n    ProcessIdentitySource, SystemClock,'
          if s.count(old)!=1: raise SystemExit(f'anchor={s.count(old)}')
          p.write_text(s.replace(old,new,1))
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - run: rm .github/workflows/phase8a8-one-shot-runtime-c3.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m 'Complete Phase 8A.8 runtime bootstrap import' && git push origin HEAD:develop/phase8a8-customer-export-jobs
