name: Temporary Provider Conflict Process Hold

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: temporary-provider-conflict-process-hold-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_worker_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_worker_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5442
      PGDATABASE: crm_customer_enrichment_worker_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply provider conflict process hold patch
        shell: bash
        run: |
          set -euo pipefail
          python scripts/tmp_apply_provider_conflict_process_hold.py
          cargo fmt --all
      - name: Reject unexpected patch scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess

          allowed = {
              "crates/crm-customer-enrichment-provider-process-composition/Cargo.toml",
              "crates/crm-customer-enrichment-provider-process-composition/src/conflict_persistence.rs",
              "crates/crm-customer-enrichment-provider-process-composition/src/worker.rs",
              "crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_persistence.rs",
              "crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_process_hold.rs",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f"unexpected={sorted(unexpected)}")
          print("provider conflict process diff:", sorted(changed))
          PY
      - name: Verify pure process and persistence contracts
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p crm-customer-enrichment-provider-process-composition --lib -- --nocapture
      - name: Prepare fresh conflict persistence database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify PostgreSQL conflict relationship replay
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p crm-customer-enrichment-provider-process-composition \
            --features postgres-integration \
            --test postgres_conflict_persistence \
            -- --nocapture
      - name: Prepare fresh conflict process database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify PostgreSQL unresolved conflict checkpoint hold
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p crm-customer-enrichment-provider-process-composition \
            --features postgres-integration \
            --test postgres_conflict_process_hold \
            -- --nocapture
      - name: Verify production wrappers compile
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p crm-application-runtime
          cargo test -p crm-application-runtime --test customer_enrichment_provider_source_contract --no-run
      - name: Strict focused Clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy \
            -p crm-customer-enrichment-provider-process-composition \
            -p crm-customer-enrichment-worker-composition \
            -p crm-application-runtime \
            --all-targets --all-features -- -D warnings
      - name: Commit verified provider conflict process hold
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/crm-customer-enrichment-provider-process-composition/Cargo.toml \
            crates/crm-customer-enrichment-provider-process-composition/src/conflict_persistence.rs \
            crates/crm-customer-enrichment-provider-process-composition/src/worker.rs \
            crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_persistence.rs \
            crates/crm-customer-enrichment-provider-process-composition/tests/postgres_conflict_process_hold.rs
          git diff --cached --quiet && exit 0
          git commit -m "Hold provider checkpoint on unresolved conflicts"
          git push origin "HEAD:${HEAD_BRANCH}"
