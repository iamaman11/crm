name: Agent Final Architecture Apply

on:
  pull_request:
    paths:
      - ".github/workflows/agent-final-architecture.yml"
      - ".agent/final-code.patch.ready"

permissions:
  contents: write

concurrency:
  group: agent-final-architecture-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified final architecture packet
        id: packet
        shell: bash
        run: |
          if [ ! -f .agent/final-code.patch.ready ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat .agent/final-code.patch.part.* > /tmp/final-code.patch
          {
            echo "expected: $(cut -d' ' -f1 .agent/final-code.patch.ready)"
            echo "actual:   $(sha256sum /tmp/final-code.patch | cut -d' ' -f1)"
            echo
            echo "git apply --check:"
            git apply --check /tmp/final-code.patch
          } >/tmp/final-architecture-diagnostics.txt 2>&1 || {
            cat /tmp/final-architecture-diagnostics.txt
            exit 1
          }
          sha256sum --check .agent/final-code.patch.ready
          git apply --index /tmp/final-code.patch
          git rm .agent/final-code.patch.part.* .agent/final-code.patch.ready .github/workflows/agent-final-architecture.yml
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Upload final packet diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-architecture-diagnostics-${{ github.sha }}
          path: /tmp/final-architecture-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 1
      - name: Publish final architecture packet
        if: steps.packet.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Complete lifecycle parity and module scaffolding gates"
          git push origin "HEAD:${HEAD_BRANCH}"
