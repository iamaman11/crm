name: Agent Inventory Compatibility Fix

on:
  pull_request:
    paths:
      - ".github/workflows/agent-inventory-fix.yml"
      - ".agent/native-inventory-api.patch"

permissions:
  contents: write

concurrency:
  group: agent-inventory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified inventory API patch
        id: patch
        shell: bash
        run: |
          if [ ! -f .agent/native-inventory-api.patch ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "expected: 5fe8da09938d4f462cb4df127cbeed4f72f35276b71558eea82a1a6518a03f21"
            echo "actual:   $(sha256sum .agent/native-inventory-api.patch | cut -d' ' -f1)"
            echo
            echo "git apply --check:"
            git apply --check .agent/native-inventory-api.patch
          } >/tmp/native-inventory-diagnostics.txt 2>&1 || {
            cat /tmp/native-inventory-diagnostics.txt
            exit 1
          }
          echo "5fe8da09938d4f462cb4df127cbeed4f72f35276b71558eea82a1a6518a03f21  .agent/native-inventory-api.patch" | sha256sum --check
          git apply --index .agent/native-inventory-api.patch
          git rm .agent/native-inventory-api.patch .github/workflows/agent-inventory-fix.yml
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Upload inventory diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-inventory-diagnostics-${{ github.sha }}
          path: /tmp/native-inventory-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 1
      - name: Publish verified inventory API patch
        if: steps.patch.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Restore module-owned contract inventory API"
          git push origin "HEAD:${HEAD_BRANCH}"
