name: Phase 6H add PostgreSQL query Database CI gate

on:
  push:
    branches:
      - feature/phase6h-postgres-query-reader-v1
    paths:
      - .github/workflows/phase6h-add-query-database-gate.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-postgres-query-reader-v1
          fetch-depth: 0
      - name: Add permanent PostgreSQL query acceptance step
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/database.yml')
          text = path.read_text()
          needle = '''      - name: Verify multi-record replay optimistic and relationship semantics
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_advanced -- --nocapture 2>&1 | tee database/postgres-advanced.log
'''
          addition = needle + '''      - name: Verify tenant-scoped PostgreSQL keyset query reader
        env:
          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test
          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-core-data --features postgres-integration --test postgres_query -- --nocapture 2>&1 | tee database/postgres-query.log
'''
          if 'Verify tenant-scoped PostgreSQL keyset query reader' in text:
              raise SystemExit(0)
          if needle not in text:
              raise SystemExit('expected postgres_advanced step not found')
          path.write_text(text.replace(needle, addition, 1))
          PY
      - name: Commit Database CI gate
        run: |
          git add .github/workflows/database.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Run PostgreSQL keyset query acceptance in Database CI"
          git push origin HEAD:feature/phase6h-postgres-query-reader-v1
