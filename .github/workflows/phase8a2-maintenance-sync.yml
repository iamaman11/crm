name: Phase 8A.2 Maintenance Sync

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-parties-capability-adapter/**"
      - "crates/crm-parties-query-adapter/**"
      - "services/crm-api/tests/party_process_e2e.rs"
      - ".github/workflows/database.yml"
      - ".github/workflows/phase8a2-maintenance-sync.yml"

permissions:
  contents: write

concurrency:
  group: phase8a2-maintenance-sync-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Patch permanent Party database gate and source maintenance
        run: |
          python - <<'PY'
          from pathlib import Path

          database = Path('.github/workflows/database.yml')
          text = database.read_text()

          party_crate_path = '      - "crates/crm-parties-capability-adapter/**"\n'
          if party_crate_path not in text:
              anchor = '      - "crates/crm-activities-capability-adapter/**"\n'
              if text.count(anchor) != 2:
                  raise SystemExit(f'expected two database crate anchors, got {text.count(anchor)}')
              text = text.replace(
                  anchor,
                  anchor
                  + '      - "crates/crm-parties-capability-adapter/**"\n'
                  + '      - "crates/crm-parties-query-adapter/**"\n',
              )

          party_module_path = '      - "modules/crm-parties/**"\n'
          if party_module_path not in text:
              anchor = '      - "modules/crm-sales/**"\n'
              if text.count(anchor) != 2:
                  raise SystemExit(f'expected two database module anchors, got {text.count(anchor)}')
              text = text.replace(anchor, anchor + party_module_path)

          party_step = '      - name: Verify Party audit evidence omission rollback\n'
          if party_step not in text:
              anchor = '      - name: Verify Sales PostgreSQL mutation planner\n'
              if text.count(anchor) != 1:
                  raise SystemExit(f'expected one Sales planner anchor, got {text.count(anchor)}')
              text = text.replace(
                  anchor,
                  '      - name: Verify Party audit evidence omission rollback\n'
                  '        env:\n'
                  '          DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5432/crm_test\n'
                  '          ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/crm_test\n'
                  '        shell: bash\n'
                  '        run: |\n'
                  '          set -o pipefail\n'
                  '          cargo test -p crm-parties-capability-adapter --features postgres-integration --test postgres_evidence_rollback -- --nocapture 2>&1 | tee database/postgres-party-evidence-rollback.log\n'
                  + anchor,
                  1,
              )

          diagnostics_path = '            crates/crm-parties-capability-adapter/\n'
          if diagnostics_path not in text:
              anchor = '            crates/crm-capability-ingress/\n'
              if text.count(anchor) != 1:
                  raise SystemExit(f'expected one diagnostics anchor, got {text.count(anchor)}')
              text = text.replace(
                  anchor,
                  anchor
                  + '            crates/crm-parties-capability-adapter/\n'
                  + '            crates/crm-parties-query-adapter/\n',
                  1,
              )
          database.write_text(text)

          rollback = Path('crates/crm-parties-capability-adapter/tests/postgres_evidence_rollback.rs')
          text = rollback.read_text().replace('CapabilityCallEnvelope, ', '')
          rollback.write_text(text)

          for source in [
              Path('crates/crm-parties-capability-adapter/src/planner.rs'),
              Path('crates/crm-parties-query-adapter/src/lib.rs'),
              Path('services/crm-api/tests/party_process_e2e.rs'),
          ]:
              text = source.read_text()
              if '.allowed_data_classes' not in text:
                  count = text.count('.data_classes')
                  if count != 1:
                      raise SystemExit(f'expected one data-class field repair in {source}, got {count}')
                  text = text.replace('.data_classes', '.allowed_data_classes', 1)
              source.write_text(text)
          PY

      - name: Format and synchronize generated Rust artifacts
        run: |
          cargo fmt --all
          cargo generate-lockfile

      - name: Compile new Party acceptance binaries
        shell: bash
        run: |
          set -o pipefail
          cargo check -p crm-api --test party_process_e2e 2>&1 | tee phase8a2-party-process-check.log
          cargo check -p crm-parties-capability-adapter --features postgres-integration --test postgres_evidence_rollback 2>&1 | tee phase8a2-party-rollback-check.log

      - name: Upload Party maintenance diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase8a2-maintenance-diagnostics
          path: |
            phase8a2-party-process-check.log
            phase8a2-party-rollback-check.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit synchronized files only
        if: github.event_name == 'push'
        run: |
          git add \
            Cargo.lock \
            .github/workflows/database.yml \
            crates/crm-application-runtime/src \
            crates/crm-parties-capability-adapter \
            crates/crm-parties-query-adapter \
            modules/crm-parties/src \
            services/crm-api/tests/party_process_e2e.rs
          if git diff --cached --quiet; then
            echo "Phase 8A.2 maintenance is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Synchronize Party production acceptance artifacts"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
