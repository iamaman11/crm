name: Phase 8A.2 Party Fixture Sync

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice

permissions:
  contents: write

concurrency:
  group: phase8a2-party-fixture-sync-final
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Make Party PostgreSQL acceptance self-seeding
        run: |
          python - <<'PY'
          from pathlib import Path

          process = Path('services/crm-api/tests/party_process_e2e.rs')
          text = process.read_text()
          old = 'use sqlx::PgPool;'
          new = 'use sqlx::{Executor, PgPool};'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Party process sqlx import changed unexpectedly')
          anchor = '''    let admin = PgPool::connect(&admin_database_url)
              .await
              .expect("connect Party process evidence reader");
          '''
          seed = anchor + '''    admin
              .execute(sqlx::raw_sql(include_str!(
                  "../../../database/tests/0005_party_adapter.sql"
              )))
              .await
              .expect("publish Party module/capability registry fixture");
          '''
          if 'publish Party module/capability registry fixture' not in text:
              if text.count(anchor) != 1:
                  raise SystemExit('Party process admin connection anchor changed')
              text = text.replace(anchor, seed, 1)
          process.write_text(text)

          rollback = Path('crates/crm-parties-capability-adapter/tests/postgres_evidence_rollback.rs')
          text = rollback.read_text()
          old = 'use sqlx::PgPool;'
          new = 'use sqlx::{Executor, PgPool};'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Party rollback sqlx import changed unexpectedly')
          anchor = '''    let admin = PgPool::connect(&admin_database_url)
              .await
              .expect("connect Party rollback evidence reader");
          '''
          seed = anchor + '''    admin
              .execute(sqlx::raw_sql(include_str!(
                  "../../../database/tests/0005_party_adapter.sql"
              )))
              .await
              .expect("publish Party module/capability registry fixture");
          '''
          if 'publish Party module/capability registry fixture' not in text:
              if text.count(anchor) != 1:
                  raise SystemExit('Party rollback admin connection anchor changed')
              text = text.replace(anchor, seed, 1)
          rollback.write_text(text)
          PY

      - name: Format and compile the self-seeding acceptance binaries
        run: |
          cargo fmt --all
          cargo check -p crm-api --test party_process_e2e
          cargo check -p crm-parties-capability-adapter --features postgres-integration --test postgres_evidence_rollback

      - name: Commit acceptance setup and remove this one-shot workflow
        run: |
          git rm .github/workflows/phase8a2-party-fixture-sync.yml
          git add \
            database/tests/0005_party_adapter.sql \
            services/crm-api/tests/party_process_e2e.rs \
            crates/crm-parties-capability-adapter/tests/postgres_evidence_rollback.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Make Party PostgreSQL acceptance self-seeding"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
