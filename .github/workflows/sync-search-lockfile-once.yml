name: Sync search lockfile once

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**/Cargo.toml"
      - ".github/workflows/sync-search-lockfile-once.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate canonical lockfile and remove this workflow
        run: |
          cargo generate-lockfile
          rm .github/workflows/sync-search-lockfile-once.yml
      - name: Commit synchronized lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock .github/workflows/sync-search-lockfile-once.yml
          git commit -m "Synchronize search foundation lockfile"
          git push origin HEAD:develop/phase7-permission-aware-search
