name: Phase 8A.7 Query Sync Once

on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - .github/workflows/phase8a7-query-sync-once.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Synchronize workspace and restore permanent maintenance workflow
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo fmt --all
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          rm .github/workflows/phase8a7-query-sync-once.yml
      - name: Commit synchronized workspace
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(phase8a7): synchronize query adapter workspace"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
