name: Phase 8A.5 Query Router Refactor Once

on:
  pull_request:
    types: [synchronize]
    paths:
      - ".github/workflows/phase8a5-query-router-refactor-once.yml"

permissions:
  contents: write

jobs:
  refactor:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Refactor query router constructor boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          governed = Path("crates/crm-application-runtime/src/governed_metadata.rs")
          text = governed.read_text()
          pattern = re.compile(
              r"#\[derive\(Debug, Clone\)\]\npub struct ApplicationQueryRouter \{.*?\n\}\n\nimpl ApplicationQueryRouter \{.*?\n\}\n",
              re.S,
          )
          replacement = '''#[derive(Debug, Clone)]
pub struct ApplicationQueryAdapters {
    pub parties: PartyQueryAdapter,
    pub accounts: AccountQueryAdapter,
    pub contact_points: ContactPointQueryAdapter,
    pub party_relationships: PartyRelationshipQueryAdapter,
    pub customer_360: Customer360QueryAdapter,
    pub consents: ConsentQueryAdapter,
    pub identity_resolution: IdentityResolutionQueryAdapter,
    pub metadata: MetadataQueryAdapter,
}

#[derive(Debug, Clone)]
pub struct ApplicationQueryRouter {
    production: ProductionQueryRouter,
    adapters: ApplicationQueryAdapters,
}

impl ApplicationQueryRouter {
    pub fn new(
        production: ProductionQueryRouter,
        adapters: ApplicationQueryAdapters,
    ) -> Self {
        Self {
            production,
            adapters,
        }
    }
}
'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one query router block, replaced {count}")
          for field in [
              "metadata", "parties", "accounts", "contact_points",
              "party_relationships", "customer_360", "consents", "identity_resolution",
          ]:
              text = text.replace(f"self.{field}.validate(", f"self.adapters.{field}.validate(")
              text = text.replace(f"self.{field}.execute(", f"self.adapters.{field}.execute(")
          governed.write_text(text)

          runtime = Path("crates/crm-application-runtime/src/runtime.rs")
          text = runtime.read_text()
          if "ApplicationQueryAdapters" not in text:
              text = text.replace(
                  "ApplicationGatewayService, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,",
                  "ApplicationGatewayService, ApplicationQueryAdapters, ApplicationQueryRouter, ContractBoundMutationSemanticValidator,",
                  1,
              )
          call_pattern = re.compile(
              r"let query_router = Arc::new\(ApplicationQueryRouter::new\(\n\s*production_query_router,\n\s*party_query_adapter,\n\s*account_query_adapter,\n\s*contact_point_query_adapter,\n\s*party_relationship_query_adapter,\n\s*customer_360_query_adapter,\n\s*consent_query_adapter,\n\s*identity_resolution_query_adapter,\n\s*metadata_query_adapter,\n\s*\)\);"
          )
          call_replacement = '''let query_router = Arc::new(ApplicationQueryRouter::new(
            production_query_router,
            ApplicationQueryAdapters {
                parties: party_query_adapter,
                accounts: account_query_adapter,
                contact_points: contact_point_query_adapter,
                party_relationships: party_relationship_query_adapter,
                customer_360: customer_360_query_adapter,
                consents: consent_query_adapter,
                identity_resolution: identity_resolution_query_adapter,
                metadata: metadata_query_adapter,
            },
        ));'''
          text, count = call_pattern.subn(call_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one runtime constructor call, replaced {count}")
          runtime.write_text(text)
          PY
      - name: Verify refactor
        run: |
          cargo fmt --all
          cargo clippy -p crm-application-runtime --all-targets --all-features -- -D warnings
          cargo test -p crm-application-runtime --lib
      - name: Remove one-shot workflow and commit
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm .github/workflows/phase8a5-query-router-refactor-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime .github/workflows/phase8a5-query-router-refactor-once.yml
          git commit -m "refactor(runtime): bundle query router adapters"
          git push origin "HEAD:${HEAD_BRANCH}"
