name: Phase 8A.5 Query Router Clippy Fix Once

on:
  push:
    branches:
      - develop/phase8a5-identity-resolution-duplicate-candidates
    paths:
      - ".github/workflows/phase8a5-query-router-clippy-fix-once.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a5-identity-resolution-duplicate-candidates
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply typed query adapter bundle refactor
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/crm-application-runtime/src/governed_metadata.rs")
          text = path.read_text()
          old = '''#[derive(Debug, Clone)]
pub struct ApplicationQueryRouter {
    production: ProductionQueryRouter,
    parties: PartyQueryAdapter,
    accounts: AccountQueryAdapter,
    contact_points: ContactPointQueryAdapter,
    party_relationships: PartyRelationshipQueryAdapter,
    customer_360: Customer360QueryAdapter,
    consents: ConsentQueryAdapter,
    identity_resolution: IdentityResolutionQueryAdapter,
    metadata: MetadataQueryAdapter,
}

impl ApplicationQueryRouter {
    pub fn new(
        production: ProductionQueryRouter,
        parties: PartyQueryAdapter,
        accounts: AccountQueryAdapter,
        contact_points: ContactPointQueryAdapter,
        party_relationships: PartyRelationshipQueryAdapter,
        customer_360: Customer360QueryAdapter,
        consents: ConsentQueryAdapter,
        identity_resolution: IdentityResolutionQueryAdapter,
        metadata: MetadataQueryAdapter,
    ) -> Self {
        Self {
            production,
            parties,
            accounts,
            contact_points,
            party_relationships,
            customer_360,
            consents,
            identity_resolution,
            metadata,
        }
    }
}
'''
          new = '''#[derive(Debug, Clone)]
pub struct ApplicationQueryAdapters {
    pub parties: PartyQueryAdapter,
    pub accounts: AccountQueryAdapter,
    pub contact_points: ContactPointQueryAdapter,
    pub party_relationships: PartyRelationshipQueryAdapter,
    pub customer_360: Customer360QueryAdapter,
    pub consents: ConsentQueryAdapter,
    pub identity_resolution: IdentityResolutionQueryAdapter,
    pub metadata: MetadataQueryAdapter,
}

#[derive(Debug, Clone)]
pub struct ApplicationQueryRouter {
    production: ProductionQueryRouter,
    parties: PartyQueryAdapter,
    accounts: AccountQueryAdapter,
    contact_points: ContactPointQueryAdapter,
    party_relationships: PartyRelationshipQueryAdapter,
    customer_360: Customer360QueryAdapter,
    consents: ConsentQueryAdapter,
    identity_resolution: IdentityResolutionQueryAdapter,
    metadata: MetadataQueryAdapter,
}

impl ApplicationQueryRouter {
    pub fn new(production: ProductionQueryRouter, adapters: ApplicationQueryAdapters) -> Self {
        Self {
            production,
            parties: adapters.parties,
            accounts: adapters.accounts,
            contact_points: adapters.contact_points,
            party_relationships: adapters.party_relationships,
            customer_360: adapters.customer_360,
            consents: adapters.consents,
            identity_resolution: adapters.identity_resolution,
            metadata: adapters.metadata,
        }
    }
}
'''
          if old not in text:
              raise SystemExit("ApplicationQueryRouter constructor anchor not found")
          path.write_text(text.replace(old, new, 1))

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()
          old = '''        let query_router = Arc::new(ApplicationQueryRouter::new(
            production_query_router,
            party_query_adapter,
            account_query_adapter,
            contact_point_query_adapter,
            party_relationship_query_adapter,
            customer_360_query_adapter,
            consent_query_adapter,
            identity_resolution_query_adapter,
            metadata_query_adapter,
        ));
'''
          new = '''        let query_router = Arc::new(ApplicationQueryRouter::new(
            production_query_router,
            ApplicationQueryAdapters {
                parties: party_query_adapter,
                accounts: account_query_adapter,
                contact_points: contact_point_query_adapter,
                party_relationships: party_relationship_query_adapter,
                customer_360: customer_360_query_adapter,
                consents: consent_query_adapter,
                identity_resolution: identity_resolution_query_adapter,
                metadata: metadata_query_adapter,
            },
        ));
'''
          if old not in text:
              raise SystemExit("runtime query router call anchor not found")
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          cargo clippy -p crm-application-runtime --all-targets --all-features -- -D warnings
          cargo test -p crm-application-runtime --lib
      - name: Remove one-shot workflow and commit
        run: |
          rm .github/workflows/phase8a5-query-router-clippy-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime/src/governed_metadata.rs crates/crm-application-runtime/src/runtime.rs .github/workflows/phase8a5-query-router-clippy-fix-once.yml
          git commit -m "Refactor application query router construction"
          git push origin HEAD:develop/phase8a5-identity-resolution-duplicate-candidates
