name: Add Phase 7 process search acceptance once

on:
  pull_request:
    paths:
      - "scripts/add_phase7_process_search_acceptance.py"
      - ".github/workflows/add-phase7-process-search-acceptance-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add governed process-level search acceptance
        run: |
          python scripts/add_phase7_process_search_acceptance.py
          rustfmt --edition 2024 services/crm-api/tests/process_e2e.rs
          rm scripts/add_phase7_process_search_acceptance.py
          rm .github/workflows/add-phase7-process-search-acceptance-once.yml
      - name: Commit acceptance and helper cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prove governed search through production process gateway"
          git push origin HEAD:develop/phase7-permission-aware-search
