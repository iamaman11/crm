name: Sync search foundation v2

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-search-runtime/src/lib.rs"
      - "crates/crm-core-data/tests/postgres_search.rs"
      - "crates/crm-sales-activities-capability-composition/src/lib.rs"
      - ".github/workflows/sync-search-foundation-v2.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply mechanical source wiring
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path("crates/crm-search-runtime/src/lib.rs")
          text = runtime.read_text(encoding="utf-8")
          bad = '''                let next_after = has_more && !filtered.is_empty().then(|| ());
                let next_after = if has_more {
                    filtered.last().map(SearchCandidate::cursor)
                } else {
                    None
                };
                let _ = next_after;
                Ok(SearchCandidatePage {
                    candidates: filtered.clone(),
                    next_after: if has_more {
                        filtered.last().map(SearchCandidate::cursor)
                    } else {
                        None
                    },
                })
'''
          good = '''                let next_after = if has_more {
                    filtered.last().map(SearchCandidate::cursor)
                } else {
                    None
                };
                Ok(SearchCandidatePage {
                    candidates: filtered,
                    next_after,
                })
'''
          if bad in text:
              text = text.replace(bad, good, 1)
          runtime.write_text(text, encoding="utf-8")

          pg_test = Path("crates/crm-core-data/tests/postgres_search.rs")
          text = pg_test.read_text(encoding="utf-8")
          text = text.replace(
              "use crm_module_sdk::{RecordId, RecordType, TenantId};",
              "use crm_module_sdk::{RecordType, TenantId};",
              1,
          )
          pg_test.write_text(text, encoding="utf-8")

          composition = Path("crates/crm-sales-activities-capability-composition/src/lib.rs")
          text = composition.read_text(encoding="utf-8")
          if "mod phase7_search;" not in text:
              text = text.replace(
                  "mod phase6_projections;\n",
                  "mod phase6_projections;\nmod phase7_search;\n",
                  1,
              )
          if "pub use phase7_search::*;" not in text:
              text = text.replace(
                  "pub use phase6_projections::*;\n",
                  "pub use phase6_projections::*;\npub use phase7_search::*;\n",
                  1,
              )
          composition.write_text(text, encoding="utf-8")

          Path(".github/workflows/fix-search-foundation.yml").unlink(missing_ok=True)
          Path(".github/workflows/sync-search-foundation-v2.yml").unlink()
          PY
      - name: Synchronize generated state
        run: |
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit exact generated and wired state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates .github/workflows/fix-search-foundation.yml .github/workflows/sync-search-foundation-v2.yml
          git commit -m "sync and wire search foundation"
          git push origin HEAD:develop/phase7-permission-aware-search
