name: Apply Phase 7 search runtime match semantics once

on:
  pull_request:
    paths:
      - "scripts/align_phase7_search_match_semantics.py"
      - ".github/workflows/apply-phase7-search-match-semantics-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Align runtime and permission-filtered match semantics
        run: |
          python scripts/align_phase7_search_match_semantics.py
          rustfmt --edition 2024 \
            crates/crm-search-runtime/src/lib.rs \
            crates/crm-search-query-adapter/tests/live_permission_revocation.rs
          rm scripts/align_phase7_search_match_semantics.py
          rm .github/workflows/apply-phase7-search-match-semantics-once.yml
      - name: Commit runtime semantic alignment and helper cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make search runtime consume backend match evidence"
          git push origin HEAD:develop/phase7-permission-aware-search
