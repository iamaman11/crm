name: Phase 8A.7 Format Planner Once

# Retrigger after the latest parallel branch update; self-removes after formatting.
on:
  push:
    branches:
      - develop/phase8a7-customer-import-jobs
    paths:
      - .github/workflows/phase8a7-format-planner-once.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a7-customer-import-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format and self-remove
        shell: bash
        run: |
          cargo fmt --all
          rm .github/workflows/phase8a7-format-planner-once.yml
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(phase8a7): format planner and tests"
          git push origin HEAD:develop/phase8a7-customer-import-jobs
