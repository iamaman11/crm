name: Agent Verified Fix

on:
  pull_request:
    paths:
      - ".github/workflows/agent-fix.yml"
      - ".agent/native-composition-clippy-fix.patch"

permissions:
  contents: write

concurrency:
  group: agent-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified fix
        id: fix
        shell: bash
        run: |
          if [ ! -f .agent/native-composition-clippy-fix.patch ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "165b256454391162ca12b51278265e2d51d0c7dd739c9bb2ee8c6e7dba7c4d1e  .agent/native-composition-clippy-fix.patch" | sha256sum --check
          git apply --check .agent/native-composition-clippy-fix.patch
          git apply --index .agent/native-composition-clippy-fix.patch
          git rm .agent/native-composition-clippy-fix.patch .github/workflows/agent-fix.yml
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Publish verified fix
        if: steps.fix.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Fix native composition integration errors"
          git push origin "HEAD:${HEAD_BRANCH}"
