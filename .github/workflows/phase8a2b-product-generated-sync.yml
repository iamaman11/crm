name: Phase 8A.2b Product Generated Sync

on:
  push:
    branches:
      - develop/phase8a2b-party-update-list
    paths:
      - "proto/**"
      - "crates/crm-proto-contracts/**"
      - "packages/client/src/contract_hashes.ts"
      - ".github/workflows/phase8a2b-product-generated-sync.yml"

permissions:
  contents: write

concurrency:
  group: phase8a2b-product-generated-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2b-party-update-list
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Generate browser contract descriptor hashes
        run: |
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Commit generated registry and remove one-shot workflow
        run: |
          git rm .github/workflows/phase8a2b-product-generated-sync.yml
          if git diff --quiet -- packages/client/src/contract_hashes.ts .github/workflows/phase8a2b-product-generated-sync.yml; then
            echo "Generated contract registry is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/client/src/contract_hashes.ts .github/workflows/phase8a2b-product-generated-sync.yml
          git commit -m "Synchronize generated browser contract hashes"
          git push origin HEAD:develop/phase8a2b-party-update-list
