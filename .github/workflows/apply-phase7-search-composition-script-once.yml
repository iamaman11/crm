name: Apply Phase 7 search composition script once

on:
  pull_request:
    paths:
      - "scripts/apply_phase7_search_composition.py"
      - ".github/workflows/apply-phase7-search-composition-script-once.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Validate patch script
        run: python -m py_compile scripts/apply_phase7_search_composition.py
      - name: Apply application composition
        run: |
          python scripts/apply_phase7_search_composition.py
          rustfmt --edition 2024 crates/crm-application-runtime/src/runtime.rs
          rm scripts/apply_phase7_search_composition.py
          rm .github/workflows/apply-phase7-search-composition-script-once.yml
      - name: Commit application composition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime scripts/apply_phase7_search_composition.py .github/workflows/apply-phase7-search-composition-script-once.yml
          git commit -m "Compose governed search in application runtime"
          git pull --rebase origin develop/phase7-permission-aware-search
          git push origin HEAD:develop/phase7-permission-aware-search
