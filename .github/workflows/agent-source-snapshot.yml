name: Agent Worker Bootstrap Apply

on:
  pull_request:
    paths:
      - ".github/workflows/agent-source-snapshot.yml"
      - ".agent/worker-bootstrap.patch.ready"

permissions:
  contents: write

concurrency:
  group: agent-worker-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified worker and bootstrap patch
        id: patch
        shell: bash
        run: |
          if [ ! -f .agent/worker-bootstrap.patch.ready ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat .agent/worker-bootstrap.patch.part.* > /tmp/worker-bootstrap.patch
          {
            echo "expected: $(cut -d' ' -f1 .agent/worker-bootstrap.patch.ready)"
            echo "actual:   $(sha256sum /tmp/worker-bootstrap.patch | cut -d' ' -f1)"
            echo
            echo "git apply --check:"
            git apply --check /tmp/worker-bootstrap.patch
          } >/tmp/worker-bootstrap-diagnostics.txt 2>&1 || {
            cat /tmp/worker-bootstrap-diagnostics.txt
            exit 1
          }
          sha256sum --check .agent/worker-bootstrap.patch.ready
          git apply --index /tmp/worker-bootstrap.patch
          git rm .agent/worker-bootstrap.patch.part.* .agent/worker-bootstrap.patch.ready .github/workflows/agent-source-snapshot.yml
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Upload worker bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-bootstrap-diagnostics-${{ github.sha }}
          path: |
            /tmp/worker-bootstrap-diagnostics.txt
            /tmp/worker-bootstrap.patch
          if-no-files-found: ignore
          retention-days: 1
      - name: Publish worker and bootstrap migration
        if: steps.patch.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Compose background workers and bootstrap visibility declaratively"
          git push origin "HEAD:${HEAD_BRANCH}"
