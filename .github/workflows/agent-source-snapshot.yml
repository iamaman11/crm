name: Agent Source Snapshot

on:
  push:
    branches:
      - agent/native-module-composition
    paths:
      - ".github/workflows/agent-source-snapshot.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "modules/**"
      - "services/**"
      - "database/**"
      - "proto/**"
      - "scripts/**"
      - "tests/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Create source snapshot
        run: |
          tar --exclude=.git -czf /tmp/crm-source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: crm-source-${{ github.sha }}
          path: /tmp/crm-source.tgz
          if-no-files-found: error
          retention-days: 1
