name: Agent Patch Apply

on:
  pull_request:
    paths:
      - ".github/workflows/agent-source-snapshot.yml"
      - ".agent/native-composition.patch.ready"

permissions:
  contents: write

concurrency:
  group: agent-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Prepare staged architecture patch
        id: staged
        shell: bash
        run: |
          if [ ! -f .agent/native-composition.patch.ready ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            echo "No complete staged patch is present."
            exit 0
          fi
          cat .agent/native-composition.patch.part.* > /tmp/native-composition.patch
          {
            echo "expected: $(cut -d' ' -f1 .agent/native-composition.patch.ready)"
            echo "actual:   $(sha256sum /tmp/native-composition.patch | cut -d' ' -f1)"
            echo
            echo "git apply --check:"
            git apply --check /tmp/native-composition.patch
          } >/tmp/native-composition-diagnostics.txt 2>&1 || {
            cat /tmp/native-composition-diagnostics.txt
            exit 1
          }
          sha256sum --check .agent/native-composition.patch.ready
          git apply --index /tmp/native-composition.patch
          git rm .agent/native-composition.patch.part.* .agent/native-composition.patch.ready
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-composition-patch-diagnostics-${{ github.sha }}
          path: /tmp/native-composition-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 1
      - name: Publish staged architecture patch
        if: steps.staged.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Migrate production routes to module contributions"
          git push origin "HEAD:${HEAD_BRANCH}"
