name: Agent Patch Apply

on:
  pull_request:
    paths:
      - ".github/workflows/agent-source-snapshot.yml"
      - ".agent/native-composition.patch.gz.b64"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply staged architecture patch
        shell: bash
        run: |
          test -f .agent/native-composition.patch.gz.b64
          base64 --decode .agent/native-composition.patch.gz.b64 | gzip --decompress > /tmp/native-composition.patch
          git apply --index /tmp/native-composition.patch
          git rm .agent/native-composition.patch.gz.b64
      - name: Publish staged architecture patch
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Migrate production routes to module contributions"
          git push origin "HEAD:${HEAD_BRANCH}"
