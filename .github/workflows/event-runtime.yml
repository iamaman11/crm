name: Event Runtime CI

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-link-contract-adapter/**"
      - "modules/crm-sales-activities-link/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/event-runtime.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/crm-core-data/**"
      - "crates/crm-core-events/**"
      - "crates/crm-capability-adapters/**"
      - "crates/crm-capability-runtime/**"
      - "crates/crm-sales-activities-capability-composition/**"
      - "crates/crm-sales-activities-link-contract-adapter/**"
      - "modules/crm-sales-activities-link/**"
      - "database/migrations/**"
      - "database/tests/**"
      - ".github/workflows/event-runtime.yml"

permissions:
  contents: read

jobs:
  event-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_event_runtime_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_event_runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5434
      PGDATABASE: crm_event_runtime_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5434/crm_event_runtime_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5434/crm_event_runtime_test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply authoritative and rebuildable runtime migrations
        run: |
          psql --set ON_ERROR_STOP=1 --file database/migrations/0001_platform_foundation.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0002_typed_payload_encoding.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0003_relationship_payload_governance.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0004_delete_execution_context.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0005_audited_noop_transactions.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0006_event_delivery_lineage.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0007_consumer_event_delivery_ledger.up.sql
          psql --set ON_ERROR_STOP=1 --file database/migrations/0008_rebuildable_projection_runtime.up.sql
      - name: Seed production runtime fixtures
        run: |
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0003_sales_activities_adapters.sql
          psql --set ON_ERROR_STOP=1 --command "ALTER ROLE crm_app_test LOGIN PASSWORD 'crm_app_test'"
      - name: Verify production Sales to Activities event delivery
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-sales-activities-capability-composition \
            --features postgres-integration \
            --test postgres_link_delivery -- --nocapture \
            2>&1 | tee database/postgres-link-delivery.log
      - name: Verify rebuildable Deal timeline and Task status projections
        shell: bash
        run: |
          set -o pipefail
          cargo test -p crm-sales-activities-capability-composition \
            --features postgres-integration \
            --test postgres_projections -- --nocapture \
            2>&1 | tee database/postgres-projections.log
      - name: Upload event runtime diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: event-runtime-diagnostics
          path: |
            database/postgres-link-delivery.log
            database/postgres-projections.log
            crates/crm-core-data/
            crates/crm-core-events/
            crates/crm-sales-activities-capability-composition/
            modules/crm-sales-activities-link/
          if-no-files-found: error
          retention-days: 7
