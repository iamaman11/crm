name: Temporary Provider HTTP Process Acceptance

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: temporary-provider-http-process-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_customer_enrichment_worker_process_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_customer_enrichment_worker_process_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5442
      PGDATABASE: crm_customer_enrichment_worker_process_test
      PGUSER: postgres
      PGPASSWORD: postgres
      DATABASE_URL: postgres://crm_app_test:crm_app_test@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
      ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5442/crm_customer_enrichment_worker_process_test
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply provider HTTP process acceptance
        run: |
          set -euo pipefail
          python scripts/tmp_apply_provider_http_process_acceptance.py
          python scripts/tmp_adjust_http_process_source.py
          cargo fmt --all
      - name: Reject unexpected patch scope
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess

          allowed = {
              "crates/crm-application-runtime/tests/postgres_customer_enrichment_provider_http_process.rs",
          }
          modified = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
          untracked = set(subprocess.check_output(["git", "ls-files", "--others", "--exclude-standard"], text=True).splitlines())
          changed = modified | untracked
          unexpected = changed - allowed
          missing = allowed - changed
          if unexpected or missing:
              raise SystemExit(f"unexpected={sorted(unexpected)} missing={sorted(missing)}")
          print("provider HTTP process diff:", sorted(changed))
          PY
      - name: Prepare fresh provider HTTP process database
        run: bash scripts/prepare_customer_enrichment_worker_process_database.sh
      - name: Verify exact host HTTP provider process
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p crm-application-runtime \
            --test postgres_customer_enrichment_provider_http_process \
            process::exact_host_http_transport_records_one_canonical_process_outcome \
            -- --exact --nocapture
      - name: Verify production wrappers compile
        run: |
          set -euo pipefail
          cargo check -p crm-application-runtime
          cargo test -p crm-application-runtime --test postgres_customer_enrichment_provider_http_process --no-run
      - name: Strict focused Clippy
        run: |
          set -euo pipefail
          cargo clippy -p crm-application-runtime --all-targets --all-features -- -D warnings
      - name: Commit verified provider HTTP process acceptance
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime/tests/postgres_customer_enrichment_provider_http_process.rs
          git diff --cached --quiet && exit 0
          git commit -m "Prove exact host HTTP provider process"
          git push origin "HEAD:${HEAD_BRANCH}"
