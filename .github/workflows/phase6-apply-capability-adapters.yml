name: Phase 6F recovery publish blob manifest

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6f-recovery-v1
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Build recovered blob manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/phase6_recovery_publish.py")
          source = path.read_text()
          source = source.replace(
              '["git", "status", "--porcelain=v1", "-z"]',
              '["git", "status", "--porcelain=v1", "-z", "--untracked-files=all"]',
          )
          prefix = source.split("    tree_sha = run_json(", 1)[0]
          replacement = (
              '    manifest = json.dumps({"base_sha": base_sha, "base_tree": base_tree, "entries": entries}, separators=(",", ":"))\n'
              '    body = "Phase 6F recovered blob manifest:\\n\\n```json\\n" + manifest + "\\n```"\n'
              '    subprocess.run(["gh", "pr", "comment", PR_NUMBER, "--repo", REPO, "--body", body], check=True)\n'
              '    print(f"MATERIALIZED_FILES={len(entries)}")\n'
              '    print(manifest)\n'
              '\n\nif __name__ == "__main__":\n'
              '    main()\n'
          )
          path.write_text(prefix + replacement)
          PY
          set +e
          python scripts/phase6_recovery_publish.py > /tmp/phase6-recovery.log 2>&1
          status=$?
          set -e
          cat /tmp/phase6-recovery.log
          if [ "$status" -ne 0 ]; then
            {
              echo 'Phase 6F blob publisher failed:'
              echo
              echo '```text'
              tail -n 80 /tmp/phase6-recovery.log
              echo '```'
            } > /tmp/phase6-comment.md
            gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase6-comment.md
            exit "$status"
          fi
