name: Phase 6 apply capability adapters

on:
  push:
    branches:
      - feature/sales-activities-capability-adapters-v1
    paths:
      - .github/workflows/phase6-apply-capability-adapters.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/sales-activities-capability-adapters-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply reviewed implementation
        run: |
          python scripts/phase6_payload_1.py
          python scripts/phase6_payload_2.py
          python scripts/phase6_payload_3.py
          python scripts/phase6_payload_4.py
      - name: Resolve, format and verify
        run: |
          cargo generate-lockfile
          cargo fmt --all
          python scripts/check_architecture.py
          cargo test --workspace
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Commit implementation and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/phase6-apply-capability-adapters.yml \
            scripts/phase6_payload_1.py \
            scripts/phase6_payload_2.py \
            scripts/phase6_payload_3.py \
            scripts/phase6_payload_4.py
          git add .
          git diff --cached --check
          git commit -m "feat: add Sales and Activities capability adapters"
          git push origin HEAD:feature/sales-activities-capability-adapters-v1
