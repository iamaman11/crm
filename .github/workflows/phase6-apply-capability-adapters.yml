name: Phase 6F recovery build Git commit

on:
  push:
    branches:
      - feature/phase6f-recovery-v1
    paths:
      - .github/workflows/phase6-apply-capability-adapters.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Clone recovery branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo clone "$GITHUB_REPOSITORY" repo -- --quiet --branch feature/phase6f-recovery-v1 --depth 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Materialize complete recovered source tree
        working-directory: repo
        run: |
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib

          corrupt_path = "crates/crm-core-data/tests/postgres_advanced/support.rs"
          for script_path in [
              "scripts/phase6_payload_1.py",
              "scripts/phase6_payload_2.py",
              "scripts/phase6_payload_3.py",
              "scripts/phase6_payload_4.py",
          ]:
              module = ast.parse(Path(script_path).read_text())
              assignment = next(
                  node for node in module.body
                  if isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "FILES" for target in node.targets)
              )
              for path, encoded in ast.literal_eval(assignment.value).items():
                  if path == corrupt_path:
                      continue
                  target = Path(path)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(zlib.decompress(base64.b64decode(encoded)))

          appendix_b64 = ""
          support = Path(corrupt_path)
          support.write_text(
              support.read_text().rstrip()
              + base64.b64decode(appendix_b64).decode()
          )
          PY
          cargo generate-lockfile >/tmp/cargo-lock.log 2>&1
          cargo fmt --all >/tmp/cargo-fmt.log 2>&1
      - name: Create unattached Git commit and report SHA
        working-directory: repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess

          repo = os.environ["GITHUB_REPOSITORY"]
          base_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          base_tree = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/git/commits/{base_sha}", "--jq", ".tree.sha"],
              text=True,
          ).strip()
          status = subprocess.check_output(
              ["git", "status", "--porcelain=v1", "-z"],
          ).decode().split("\0")
          entries = []
          for item in status:
              if not item:
                  continue
              path = item[3:]
              if path == ".github/workflows/phase6-apply-capability-adapters.yml" or path.startswith("scripts/phase6_payload_"):
                  continue
              content = Path(path).read_text()
              blob_payload = json.dumps({"content": content, "encoding": "utf-8"}).encode()
              blob = subprocess.run(
                  ["gh", "api", f"repos/{repo}/git/blobs", "--input", "-", "--jq", ".sha"],
                  input=blob_payload,
                  stdout=subprocess.PIPE,
                  check=True,
              ).stdout.decode().strip()
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": blob})
          tree_payload = json.dumps({"base_tree": base_tree, "tree": entries}).encode()
          tree_sha = subprocess.run(
              ["gh", "api", f"repos/{repo}/git/trees", "--input", "-", "--jq", ".sha"],
              input=tree_payload,
              stdout=subprocess.PIPE,
              check=True,
          ).stdout.decode().strip()
          commit_payload = json.dumps({
              "message": "feat: materialize recovered Phase 6F capability implementation",
              "tree": tree_sha,
              "parents": [base_sha],
          }).encode()
          commit_sha = subprocess.run(
              ["gh", "api", f"repos/{repo}/git/commits", "--input", "-", "--jq", ".sha"],
              input=commit_payload,
              stdout=subprocess.PIPE,
              check=True,
          ).stdout.decode().strip()
          body = f"Phase 6F recovery object built.\n\nMATERIALIZED_FILES={len(entries)}\nMATERIALIZED_COMMIT_SHA={commit_sha}"
          subprocess.run(
              ["gh", "pr", "comment", "37", "--repo", repo, "--body", body],
              check=True,
          )
          print(body)
          PY
