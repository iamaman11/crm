name: Phase 6F recovery publish materialized commit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6f-recovery-v1
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Build recovered Git commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/phase6_recovery_publish.py")
          source = path.read_text()
          source = source.replace(
              '["git", "status", "--porcelain=v1", "-z"]',
              '["git", "status", "--porcelain=v1", "-z", "--untracked-files=all"]',
          )
          path.write_text(source)
          PY
          set +e
          python scripts/phase6_recovery_publish.py > /tmp/phase6-recovery.log 2>&1
          status=$?
          set -e
          cat /tmp/phase6-recovery.log
          if [ "$status" -ne 0 ]; then
            {
              echo 'Phase 6F recovery publisher failed:'
              echo
              echo '```text'
              tail -n 80 /tmp/phase6-recovery.log
              echo '```'
            } > /tmp/phase6-comment.md
            gh pr comment 37 --repo "$GITHUB_REPOSITORY" --body-file /tmp/phase6-comment.md
            exit "$status"
          fi
