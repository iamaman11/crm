name: Phase 6F recovery materialize valid payloads

on:
  push:
    branches:
      - feature/phase6f-recovery-v1
    paths:
      - .github/workflows/phase6-apply-capability-adapters.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6f-recovery-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Materialize every valid payload entry
        run: |
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib

          corrupt_path = "crates/crm-core-data/tests/postgres_advanced/support.rs"
          for script_path in [
              "scripts/phase6_payload_1.py",
              "scripts/phase6_payload_2.py",
              "scripts/phase6_payload_3.py",
              "scripts/phase6_payload_4.py",
          ]:
              module = ast.parse(Path(script_path).read_text())
              assignment = next(
                  node for node in module.body
                  if isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "FILES" for target in node.targets)
              )
              files = ast.literal_eval(assignment.value)
              for path, encoded in files.items():
                  if path == corrupt_path:
                      print(f"SKIP corrupt entry {path}")
                      continue
                  target = Path(path)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(zlib.decompress(base64.b64decode(encoded)))
                  print(f"WROTE {path}")
          PY
          cargo generate-lockfile
          cargo fmt --all
      - name: Commit materialized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- \
            .github/workflows/phase6-apply-capability-adapters.yml \
            scripts/phase6_payload_1.py \
            scripts/phase6_payload_2.py \
            scripts/phase6_payload_3.py \
            scripts/phase6_payload_4.py
          git diff --cached --check
          git commit -m "feat: materialize valid Phase 6F capability sources"
          git push origin HEAD:feature/phase6f-recovery-v1
