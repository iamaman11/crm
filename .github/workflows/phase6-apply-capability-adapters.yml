name: Phase 6F recovery publish materialized commit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6f-recovery-v1
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Build recovered Git commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/phase6_recovery_publish.py
