name: Phase 6F recovery commit valid payloads

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone recovery branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo clone "$GITHUB_REPOSITORY" repo -- --quiet --branch feature/phase6f-recovery-v1 --depth 1
      - name: Materialize and publish valid non-workflow entries
        working-directory: repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib

          skipped = {
              ".github/workflows/database.yml",
              "crates/crm-core-data/tests/postgres_advanced/support.rs",
          }
          for script_path in [
              "scripts/phase6_payload_1.py",
              "scripts/phase6_payload_2.py",
              "scripts/phase6_payload_3.py",
              "scripts/phase6_payload_4.py",
          ]:
              module = ast.parse(Path(script_path).read_text())
              assignment = next(
                  node for node in module.body
                  if isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "FILES" for target in node.targets)
              )
              for path, encoded in ast.literal_eval(assignment.value).items():
                  if path in skipped:
                      continue
                  target = Path(path)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(zlib.decompress(base64.b64decode(encoded)))
          PY
          cargo generate-lockfile >/tmp/cargo-lock.log 2>&1
          cargo fmt --all >/tmp/cargo-fmt.log 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- \
            .github/workflows/phase6-apply-capability-adapters.yml \
            .github/workflows/database.yml \
            scripts/phase6_payload_1.py \
            scripts/phase6_payload_2.py \
            scripts/phase6_payload_3.py \
            scripts/phase6_payload_4.py
          git status --short
          git commit -m "feat: materialize valid Phase 6F capability sources"
          git push origin HEAD:feature/phase6f-recovery-v1
