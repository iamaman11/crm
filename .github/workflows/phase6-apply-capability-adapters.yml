name: Phase 6F recovery diagnose payloads

on:
  push:
    branches:
      - feature/phase6f-recovery-v1
    paths:
      - .github/workflows/phase6-apply-capability-adapters.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch branch source quietly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/feature/phase6f-recovery-v1" \
            | tar --extract --gzip --strip-components=1
      - name: Apply payloads with concise diagnostics
        run: |
          set -euxo pipefail
          for payload in \
            scripts/phase6_payload_1.py \
            scripts/phase6_payload_2.py \
            scripts/phase6_payload_3.py \
            scripts/phase6_payload_4.py
          do
            echo ">>> ${payload}"
            python "${payload}"
          done
          echo "All payloads applied successfully"
