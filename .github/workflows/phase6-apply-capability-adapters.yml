name: Phase 6F recovery diagnose payload 2

on:
  push:
    branches:
      - feature/phase6f-recovery-v1
    paths:
      - .github/workflows/phase6-apply-capability-adapters.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch branch source quietly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/feature/phase6f-recovery-v1" \
            | tar --extract --gzip --strip-components=1
      - name: Locate corrupt payload entry
        run: |
          set -euxo pipefail
          python scripts/phase6_payload_1.py
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib

          source = Path("scripts/phase6_payload_2.py").read_text()
          module = ast.parse(source)
          assignment = next(
              node for node in module.body
              if isinstance(node, ast.Assign)
              and any(isinstance(target, ast.Name) and target.id == "FILES" for target in node.targets)
          )
          files = ast.literal_eval(assignment.value)
          failed = False
          for path, encoded in files.items():
              try:
                  decoded = base64.b64decode(encoded, validate=True)
                  data = zlib.decompress(decoded)
                  print(f"OK {path} compressed={len(decoded)} uncompressed={len(data)}")
              except Exception as error:
                  failed = True
                  print(f"CORRUPT {path}: {error!r}")
          if failed:
              raise SystemExit(1)
          PY
