name: Phase 6F recovery export materialized sources

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone recovery branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo clone "$GITHUB_REPOSITORY" repo -- --quiet --branch feature/phase6f-recovery-v1 --depth 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Materialize valid payload entries
        working-directory: repo
        run: |
          python - <<'PY'
          import ast
          import base64
          from pathlib import Path
          import zlib

          skipped = {
              ".github/workflows/database.yml",
              "crates/crm-core-data/tests/postgres_advanced/support.rs",
          }
          for script_path in [
              "scripts/phase6_payload_1.py",
              "scripts/phase6_payload_2.py",
              "scripts/phase6_payload_3.py",
              "scripts/phase6_payload_4.py",
          ]:
              module = ast.parse(Path(script_path).read_text())
              assignment = next(
                  node for node in module.body
                  if isinstance(node, ast.Assign)
                  and any(isinstance(target, ast.Name) and target.id == "FILES" for target in node.targets)
              )
              for path, encoded in ast.literal_eval(assignment.value).items():
                  if path in skipped:
                      continue
                  target = Path(path)
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(zlib.decompress(base64.b64decode(encoded)))
          PY
          cargo generate-lockfile
          cargo fmt --all
          git add -A
          git reset -- \
            .github/workflows/phase6-apply-capability-adapters.yml \
            .github/workflows/database.yml \
            scripts/phase6_payload_1.py \
            scripts/phase6_payload_2.py \
            scripts/phase6_payload_3.py \
            scripts/phase6_payload_4.py
          git diff --cached --binary > ../phase6-materialized.patch
          tar --create --gzip --file ../phase6-materialized-tree.tar.gz \
            --exclude=.git \
            --exclude=.github/workflows/phase6-apply-capability-adapters.yml \
            --exclude=.github/workflows/database.yml \
            --exclude=scripts/phase6_payload_1.py \
            --exclude=scripts/phase6_payload_2.py \
            --exclude=scripts/phase6_payload_3.py \
            --exclude=scripts/phase6_payload_4.py \
            .
          test -s ../phase6-materialized.patch
      - uses: actions/upload-artifact@v4
        with:
          name: phase6-materialized-sources
          path: |
            phase6-materialized.patch
            phase6-materialized-tree.tar.gz
          if-no-files-found: error
          retention-days: 7
