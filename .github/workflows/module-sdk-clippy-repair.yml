name: One-shot Module SDK Clippy repair

on:
  push:
    branches:
      - feature/module-sdk-v1
    paths:
      - .github/workflows/module-sdk-clippy-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/module-sdk-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact Clippy repairs
        run: |
          python - <<'PY'
          from pathlib import Path

          lib = Path("crates/crm-module-sdk/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          text = text.replace(
              "use ports::{\n    CapabilityClient, Clock, EventPublisher, FileClient, ModuleStateStore, ObservabilityContext,\n    RandomSource, RecordClient, RelationshipClient, WorkflowClient,\n};\n",
              "",
          )
          lib.write_text(text, encoding="utf-8")

          types = Path("crates/crm-module-sdk/src/types.rs")
          text = types.read_text(encoding="utf-8")
          text = text.replace(
              "    fn identifier_deserialization_rejects_empty_values() {\n        let error = serde_json::from_str::<TenantId>(\"\\\"\\\"\").expect_err(\"empty id must fail\");\n        assert!(error.to_string().contains(\"must not be empty\"));\n    }",
              "    fn identifier_constructor_rejects_empty_values() {\n        let error = TenantId::try_new(\"\").expect_err(\"empty id must fail\");\n        assert!(error.to_string().contains(\"must not be empty\"));\n    }",
          )
          types.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          git diff --check
      - name: Commit repairs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-module-sdk/src
          if git diff --cached --quiet; then
            echo "No repair changes required"
          else
            git commit -m "fix: resolve module SDK Clippy findings"
            git push origin HEAD:feature/module-sdk-v1
          fi
