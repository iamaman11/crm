name: Phase 8A.2 Personal Data Contract Sync

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice

permissions:
  contents: write

concurrency:
  group: phase8a2-personal-data-sync
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Generalize shared payload helpers without changing existing defaults
        run: |
          python - <<'PY'
          from pathlib import Path

          support = Path('crates/crm-capability-plan-support/src/lib.rs')
          text = support.read_text()

          old = '''pub fn persisted_json_payload(
              contract: PersistedPayloadContract<'_>,
              bytes: Vec<u8>,
          ) -> Result<TypedPayload, SdkError> {
              if bytes.len() as u64 > contract.maximum_size_bytes {
                  return Err(stored_data_error("PERSISTED_AGGREGATE_TOO_LARGE"));
              }
              let payload = TypedPayload {
                  owner: configured_identifier(ModuleId::try_new(contract.owner))?,
                  schema_id: configured_identifier(SchemaId::try_new(contract.schema_id))?,
                  schema_version: configured_identifier(SchemaVersion::try_new(contract.schema_version))?,
                  descriptor_hash: contract.descriptor_hash,
                  data_class: DataClass::Confidential,
                  encoding: PayloadEncoding::Json,
                  maximum_size_bytes: contract.maximum_size_bytes,
                  retention_policy_id: configured_identifier(RetentionPolicyId::try_new(
                      contract.retention_policy_id,
                  ))?,
                  bytes,
              };
              payload.validate()?;
              Ok(payload)
          }

          pub fn persisted_json_bytes<'a>(
              snapshot: &'a RecordSnapshot,
              contract: PersistedPayloadContract<'_>,
          ) -> Result<&'a [u8], SdkError> {
              let payload = &snapshot.payload;
              if payload.owner.as_str() != contract.owner
                  || payload.schema_id.as_str() != contract.schema_id
                  || payload.schema_version.as_str() != contract.schema_version
                  || payload.descriptor_hash != contract.descriptor_hash
                  || payload.data_class != DataClass::Confidential
                  || payload.encoding != PayloadEncoding::Json
                  || payload.maximum_size_bytes != contract.maximum_size_bytes
                  || payload.retention_policy_id.as_str() != contract.retention_policy_id
                  || payload.validate().is_err()
              {
                  return Err(stored_data_error("PERSISTED_AGGREGATE_CONTRACT_INVALID"));
              }
              Ok(payload.bytes.as_slice())
          }
          '''
          new = '''pub fn persisted_json_payload(
              contract: PersistedPayloadContract<'_>,
              bytes: Vec<u8>,
          ) -> Result<TypedPayload, SdkError> {
              persisted_json_payload_with_data_class(contract, DataClass::Confidential, bytes)
          }

          pub fn persisted_json_payload_with_data_class(
              contract: PersistedPayloadContract<'_>,
              data_class: DataClass,
              bytes: Vec<u8>,
          ) -> Result<TypedPayload, SdkError> {
              if bytes.len() as u64 > contract.maximum_size_bytes {
                  return Err(stored_data_error("PERSISTED_AGGREGATE_TOO_LARGE"));
              }
              let payload = TypedPayload {
                  owner: configured_identifier(ModuleId::try_new(contract.owner))?,
                  schema_id: configured_identifier(SchemaId::try_new(contract.schema_id))?,
                  schema_version: configured_identifier(SchemaVersion::try_new(contract.schema_version))?,
                  descriptor_hash: contract.descriptor_hash,
                  data_class,
                  encoding: PayloadEncoding::Json,
                  maximum_size_bytes: contract.maximum_size_bytes,
                  retention_policy_id: configured_identifier(RetentionPolicyId::try_new(
                      contract.retention_policy_id,
                  ))?,
                  bytes,
              };
              payload.validate()?;
              Ok(payload)
          }

          pub fn persisted_json_bytes<'a>(
              snapshot: &'a RecordSnapshot,
              contract: PersistedPayloadContract<'_>,
          ) -> Result<&'a [u8], SdkError> {
              persisted_json_bytes_with_data_class(snapshot, contract, DataClass::Confidential)
          }

          pub fn persisted_json_bytes_with_data_class<'a>(
              snapshot: &'a RecordSnapshot,
              contract: PersistedPayloadContract<'_>,
              data_class: DataClass,
          ) -> Result<&'a [u8], SdkError> {
              let payload = &snapshot.payload;
              if payload.owner.as_str() != contract.owner
                  || payload.schema_id.as_str() != contract.schema_id
                  || payload.schema_version.as_str() != contract.schema_version
                  || payload.descriptor_hash != contract.descriptor_hash
                  || payload.data_class != data_class
                  || payload.encoding != PayloadEncoding::Json
                  || payload.maximum_size_bytes != contract.maximum_size_bytes
                  || payload.retention_policy_id.as_str() != contract.retention_policy_id
                  || payload.validate().is_err()
              {
                  return Err(stored_data_error("PERSISTED_AGGREGATE_CONTRACT_INVALID"));
              }
              Ok(payload.bytes.as_slice())
          }
          '''
          if text.count(old) != 1:
              raise SystemExit('persisted payload helper block changed')
          text = text.replace(old, new, 1)

          old = '''pub fn decode_request<M: Message + Default>(
              request: &CapabilityRequest,
              owner: &str,
              schema_id: &str,
          ) -> Result<M, SdkError> {
              let payload = &request.input;
              if payload.owner.as_str() != owner
                  || payload.schema_id.as_str() != schema_id
                  || payload.schema_version.as_str() != CONTRACT_VERSION
                  || payload.descriptor_hash != message_descriptor_hash(schema_id)
                  || payload.data_class != DataClass::Confidential
                  || payload.encoding != PayloadEncoding::Protobuf
                  || payload.maximum_size_bytes > MAX_PROTOBUF_BYTES
                  || payload.validate().is_err()
              {
                  return Err(SdkError::new(
                      "CAPABILITY_INPUT_CONTRACT_MISMATCH",
                      ErrorCategory::InvalidArgument,
                      false,
                      "The capability input does not match the required contract.",
                  ));
              }
              M::decode(payload.bytes.as_slice()).map_err(|_| {
                  SdkError::new(
                      "CAPABILITY_INPUT_PROTOBUF_INVALID",
                      ErrorCategory::InvalidArgument,
                      false,
                      "The capability input is not valid Protobuf.",
                  )
              })
          }
          '''
          new = '''pub fn decode_request<M: Message + Default>(
              request: &CapabilityRequest,
              owner: &str,
              schema_id: &str,
          ) -> Result<M, SdkError> {
              decode_request_with_data_class(request, owner, schema_id, DataClass::Confidential)
          }

          pub fn decode_request_with_data_class<M: Message + Default>(
              request: &CapabilityRequest,
              owner: &str,
              schema_id: &str,
              data_class: DataClass,
          ) -> Result<M, SdkError> {
              let payload = &request.input;
              if payload.owner.as_str() != owner
                  || payload.schema_id.as_str() != schema_id
                  || payload.schema_version.as_str() != CONTRACT_VERSION
                  || payload.descriptor_hash != message_descriptor_hash(schema_id)
                  || payload.data_class != data_class
                  || payload.encoding != PayloadEncoding::Protobuf
                  || payload.maximum_size_bytes > MAX_PROTOBUF_BYTES
                  || payload.validate().is_err()
              {
                  return Err(SdkError::new(
                      "CAPABILITY_INPUT_CONTRACT_MISMATCH",
                      ErrorCategory::InvalidArgument,
                      false,
                      "The capability input does not match the required contract.",
                  ));
              }
              M::decode(payload.bytes.as_slice()).map_err(|_| {
                  SdkError::new(
                      "CAPABILITY_INPUT_PROTOBUF_INVALID",
                      ErrorCategory::InvalidArgument,
                      false,
                      "The capability input is not valid Protobuf.",
                  )
              })
          }
          '''
          if text.count(old) != 1:
              raise SystemExit('decode request helper block changed')
          text = text.replace(old, new, 1)

          old = '''pub fn event_evidence<M: Message>(
              request: &CapabilityRequest,
              aggregate: RecordRef,
              owner: &str,
              spec: EventSpec<'_>,
              message: &M,
          ) -> Result<EventEvidence, SdkError> {
              let event_id = stable_evidence_id("event", request, &aggregate, spec.aggregate_version);
              Ok(EventEvidence {
                  event_id: event_id.clone(),
                  event: DomainEvent {
                      event_type: configured_identifier(EventType::try_new(spec.event_type))?,
                      aggregate,
                      expected_aggregate_version: spec.previous_version,
                      deduplication_key: event_id,
                      payload: protobuf_payload(
                          owner,
                          spec.event_schema_id,
                          DataClass::Confidential,
                          message,
                      )?,
                  },
                  aggregate_version: spec.aggregate_version,
                  event_sequence: spec.aggregate_version,
                  occurred_at_unix_nanos: request.context.execution.request_started_at_unix_nanos,
              })
          }
          '''
          new = '''pub fn event_evidence<M: Message>(
              request: &CapabilityRequest,
              aggregate: RecordRef,
              owner: &str,
              spec: EventSpec<'_>,
              message: &M,
          ) -> Result<EventEvidence, SdkError> {
              event_evidence_with_data_class(
                  request,
                  aggregate,
                  owner,
                  spec,
                  DataClass::Confidential,
                  message,
              )
          }

          pub fn event_evidence_with_data_class<M: Message>(
              request: &CapabilityRequest,
              aggregate: RecordRef,
              owner: &str,
              spec: EventSpec<'_>,
              data_class: DataClass,
              message: &M,
          ) -> Result<EventEvidence, SdkError> {
              let event_id = stable_evidence_id("event", request, &aggregate, spec.aggregate_version);
              Ok(EventEvidence {
                  event_id: event_id.clone(),
                  event: DomainEvent {
                      event_type: configured_identifier(EventType::try_new(spec.event_type))?,
                      aggregate,
                      expected_aggregate_version: spec.previous_version,
                      deduplication_key: event_id,
                      payload: protobuf_payload(owner, spec.event_schema_id, data_class, message)?,
                  },
                  aggregate_version: spec.aggregate_version,
                  event_sequence: spec.aggregate_version,
                  occurred_at_unix_nanos: request.context.execution.request_started_at_unix_nanos,
              })
          }
          '''
          if text.count(old) != 1:
              raise SystemExit('event helper block changed')
          text = text.replace(old, new, 1)
          support.write_text(text)

          planner = Path('crates/crm-parties-capability-adapter/src/planner.rs')
          text = planner.read_text()
          text = text.replace(
              'support::decode_request(request, MODULE_ID, CREATE_REQUEST_SCHEMA)?',
              'support::decode_request_with_data_class(\n            request,\n            MODULE_ID,\n            CREATE_REQUEST_SCHEMA,\n            DataClass::Personal,\n        )?',
          )
          text = text.replace(
              'let event = support::event_evidence(',
              'let event = support::event_evidence_with_data_class(',
          )
          text = text.replace(
              '            &wire::PartyCreatedEvent {',
              '            DataClass::Personal,\n            &wire::PartyCreatedEvent {',
              1,
          )
          text = text.replace(
              'support::persisted_json_payload(persisted_contract(), encode_party_state(party)?)',
              'support::persisted_json_payload_with_data_class(\n        persisted_contract(),\n        DataClass::Personal,\n        encode_party_state(party)?,\n    )',
          )
          planner.write_text(text)

          query = Path('crates/crm-parties-query-adapter/src/lib.rs')
          text = query.read_text().replace(
              'support::persisted_json_bytes(&snapshot, contract)?',
              'support::persisted_json_bytes_with_data_class(\n                &snapshot,\n                contract,\n                DataClass::Personal,\n            )?',
          )
          query.write_text(text)
          PY

      - name: Format and verify the focused Party adapter surface
        run: |
          cargo fmt --all
          cargo test -p crm-parties-capability-adapter --lib
          cargo test -p crm-parties-query-adapter --lib

      - name: Commit shared data-class support and Party adoption
        run: |
          git add \
            crates/crm-capability-plan-support/src/lib.rs \
            crates/crm-parties-capability-adapter/src/planner.rs \
            crates/crm-parties-query-adapter/src/lib.rs
          if git diff --cached --quiet; then
            echo "Personal data helpers are already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Generalize governed payload data-class helpers"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
