name: Phase 7G Sync

on:
  push:
    branches:
      - develop/phase7-governed-metadata-api
    paths:
      - ".github/workflows/phase7g-sync.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-governed-metadata-api
      - uses: dtolnay/rust-toolchain@stable
      # Refresh after acceptance-only dev dependencies were added.
      - run: cargo generate-lockfile
      - run: cargo fmt --all
      - name: Commit generated sync
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates
          git commit -m "Phase 7G: sync lockfile and formatting"
          git push origin HEAD:develop/phase7-governed-metadata-api
