name: Phase 6 Protobuf runtime normalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/protobuf-rust-contract-runtime-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Normalize and verify generated contracts
        run: |
          cargo generate-lockfile
          cargo fmt --all
          cargo test -p crm-proto-contracts
          cargo clippy -p crm-proto-contracts --all-targets --all-features -- -D warnings
          cargo test --workspace
      - name: Commit exact lockfile and formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates/crm-proto-contracts
          git diff --cached --check
          git commit -m "chore: normalize generated Protobuf runtime"
          git push origin HEAD:feature/protobuf-rust-contract-runtime-v1
