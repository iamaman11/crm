name: Phase 8A.8 One-shot Rustfmt

on:
  push:
    branches:
      - develop/phase8a8-customer-export-jobs

permissions:
  contents: write

jobs:
  format-and-self-delete:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a8-customer-export-jobs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Format Rust and remove one-shot workflow
        run: |
          cargo fmt --all
          rm .github/workflows/phase8a8-one-shot-rustfmt.yml
      - name: Commit synchronized formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Synchronize Phase 8A.8 Rust formatting"
          git push origin HEAD:develop/phase8a8-customer-export-jobs
