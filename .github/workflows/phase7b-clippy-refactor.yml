name: Phase 7B Clippy Refactor

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/phase7b-clippy-refactor.yml"

permissions:
  contents: write

jobs:
  refactor:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Refactor bootstrap visibility resource coordinate
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("crates/crm-application-runtime/src/runtime.rs")
          text = path.read_text()

          marker = "fn bootstrap_application_access(\n"
          resource_type = """#[derive(Clone, Copy)]
          struct BootstrapVisibilityResource<'a> {
              owner_module_id: &'a str,
              resource_type: &'a str,
          }

          """
          if "struct BootstrapVisibilityResource<'a>" not in text:
              if marker not in text:
                  raise SystemExit("bootstrap_application_access marker not found")
              text = text.replace(marker, resource_type + marker, 1)

          def replace_coordinate(module_id: str, record_type: str, expected: int) -> None:
              nonlocal_text = replace_coordinate.text
              pattern = re.compile(
                  rf'(?m)^(?P<indent>\s*)"{re.escape(module_id)}",\n(?P=indent){re.escape(record_type)},'
              )

              def replacement(match: re.Match[str]) -> str:
                  indent = match.group("indent")
                  return (
                      f"{indent}BootstrapVisibilityResource {{\n"
                      f"{indent}    owner_module_id: \"{module_id}\",\n"
                      f"{indent}    resource_type: {record_type},\n"
                      f"{indent}}},"
                  )

              updated, count = pattern.subn(replacement, nonlocal_text)
              if count != expected:
                  raise SystemExit(
                      f"expected {expected} {module_id}/{record_type} coordinates, found {count}"
                  )
              replace_coordinate.text = updated

          replace_coordinate.text = text
          replace_coordinate("crm.sales", "SALES_RECORD_TYPE", 2)
          replace_coordinate("crm.activities", "ACTIVITIES_RECORD_TYPE", 2)
          text = replace_coordinate.text

          old_signature = """    owner_module_id: &str,
              resource_type: &str,
          """
          new_signature = """    resource: BootstrapVisibilityResource<'_>,
          """
          if old_signature not in text:
              raise SystemExit("bootstrap visibility signature not found")
          text = text.replace(old_signature, new_signature, 1)

          old_owner = "ModuleId::try_new(owner_module_id)"
          old_record = "RecordType::try_new(resource_type)"
          if old_owner not in text or old_record not in text:
              raise SystemExit("bootstrap visibility resource conversion not found")
          text = text.replace(old_owner, "ModuleId::try_new(resource.owner_module_id)", 1)
          text = text.replace(old_record, "RecordType::try_new(resource.resource_type)", 1)

          path.write_text(text)

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format refactor
        run: cargo fmt --all

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime/src/runtime.rs
          git diff --cached --quiet || git commit -m "fix(runtime): refactor bootstrap visibility resource"
          git push
