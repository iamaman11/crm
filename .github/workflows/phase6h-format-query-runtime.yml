name: Phase 6H format query runtime

on:
  push:
    branches:
      - feature/phase6h-permission-bound-queries-v1
    paths:
      - .github/workflows/phase6h-format-query-runtime.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-permission-bound-queries-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all
      - name: Commit query runtime formatting only
        run: |
          git add crates/crm-query-runtime/src/lib.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Format Phase 6H query runtime"
          git push origin HEAD:feature/phase6h-permission-bound-queries-v1
