name: Apply search application composition v2

on:
  pull_request:
    paths:
      - ".github/workflows/apply-search-application-composition-v2.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase7-permission-aware-search'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-permission-aware-search
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply deterministic application-runtime composition patch
        run: |
          python - <<'PY'
          from pathlib import Path

          cargo = Path('crates/crm-application-runtime/Cargo.toml')
          text = cargo.read_text()
          needle = 'crm-sales-activities-query-adapter = { path = "../crm-sales-activities-query-adapter" }\n'
          replacement = needle + 'crm-search-query-adapter = { path = "../crm-search-query-adapter" }\ncrm-search-runtime = { path = "../crm-search-runtime" }\n'
          assert text.count(needle) == 1
          cargo.write_text(text.replace(needle, replacement))

          path = Path('crates/crm-application-runtime/src/runtime.rs')
          text = path.read_text()

          old = '''use crm_sales_activities_capability_composition::{
              DEAL_TIMELINE_PROJECTION_ID, Phase6ProjectionWorker, SalesActivitiesCapabilityPlannerRouter,
              SalesActivitiesLinkDeliveryOutcome, SalesActivitiesLinkEventProcessor,
              SalesActivitiesLinkEventProcessorConfig, TASK_STATUS_PROJECTION_ID, capability_catalog,
              capability_definitions, query_capability_catalog, query_capability_definitions,
          };'''
          new = '''use crm_sales_activities_capability_composition::{
              DEAL_TIMELINE_PROJECTION_ID, GLOBAL_SEARCH_INDEX_ID, Phase6ProjectionWorker,
              Phase7SearchWorker, ProductionQueryRouter, SalesActivitiesCapabilityPlannerRouter,
              SalesActivitiesLinkDeliveryOutcome, SalesActivitiesLinkEventProcessor,
              SalesActivitiesLinkEventProcessorConfig, TASK_STATUS_PROJECTION_ID, capability_catalog,
              capability_definitions, query_capability_catalog, query_capability_definitions,
          };'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          needle = '''use crm_sales_activities_query_adapter::{
              ACTIVITIES_RECORD_TYPE, SALES_RECORD_TYPE, SalesActivitiesQueryAdapter,
          };'''
          replacement = needle + '''
          use crm_search_query_adapter::{SEARCH_MODULE_ID, SearchQueryAdapter};
          use crm_search_runtime::SearchIndexId;'''
          assert text.count(needle) == 1
          text = text.replace(needle, replacement)

          needle = 'const PROJECTION_PAGE_SIZE: u32 = 200;\n'
          assert text.count(needle) == 1
          text = text.replace(needle, needle + 'const SEARCH_PAGE_SIZE: u32 = 200;\n')

          needle = '    pub projection_worker: Arc<Phase6ProjectionWorker>,\n'
          assert text.count(needle) == 1
          text = text.replace(needle, needle + '    pub search_worker: Arc<Phase7SearchWorker>,\n')

          text = text.replace('bootstrap_phase6_access(', 'bootstrap_application_access(')

          old = '''        let query_adapter = Arc::new(
              SalesActivitiesQueryAdapter::new(
                  store.clone(),
                  CursorCodec::new(cursor_key)
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                  visibility_authorizer,
              )
              .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          );
          let query_gateway = Arc::new(QueryGateway::new(
              Arc::new(
                  query_capability_catalog()
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              ),
              query_adapter.clone(),
              authorizer,
              query_adapter,
          ));'''
          new = '''        let owner_query_adapter = SalesActivitiesQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          let search_query_adapter = SearchQueryAdapter::new(
              SearchIndexId::try_new(GLOBAL_SEARCH_INDEX_ID)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              Arc::new(store.clone()),
              visibility_authorizer,
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          let query_router = Arc::new(ProductionQueryRouter::new(
              owner_query_adapter,
              search_query_adapter,
          ));
          let query_gateway = Arc::new(QueryGateway::new(
              Arc::new(
                  query_capability_catalog()
                      .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              ),
              query_router.clone(),
              authorizer,
              query_router,
          ));'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          needle = '        let projection_worker = Arc::new(Phase6ProjectionWorker::new(store.clone()));\n'
          replacement = needle + '''        let search_worker = Arc::new(
              Phase7SearchWorker::new(store.clone())
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
          );
          '''
          assert text.count(needle) == 1
          text = text.replace(needle, replacement)

          needle = '            projection_worker,\n'
          assert text.count(needle) == 1
          text = text.replace(needle, needle + '            search_worker,\n')

          old = '''        drain_projection(
              &components.projection_worker,
              tenant_id.clone(),
              TASK_STATUS_PROJECTION_ID,
          )
          .await?;
          '''
          new = old + '''        components
              .search_worker
              .ensure_ready(tenant_id.clone(), SEARCH_PAGE_SIZE)
              .await
              .map_err(|error| ApplicationRuntimeError::Server(error.to_string()))?;
          '''
          assert text.count(old) == 1
          text = text.replace(old, new)

          old = '''        for definition in query_definitions {
              let (resource_type, field_paths) = if definition.owner_module_id.as_str() == "crm.sales"
              {
                  (SALES_RECORD_TYPE, sales_fields())
              } else {
                  (ACTIVITIES_RECORD_TYPE, task_fields())
              };
              visibility_store
                  .upsert(QueryVisibilityGrant {
                      tenant_id: tenant_id.clone(),
                      actor_id: config.actor_id.clone(),
                      capability_id: definition.capability_id.clone(),
                      capability_version: definition.capability_version.clone(),
                      owner_module_id: definition.owner_module_id.clone(),
                      record_type: RecordType::try_new(resource_type)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_id: None,
                      allowed_fields: field_paths,
                      policy_version: BOOTSTRAP_POLICY_VERSION.to_owned(),
                      expires_at_unix_nanos: Some(expires_at),
                  })
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
          }'''
          new = '''        for definition in query_definitions {
              match definition.owner_module_id.as_str() {
                  "crm.sales" => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      "crm.sales",
                      SALES_RECORD_TYPE,
                      sales_fields(),
                      expires_at,
                  )?,
                  "crm.activities" => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      "crm.activities",
                      ACTIVITIES_RECORD_TYPE,
                      task_fields(),
                      expires_at,
                  )?,
                  SEARCH_MODULE_ID => {
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          "crm.sales",
                          SALES_RECORD_TYPE,
                          ["name"].into_iter().map(str::to_owned).collect(),
                          expires_at,
                      )?;
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          "crm.activities",
                          ACTIVITIES_RECORD_TYPE,
                          ["subject"].into_iter().map(str::to_owned).collect(),
                          expires_at,
                      )?;
                  }
                  _ => {
                      return Err(ApplicationRuntimeError::Assembly(
                          "unsupported bootstrap query owner".to_owned(),
                      ));
                  }
              }
          }'''
          assert text.count(old) == 1
          text = text.replace(old, new)

          marker = '''fn expiry(now_unix_nanos: i64) -> Result<i64, ApplicationRuntimeError> {'''
          helper = '''fn upsert_bootstrap_visibility(
              visibility_store: &LiveQueryVisibilityStore,
              config: &ApplicationConfig,
              tenant_id: &TenantId,
              definition: &CapabilityDefinition,
              owner_module_id: &str,
              resource_type: &str,
              allowed_fields: BTreeSet<String>,
              expires_at: i64,
          ) -> Result<(), ApplicationRuntimeError> {
              visibility_store
                  .upsert(QueryVisibilityGrant {
                      tenant_id: tenant_id.clone(),
                      actor_id: config.actor_id.clone(),
                      capability_id: definition.capability_id.clone(),
                      capability_version: definition.capability_version.clone(),
                      owner_module_id: ModuleId::try_new(owner_module_id)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_type: RecordType::try_new(resource_type)
                          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
                      record_id: None,
                      allowed_fields,
                      policy_version: BOOTSTRAP_POLICY_VERSION.to_owned(),
                      expires_at_unix_nanos: Some(expires_at),
                  })
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))
          }

          '''
          assert text.count(marker) == 1
          text = text.replace(marker, helper + marker)

          path.write_text(text)
          PY
          cargo fmt --all
          rm .github/workflows/apply-search-application-composition-v2.yml
      - name: Commit application composition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/crm-application-runtime .github/workflows/apply-search-application-composition-v2.yml
          git commit -m "Compose governed search in application runtime"
          git pull --rebase origin develop/phase7-permission-aware-search
          git push origin HEAD:develop/phase7-permission-aware-search
