name: Phase 6H fix PostgreSQL query Clippy

on:
  push:
    branches:
      - feature/phase6h-postgres-query-reader-v1
    paths:
      - .github/workflows/phase6h-fix-query-clippy.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6h-postgres-query-reader-v1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Remove obsolete decoder tenant argument
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/crm-core-data/src/postgres_query.rs')
          text = path.read_text()
          text = text.replace(
              'row.map(|row| decode_query_record(&query.tenant_id, &query.record_type, row))',
              'row.map(|row| decode_query_record(&query.record_type, row))',
          )
          text = text.replace(
              'let snapshot = decode_query_record(&query.tenant_id, &query.record_type, row)?;',
              'let snapshot = decode_query_record(&query.record_type, row)?;',
          )
          text = text.replace(
              'fn decode_query_record(\n    tenant_id: &TenantId,\n    record_type: &RecordType,\n    row: PgRow,\n)',
              'fn decode_query_record(record_type: &RecordType, row: PgRow)',
          )
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit Clippy fix only
        run: |
          git add crates/crm-core-data/src/postgres_query.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove obsolete query decoder tenant argument"
          git push origin HEAD:feature/phase6h-postgres-query-reader-v1
