name: Phase 8A.2 Party Acceptance Fix

on:
  push:
    branches:
      - develop/phase8a2-party-vertical-slice

permissions:
  contents: write

concurrency:
  group: phase8a2-party-acceptance-fix
  cancel-in-progress: true

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a2-party-vertical-slice
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Align Party acceptance with authoritative tenant and actor fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          process = Path('services/crm-api/tests/party_process_e2e.rs')
          text = process.read_text()
          replacements = {
              'const TENANT_A: &str = "party-process-a";': 'const TENANT_A: &str = "tenant-a";',
              'const TENANT_B: &str = "party-process-b";': 'const TENANT_B: &str = "tenant-b";',
              'const ACTOR: &str = "party-process-actor";': 'const ACTOR: &str = "actor-a";',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing process acceptance anchor: {old}')
              text = text.replace(old, new, 1)
          process.write_text(text)

          rollback = Path('crates/crm-parties-capability-adapter/tests/postgres_evidence_rollback.rs')
          text = rollback.read_text()
          text = text.replace('use sqlx::PgPool;', 'use sqlx::{Executor, PgPool};', 1)
          text = text.replace(
              'const TENANT: &str = "party-evidence-rollback";',
              'const TENANT: &str = "tenant-a";',
              1,
          )
          text = text.replace(
              'const ACTOR: &str = "party-evidence-actor";',
              'const ACTOR: &str = "actor-a";',
              1,
          )
          anchor = '''    let admin = PgPool::connect(&admin_database_url)\n        .await\n        .expect("connect Party rollback evidence reader");\n    let before = evidence_counts(&admin).await;\n'''
          replacement = '''    let admin = PgPool::connect(&admin_database_url)\n        .await\n        .expect("connect Party rollback evidence reader");\n    admin\n        .execute(sqlx::raw_sql(include_str!(\n            "../../../database/tests/0005_party_adapter.sql"\n        )))\n        .await\n        .expect("publish Party module/capability registry fixture");\n    let before = evidence_counts(&admin).await;\n'''
          if anchor not in text:
              raise SystemExit('missing rollback fixture setup anchor')
          text = text.replace(anchor, replacement, 1)
          rollback.write_text(text)

          fixture = Path('database/tests/0005_party_adapter.sql')
          text = fixture.read_text()
          old = '''ON CONFLICT (capability_id, capability_version) DO UPDATE\nSET\n  owner_module_id = EXCLUDED.owner_module_id,\n  owner_module_version = EXCLUDED.owner_module_version,\n  service_name = EXCLUDED.service_name,\n  method_name = EXCLUDED.method_name,\n  input_descriptor_hash = EXCLUDED.input_descriptor_hash,\n  output_descriptor_hash = EXCLUDED.output_descriptor_hash,\n  risk_level = EXCLUDED.risk_level,\n  idempotency_required = EXCLUDED.idempotency_required,\n  audit_required = EXCLUDED.audit_required,\n  approval_required = EXCLUDED.approval_required,\n  ai_callable = EXCLUDED.ai_callable,\n  marketplace_callable = EXCLUDED.marketplace_callable,\n  bulk_allowed = EXCLUDED.bulk_allowed,\n  export_allowed = EXCLUDED.export_allowed,\n  data_classes_touched = EXCLUDED.data_classes_touched;\n'''
          if old not in text:
              raise SystemExit('missing mutable Party capability fixture conflict block')
          text = text.replace(
              old,
              'ON CONFLICT (capability_id, capability_version) DO NOTHING;\n',
              1,
          )
          fixture.write_text(text)
          PY

      - name: Format and compile focused Party acceptance binaries
        run: |
          cargo fmt --all
          cargo test -p crm-parties-capability-adapter --lib
          cargo test -p crm-parties-query-adapter --lib
          cargo check -p crm-api --test party_process_e2e
          cargo check -p crm-parties-capability-adapter --features postgres-integration --test postgres_evidence_rollback

      - name: Commit fix and remove one-shot workflow
        run: |
          git rm .github/workflows/phase8a2-party-acceptance-fix.yml
          git add \
            services/crm-api/tests/party_process_e2e.rs \
            crates/crm-parties-capability-adapter/tests/postgres_evidence_rollback.rs \
            database/tests/0005_party_adapter.sql
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix Party production acceptance fixture identity"
          git push origin HEAD:develop/phase8a2-party-vertical-slice
