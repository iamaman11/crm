name: Phase 8A.3c Browser Generated Sync

on:
  push:
    branches:
      - develop/phase8a3c-party-relationship
    paths:
      - ".phase8a3c-browser-generated-trigger"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3c-party-relationship
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - run: pnpm install --frozen-lockfile
      - name: Generate canonical browser descriptors
        run: |
          set -euo pipefail
          pnpm web:generate
          git diff --name-only > /tmp/generated-files
          printf '%s\n' packages/client/src/contract_hashes.ts > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/generated-files
      - name: Commit generated file and remove one-shot gate
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase8a3c-browser-generated-sync.yml .phase8a3c-browser-generated-trigger
          git add packages/client/src/contract_hashes.ts
          git commit -m "Synchronize Party Relationship browser descriptors"
          git push origin HEAD:develop/phase8a3c-party-relationship
