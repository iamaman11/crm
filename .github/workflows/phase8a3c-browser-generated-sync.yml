name: Phase 8A.3c Runtime and Generated Sync

on:
  push:
    branches:
      - develop/phase8a3c-party-relationship
    paths:
      - ".phase8a3c-browser-generated-trigger"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase8a3c-party-relationship
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
      - name: Patch Party Relationship runtime composition
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          runtime = Path('crates/crm-application-runtime/src/runtime.rs')
          text = runtime.read_text()

          if 'use crm_party_relationships_query_adapter::PartyRelationshipQueryAdapter;' not in text:
              anchor = 'use crm_parties_query_adapter::PartyQueryAdapter;\n'
              insert = (
                  anchor
                  + 'use crm_party_relationships_capability_adapter::{\n'
                  + '    MODULE_ID as PARTY_RELATIONSHIPS_MODULE_ID,\n'
                  + '    RECORD_TYPE as PARTY_RELATIONSHIP_RECORD_TYPE,\n'
                  + '};\n'
                  + 'use crm_party_relationships_query_adapter::PartyRelationshipQueryAdapter;\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('expected one PartyQueryAdapter import anchor')
              text = text.replace(anchor, insert, 1)

          if 'let party_relationship_query_adapter = PartyRelationshipQueryAdapter::new(' not in text:
              anchor = '        let search_query_adapter = SearchQueryAdapter::new(\n'
              insert = (
                  '        let party_relationship_query_adapter = PartyRelationshipQueryAdapter::new(\n'
                  '            store.clone(),\n'
                  '            CursorCodec::new(cursor_key)\n'
                  '                .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,\n'
                  '            visibility_authorizer.clone(),\n'
                  '        )\n'
                  '        .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('expected one search adapter anchor')
              text = text.replace(anchor, insert + anchor, 1)

          if '            party_relationship_query_adapter,\n            metadata_query_adapter,' not in text:
              anchor = '            contact_point_query_adapter,\n            metadata_query_adapter,\n'
              replacement = '            contact_point_query_adapter,\n            party_relationship_query_adapter,\n            metadata_query_adapter,\n'
              if text.count(anchor) != 1:
                  raise SystemExit('expected one query router argument anchor')
              text = text.replace(anchor, replacement, 1)

          if '                PARTY_RELATIONSHIPS_MODULE_ID => upsert_bootstrap_visibility(' not in text:
              anchor = '                METADATA_MODULE_ID => {}\n'
              insert = (
                  '                PARTY_RELATIONSHIPS_MODULE_ID => upsert_bootstrap_visibility(\n'
                  '                    visibility_store,\n'
                  '                    config,\n'
                  '                    tenant_id,\n'
                  '                    definition,\n'
                  '                    BootstrapVisibilityResource {\n'
                  '                        owner_module_id: PARTY_RELATIONSHIPS_MODULE_ID,\n'
                  '                        resource_type: PARTY_RELATIONSHIP_RECORD_TYPE,\n'
                  '                    },\n'
                  '                    party_relationship_fields(),\n'
                  '                    expires_at,\n'
                  '                )?,\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('expected one metadata visibility anchor')
              text = text.replace(anchor, insert + anchor, 1)

          if 'fn party_relationship_fields() -> BTreeSet<String> {' not in text:
              anchor = 'fn task_fields() -> BTreeSet<String> {\n'
              insert = (
                  'fn party_relationship_fields() -> BTreeSet<String> {\n'
                  '    [\n'
                  '        "from_party_ref",\n'
                  '        "to_party_ref",\n'
                  '        "relationship_type",\n'
                  '        "status",\n'
                  '        "validity",\n'
                  '    ]\n'
                  '    .into_iter()\n'
                  '    .map(str::to_owned)\n'
                  '    .collect()\n'
                  '}\n\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('expected one task fields anchor')
              text = text.replace(anchor, insert + anchor, 1)

          if 'assert!(party_relationship_fields().contains("relationship_type"));' not in text:
              anchor = '        assert!(contact_point_fields().contains("verification"));\n        assert!(task_fields().contains("subject"));\n'
              replacement = (
                  '        assert!(contact_point_fields().contains("verification"));\n'
                  '        assert!(party_relationship_fields().contains("from_party_ref"));\n'
                  '        assert!(party_relationship_fields().contains("relationship_type"));\n'
                  '        assert!(party_relationship_fields().contains("validity"));\n'
                  '        assert!(task_fields().contains("subject"));\n'
              )
              if text.count(anchor) != 1:
                  raise SystemExit('expected one visibility test anchor')
              text = text.replace(anchor, replacement, 1)

          runtime.write_text(text)

          query = Path('crates/crm-party-relationships-query-adapter/src/lib.rs')
          text = query.read_text()
          text = text.replace('customer::v1 as customer, ', '')
          if 'customer::v1 as customer' in text:
              raise SystemExit('failed to remove unused customer import')
          query.write_text(text)
          PY
      - name: Synchronize Rust and browser generated state
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo fmt --all
          pnpm install --frozen-lockfile
          pnpm web:generate
      - name: Commit synchronized product files and remove one-shot gate
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/phase8a3c-browser-generated-sync.yml .phase8a3c-browser-generated-trigger
          git add Cargo.lock packages/client/src/contract_hashes.ts crates/crm-application-runtime/src/runtime.rs crates/crm-party-relationships-query-adapter/src/lib.rs
          git commit -m "Complete Party Relationship runtime query composition"
          git push origin HEAD:develop/phase8a3c-party-relationship
