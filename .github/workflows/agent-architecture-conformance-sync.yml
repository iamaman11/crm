name: Agent Architecture Conformance Sync

on:
  push:
    branches:
      - docs/architecture-conformance-baseline
    paths:
      - .github/workflows/agent-architecture-conformance-sync.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: docs/architecture-conformance-baseline
          fetch-depth: 0
      - name: Synchronize normative architecture controls
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected source block missing in {path}: {old[:120]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          def write(path: str, content: str) -> None:
              Path(path).write_text(content, encoding="utf-8")

