name: Agent Worker Clippy Fix

on:
  pull_request:
    paths:
      - ".github/workflows/agent-worker-clippy-fix.yml"
      - ".agent/worker-clippy-fix.patch"

permissions:
  contents: write

concurrency:
  group: agent-worker-clippy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply verified Clippy fix
        id: fix
        shell: bash
        run: |
          if [ ! -f .agent/worker-clippy-fix.patch ]; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "78d855800ea7f6ededdea62a891e4846b4ad21ce69314a1c5f051fcbb9455c6e  .agent/worker-clippy-fix.patch" | sha256sum --check
          git apply --check .agent/worker-clippy-fix.patch
          git apply --index .agent/worker-clippy-fix.patch
          git rm .agent/worker-clippy-fix.patch .github/workflows/agent-worker-clippy-fix.yml
          echo "apply=true" >> "$GITHUB_OUTPUT"
      - name: Publish worker composition fix
        if: steps.fix.outputs.apply == 'true'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Remove unused worker composition alias"
          git push origin "HEAD:${HEAD_BRANCH}"
