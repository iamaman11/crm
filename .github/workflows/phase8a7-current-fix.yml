name: Phase 8A.7 Current Fix

on:
  pull_request:
    types: [synchronize, reopened]
    paths:
      - "crates/**/*.rs"
      - "modules/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: write

concurrency:
  group: phase8a7-current-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'develop/phase8a7-customer-import-jobs'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply exact Phase 8A.7 current fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          # Complete mutation/query routing in the application router.
          meta = Path('crates/crm-application-runtime/src/governed_metadata.rs')
          text = meta.read_text()
          if 'CustomerDataOperationsCapabilityPlanner.target(definition, request)' not in text:
              text = text.replace(
                  '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.target(definition, request)
          } else {
              SalesActivitiesCapabilityPlannerRouter.target(definition, request)
          }
''',
                  '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.target(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              CustomerDataOperationsCapabilityPlanner.target(definition, request)
          } else {
              SalesActivitiesCapabilityPlannerRouter.target(definition, request)
          }
''',
                  1,
              )
          if 'CustomerDataOperationsCapabilityPlanner.plan(definition, request, current)' not in text:
              text = text.replace(
                  '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.plan(definition, request, current)
          } else {
              SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
          }
''',
                  '''        } else if IDENTITY_RESOLUTION_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              IdentityResolutionCapabilityPlanner.plan(definition, request, current)
          } else if CUSTOMER_DATA_OPERATIONS_MUTATION_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              CustomerDataOperationsCapabilityPlanner.plan(definition, request, current)
          } else {
              SalesActivitiesCapabilityPlannerRouter.plan(definition, request, current)
          }
''',
                  1,
              )
          if 'self.customer_data_operations.validate(definition, request)' not in text:
              text = text.replace(
                  '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.validate(definition, request)
          } else {
              self.production.validate(definition, request)
          }
''',
                  '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.validate(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.customer_data_operations.validate(definition, request)
          } else {
              self.production.validate(definition, request)
          }
''',
                  1,
              )
          if 'self.customer_data_operations.execute(definition, request)' not in text:
              text = text.replace(
                  '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.execute(definition, request)
          } else {
              self.production.execute(definition, request)
          }
''',
                  '''        } else if IDENTITY_RESOLUTION_MERGE_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.identity_resolution_merge.execute(definition, request)
          } else if CUSTOMER_DATA_OPERATIONS_QUERY_CAPABILITY_IDS
              .contains(&definition.capability_id.as_str())
          {
              self.customer_data_operations.execute(definition, request)
          } else {
              self.production.execute(definition, request)
          }
''',
                  1,
              )
          meta.write_text(text)

          # Construct the query adapter and bootstrap live field visibility.
          runtime = Path('crates/crm-application-runtime/src/runtime.rs')
          text = runtime.read_text()
          if 'let customer_data_operations_query_adapter =' not in text:
              anchor = '''        let identity_resolution_merge_query_adapter = IdentityResolutionMergeQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
'''
              text = text.replace(
                  anchor,
                  anchor + '''        let customer_data_operations_query_adapter = CustomerDataOperationsQueryAdapter::new(
              store.clone(),
              CursorCodec::new(cursor_key)
                  .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?,
              visibility_authorizer.clone(),
          )
          .map_err(|error| ApplicationRuntimeError::Assembly(error.to_string()))?;
''',
                  1,
              )
          if 'CUSTOMER_DATA_OPERATIONS_MODULE_ID =>' not in text:
              anchor = '''                PARTY_RELATIONSHIPS_MODULE_ID => upsert_bootstrap_visibility(
                      visibility_store,
                      config,
                      tenant_id,
                      definition,
                      BootstrapVisibilityResource {
                          owner_module_id: PARTY_RELATIONSHIPS_MODULE_ID,
                          resource_type: PARTY_RELATIONSHIP_RECORD_TYPE,
                      },
                      party_relationship_fields(),
                      expires_at,
                  )?,
'''
              text = text.replace(
                  anchor,
                  anchor + '''                CUSTOMER_DATA_OPERATIONS_MODULE_ID => {
                      upsert_bootstrap_visibility(
                          visibility_store,
                          config,
                          tenant_id,
                          definition,
                          BootstrapVisibilityResource {
                              owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                              resource_type: CUSTOMER_DATA_IMPORT_JOB_RECORD_TYPE,
                          },
                          customer_data_import_job_fields(),
                          expires_at,
                      )?;
                      if definition.capability_id.as_str() == LIST_IMPORT_ROWS_CAPABILITY {
                          upsert_bootstrap_visibility(
                              visibility_store,
                              config,
                              tenant_id,
                              definition,
                              BootstrapVisibilityResource {
                                  owner_module_id: CUSTOMER_DATA_OPERATIONS_MODULE_ID,
                                  resource_type: CUSTOMER_DATA_IMPORT_ROW_RECORD_TYPE,
                              },
                              customer_data_import_row_fields(),
                              expires_at,
                          )?;
                      }
                  }
''',
                  1,
              )
          if 'fn customer_data_import_job_fields()' not in text:
              text = text.replace(
                  'fn customer_360_party_fields() -> BTreeSet<String> {\n',
                  '''fn customer_data_import_job_fields() -> BTreeSet<String> {
              ["source", "mapping", "status", "counters", "checkpoint"]
                  .into_iter()
                  .map(str::to_owned)
                  .collect()
          }

          fn customer_data_import_row_fields() -> BTreeSet<String> {
              [
                  "row_position",
                  "source_identity",
                  "status",
                  "prepared_party",
                  "diagnostics",
                  "execution",
                  "target_party_ref",
              ]
              .into_iter()
              .map(str::to_owned)
              .collect()
          }

          fn customer_360_party_fields() -> BTreeSet<String> {
''',
                  1,
              )
          runtime.write_text(text)

          # Prost open enums require catch-all arms for forward compatibility.
          planner = Path('crates/crm-customer-data-operations-capability-adapter/src/planner.rs')
          text = planner.read_text()
          text = text.replace(
              'Ok(wire::ImportSourceFormat::Unspecified) | Err(_) =>',
              'Ok(_) | Err(_) =>',
          )
          text = text.replace(
              'Ok(wire::ImportTextEncoding::Unspecified) | Err(_) =>',
              'Ok(_) | Err(_) =>',
          )
          text = text.replace(
              'Ok(wire::ImportHeaderMode::Unspecified) | Err(_) =>',
              'Ok(_) | Err(_) =>',
          )
          text = text.replace(
              'Ok(wire::ImportParserVersion::Unspecified) | Err(_) =>',
              'Ok(_) | Err(_) =>',
          )
          text = text.replace(
              'Ok(wire::ImportCanonicalizationVersion::Unspecified) | Err(_) =>',
              'Ok(_) | Err(_) =>',
          )
          planner.write_text(text)

          query = Path('crates/crm-customer-data-operations-query-adapter/src/lib.rs')
          text = query.read_text()
          if 'Some(_) => false,' not in text:
              text = text.replace(
                  '        Some(wire::ImportJobStatus::Cancelled) => job.status() == ImportJobStatus::Cancelled,\n    }\n}\n',
                  '        Some(wire::ImportJobStatus::Cancelled) => job.status() == ImportJobStatus::Cancelled,\n        Some(_) => false,\n    }\n}\n',
                  1,
              )
              text = text.replace(
                  '        Some(wire::ImportRowStatus::Succeeded) => row.status() == ImportRowStatus::Succeeded,\n    }\n}\n',
                  '        Some(wire::ImportRowStatus::Succeeded) => row.status() == ImportRowStatus::Succeeded,\n        Some(_) => false,\n    }\n}\n',
                  1,
              )
          query.write_text(text)
          PY
          cargo generate-lockfile
          cargo fmt --all
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/rust-generated-sync.yml
          rm .github/workflows/phase8a7-current-fix.yml
      - name: Commit fixed current boundary
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(phase8a7): complete routing and forward-compatible enum handling"
          git push origin "HEAD:${HEAD_BRANCH}"
