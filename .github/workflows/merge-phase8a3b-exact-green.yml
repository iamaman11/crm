name: Merge Phase 8A.3b Exact Green

on:
  push:
    branches:
      - ops/merge-phase8a3b-exact-green
    paths:
      - ".github/workflows/merge-phase8a3b-exact-green.yml"

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  gate-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: iamaman11/crm
      PR_NUMBER: "104"
      EXPECTED_HEAD_SHA: 0af9ef201fbe96e74e825e648927a7f36ae39e10
    steps:
      - name: Require exact-head 11-workflow green set
        shell: bash
        run: |
          set -euo pipefail
          expected_json='["Application Runtime CI","Contract CI","Database CI","Event Runtime CI","Governance CI","Metadata Runtime CI","Product Plane CI","Projection Runtime CI","Rust CI","Rust Generated Sync","Search Runtime CI"]'

          for attempt in $(seq 1 60); do
            gh api "repos/${REPOSITORY}/actions/runs?head_sha=${EXPECTED_HEAD_SHA}&event=pull_request&per_page=100" > /tmp/runs.json
            python - "$expected_json" <<'PY'
          import json
          import sys

          expected = set(json.loads(sys.argv[1]))
          runs = json.load(open('/tmp/runs.json'))['workflow_runs']
          latest = {}
          for run in runs:
              name = run['name']
              if name not in expected:
                  continue
              previous = latest.get(name)
              if previous is None or run['run_number'] > previous['run_number']:
                  latest[name] = run

          missing = sorted(expected - latest.keys())
          failed = sorted(
              name for name, run in latest.items()
              if run['status'] == 'completed' and run['conclusion'] != 'success'
          )
          pending = sorted(
              name for name, run in latest.items()
              if run['status'] != 'completed'
          )

          if failed:
              print('FAILED=' + ','.join(failed))
              sys.exit(2)
          if missing or pending:
              print('MISSING=' + ','.join(missing))
              print('PENDING=' + ','.join(pending))
              sys.exit(1)
          print('All 11 expected workflows completed successfully on the exact head SHA.')
          PY
            status=$?
            if [ "$status" -eq 0 ]; then
              break
            fi
            if [ "$status" -eq 2 ]; then
              exit 1
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for exact-head workflows."
              exit 1
            fi
            sleep 15
          done

      - name: Require exact PR head and clean review gate
        shell: bash
        run: |
          set -euo pipefail
          gh api graphql \
            -f owner=iamaman11 \
            -f name=crm \
            -F number=${PR_NUMBER} \
            -f query='query($owner:String!,$name:String!,$number:Int!){repository(owner:$owner,name:$name){pullRequest(number:$number){id isDraft headRefOid mergeable reviewDecision reviewThreads(first:100){nodes{isResolved}}}}}' \
            > /tmp/pr.json
          python - <<'PY'
          import json
          import os
          import sys

          pr = json.load(open('/tmp/pr.json'))['data']['repository']['pullRequest']
          expected = os.environ['EXPECTED_HEAD_SHA']
          if pr['headRefOid'] != expected:
              raise SystemExit(f"PR head changed: {pr['headRefOid']} != {expected}")
          if not pr['isDraft']:
              raise SystemExit('PR #104 was expected to remain draft until this exact-green gate.')
          if pr['mergeable'] != 'MERGEABLE':
              raise SystemExit(f"PR is not mergeable: {pr['mergeable']}")
          if pr['reviewDecision'] == 'CHANGES_REQUESTED':
              raise SystemExit('PR has CHANGES_REQUESTED review state.')
          unresolved = [node for node in pr['reviewThreads']['nodes'] if not node['isResolved']]
          if unresolved:
              raise SystemExit(f"PR has {len(unresolved)} unresolved review thread(s).")
          print(pr['id'])
          PY

      - name: Mark ready and merge with SHA lock
        shell: bash
        run: |
          set -euo pipefail
          pr_id="$(python - <<'PY'
          import json
          print(json.load(open('/tmp/pr.json'))['data']['repository']['pullRequest']['id'])
          PY
          )"
          gh api graphql \
            -F pullRequestId="$pr_id" \
            -f query='mutation($pullRequestId:ID!){markPullRequestReadyForReview(input:{pullRequestId:$pullRequestId}){pullRequest{isDraft headRefOid}}}' \
            --jq '.data.markPullRequestReadyForReview.pullRequest'

          gh api \
            --method PUT \
            "repos/${REPOSITORY}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=merge \
            -f sha="${EXPECTED_HEAD_SHA}" \
            -f commit_title='Phase 8A.3b: authoritative Contact Point lifecycle and verification (#104)' \
            > /tmp/merge.json

          python - <<'PY'
          import json
          result = json.load(open('/tmp/merge.json'))
          if not result.get('merged'):
              raise SystemExit(f"Merge failed: {result}")
          print('Merged as ' + result['sha'])
          PY
