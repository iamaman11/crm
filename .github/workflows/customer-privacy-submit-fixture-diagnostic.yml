name: Customer Privacy Submit Fixture Diagnostic

on:
  push:
    paths:
      - "database/tests/0022_customer_privacy_submit_fixture.sql"
      - ".github/workflows/customer-privacy-submit-fixture-diagnostic.yml"
  pull_request:
    paths:
      - "database/tests/0022_customer_privacy_submit_fixture.sql"
      - ".github/workflows/customer-privacy-submit-fixture-diagnostic.yml"

permissions:
  contents: read

jobs:
  fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crm_privacy_submit_fixture_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_privacy_submit_fixture_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: crm_privacy_submit_fixture_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Apply migrations and prerequisite fixtures
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql --set ON_ERROR_STOP=1 --file "${migration}"
          done < <(find database/migrations -maxdepth 1 -type f -name '*.up.sql' | sort)
          psql --set ON_ERROR_STOP=1 --file database/tests/0001_platform_foundation.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0004_search_runtime_role_grants.sql
          psql --set ON_ERROR_STOP=1 --file database/tests/0020_customer_privacy_persistence_fixture.sql
      - name: Diagnose submit fixture
        shell: bash
        run: |
          set -o pipefail
          psql --set ON_ERROR_STOP=1 --set VERBOSITY=verbose --echo-errors \
            --file database/tests/0022_customer_privacy_submit_fixture.sql \
            2>&1 | tee database/customer-privacy-submit-fixture-diagnostic.log
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-privacy-submit-fixture-diagnostic
          path: database/customer-privacy-submit-fixture-diagnostic.log
          if-no-files-found: error
          retention-days: 1
