name: Phase 6F emit Clippy-fix blobs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  emit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/phase6f-recovery-v1
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Emit exact fixed blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess

          activities = Path("crates/crm-activities-capability-adapter/src/lib.rs")
          source = activities.read_text().replace(
              "RecordRef, RecordSnapshot, ResourceRef, SdkError, TenantId, TypedPayload,",
              "RecordRef, RecordSnapshot, SdkError, TenantId, TypedPayload,",
          )
          activities.write_text(source)

          sales = Path("crates/crm-sales-capability-adapter/src/lib.rs")
          source = sales.read_text().replace(
              "fn deal_to_wire(deal: &Deal, tenant: &TenantId) -> wire::Deal {",
              "#[allow(deprecated)]\nfn deal_to_wire(deal: &Deal, tenant: &TenantId) -> wire::Deal {",
              1,
          )
          sales.write_text(source)
          subprocess.run(["cargo", "fmt", "--all"], check=True)

          repo = os.environ["GITHUB_REPOSITORY"]
          base_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          base_tree = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/git/commits/{base_sha}", "--jq", ".tree.sha"],
              text=True,
          ).strip()
          entries = []
          for path in [activities, sales]:
              payload = json.dumps({"content": path.read_text(), "encoding": "utf-8"}).encode()
              sha = subprocess.run(
                  ["gh", "api", f"repos/{repo}/git/blobs", "--input", "-", "--jq", ".sha"],
                  input=payload,
                  stdout=subprocess.PIPE,
                  check=True,
              ).stdout.decode().strip()
              entries.append({"path": str(path), "mode": "100644", "type": "blob", "sha": sha})
          manifest = json.dumps(
              {"base_sha": base_sha, "base_tree": base_tree, "entries": entries},
              separators=(",", ":"),
          )
          body = "Phase 6F Clippy-fix blob manifest:\n\n```json\n" + manifest + "\n```"
          subprocess.run(
              ["gh", "pr", "comment", "37", "--repo", repo, "--body", body],
              check=True,
          )
          print(manifest)
          PY
