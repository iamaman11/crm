name: Phase 7G Refresh Cargo Lock

on:
  push:
    branches:
      - develop/phase7-governed-metadata-api
    paths:
      - ".github/workflows/phase7g-refresh-lock.yml"
      - "Cargo.toml"
      - "crates/crm-metadata-api-adapter/Cargo.toml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop/phase7-governed-metadata-api
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate exact workspace lockfile
        run: cargo generate-lockfile
      - name: Commit generated lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "Phase 7G: refresh Cargo lockfile"
          git push origin HEAD:develop/phase7-governed-metadata-api
