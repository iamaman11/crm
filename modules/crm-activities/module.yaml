schema_version: crm.module/v1
module_id: crm.activities
version: "0.1.0"
display_name: CRM Activities
description: Independent activities domain module owning tasks and reminder state.

owner:
  team: activities-platform
  contact: crm-owner@example.com
  codeowners:
    - "@iamaman11"

runtime:
  kind: in_process
  entrypoint: modules/crm-activities

platform:
  minimum_version: "0.1.0"

dependencies:
  required: []
  optional: []
  conflicts: []

provides:
  capabilities:
    - id: activities.task.create
      version: "1.0.0"
    - id: activities.task.update
      version: "1.0.0"
    - id: activities.task.complete
      version: "1.0.0"
    - id: activities.task.schedule_reminder
      version: "1.0.0"
    - id: activities.task.get
      version: "1.0.0"
    - id: activities.task.list
      version: "1.0.0"
  events:
    - id: activities.task.created
      version: "1.0.0"
    - id: activities.task.updated
      version: "1.0.0"
    - id: activities.task.completed
      version: "1.0.0"
    - id: activities.task.reminder_scheduled
      version: "1.0.0"
  objects:
    - activities.task
  ui_extensions:
    - id: activities.tasks.navigation
      type: navigation.item
      version: "1.0.0"
      permission: activities.task.read
      fallback: hide
    - id: activities.related_tasks.panel
      type: record_page.panel
      version: "1.0.0"
      permission: activities.task.read
      fallback: readonly

consumes:
  capabilities: []
  events: []

storage:
  record_types:
    - activities.task
  private_state_namespaces:
    - crm.activities

security:
  data_classes:
    - internal
    - confidential
    - personal
  network_egress: []
  secret_handles: []

quotas:
  maximum_bulk_records: 10000
  maximum_workflow_actions_per_transaction: 100

lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: retain_business_records
  migrations_path: modules/crm-activities/migrations
  retained_record_types:
    - activities.task
