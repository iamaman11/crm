schema_version: crm.module/v1
module_id: crm.data-quality
version: "0.1.0"
display_name: CRM Data Quality
description: Governed versioned quality rules, exact source-version findings, deterministic completeness evidence and stewardship lifecycle without owning customer-master values.

owner:
  team: customer-platform
  contact: "crm-owner@example.com"
  codeowners:
    - "@iamaman11"

runtime:
  kind: in_process
  entrypoint: modules/crm-data-quality

platform:
  minimum_version: "0.1.0"

dependencies:
  required:
    - module_id: crm.parties
      version_range: ">=0.3.0, <1.0.0"
  optional: []
  conflicts: []

provides:
  capabilities:
    - id: data_quality.party.rule_set.publish
      version: "1.0.0"
    - id: data_quality.party.rule_set.get
      version: "1.0.0"
  events:
    - id: data_quality.party.rule_set.published
      version: "1.0.0"
  objects:
    - data_quality.party_rule_set_version
    - data_quality.party_completeness_profile_version
    - data_quality.party_evaluation_job
    - data_quality.party_evaluation_input
    - data_quality.rule_outcome
    - data_quality.finding
    - data_quality.finding_observation
    - data_quality.party_completeness_result
    - data_quality.remediation_attempt
  ui_extensions: []

consumes:
  capabilities: []
  events: []

storage:
  record_types:
    - data_quality.party_rule_set_version
    - data_quality.party_completeness_profile_version
    - data_quality.party_evaluation_job
    - data_quality.party_evaluation_input
    - data_quality.rule_outcome
    - data_quality.finding
    - data_quality.finding_observation
    - data_quality.party_completeness_result
    - data_quality.remediation_attempt
  private_state_namespaces:
    - crm.data-quality.party_rule_set_version
    - crm.data-quality.party_completeness_profile_version
    - crm.data-quality.party_evaluation_job
    - crm.data-quality.party_evaluation_input
    - crm.data-quality.rule_outcome
    - crm.data-quality.finding
    - crm.data-quality.finding_observation
    - crm.data-quality.party_completeness_result
    - crm.data-quality.remediation_attempt

security:
  data_classes:
    - internal
    - confidential
    - personal
  network_egress: []
  secret_handles: []

lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: retain_business_records
  migrations_path: modules/crm-data-quality/migrations
  retained_record_types:
    - data_quality.party_rule_set_version
    - data_quality.party_completeness_profile_version
    - data_quality.party_evaluation_job
    - data_quality.party_evaluation_input
    - data_quality.rule_outcome
    - data_quality.finding
    - data_quality.finding_observation
    - data_quality.party_completeness_result
    - data_quality.remediation_attempt
