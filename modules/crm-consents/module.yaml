schema_version: crm.module/v1
module_id: crm.consents
version: 0.2.0
display_name: CRM Consents
description: Authoritative purpose-specific consent assertions and communication authorization evidence; Contact Point verification or preference never implies authorization.
owner:
  team: customer-platform
  contact: crm-owner@example.com
  codeowners:
    - '@iamaman11'
runtime:
  kind: in_process
  entrypoint: modules/crm-consents
platform:
  minimum_version: 0.1.0
dependencies:
  required:
    - module_id: crm.parties
      version_range: '>=0.3.0, <1.0.0'
    - module_id: crm.contact-points
      version_range: '>=0.2.0, <1.0.0'
  optional: []
  conflicts: []
provides:
  capabilities:
    - id: consents.authorization.create
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.consents.v1.ConsentAuthorizationService.CreateConsentAuthorization
        request: crm.consents.v1.CreateConsentAuthorizationRequest
        response: crm.consents.v1.CreateConsentAuthorizationResponse
    - id: consents.authorization.withdraw
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.consents.v1.ConsentAuthorizationService.WithdrawConsentAuthorization
        request: crm.consents.v1.WithdrawConsentAuthorizationRequest
        response: crm.consents.v1.WithdrawConsentAuthorizationResponse
    - id: consents.authorization.get
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.consents.v1.ConsentAuthorizationService.GetConsentAuthorization
        request: crm.consents.v1.GetConsentAuthorizationRequest
        response: crm.consents.v1.GetConsentAuthorizationResponse
    - id: consents.authorization.list
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.consents.v1.ConsentAuthorizationService.ListConsentAuthorizations
        request: crm.consents.v1.ListConsentAuthorizationsRequest
        response: crm.consents.v1.ListConsentAuthorizationsResponse
    - id: consents.communication.authorize
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.consents.v1.ConsentAuthorizationService.AuthorizeCommunication
        request: crm.consents.v1.AuthorizeCommunicationRequest
        response: crm.consents.v1.AuthorizeCommunicationResponse
    - id: consents.privacy.scope.contribute
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.customer_privacy.v1.ConsentsPrivacyScopeContributionService.ContributePrivacyScope
        request: crm.customer_privacy.v1.ConsentsPrivacyScopeContributionRequest
        response: crm.customer_privacy.v1.ConsentsPrivacyScopeContributionResponse
  events:
    - id: consents.authorization.created
      version: 1.0.0
      binding:
        kind: protobuf_message
        message: crm.consents.v1.ConsentAuthorizationCreatedEvent
    - id: consents.authorization.withdrawn
      version: 1.0.0
      binding:
        kind: protobuf_message
        message: crm.consents.v1.ConsentAuthorizationWithdrawnEvent
  objects:
    - consents.authorization
  ui_extensions: []
consumes:
  capabilities: []
  events: []
storage:
  record_types:
    - consents.authorization
  private_state_namespaces:
    - crm.consents.authorization
security:
  data_classes:
    - internal
    - confidential
    - personal
  network_egress: []
  secret_handles: []
lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: retain_business_records
  migrations_path: modules/crm-consents/migrations
  retained_record_types:
    - consents.authorization
