schema_version: crm.module/v1
module_id: crm.party-relationships
version: 0.2.0
display_name: CRM Party Relationships
description: Authoritative owner domain for typed, temporal Party-to-Party relationship state and hierarchy foundations.
owner:
  team: customer-platform
  contact: crm-owner@example.com
  codeowners:
    - '@iamaman11'
runtime:
  kind: in_process
  entrypoint: modules/crm-party-relationships
platform:
  minimum_version: 0.1.0
dependencies:
  required:
    - module_id: crm.parties
      version_range: '>=0.3.0, <1.0.0'
  optional: []
  conflicts: []
provides:
  capabilities:
    - id: party-relationships.party-relationship.create
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.party_relationships.v1.PartyRelationshipService.CreatePartyRelationship
        request: crm.party_relationships.v1.CreatePartyRelationshipRequest
        response: crm.party_relationships.v1.CreatePartyRelationshipResponse
    - id: party-relationships.party-relationship.update
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.party_relationships.v1.PartyRelationshipService.UpdatePartyRelationship
        request: crm.party_relationships.v1.UpdatePartyRelationshipRequest
        response: crm.party_relationships.v1.UpdatePartyRelationshipResponse
    - id: party-relationships.party-relationship.get
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.party_relationships.v1.PartyRelationshipService.GetPartyRelationship
        request: crm.party_relationships.v1.GetPartyRelationshipRequest
        response: crm.party_relationships.v1.GetPartyRelationshipResponse
    - id: party-relationships.party-relationship.list
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.party_relationships.v1.PartyRelationshipService.ListPartyRelationships
        request: crm.party_relationships.v1.ListPartyRelationshipsRequest
        response: crm.party_relationships.v1.ListPartyRelationshipsResponse
    - id: party_relationships.privacy.scope.contribute
      version: 1.0.0
      binding:
        kind: protobuf_rpc
        rpc: crm.customer_privacy.v1.PartyRelationshipsPrivacyScopeContributionService.ContributePrivacyScope
        request: crm.customer_privacy.v1.ContributePrivacyScopeRequest
        response: crm.customer_privacy.v1.ContributePrivacyScopeResponse
  events:
    - id: party-relationships.party-relationship.created
      version: 1.0.0
      binding:
        kind: protobuf_message
        message: crm.party_relationships.v1.PartyRelationshipCreatedEvent
    - id: party-relationships.party-relationship.updated
      version: 1.0.0
      binding:
        kind: protobuf_message
        message: crm.party_relationships.v1.PartyRelationshipUpdatedEvent
  objects:
    - party-relationships.party_relationship
  ui_extensions: []
consumes:
  capabilities: []
  events: []
storage:
  record_types:
    - party-relationships.party_relationship
  private_state_namespaces:
    - crm.party-relationships
security:
  data_classes:
    - internal
    - confidential
    - personal
  network_egress: []
  secret_handles: []
lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: retain_business_records
  migrations_path: modules/crm-party-relationships/migrations
  retained_record_types:
    - party-relationships.party_relationship
