schema_version: crm.module/v1
module_id: crm.party-relationships
version: "0.1.0"
display_name: CRM Party Relationships
description: Authoritative owner domain for typed, temporal Party-to-Party relationship state and hierarchy foundations.

owner:
  team: customer-platform
  contact: "crm-owner@example.com"
  codeowners:
    - "@iamaman11"

runtime:
  kind: in_process
  entrypoint: modules/crm-party-relationships

platform:
  minimum_version: "0.1.0"

dependencies:
  required:
    - module_id: crm.parties
      version_range: ">=0.3.0, <1.0.0"
  optional: []
  conflicts: []

provides:
  capabilities:
    - id: party-relationships.party-relationship.create
      version: "1.0.0"
    - id: party-relationships.party-relationship.update
      version: "1.0.0"
    - id: party-relationships.party-relationship.get
      version: "1.0.0"
    - id: party-relationships.party-relationship.list
      version: "1.0.0"
  events:
    - id: party-relationships.party-relationship.created
      version: "1.0.0"
    - id: party-relationships.party-relationship.updated
      version: "1.0.0"
  objects:
    - party-relationships.party_relationship
  ui_extensions: []

consumes:
  capabilities: []
  events: []

storage:
  record_types:
    - party-relationships.party_relationship
  private_state_namespaces:
    - crm.party-relationships

security:
  data_classes:
    - internal
    - confidential
    - personal
  network_egress: []
  secret_handles: []

lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: retain_business_records
  migrations_path: modules/crm-party-relationships/migrations
  retained_record_types:
    - party-relationships.party_relationship
