schema_version: crm.module/v1
module_id: crm.customer-360
version: "0.1.0"
display_name: CRM Customer 360
description: Permission-aware rebuildable Party-rooted read composition across authoritative customer-master owners; owns no mutable customer state.

owner:
  team: customer-platform
  contact: "crm-owner@example.com"
  codeowners:
    - "@iamaman11"

runtime:
  kind: in_process
  entrypoint: crates/crm-customer-360-query-adapter

platform:
  minimum_version: "0.1.0"

dependencies:
  required:
    - module_id: crm.parties
      version_range: ">=0.3.0, <1.0.0"
    - module_id: crm.customer-accounts
      version_range: ">=0.2.0, <1.0.0"
    - module_id: crm.contact-points
      version_range: ">=0.2.0, <1.0.0"
    - module_id: crm.party-relationships
      version_range: ">=0.1.0, <1.0.0"
  optional: []
  conflicts: []

provides:
  capabilities:
    - id: customer-360.customer.get
      version: "1.0.0"
  events: []
  objects: []
  ui_extensions: []

consumes:
  capabilities: []
  events:
    - id: parties.party.created
      version: "1.0.0"
    - id: parties.party.updated
      version: "1.0.0"
    - id: accounts.account.created
      version: "1.0.0"
    - id: accounts.account.updated
      version: "1.0.0"
    - id: contact-points.contact-point.created
      version: "1.0.0"
    - id: contact-points.contact-point.updated
      version: "1.0.0"
    - id: contact-points.contact-point.verified
      version: "1.0.0"
    - id: party-relationships.party-relationship.created
      version: "1.0.0"
    - id: party-relationships.party-relationship.updated
      version: "1.0.0"

storage:
  record_types: []
  private_state_namespaces: []

security:
  data_classes:
    - personal
  network_egress: []
  secret_handles: []

lifecycle:
  upgrade_policy: manual
  rollback_policy: supported
  uninstall_policy: delete_private_state
  retained_record_types: []
