[package]
name = "crm-api"
version = "0.1.0"
edition = "2024"
publish = false

[features]
default = []
customer-privacy-subject-verify-candidate = [
  "crm-application-runtime/customer-privacy-subject-verify-candidate",
]

[lints.clippy]
# Process-acceptance helpers intentionally pass explicit governed context values.
# Keep the exception local to the executable/test crate rather than weakening workspace policy.
too_many_arguments = "allow"

[dependencies]
crm-application-runtime = { path = "../../crates/crm-application-runtime" }

[dev-dependencies]
crm-capability-adapters = { path = "../../crates/crm-capability-adapters" }
crm-capability-ingress = { path = "../../crates/crm-capability-ingress" }
crm-capability-runtime = { path = "../../crates/crm-capability-runtime" }
crm-core-data = { path = "../../crates/crm-core-data" }
crm-customer-360-composition = { path = "../../crates/crm-customer-360-composition" }
crm-customer-privacy-capability-adapter = { path = "../../crates/crm-customer-privacy-capability-adapter" }
crm-customer-privacy-subject-capability-adapter = { path = "../../crates/crm-customer-privacy-subject-capability-adapter" }
crm-data-quality = { path = "../../modules/crm-data-quality" }
crm-data-quality-capability-adapter = { path = "../../crates/crm-data-quality-capability-adapter" }
crm-data-quality-source-composition = { path = "../../crates/crm-data-quality-source-composition" }
crm-module-sdk = { path = "../../crates/crm-module-sdk" }
crm-parties-query-adapter = { path = "../../crates/crm-parties-query-adapter" }
crm-party-relationships-projection = { path = "../../crates/crm-party-relationships-projection" }
crm-proto-contracts = { path = "../../crates/crm-proto-contracts" }
crm-query-runtime = { path = "../../crates/crm-query-runtime" }
crm-sales-activities-capability-composition = { path = "../../crates/crm-sales-activities-capability-composition" }
prost = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["json"] }
serde_json = "1"
sha2 = "0.10"
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "postgres", "json"] }
tokio = { version = "1", features = ["macros", "process", "rt-multi-thread", "time"] }
tonic = "0.14"
