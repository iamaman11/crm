[package]
name = "crm-api"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
crm-application-runtime = { path = "../../crates/crm-application-runtime" }

[dev-dependencies]
crm-capability-runtime = { path = "../../crates/crm-capability-runtime" }
crm-module-sdk = { path = "../../crates/crm-module-sdk" }
crm-proto-contracts = { path = "../../crates/crm-proto-contracts" }
crm-sales-activities-capability-composition = { path = "../../crates/crm-sales-activities-capability-composition" }
prost = "0.14"
reqwest = { version = "0.12", default-features = false, features = ["json"] }
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "postgres", "json"] }
tokio = { version = "1", features = ["macros", "process", "rt-multi-thread", "time"] }
tonic = "0.14"
