syntax = "proto3";

package crm.parties.v1;

import "crm/core/v1/common.proto";
import "crm/customer/v1/reference.proto";

// Explicit sentinel plus additive numeric values preserve safe evolution. An
// unknown future numeric value can survive Protobuf round-trip even when an
// older consumer does not yet understand its business meaning.
enum PartyKind {
  PARTY_KIND_UNSPECIFIED = 0;
  PARTY_KIND_PERSON = 1;
  PARTY_KIND_ORGANIZATION = 2;
}

enum PartySort {
  PARTY_SORT_UNSPECIFIED = 0;
  PARTY_SORT_UPDATED_AT_DESCENDING = 1;
}

// Public Party state is intentionally minimal. Merge redirects remain an
// authoritative private Party lifecycle concern and are resolved through the
// governed canonical-resolution query rather than by rewriting Party identity.
message Party {
  crm.customer.v1.PartyRef party_ref = 1;
  PartyKind kind = 2;
  string display_name = 3;
  crm.customer.v1.CustomerResourceVersion resource_version = 4;
}

message CreatePartyRequest {
  crm.customer.v1.PartyRef party_ref = 1;
  PartyKind kind = 2;
  string display_name = 3;
}

message CreatePartyResponse {
  Party party = 1;
}

message UpdatePartyRequest {
  crm.customer.v1.PartyRef party_ref = 1;
  int64 expected_version = 2;
  string display_name = 3;
}

message UpdatePartyResponse {
  Party party = 1;
}

message GetPartyRequest {
  crm.customer.v1.PartyRef party_ref = 1;
}

message GetPartyResponse {
  Party party = 1;
}

message ListPartiesRequest {
  crm.core.v1.PageRequest page = 1;
  optional PartyKind kind = 2;
  PartySort sort = 3;
}

message ListPartiesResponse {
  repeated Party parties = 1;
  crm.core.v1.PageInfo page = 2;
}

message PartyCreatedEvent {
  Party party = 1;
}

message PartyUpdatedEvent {
  Party party = 1;
  repeated string changed_fields = 2;
}

// Party-owned evidence that an absorbed Party entered the reversible merged
// lifecycle. The Party record remains durable and is never hard-deleted.
message PartyMergeRedirectAppliedEvent {
  crm.customer.v1.PartyRef absorbed_party_ref = 1;
  crm.customer.v1.PartyRef survivor_party_ref = 2;
  string merge_lineage_id = 3;
  int64 absorbed_party_version = 4;
}

// Party-owned evidence that a merge redirect was removed by exact governed
// unmerge. Historical merge lineage remains owned by crm.identity-resolution.
message PartyMergeRedirectRemovedEvent {
  crm.customer.v1.PartyRef absorbed_party_ref = 1;
  crm.customer.v1.PartyRef survivor_party_ref = 2;
  string merge_lineage_id = 3;
  int64 absorbed_party_version = 4;
}

// Party-owned evidence that merge survivorship changed the survivor's mutable
// Party state. The corresponding provenance decision is retained by the merge lineage.
message PartyMergeSurvivorshipUpdatedEvent {
  Party party = 1;
  string merge_lineage_id = 2;
  repeated string changed_fields = 3;
}

// Party-owned evidence that governed unmerge restored the exact survivor value
// owned by the active merge lineage. Later unrelated edits are never overwritten.
message PartyMergeSurvivorshipRestoredEvent {
  Party party = 1;
  string merge_lineage_id = 2;
  repeated string changed_fields = 3;
}

service PartyService {
  rpc CreateParty(CreatePartyRequest) returns (CreatePartyResponse);
  rpc UpdateParty(UpdatePartyRequest) returns (UpdatePartyResponse);
  rpc GetParty(GetPartyRequest) returns (GetPartyResponse);
  rpc ListParties(ListPartiesRequest) returns (ListPartiesResponse);
}
