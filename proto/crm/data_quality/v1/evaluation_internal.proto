syntax = "proto3";

package crm.data_quality.v1;

import "crm/customer/v1/reference.proto";
import "crm/data_quality/v1/evaluation_types.proto";
import "crm/parties/v1/party.proto";

message StagePartyEvaluationInputRequest {
  PartyEvaluationJobRef evaluation_job_ref = 1;
  int64 expected_job_version = 2;
  crm.customer.v1.PartyRef party_ref = 3;
  crm.parties.v1.PartyKind party_kind = 4;
  string display_name = 5;
  int64 party_resource_version = 6;
}

message StagePartyEvaluationInputResponse {
  PartyEvaluationJob evaluation_job = 1;
}

message PartyEvaluationStagedEvent {
  PartyEvaluationJob evaluation_job = 1;
}
