syntax = "proto3";

package crm.data_quality.v1;

import "crm/core/v1/common.proto";
import "crm/customer/v1/reference.proto";
import "crm/data_quality/v1/completeness.proto";
import "crm/data_quality/v1/evaluation_types.proto";
import "crm/data_quality/v1/reference.proto";

message PartyCompletenessComponentResult {
  string component_key = 1;
  string rule_key = 2;
  PartyRuleOutcomeRef rule_outcome_ref = 3;
  uint32 awarded_basis_points = 4;
}

message PartyCompletenessResult {
  PartyCompletenessResultRef completeness_result_ref = 1;
  PartyEvaluationJobRef evaluation_job_ref = 2;
  crm.customer.v1.PartyRef party_ref = 3;
  crm.customer.v1.CustomerResourceVersion evaluated_party_resource_version = 4;
  PartyCompletenessProfileVersionRef completeness_profile_version_ref = 5;
  uint32 score_basis_points = 6;
  repeated PartyCompletenessComponentResult components = 7;
  crm.core.v1.UnixTime computed_at = 8;
  crm.customer.v1.CustomerResourceVersion resource_version = 9;
}

message GetPartyCompletenessResultRequest {
  PartyCompletenessResultRef completeness_result_ref = 1;
}

message GetPartyCompletenessResultResponse {
  PartyCompletenessResult completeness_result = 1;
}
