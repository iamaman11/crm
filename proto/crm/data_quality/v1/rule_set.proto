syntax = "proto3";

package crm.data_quality.v1;

import "crm/core/v1/common.proto";
import "crm/customer/v1/reference.proto";
import "crm/data_quality/v1/quality_types.proto";
import "crm/data_quality/v1/reference.proto";

message PartyRuleSetDefinition {
  PartyQualityEvaluatorSemanticVersion evaluator_semantic_version = 1;
  repeated PartyQualityRule rules = 2;
}

message PartyRuleSetVersion {
  PartyRuleSetVersionRef rule_set_version_ref = 1;
  PartyRuleSetDefinition definition = 2;
  crm.core.v1.UnixTime published_at = 3;
  crm.customer.v1.CustomerResourceVersion resource_version = 4;
}

message PublishPartyRuleSetVersionRequest {
  PartyRuleSetDefinition definition = 1;
}

message PublishPartyRuleSetVersionResponse {
  PartyRuleSetVersion rule_set_version = 1;
}

message GetPartyRuleSetVersionRequest {
  PartyRuleSetVersionRef rule_set_version_ref = 1;
}

message GetPartyRuleSetVersionResponse {
  PartyRuleSetVersion rule_set_version = 1;
}

message PartyRuleSetVersionPublishedEvent {
  PartyRuleSetVersion rule_set_version = 1;
}
