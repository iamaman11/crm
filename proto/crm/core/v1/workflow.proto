syntax = "proto3";
package crm.core.v1;

import "crm/core/v1/common.proto";
import "crm/core/v1/execution_context.proto";

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_STATUS_RUNNING = 1;
  WORKFLOW_RUN_STATUS_WAITING_TIMER = 2;
  WORKFLOW_RUN_STATUS_WAITING_APPROVAL = 3;
  WORKFLOW_RUN_STATUS_COMPLETED = 4;
  WORKFLOW_RUN_STATUS_FAILED = 5;
  WORKFLOW_RUN_STATUS_CANCELLED = 6;
  WORKFLOW_RUN_STATUS_COMPENSATING = 7;
}
message WorkflowAction {
  string step_id = 1;
  string capability_id = 2;
  bytes input_template = 3;
  string idempotency_key_template = 4;
  string retry_policy_id = 5;
  optional string compensation_capability_id = 6;
  bool requires_approval = 7;
}
message WorkflowVersion {
  string workflow_version_id = 1;
  string workflow_id = 2;
  string trigger_event_type = 3;
  string condition_cel = 4;
  repeated WorkflowAction actions = 5;
  bool immutable_after_publish = 6;
}
message WorkflowRun {
  string run_id = 1;
  string tenant_id = 2;
  string workflow_version_id = 3;
  string trigger_event_id = 4;
  string metadata_snapshot_id = 5;
  string policy_snapshot_id = 6;
  WorkflowRunStatus status = 7;
  int64 next_wakeup_at_unix_nanos = 8;
}
message ApprovalRequest {
  string approval_id = 1;
  string tenant_id = 2;
  string workflow_run_id = 3;
  string capability_id = 4;
  string capability_version = 5;
  CapabilityRiskLevel risk_level = 6;
  bytes proposed_input_bytes = 7;
  bytes proposed_input_hash = 8;
  repeated DataClass data_classes_touched = 9;
  string requested_by_actor_id = 10;
  int64 expires_at_unix_nanos = 11;
  bool single_use = 12;
}
message PublishWorkflowRequest {
  ExecutionContext context = 1;
  WorkflowVersion workflow = 2;
}
message PublishWorkflowResponse {
  WorkflowVersion workflow = 1;
}
message StartWorkflowRequest {
  ExecutionContext context = 1;
  string workflow_version_id = 2;
  string trigger_event_id = 3;
  bytes input = 4;
}
message StartWorkflowResponse {
  WorkflowRun run = 1;
}
message SignalWorkflowRequest {
  ExecutionContext context = 1;
  string run_id = 2;
  string signal_name = 3;
  bytes payload = 4;
}
message SignalWorkflowResponse {
  WorkflowRun run = 1;
}
message ApproveActionRequest {
  ExecutionContext context = 1;
  string approval_id = 2;
  bytes proposed_input_hash = 3;
  string decision = 4;
  string reason = 5;
}
message ApproveActionResponse {
  ApprovalRequest approval = 1;
}
message CancelWorkflowRequest {
  ExecutionContext context = 1;
  string run_id = 2;
  string reason = 3;
}
message CancelWorkflowResponse {
  WorkflowRun run = 1;
}
message RetryFailureRequest {
  ExecutionContext context = 1;
  string run_id = 2;
  string failure_id = 3;
}
message RetryFailureResponse {
  WorkflowRun run = 1;
}

service WorkflowService {
  rpc PublishWorkflow(PublishWorkflowRequest) returns (PublishWorkflowResponse);
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc SignalWorkflow(SignalWorkflowRequest) returns (SignalWorkflowResponse);
  rpc ApproveAction(ApproveActionRequest) returns (ApproveActionResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
  rpc RetryFailure(RetryFailureRequest) returns (RetryFailureResponse);
}
