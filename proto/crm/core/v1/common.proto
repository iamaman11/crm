syntax = "proto3";
package crm.core.v1;

enum DataClass {
  DATA_CLASS_UNSPECIFIED = 0;
  DATA_CLASS_PUBLIC = 1;
  DATA_CLASS_INTERNAL = 2;
  DATA_CLASS_CONFIDENTIAL = 3;
  DATA_CLASS_PII = 4;
  DATA_CLASS_FINANCIAL = 5;
  DATA_CLASS_BIOMETRIC = 6;
  DATA_CLASS_LEGAL = 7;
  DATA_CLASS_SECRET = 8;
  DATA_CLASS_AUTH_TOKEN = 9;
  DATA_CLASS_SYSTEM_INTERNAL = 10;
}

enum CapabilityRiskLevel {
  CAPABILITY_RISK_LEVEL_UNSPECIFIED = 0;
  CAPABILITY_RISK_LEVEL_LOW = 1;
  CAPABILITY_RISK_LEVEL_MEDIUM = 2;
  CAPABILITY_RISK_LEVEL_HIGH = 3;
  CAPABILITY_RISK_LEVEL_CRITICAL = 4;
}

message PageRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message PageInfo {
  string next_page_token = 1;
  int64 total_size = 2;
}

message ResourceRef {
  string tenant_id = 1;
  string resource_type = 2;
  string resource_id = 3;
  optional int64 version = 4;
}

// ExactMoney carries an arbitrary precision signed integer encoded in canonical
// base-10 minor units. Binary floating point is forbidden for authoritative CRM
// money values.
message ExactMoney {
  string minor_units = 1;
  string currency_code = 2;
}

message CalendarDate {
  int32 year = 1;
  uint32 month = 2;
  uint32 day = 3;
}

message UnixTime {
  sint64 unix_nanos = 1;
}

message ActorOrTeamOwner {
  oneof owner {
    string actor_id = 1;
    string team_id = 2;
  }
}

// An absent patch message means Keep. Within a present patch message, exactly
// one operation must be selected.
message StringPatch {
  oneof operation {
    string set = 1;
    bool clear = 2;
  }
}

message ResourceRefPatch {
  oneof operation {
    ResourceRef set = 1;
    bool clear = 2;
  }
}

message ExactMoneyPatch {
  oneof operation {
    ExactMoney set = 1;
    bool clear = 2;
  }
}

message CalendarDatePatch {
  oneof operation {
    CalendarDate set = 1;
    bool clear = 2;
  }
}

message UInt32Patch {
  oneof operation {
    uint32 set = 1;
    bool clear = 2;
  }
}

message UnixTimePatch {
  oneof operation {
    UnixTime set = 1;
    bool clear = 2;
  }
}

message ActorOrTeamOwnerPatch {
  oneof operation {
    ActorOrTeamOwner set = 1;
    bool clear = 2;
  }
}
