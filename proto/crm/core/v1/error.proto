syntax = "proto3";
package crm.core.v1;

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_PERMISSION_DENIED = 1;
  ERROR_CODE_POLICY_DENIED = 2;
  ERROR_CODE_FIELD_MASKED = 3;
  ERROR_CODE_IDEMPOTENCY_CONFLICT = 4;
  ERROR_CODE_VALIDATION_FAILED = 5;
  ERROR_CODE_SCHEMA_INCOMPATIBLE = 6;
  ERROR_CODE_RATE_LIMITED = 7;
  ERROR_CODE_APPROVAL_REQUIRED = 8;
  ERROR_CODE_NOT_FOUND = 9;
  ERROR_CODE_CONFLICT = 10;
  ERROR_CODE_RETRYABLE_EXTERNAL_ERROR = 11;
  ERROR_CODE_NON_RETRYABLE_EXTERNAL_ERROR = 12;
  ERROR_CODE_IN_PROGRESS = 13;
  ERROR_CODE_LEGAL_HOLD = 14;
}

message ErrorDetail {
  ErrorCode code = 1;
  string message = 2;
  string correlation_id = 3;
  optional string policy_id = 4;
  optional string field_api_name = 5;
  bool retryable = 6;
  optional int64 retry_after_millis = 7;
  map<string, string> metadata = 8;
  reserved 9 to 20;
}
