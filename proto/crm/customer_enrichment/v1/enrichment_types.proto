syntax = "proto3";

package crm.customer_enrichment.v1;

import "crm/customer/v1/reference.proto";

// The first published target vocabulary is intentionally limited to Party display name.
enum EnrichmentTargetField {
  ENRICHMENT_TARGET_FIELD_UNSPECIFIED = 0;
  ENRICHMENT_TARGET_FIELD_PARTY_DISPLAY_NAME = 1;
}

enum RawProviderPayloadPolicy {
  RAW_PROVIDER_PAYLOAD_POLICY_UNSPECIFIED = 0;
  RAW_PROVIDER_PAYLOAD_POLICY_DIGEST_ONLY = 1;
  RAW_PROVIDER_PAYLOAD_POLICY_GOVERNED_PROTECTED_EVIDENCE = 2;
}

enum EnrichmentRequestStatus {
  ENRICHMENT_REQUEST_STATUS_UNSPECIFIED = 0;
  ENRICHMENT_REQUEST_STATUS_CREATED = 1;
  ENRICHMENT_REQUEST_STATUS_QUEUED = 2;
  ENRICHMENT_REQUEST_STATUS_DISPATCHED = 3;
  ENRICHMENT_REQUEST_STATUS_RESPONSE_RECORDED = 4;
  ENRICHMENT_REQUEST_STATUS_SUGGESTIONS_MATERIALIZED = 5;
  ENRICHMENT_REQUEST_STATUS_COMPLETED = 6;
  ENRICHMENT_REQUEST_STATUS_FAILED_RETRYABLE = 7;
  ENRICHMENT_REQUEST_STATUS_FAILED_TERMINAL = 8;
  ENRICHMENT_REQUEST_STATUS_CANCELLED = 9;
  ENRICHMENT_REQUEST_STATUS_EXPIRED = 10;
}

enum ProviderResponseClass {
  PROVIDER_RESPONSE_CLASS_UNSPECIFIED = 0;
  PROVIDER_RESPONSE_CLASS_SUCCESS = 1;
  PROVIDER_RESPONSE_CLASS_NO_MATCH = 2;
  PROVIDER_RESPONSE_CLASS_RETRYABLE_FAILURE = 3;
  PROVIDER_RESPONSE_CLASS_TERMINAL_FAILURE = 4;
}

enum SuggestionReviewDecisionKind {
  SUGGESTION_REVIEW_DECISION_KIND_UNSPECIFIED = 0;
  SUGGESTION_REVIEW_DECISION_KIND_ACCEPTED = 1;
  SUGGESTION_REVIEW_DECISION_KIND_REJECTED = 2;
}

enum SuggestionLifecycleStatus {
  SUGGESTION_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  SUGGESTION_LIFECYCLE_STATUS_PROPOSED = 1;
  SUGGESTION_LIFECYCLE_STATUS_ACCEPTED = 2;
  SUGGESTION_LIFECYCLE_STATUS_REJECTED = 3;
  SUGGESTION_LIFECYCLE_STATUS_EXPIRED = 4;
  SUGGESTION_LIFECYCLE_STATUS_SUPERSEDED = 5;
  SUGGESTION_LIFECYCLE_STATUS_APPLIED = 6;
  SUGGESTION_LIFECYCLE_STATUS_APPLICATION_FAILED_RETRYABLE = 7;
  SUGGESTION_LIFECYCLE_STATUS_APPLICATION_FAILED_TERMINAL = 8;
}

enum ProviderUsageKind {
  PROVIDER_USAGE_KIND_UNSPECIFIED = 0;
  PROVIDER_USAGE_KIND_REQUEST_DISPATCHED = 1;
  PROVIDER_USAGE_KIND_RESPONSE_RECEIVED = 2;
  PROVIDER_USAGE_KIND_BILLABLE_UNITS = 3;
  PROVIDER_USAGE_KIND_QUOTA_SNAPSHOT = 4;
}

message EnrichmentTargetSnapshot {
  crm.customer.v1.PartyRef party_ref = 1;
  int64 party_resource_version = 2;
  EnrichmentTargetField target_field = 3;
}

message EnrichmentRequestPolicyEvidence {
  string purpose_code = 1;
  string legal_basis_code = 2;
  optional string consent_evidence_reference = 3;
  string policy_version = 4;
}

message ProviderPolicyEvidence {
  string license_id = 1;
  string permitted_use_class = 2;
  string residency_region = 3;
  uint32 retention_days = 4;
  optional string consent_evidence_reference = 5;
}
