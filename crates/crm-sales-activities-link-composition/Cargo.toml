[package]
name = "crm-sales-activities-link-composition"
version = "0.1.0"
edition = "2024"
publish = false

[features]
default = []
postgres-integration = []

[dependencies]
crm-core-events = { path = "../crm-core-events" }
crm-module-sdk = { path = "../crm-module-sdk" }
crm-sales-activities-link = { path = "../../modules/crm-sales-activities-link" }
crm-sales-activities-link-contract-adapter = { path = "../crm-sales-activities-link-contract-adapter" }
sha2 = "0.10"

[dev-dependencies]
crm-capability-adapters = { path = "../crm-capability-adapters" }
crm-capability-ingress = { path = "../crm-capability-ingress" }
crm-capability-runtime = { path = "../crm-capability-runtime" }
crm-core-data = { path = "../crm-core-data" }
crm-proto-contracts = { path = "../crm-proto-contracts" }
crm-sales-activities-capability-composition = { path = "../crm-sales-activities-capability-composition" }
prost = "0.14"
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "postgres"] }
tokio = { version = "1", features = ["macros", "rt"] }

[[test]]
name = "postgres_link_delivery"
path = "tests/postgres_link_delivery.rs"
required-features = ["postgres-integration"]
