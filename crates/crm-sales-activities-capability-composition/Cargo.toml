[package]
name = "crm-sales-activities-capability-composition"
version = "0.1.0"
edition = "2024"
publish = false

[features]
default = []
postgres-integration = []

[dependencies]
crm-activities-capability-adapter = { path = "../crm-activities-capability-adapter" }
crm-capability-adapters = { path = "../crm-capability-adapters" }
crm-capability-runtime = { path = "../crm-capability-runtime" }
crm-core-data = { path = "../crm-core-data" }
crm-core-events = { path = "../crm-core-events" }
crm-module-sdk = { path = "../crm-module-sdk" }
crm-projection-runtime = { path = "../crm-projection-runtime" }
crm-proto-contracts = { path = "../crm-proto-contracts" }
crm-sales-activities-link = { path = "../../modules/crm-sales-activities-link" }
crm-sales-activities-link-contract-adapter = { path = "../crm-sales-activities-link-contract-adapter" }
crm-sales-activities-query-adapter = { path = "../crm-sales-activities-query-adapter" }
crm-sales-capability-adapter = { path = "../crm-sales-capability-adapter" }
crm-search-runtime = { path = "../crm-search-runtime" }
prost = "0.14"
serde_json = "1"

[dev-dependencies]
crm-query-runtime = { path = "../crm-query-runtime" }
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "postgres"] }
tokio = { version = "1", features = ["macros", "rt"] }

[[test]]
name = "postgres_queries"
path = "tests/postgres_queries.rs"
required-features = ["postgres-integration"]

[[test]]
name = "postgres_link_delivery"
path = "tests/postgres_link_delivery.rs"
required-features = ["postgres-integration"]

[[test]]
name = "postgres_projections"
path = "tests/postgres_projections.rs"
required-features = ["postgres-integration"]
