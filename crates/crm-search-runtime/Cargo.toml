[package]
name = "crm-search-runtime"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
crm-core-events = { path = "../crm-core-events" }
crm-module-sdk = { path = "../crm-module-sdk" }
crm-query-runtime = { path = "../crm-query-runtime" }
serde = { version = "1", features = ["derive"] }
